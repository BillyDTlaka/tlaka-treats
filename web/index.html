// ── DASHBOARD MODULE ──────────────────────────────────────────────────────
function renderAdminDashboard(data, container, reload, navigate) {
  const { orders: allOrders, ambassadors, products } = data;

  let dateFilter = 'all'; // 'today' | '7d' | '30d' | 'all' | 'custom'
  let customFrom = '', customTo = '';

  const page = el('div', { className: 'p-6 max-w-5xl mx-auto' });
  container.append(page);

  function getFilteredOrders() {
    if (dateFilter === 'all') return allOrders;
    if (dateFilter === 'custom') {
      return allOrders.filter(o => {
        const d = new Date(o.createdAt);
        if (customFrom && d < new Date(customFrom)) return false;
        if (customTo) { const to = new Date(customTo); to.setHours(23,59,59,999); if (d > to) return false; }
        return true;
      });
    }
    const cutoff = new Date();
    if (dateFilter === 'today')     cutoff.setHours(0, 0, 0, 0);
    else if (dateFilter === '7d')   cutoff.setDate(cutoff.getDate() - 7);
    else if (dateFilter === '30d')  cutoff.setDate(cutoff.getDate() - 30);
    return allOrders.filter(o => new Date(o.createdAt) >= cutoff);
  }

  function render() {
    page.innerHTML = '';
    const orders        = getFilteredOrders();
    const revenue       = orders.reduce((s, o) => s + Number(o.total || 0), 0);
    const pendingOrders = orders.filter(o => o.status === 'PENDING').length;
    const activeAmb     = ambassadors.filter(a => a.status === 'ACTIVE').length;
    const activeProducts= products.filter(p => p.isActive).length;

    // Date filter row
    const filterDefs = [
      { id: 'all',   label: 'All Time' },
      { id: 'today', label: 'Today'    },
      { id: '7d',    label: '7 Days'   },
      { id: '30d',   label: '30 Days'  },
    ];
    const fromInput = el('input', {
      type: 'date',
      className: `border rounded-lg px-2 py-1 text-xs outline-none focus:ring-2 focus:ring-brand ${dateFilter === 'custom' ? 'border-brand' : 'border-gray-200 bg-white'}`,
      onInput: e => { customFrom = e.target.value; dateFilter = 'custom'; render(); },
    });
    if (customFrom) fromInput.value = customFrom;
    const toInput = el('input', {
      type: 'date',
      className: `border rounded-lg px-2 py-1 text-xs outline-none focus:ring-2 focus:ring-brand ${dateFilter === 'custom' ? 'border-brand' : 'border-gray-200 bg-white'}`,
      onInput: e => { customTo = e.target.value; dateFilter = 'custom'; render(); },
    });
    if (customTo) toInput.value = customTo;
    page.append(
      el('div', { className: 'flex flex-wrap items-center gap-2 mb-5' },
        el('span', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide' }, 'Period:'),
        ...filterDefs.map(f =>
          el('button', {
            className: `px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${
              dateFilter === f.id
                ? 'bg-brand text-white'
                : 'bg-white text-gray-500 border border-gray-200 hover:border-brand hover:text-brand'
            }`,
            onClick: () => { dateFilter = f.id; customFrom = ''; customTo = ''; render(); }
          }, f.label)
        ),
        el('span', { className: 'text-gray-200 text-sm mx-1' }, '|'),
        el('span', { className: 'text-xs font-semibold text-gray-400' }, 'Custom:'),
        fromInput,
        el('span', { className: 'text-xs text-gray-400' }, '→'),
        toInput
      )
    );

    // KPI cards
    page.append(el('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-6' },
      kpiCard('Total Revenue',      `R${revenue.toFixed(2)}`, '#10B981', 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z'),
      kpiCard('Total Orders',       String(orders.length),    '#3B82F6', 'M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z|M3 6h18',                                           navigate ? () => navigate('orders')      : null),
      kpiCard('Pending Orders',     String(pendingOrders),    '#F59E0B', 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z',                                                      navigate ? () => navigate('orders')      : null),
      kpiCard('Active Ambassadors', String(activeAmb),        '#8B5CF6', 'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2|M9 11a4 4 0 100-8 4 4 0 000 8z',                         navigate ? () => navigate('ambassadors') : null)
    ));

    // Recent Orders table — top 5, sorted newest first
    const recentOrders = [...orders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
    page.append(
      el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6' },
        el('div', { className: 'px-5 py-4 border-b border-gray-100 flex justify-between items-center' },
          el('h3', { className: 'font-bold text-gray-900 text-sm' }, 'Recent Orders'),
          navigate
            ? el('button', { className: 'text-xs text-brand font-semibold hover:opacity-80', onClick: () => navigate('orders') }, 'View all →')
            : el('span', { className: 'text-xs text-gray-400' }, `${orders.length} total`)

                  ),
                  el('div', { className: 'flex items-center gap-3' },
                    el('p', { className: 'text-sm font-bold text-gray-900' }, `R${Number(order.total).toFixed(2)}`),
                    badge(order.status, STATUS_COLORS[order.status])
                  )
                )
              )
          )
        )
      )
    );

    // Quick stats row
    page.append(el('div', { className: 'grid grid-cols-2 gap-4' },
      el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
        el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3' }, 'Products'),
        el('div', { className: 'flex justify-between' },
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-green-600' }, String(activeProducts)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Active')
          ),
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-gray-400' }, String(products.length - activeProducts)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Inactive')
          ),
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-gray-900' }, String(products.length)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Total')
          )
        )
      ),
      el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
        el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3' }, 'Ambassadors'),
        el('div', { className: 'flex justify-between' },
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-green-600' }, String(activeAmb)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Active')
          ),
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-yellow-500' }, String(ambassadors.filter(a => a.status === 'PENDING').length)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Pending')
          ),
          el('div', { className: 'text-center' },
            el('p', { className: 'text-2xl font-black text-gray-900' }, String(ambassadors.length)),
            el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Total')
          )
        )
      )
    ));
  }

  render();
}

function kpiCard(label, value, color, iconPath, onClick) {
  return el('div', {
    className: `bg-white rounded-xl p-5 shadow-sm border border-gray-100 transition-shadow${onClick ? ' cursor-pointer hover:shadow-md' : ''}`,
    onClick: onClick || undefined,
  },
    el('div', { className: 'flex items-start justify-between mb-3' },
      el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide leading-tight' }, label),
      el('div', { className: 'w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0', style: { backgroundColor: color + '20', color } },
        svgIcon(iconPath, 15)
      )
    ),
    el('p', { className: 'text-2xl font-black', style: { color } }, value)
  );
}

// ── ORDERS MODULE ─────────────────────────────────────────────────────────
// ── Status workflow config ─────────────────────────────────────────────────
const STATUS_SEQUENCE = ['PENDING','CONFIRMED','BAKING','READY','DELIVERED'];
const STATUS_NEXT_ACTION = {
  PENDING:   { label: '✓ Confirm Order',  next: 'CONFIRMED',  btnClass: 'bg-blue-500 hover:bg-blue-600 text-white'    },
  CONFIRMED: { label: '▶ Advance Order',  next: 'BAKING',     btnClass: 'bg-purple-500 hover:bg-purple-600 text-white' },
  BAKING:    { label: '✅ Mark Ready',    next: 'READY',      btnClass: 'bg-green-500 hover:bg-green-600 text-white'   },
  READY:     { label: '🚚 Mark Delivered',next: 'DELIVERED',  btnClass: 'bg-gray-600 hover:bg-gray-700 text-white'     },
};

function renderAdminOrders(data, container, reload) {
  let allOrders = [...data.orders];
  let allQuotes = [...(data.quotes || [])];
  let searchQ = '', statusFilter = '', sortDir = 'desc';
  let detailOrder = null;
  let activeTab = 'orders'; // 'orders' | 'quotes'

  const page = el('div', {});
  container.append(page);

  async function refreshDetail(id) {
    try {
      const fresh = await api.orders.getById(id);
      const idx = allOrders.findIndex(o => o.id === id);
      if (idx !== -1) allOrders[idx] = fresh;
      detailOrder = fresh;
      renderPage();
    } catch (e) { toast(e.message || 'Failed to refresh order'); }
  }

  function renderPage() {
    page.innerHTML = '';
    if (detailOrder) { renderDetailView(detailOrder); return; }
    // Tab bar
    const tabBar = el('div', { className: 'flex gap-1 px-6 pt-5 pb-0 border-b border-gray-200 bg-gray-50' });
    [['orders', `Orders (${allOrders.length})`], ['quotes', `Quotes (${allQuotes.length})`]].forEach(([tab, label]) => {
      tabBar.append(el('button', {
        className: `px-4 py-2 text-sm font-bold rounded-t-lg border border-b-0 transition -mb-px ${activeTab === tab ? 'bg-white border-gray-200 text-brand' : 'bg-transparent border-transparent text-gray-400 hover:text-gray-700'}`,
        onClick: () => { activeTab = tab; renderPage(); },
      }, label));
    });
    page.append(tabBar);
    if (activeTab === 'orders') renderListView();
    else renderQuoteListView();
  }

  // ── LIST VIEW ───────────────────────────────────────────────────────────
  function renderListView() {
    const wrap = el('div', { className: 'p-6 max-w-6xl mx-auto' });

    // Status chips
    const chipsRow = el('div', { className: 'flex gap-2 flex-wrap mb-5' });
    function renderChips() {
      chipsRow.innerHTML = '';
      chipsRow.append(el('button', {
        className: `px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${statusFilter === '' ? 'bg-gray-800 border-gray-800 text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-400'}`,
        onClick: () => { statusFilter = ''; renderChips(); renderTable(); },
      }, `All (${allOrders.length})`));
      ['PENDING','CONFIRMED','BAKING','READY','DELIVERED','CANCELLED'].forEach(s => {
        const count = allOrders.filter(o => o.status === s).length;
        const isActive = statusFilter === s;
        chipsRow.append(el('button', {
          className: `flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${isActive ? 'text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`,
          style: isActive ? { backgroundColor: STATUS_COLORS[s], borderColor: STATUS_COLORS[s] } : {},
          onClick: () => { statusFilter = s; renderChips(); renderTable(); },
        },
          el('span', { className: 'w-2 h-2 rounded-full flex-shrink-0', style: { backgroundColor: isActive ? 'rgba(255,255,255,0.6)' : STATUS_COLORS[s] } }),
          s,
          el('span', { className: `text-xs px-1.5 py-0 rounded-full ml-0.5 ${isActive ? 'bg-white bg-opacity-25 text-white' : 'bg-gray-100 text-gray-500'}` }, String(count))
        ));
      });
    }
    wrap.append(chipsRow);

    // Toolbar
    const revSummary = el('div', { className: 'ml-auto' });
    const searchBox = el('input', {
      type: 'text', placeholder: '🔍  Search by customer name, email, or ambassador code…',
      className: 'flex-1 min-w-56 bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
      onInput: e => { searchQ = e.target.value; renderTable(); },
    });
    const sortSel = el('select', {
      className: 'bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
    });
    [['desc','Newest first'],['asc','Oldest first'],['total-desc','Highest value'],['total-asc','Lowest value']].forEach(([v,l]) => {
      const o = document.createElement('option'); o.value = v; o.textContent = l; sortSel.append(o);
    });
    sortSel.value = sortDir;
    sortSel.addEventListener('change', e => { sortDir = e.target.value; renderTable(); });
    wrap.append(el('div', { className: 'flex flex-wrap items-center gap-3 mb-5' },
      searchBox, sortSel,
      el('button', {
        className: 'bg-brand text-white text-sm font-bold px-4 py-2.5 rounded-xl hover:opacity-90 transition flex-shrink-0',
        onClick: () => showAdminPlaceOrderModal(data.customers, data.products, () => reload()),
      }, '+ Place Order'),
      el('button', {
        className: 'bg-white border border-brand text-brand text-sm font-bold px-4 py-2.5 rounded-xl hover:bg-brand-light transition flex-shrink-0',
        onClick: () => showQuoteModal(data.customers, data.products, data.discountRules || [], null, () => {
          api.quotes.getAll().then(q => { allQuotes = q; activeTab = 'quotes'; renderPage(); }).catch(() => {});
        }),
      }, '+ New Quote'),
      revSummary
    ));

    const tableWrap = el('div', {});
    wrap.append(tableWrap);

    function getFiltered() {
      const q = searchQ.toLowerCase().trim();
      let list = allOrders.filter(o => {
        if (statusFilter && o.status !== statusFilter) return false;
        if (q) {
          const name  = `${o.customer?.firstName || ''} ${o.customer?.lastName || ''}`.toLowerCase();
          const email = (o.customer?.email  || '').toLowerCase();
          const code  = (o.ambassador?.code || '').toLowerCase();
          const phone = (o.customer?.phone  || '').toLowerCase();
          if (!name.includes(q) && !email.includes(q) && !code.includes(q) && !phone.includes(q)) return false;
        }
        return true;
      });
      if (sortDir === 'asc')             list.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
      else if (sortDir === 'desc')       list.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      else if (sortDir === 'total-desc') list.sort((a,b) => Number(b.total) - Number(a.total));
      else if (sortDir === 'total-asc')  list.sort((a,b) => Number(a.total) - Number(b.total));
      return list;
    }

    function renderTable() {
      tableWrap.innerHTML = '';
      const filtered = getFiltered();
      const revenue  = filtered.reduce((s,o) => s + Number(o.total || 0), 0);
      revSummary.innerHTML = '';
      revSummary.append(
        el('div', { className: 'bg-white rounded-lg px-4 py-2 border border-gray-200 text-sm whitespace-nowrap' },
          el('span', { className: 'text-gray-500' }, `${filtered.length} orders · `),
          el('span', { className: 'font-black text-gray-900' }, `R${revenue.toFixed(2)}`)
        )
      );
      if (!filtered.length) {
        tableWrap.append(el('div', { className: 'bg-white rounded-xl p-14 text-center shadow-sm border border-gray-100' },
          el('p', { className: 'text-4xl mb-3' }, '📦'),
          el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No orders found'),
          el('p', { className: 'text-sm text-gray-400' }, searchQ ? 'Try adjusting your search' : 'No orders yet')
        )); return;
      }
      const table = el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden' });
      table.append(
        el('div', { className: 'hidden md:grid grid-cols-12 bg-gray-50 border-b border-gray-100 px-5 py-3 text-xs font-black text-gray-400 uppercase tracking-wider' },
          el('div', { className: 'col-span-3' }, 'Customer'),
          el('div', { className: 'col-span-2' }, 'Date & Time'),
          el('div', { className: 'col-span-1 text-center' }, 'Items'),
          el('div', { className: 'col-span-2' }, 'Total'),
          el('div', { className: 'col-span-2' }, 'Ambassador'),
          el('div', { className: 'col-span-2' }, 'Status'),
        )
      );
      const tbody = el('div', { className: 'divide-y divide-gray-50' });
      filtered.forEach(order => {
        const dateObj = new Date(order.createdAt);
        const dateStr = dateObj.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' });
        const timeStr = dateObj.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
        const row = el('div', {
          className: 'grid grid-cols-12 items-center px-5 py-3.5 cursor-pointer hover:bg-gray-50 transition select-none',
          onClick: () => { detailOrder = order; renderPage(); },
        });
        row.append(el('div', { className: 'col-span-6 md:col-span-3 min-w-0 pr-2' },
          el('p', { className: 'font-semibold text-gray-900 text-sm truncate' }, `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`),
          el('p', { className: 'text-xs text-gray-400 truncate' }, order.customer?.email || '—')
        ));
        row.append(el('div', { className: 'hidden md:block col-span-2' },
          el('p', { className: 'text-sm text-gray-700' }, dateStr),
          el('p', { className: 'text-xs text-gray-400' }, timeStr)
        ));
        row.append(el('div', { className: 'hidden md:flex col-span-1 justify-center' },
          el('span', { className: 'bg-gray-100 text-gray-700 text-xs font-bold px-2 py-0.5 rounded-full' }, String(order.items?.length || 0))
        ));
        row.append(el('div', { className: 'col-span-3 md:col-span-2' },
          el('p', { className: 'font-black text-gray-900 text-sm' }, `R${Number(order.total).toFixed(2)}`),
          order.commission ? el('p', { className: 'text-xs text-green-600 font-semibold' }, `comm. R${Number(order.commission.amount).toFixed(2)}`) : null
        ));
        row.append(el('div', { className: 'hidden md:block col-span-2' },
          order.ambassador
            ? el('span', { className: 'text-xs bg-brand-light text-brand-dark font-bold px-2 py-0.5 rounded-full' }, order.ambassador.code)
            : el('span', { className: 'text-xs text-gray-300' }, '—')
        ));
        row.append(el('div', { className: 'col-span-3 md:col-span-2 flex items-center gap-2' },
          badge(order.status, STATUS_COLORS[order.status] || '#999'),
          el('span', { className: 'hidden md:block text-gray-400 text-sm ml-auto' }, '›')
        ));
        tbody.append(row);
      });
      table.append(tbody);
      tableWrap.append(table);
    }

    renderChips();
    renderTable();
    page.append(wrap);
  }

  // ── DETAIL VIEW ─────────────────────────────────────────────────────────
  function renderDetailView(order) {
    const isTerminal = ['DELIVERED','CANCELLED'].includes(order.status);
    const dateObj = new Date(order.createdAt);
    const dateStr = dateObj.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' });
    const timeStr = dateObj.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
    const wrap = el('div', { className: 'p-6 max-w-4xl mx-auto' });

    // Header
    wrap.append(
      el('div', { className: 'flex items-center justify-between mb-5 flex-wrap gap-3' },
        el('div', { className: 'flex items-center gap-2' },
          el('button', {
            className: 'flex items-center gap-1 text-sm font-semibold text-gray-500 hover:text-gray-900 transition',
            onClick: () => { detailOrder = null; renderPage(); },
          }, '← All Orders'),
          el('span', { className: 'text-gray-300' }, '/'),
          el('span', { className: 'text-sm font-black text-gray-900' }, `Order #${order.id.slice(-8).toUpperCase()}`)
        ),
        el('div', { className: 'flex items-center gap-2 flex-wrap' },
          badge(order.status, STATUS_COLORS[order.status] || '#999'),
          !isTerminal && el('button', {
            className: 'px-3 py-1.5 bg-white border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition',
            onClick: () => showOrderEditModal(order, data.products, () => refreshDetail(order.id)),
          }, '✏️ Edit Order'),
          el('button', {
            className: 'px-3 py-1.5 bg-white border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition',
            onClick: async (e) => {
              const btn = e.currentTarget;
              btn.disabled = true; btn.textContent = '⏳ Generating…';
              try {
                const updated = await api.orders.invoice(order.id);
                allOrders[allOrders.findIndex(o => o.id === order.id)] = updated;
                detailOrder = updated;
                renderPage();
                printInvoice(updated);
                toast('Invoice generated', 'success');
              } catch (err) { toast(err.message || 'Failed'); btn.disabled = false; btn.textContent = '🧾 Invoice'; }
            },
          }, order.invoiceNumber ? `🧾 ${order.invoiceNumber}` : '🧾 Invoice')
        )
      )
    );

    // Status stepper
    const currentIdx = STATUS_SEQUENCE.indexOf(order.status);
    wrap.append(
      el('div', { className: 'bg-white rounded-xl px-4 py-3 border border-gray-100 mb-4 flex items-center gap-1 flex-wrap' },
        ...STATUS_SEQUENCE.flatMap((s, i) => {
          const done = i < currentIdx, active = i === currentIdx;
          const chip = el('span', {
            className: `text-xs font-bold px-2.5 py-1 rounded-full ${active ? 'text-white' : done ? 'text-green-700 bg-green-100' : 'text-gray-300 bg-gray-100'}`,
            style: active ? { backgroundColor: STATUS_COLORS[s] } : {},
          }, s);
          return i < STATUS_SEQUENCE.length - 1 ? [chip, el('span', { className: 'text-gray-300 text-xs' }, '→')] : [chip];
        })
      )
    );

    // Items table
    if (order.items?.length) {
      wrap.append(
        el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100 mb-4' },
          el('div', { className: 'px-4 py-2.5 bg-gray-50 border-b border-gray-100' },
            el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider' }, `Order Items (${order.items.length})`)
          ),
          el('div', { className: 'divide-y divide-gray-50' },
            ...order.items.map(item => {
              const pname = item.variant?.product?.name || 'Unknown Product';
              const vname = item.variant?.name || '';
              const unitP = Number(item.unitPrice || 0);
              const qty   = item.quantity;
              return el('div', { className: 'px-4 py-3 flex justify-between items-center' },
                el('div', {},
                  el('p', { className: 'text-sm font-semibold text-gray-900' }, pname + (vname ? ` — ${vname}` : '')),
                  el('p', { className: 'text-xs text-gray-400 mt-0.5' }, `${qty} × R${unitP.toFixed(2)} each`)
                ),
                el('p', { className: 'font-black text-gray-900 text-sm' }, `R${(unitP * qty).toFixed(2)}`)
              );
            }),
            el('div', { className: 'px-4 py-3 bg-gray-50 space-y-1' },
              el('div', { className: 'flex justify-between text-xs text-gray-500' },
                el('span', {}, 'Subtotal'), el('span', {}, `R${Number(order.subtotal || 0).toFixed(2)}`)
              ),
              el('div', { className: 'flex justify-between text-xs text-gray-500' },
                el('span', {}, 'Delivery fee'), el('span', {}, `R${Number(order.deliveryFee || 0).toFixed(2)}`)
              ),
              el('div', { className: 'flex justify-between text-sm font-black text-gray-900 mt-1 pt-1.5 border-t border-gray-200' },
                el('span', {}, 'Total'), el('span', {}, `R${Number(order.total).toFixed(2)}`)
              )
            )
          )
        )
      );
    }

    // Info cards
    const infoRow = el('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 mb-4' });
    infoRow.append(
      el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100 space-y-1' },
        el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '👤 Customer'),
        el('p', { className: 'font-bold text-gray-900' }, `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`),
        order.customer?.email ? el('a', { href: `mailto:${order.customer.email}`, className: 'text-sm text-blue-500 hover:underline block' }, order.customer.email) : null,
        order.customer?.phone ? el('a', { href: `tel:${order.customer.phone}`, className: 'text-sm text-brand hover:underline block' }, order.customer.phone) : null
      )
    );
    if (order.ambassador) {
      const comm = order.commission;
      infoRow.append(
        el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100' },
          el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '🌟 Ambassador'),
          el('p', { className: 'font-black text-brand text-lg tracking-wide' }, order.ambassador.code),
          comm
            ? el('div', { className: 'mt-1 flex items-center gap-2 flex-wrap' },
                el('span', { className: 'text-sm font-semibold text-gray-700' }, `R${Number(comm.amount).toFixed(2)} commission`),
                badge(comm.status, comm.status === 'PAID' ? '#10B981' : '#F59E0B')
              )
            : el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Commission generated on confirmation')
        )
      );
    }
    infoRow.append(
      el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100' },
        el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '🕐 Timeline'),
        el('p', { className: 'text-sm text-gray-600 mb-1' }, `Placed: ${dateStr} at ${timeStr}`),
        ...((order.statusLogs || []).map(log => {
          const logDate = new Date(log.createdAt).toLocaleTimeString('en-ZA', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
          return el('p', { className: 'text-xs text-gray-400' },
            el('span', { className: 'font-semibold', style: { color: STATUS_COLORS[log.status] || '#999' } }, log.status),
            ` — ${logDate}${log.note ? ` · "${log.note}"` : ''}`
          );
        }))
      )
    );
    wrap.append(infoRow);

    // Notes
    if (order.notes) {
      wrap.append(
        el('div', { className: 'bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-3 mb-4' },
          el('p', { className: 'text-xs font-black text-yellow-600 uppercase tracking-wider mb-1' }, '📝 Customer Note'),
          el('p', { className: 'text-sm text-yellow-900' }, order.notes)
        )
      );
    }

    // Action panel
    if (!isTerminal) {
      const nextAction = STATUS_NEXT_ACTION[order.status];
      let cancelNote = '', showingCancelInput = false;

      const cancelNoteInput = el('input', {
        type: 'text', placeholder: 'Reason for cancellation (optional)…',
        className: 'flex-1 min-w-48 border border-red-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-red-400 hidden',
        onInput: e => { cancelNote = e.target.value; },
      });

      const cancelBtn = el('button', {
        className: 'border-2 border-red-300 text-red-500 text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-red-50 transition',
      }, '✕ Cancel Order');
      cancelBtn.addEventListener('click', async () => {
        if (!showingCancelInput) {
          showingCancelInput = true;
          cancelNoteInput.classList.remove('hidden');
          cancelBtn.textContent = '✕ Confirm Cancellation';
          cancelBtn.className = 'bg-red-500 text-white text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-red-600 transition';
          return;
        }
        cancelBtn.disabled = true; cancelBtn.textContent = 'Cancelling…';
        try {
          await api.orders.updateStatus(order.id, 'CANCELLED', cancelNote || undefined);
          toast('Order cancelled', 'success');
          await refreshDetail(order.id);
        } catch (err) { toast(err.message || 'Failed'); cancelBtn.disabled = false; cancelBtn.textContent = '✕ Confirm Cancellation'; }
      });

      const actionsRow = el('div', { className: 'flex flex-wrap gap-2 items-center' });
      if (nextAction) {
        const advBtn = el('button', {
          className: `text-sm font-bold px-6 py-2.5 rounded-xl transition ${nextAction.btnClass}`,
        }, nextAction.label);
        advBtn.addEventListener('click', async () => {
          advBtn.disabled = true; advBtn.textContent = 'Updating…';
          try {
            const result = await api.orders.updateStatus(order.id, nextAction.next);
            const actual = result?.status || nextAction.next;
            const labels = { BAKING: '🍞 Sent to baking', READY: '✅ Marked Ready', DELIVERED: '🚚 Delivered', CONFIRMED: '✓ Confirmed — stock deducted from inventory' };
            toast(labels[actual] || `Marked ${actual} ✓`, 'success');
            await refreshDetail(order.id);
          } catch (err) { toast(err.message || 'Failed'); advBtn.disabled = false; advBtn.textContent = nextAction.label; }
        });
        actionsRow.append(advBtn);
      }
      actionsRow.append(cancelNoteInput, cancelBtn);

      wrap.append(
        el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100' },
          el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-3' }, 'Update Status'),
          actionsRow
        )
      );
    } else {
      wrap.append(
        el('div', {
          className: `rounded-xl px-4 py-3 text-sm font-semibold ${order.status === 'DELIVERED' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'}`,
        },
          order.status === 'DELIVERED'
            ? '✅ This order has been successfully delivered.'
            : `✕ This order was cancelled.${(order.statusLogs || []).find(l => l.status === 'CANCELLED' && l.note) ? ' Reason: "' + order.statusLogs.find(l => l.status === 'CANCELLED').note + '"' : ''}`
        )
      );
    }

    page.append(wrap);
  }

  // ── QUOTES LIST VIEW ────────────────────────────────────────────────────
  const QUOTE_STATUS_COLORS = { DRAFT: '#6B7280', SENT: '#3B82F6', ACCEPTED: '#10B981', DECLINED: '#EF4444', EXPIRED: '#F59E0B' };

  function renderQuoteListView() {
    const wrap = el('div', { className: 'p-6 max-w-6xl mx-auto' });

    // Filter chips
    let qStatusFilter = '';
    const qChipsRow = el('div', { className: 'flex gap-2 flex-wrap mb-5' });
    function renderQChips() {
      qChipsRow.innerHTML = '';
      qChipsRow.append(el('button', {
        className: `px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${qStatusFilter === '' ? 'bg-gray-800 border-gray-800 text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-400'}`,
        onClick: () => { qStatusFilter = ''; renderQChips(); renderQTable(); },
      }, `All (${allQuotes.length})`));
      Object.keys(QUOTE_STATUS_COLORS).forEach(s => {
        const count = allQuotes.filter(q => q.status === s).length;
        const isActive = qStatusFilter === s;
        qChipsRow.append(el('button', {
          className: `flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${isActive ? 'text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`,
          style: isActive ? { backgroundColor: QUOTE_STATUS_COLORS[s], borderColor: QUOTE_STATUS_COLORS[s] } : {},
          onClick: () => { qStatusFilter = s; renderQChips(); renderQTable(); },
        }, s, el('span', { className: `text-xs px-1.5 rounded-full ml-0.5 ${isActive ? 'bg-white bg-opacity-25 text-white' : 'bg-gray-100 text-gray-500'}` }, String(count))));
      });
    }
    wrap.append(qChipsRow);

    const qTableWrap = el('div', {});
    wrap.append(qTableWrap);

    function renderQTable() {
      qTableWrap.innerHTML = '';
      const filtered = allQuotes.filter(q => !qStatusFilter || q.status === qStatusFilter);
      if (!filtered.length) {
        qTableWrap.append(el('div', { className: 'bg-white rounded-xl p-14 text-center shadow-sm border border-gray-100' },
          el('p', { className: 'text-4xl mb-3' }, '📋'),
          el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No quotes found'),
          el('p', { className: 'text-sm text-gray-400' }, 'Click "+ New Quote" to create one')
        )); return;
      }
      const table = el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden' });
      table.append(
        el('div', { className: 'hidden md:grid grid-cols-12 bg-gray-50 border-b border-gray-100 px-5 py-3 text-xs font-black text-gray-400 uppercase tracking-wider' },
          el('div', { className: 'col-span-1' }, '#'),
          el('div', { className: 'col-span-3' }, 'Customer'),
          el('div', { className: 'col-span-2' }, 'Date'),
          el('div', { className: 'col-span-2' }, 'Total'),
          el('div', { className: 'col-span-2' }, 'Ambassador'),
          el('div', { className: 'col-span-2' }, 'Status'),
        )
      );
      const tbody = el('div', { className: 'divide-y divide-gray-50' });
      filtered.forEach(q => {
        const dateStr = new Date(q.createdAt).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' });
        const row = el('div', {
          className: 'grid grid-cols-12 items-center px-5 py-3.5 cursor-pointer hover:bg-gray-50 transition',
          onClick: () => showQuoteDetailModal(q, data.customers, data.products, data.discountRules || [], async () => {
            allQuotes = await api.quotes.getAll().catch(() => allQuotes);
            renderPage();
          }),
        });
        row.append(el('div', { className: 'col-span-1 text-xs font-bold text-gray-400' }, q.number || '—'));
        row.append(el('div', { className: 'col-span-3 min-w-0 pr-2' },
          el('p', { className: 'font-semibold text-gray-900 text-sm truncate' }, `${q.customer?.firstName || ''} ${q.customer?.lastName || ''}`),
          el('p', { className: 'text-xs text-gray-400 truncate' }, q.customer?.email || '—')
        ));
        row.append(el('div', { className: 'hidden md:block col-span-2 text-sm text-gray-600' }, dateStr));
        row.append(el('div', { className: 'col-span-2 font-black text-sm text-gray-900' }, `R${Number(q.total || 0).toFixed(2)}`));
        row.append(el('div', { className: 'hidden md:block col-span-2' },
          q.ambassador ? el('span', { className: 'text-xs bg-brand-light text-brand-dark font-bold px-2 py-0.5 rounded-full' }, q.ambassador.code) : el('span', { className: 'text-xs text-gray-300' }, '—')
        ));
        row.append(el('div', { className: 'col-span-2' }, badge(q.status, QUOTE_STATUS_COLORS[q.status] || '#999')));
        tbody.append(row);
      });
      table.append(tbody);
      qTableWrap.append(table);
    }

    renderQChips();
    renderQTable();
    page.append(wrap);
  }

  renderPage();
}

function showOrderEditModal(order, products, onSaved) {
  let notes = order.notes || '';
  let deliveryFee = Number(order.deliveryFee || 0);
  let ambassadorCode = order.ambassador?.code || '';
  let editItems = (order.items || []).map(i => ({
    variantId: i.variant?.id || i.variantId,
    productName: i.variant?.product?.name || 'Unknown',
    variantName: i.variant?.name || '',
    unitPrice: Number(i.unitPrice || 0),
    quantity: i.quantity || 1,
  }));

  const overlay = el('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4' });
  const panel = el('div', { className: 'bg-white rounded-2xl w-full max-w-xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden' });
  const close = () => document.body.removeChild(overlay);

  // Header
  panel.append(
    el('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0' },
      el('h2', { className: 'font-black text-gray-900 text-base' }, `Edit Order #${order.id.slice(-8).toUpperCase()}`),
      el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')
    )
  );

  const body = el('div', { className: 'flex-1 overflow-y-auto p-5 space-y-5' });

  // ── ITEMS SECTION ──────────────────────────────────────────────────────
  body.append(
    el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide' }, 'Order Items')
  );

  const itemsListEl = el('div', { className: 'border border-gray-100 rounded-xl overflow-hidden' });

  function renderItemsList() {
    itemsListEl.innerHTML = '';
    if (!editItems.length) {
      itemsListEl.append(el('p', { className: 'text-sm text-gray-400 text-center py-4' }, 'No items — add one below'));
      return;
    }
    editItems.forEach((item, idx) => {
      itemsListEl.append(
        el('div', { className: 'flex items-center gap-2 px-3 py-2.5 border-b border-gray-50 last:border-b-0' },
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'text-sm font-semibold text-gray-900 truncate' }, item.productName + (item.variantName ? ` — ${item.variantName}` : '')),
            el('p', { className: 'text-xs text-gray-400' }, `R${item.unitPrice.toFixed(2)} each`)
          ),
          el('div', { className: 'flex items-center gap-1 flex-shrink-0' },
            el('button', {
              className: 'w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-sm flex items-center justify-center',
              onClick: () => { if (item.quantity > 1) { editItems[idx].quantity--; renderItemsList(); } },
            }, '−'),
            el('span', { className: 'w-7 text-center text-sm font-bold' }, String(item.quantity)),
            el('button', {
              className: 'w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold text-sm flex items-center justify-center',
              onClick: () => { editItems[idx].quantity++; renderItemsList(); },
            }, '+'),
          ),
          el('button', {
            className: 'text-red-400 hover:text-red-600 font-bold text-lg leading-none ml-1 flex-shrink-0',
            onClick: () => { editItems.splice(idx, 1); renderItemsList(); },
          }, '×')
        )
      );
    });
  }

  renderItemsList();
  body.append(itemsListEl);

  // Add item row
  const activeProducts = (products || []).filter(p => p.isActive && p.variants?.length > 0);
  const variantPriceMap = new Map();

  const productSel = el('select', { className: 'flex-1 min-w-0 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand' });
  const variantSel = el('select', { className: 'flex-1 min-w-0 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand' });
  const addQtyInput = el('input', {
    type: 'number', min: '1', value: '1',
    className: 'w-14 border border-gray-200 rounded-xl px-2 py-2 text-sm text-center outline-none focus:ring-2 focus:ring-brand',
  });

  function makeOpt(val, txt) { const o = document.createElement('option'); o.value = val; o.textContent = txt; return o; }

  productSel.append(makeOpt('', '— Product —'));
  activeProducts.forEach(p => productSel.append(makeOpt(p.id, p.name)));

  function updateVariants() {
    variantSel.innerHTML = '';
    variantPriceMap.clear();
    const pid = productSel.value;
    variantSel.append(makeOpt('', '— Variant —'));
    if (!pid) return;
    const product = activeProducts.find(p => p.id === pid);
    (product?.variants || []).forEach(v => {
      const price = v.prices?.find(p => p.tier === (order.ambassador ? 'AMBASSADOR' : 'RETAIL'))
                 || v.prices?.find(p => p.tier === 'RETAIL');
      const unitPrice = price ? Number(price.price) : 0;
      variantPriceMap.set(v.id, { unitPrice, variantName: v.name });
      variantSel.append(makeOpt(v.id, `${v.name} — R${unitPrice.toFixed(2)}`));
    });
  }
  productSel.addEventListener('change', updateVariants);
  updateVariants();

  const addItemBtn = el('button', {
    className: 'px-3 py-2 bg-brand text-white text-sm font-bold rounded-xl hover:opacity-90 transition flex-shrink-0',
  }, '+ Add');
  addItemBtn.addEventListener('click', () => {
    const variantId = variantSel.value;
    if (!variantId) return;
    const qty = Math.max(1, parseInt(addQtyInput.value) || 1);
    const { unitPrice, variantName } = variantPriceMap.get(variantId) || {};
    const product = activeProducts.find(p => p.id === productSel.value);
    const existing = editItems.find(i => i.variantId === variantId);
    if (existing) {
      existing.quantity += qty;
    } else {
      editItems.push({ variantId, productName: product?.name || '', variantName: variantName || '', unitPrice: unitPrice || 0, quantity: qty });
    }
    productSel.value = ''; updateVariants(); addQtyInput.value = '1';
    renderItemsList();
  });

  body.append(
    el('div', { className: 'flex gap-2 items-center' },
      productSel, variantSel, addQtyInput, addItemBtn
    )
  );

  // ── DETAILS SECTION ─────────────────────────────────────────────────────
  body.append(el('div', { className: 'border-t border-gray-100 pt-4' },
    el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide mb-3' }, 'Order Details')
  ));

  // Ambassador code picker
  const ambPicker = createAmbPicker({
    value: ambassadorCode,
    onChange: v => { ambassadorCode = v; },
    placeholder: 'No ambassador code…',
  });
  body.append(
    el('div', {},
      el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Ambassador Code'),
      ambPicker
    )
  );

  // Delivery fee
  const feeInput = el('input', {
    type: 'number', min: '0', step: '0.01',
    className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
    onInput: e => { deliveryFee = Number(e.target.value) || 0; },
  });
  feeInput.value = String(deliveryFee);
  body.append(
    el('div', {},
      el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Delivery Fee (R)'),
      feeInput
    )
  );

  // Notes
  const notesInput = el('textarea', {
    rows: 2,
    placeholder: 'Customer notes…',
    className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand resize-none',
    onInput: e => { notes = e.target.value; },
  });
  notesInput.value = notes;
  body.append(
    el('div', {},
      el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Customer Notes'),
      notesInput
    )
  );

  const errMsg = el('p', { className: 'text-red-500 text-sm hidden' });
  body.append(errMsg);
  panel.append(body);

  // Footer
  const saveBtn = el('button', {
    className: 'flex-1 bg-brand text-white text-sm font-bold py-2.5 px-4 rounded-xl hover:opacity-90 transition',
  }, 'Save Changes');
  saveBtn.addEventListener('click', async () => {
    if (!editItems.length) {
      errMsg.textContent = 'Order must have at least one item';
      errMsg.classList.remove('hidden'); return;
    }
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    errMsg.classList.add('hidden');
    try {
      await api.orders.updateItems(order.id, editItems.map(i => ({ variantId: i.variantId, quantity: i.quantity })));
      await api.orders.update(order.id, { notes: notes || undefined, deliveryFee, ambassadorCode: ambassadorCode || null });
      toast('Order updated', 'success');
      close();
      onSaved();
    } catch (err) {
      errMsg.textContent = err.message || 'Failed to save';
      errMsg.classList.remove('hidden');
      saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
    }
  });

  panel.append(
    el('div', { className: 'flex gap-2 px-5 py-4 border-t border-gray-100 flex-shrink-0' },
      el('button', { className: 'flex-1 bg-white border border-gray-200 text-gray-600 text-sm font-semibold py-2.5 px-4 rounded-xl hover:bg-gray-50 transition', onClick: close }, 'Cancel'),
      saveBtn
    )
  );

  overlay.append(panel);
  document.body.append(overlay);
}

// ── PRINT INVOICE ─────────────────────────────────────────────────────────
function printInvoice(order) {
  const items = (order.items || []).map(i => {
    const name = (i.variant?.product?.name || 'Item') + (i.variant?.name ? ` — ${i.variant.name}` : '');
    const qty = i.quantity;
    const up = Number(i.unitPrice || 0);
    return `<tr><td style="padding:6px 8px;border-bottom:1px solid #eee">${name}</td><td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center">${qty}</td><td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">R${up.toFixed(2)}</td><td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:right">R${(up*qty).toFixed(2)}</td></tr>`;
  }).join('');
  const discountRow = Number(order.discountAmount) > 0
    ? `<tr><td colspan="3" style="text-align:right;padding:4px 8px;color:#6b7280">Discount (${order.discountType === 'PERCENTAGE' ? order.discountValue + '%' : 'Flat'})</td><td style="text-align:right;padding:4px 8px;color:#ef4444">-R${Number(order.discountAmount).toFixed(2)}</td></tr>` : '';
  const customerName = `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`.trim();
  const win = window.open('', '_blank', 'width=800,height=700');
  win.document.write(`<!DOCTYPE html><html><head><title>Invoice ${order.invoiceNumber || order.id}</title>
  <style>body{font-family:Arial,sans-serif;padding:40px;color:#111;max-width:700px;margin:0 auto}h1{color:#8B3A3A}table{width:100%;border-collapse:collapse}th{background:#f9fafb;padding:8px;text-align:left;font-size:12px;text-transform:uppercase;color:#6b7280}@media print{button{display:none}}</style></head>
  <body>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px">
    <div><h1 style="margin:0">Tlaka Treats</h1><p style="color:#6b7280;margin:4px 0 0">Tax Invoice</p></div>
    <div style="text-align:right">
      <p style="font-size:20px;font-weight:bold;margin:0">${order.invoiceNumber || `#${order.id.slice(-8).toUpperCase()}`}</p>
      <p style="color:#6b7280;margin:4px 0 0">Date: ${new Date(order.invoicedAt || order.createdAt).toLocaleDateString('en-ZA')}</p>
    </div>
  </div>
  <div style="margin-bottom:24px"><p style="font-weight:bold;margin:0 0 4px">Bill To:</p><p style="margin:0">${customerName}</p>${order.customer?.email ? `<p style="margin:0;color:#6b7280">${order.customer.email}</p>` : ''}${order.customer?.phone ? `<p style="margin:0;color:#6b7280">${order.customer.phone}</p>` : ''}</div>
  ${order.ambassador ? `<div style="margin-bottom:24px;background:#fdf2f2;padding:12px;border-radius:8px"><p style="margin:0;font-size:12px;color:#8B3A3A;font-weight:bold">AMBASSADOR CODE: ${order.ambassador.code}</p></div>` : ''}
  <table><thead><tr><th>Description</th><th style="text-align:center">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Total</th></tr></thead>
  <tbody>${items}
  <tr><td colspan="3" style="text-align:right;padding:4px 8px;color:#6b7280">Subtotal</td><td style="text-align:right;padding:4px 8px">R${Number(order.subtotal||0).toFixed(2)}</td></tr>
  <tr><td colspan="3" style="text-align:right;padding:4px 8px;color:#6b7280">Delivery Fee</td><td style="text-align:right;padding:4px 8px">R${Number(order.deliveryFee||0).toFixed(2)}</td></tr>
  ${discountRow}
  <tr><td colspan="3" style="text-align:right;padding:8px;font-weight:bold;border-top:2px solid #111">TOTAL</td><td style="text-align:right;padding:8px;font-weight:bold;border-top:2px solid #111;font-size:18px">R${Number(order.total).toFixed(2)}</td></tr>
  </tbody></table>
  ${order.notes ? `<div style="margin-top:24px;padding:12px;background:#fffbeb;border-radius:8px"><p style="margin:0;font-size:12px;font-weight:bold;color:#92400e">Note:</p><p style="margin:4px 0 0">${order.notes}</p></div>` : ''}
  <div style="margin-top:40px;text-align:center;color:#9ca3af;font-size:12px"><p>Thank you for your order! 🍰</p></div>
  <button onclick="window.print()" style="position:fixed;bottom:20px;right:20px;background:#8B3A3A;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold">🖨 Print</button>
  </body></html>`);
  win.document.close();
}

      itemsListEl.append(el('p', { className: 'text-sm text-gray-400 text-center py-4' }, 'No items — add one below'));
      return;
    }
    editItems.forEach((item, idx) => {
      itemsListEl.append(
        el('div', { className: 'flex items-center gap-2 px-3 py-2.5 border-b border-gray-50 last:border-b-0' },
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'text-sm font-semibold text-gray-900 truncate' }, item.productName + (item.variantName ? ` — ${item.variantName}` : '')),
            el('p', { className: 'text-xs text-gray-400' }, `R${item.unitPrice.toFixed(2)} each`)
          ),
          el('div', { className: 'flex items-center gap-1 flex-shrink-0' },
            el('button', { className: 'w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-sm flex items-center justify-center', onClick: () => { if (item.quantity > 1) { editItems[idx].quantity--; renderItemsList(); } } }, '−'),
            el('span', { className: 'w-7 text-center text-sm font-bold' }, String(item.quantity)),
            el('button', { className: 'w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-sm flex items-center justify-center', onClick: () => { editItems[idx].quantity++; renderItemsList(); } }, '+'),
          ),
          el('button', { className: 'text-red-400 hover:text-red-600 font-bold text-lg leading-none ml-1', onClick: () => { editItems.splice(idx, 1); renderItemsList(); } }, '×')
        )
      );
    });
  }
  renderItemsList();
  body.append(itemsListEl);

  // Add item row
  const activeProducts = (products || []).filter(p => p.isActive && p.variants?.length > 0);
  const variantPriceMap = new Map();
  const prodSel = el('select', { className: 'flex-1 min-w-0 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand' });
  const varSel = el('select', { className: 'flex-1 min-w-0 border border-gray-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand' });
  const qtyInput = el('input', { type: 'number', min: '1', value: '1', className: 'w-14 border border-gray-200 rounded-xl px-2 py-2 text-sm text-center outline-none focus:ring-2 focus:ring-brand' });
  prodSel.append(makeOpt('', '— Product —'));
  activeProducts.forEach(p => prodSel.append(makeOpt(p.id, p.name)));
  function updateVars() {
    varSel.innerHTML = ''; variantPriceMap.clear();
    varSel.append(makeOpt('', '— Variant —'));
    const pid = prodSel.value; if (!pid) return;
    const prod = activeProducts.find(p => p.id === pid);
    (prod?.variants || []).forEach(v => {
      const price = v.prices?.find(p => p.tier === (ambassadorCode ? 'AMBASSADOR' : 'RETAIL')) || v.prices?.find(p => p.tier === 'RETAIL');
      const up = price ? Number(price.price) : 0;
      variantPriceMap.set(v.id, { unitPrice: up, variantName: v.name });
      varSel.append(makeOpt(v.id, `${v.name} — R${up.toFixed(2)}`));
    });
  }
  prodSel.addEventListener('change', updateVars); updateVars();
  const addItemBtn = el('button', { className: 'px-3 py-2 bg-brand text-white text-sm font-bold rounded-xl hover:opacity-90 flex-shrink-0' }, '+ Add');
  addItemBtn.addEventListener('click', () => {
    const vId = varSel.value; if (!vId) return;
    const qty = Math.max(1, parseInt(qtyInput.value) || 1);
    const { unitPrice, variantName } = variantPriceMap.get(vId) || {};
    const prod = activeProducts.find(p => p.id === prodSel.value);
    const existing = editItems.find(i => i.variantId === vId);
    if (existing) { existing.quantity += qty; } else { editItems.push({ variantId: vId, productName: prod?.name || '', variantName: variantName || '', unitPrice: unitPrice || 0, quantity: qty }); }
    prodSel.value = ''; updateVars(); qtyInput.value = '1'; renderItemsList();
  });
  body.append(el('div', { className: 'flex gap-2 items-center' }, prodSel, varSel, qtyInput, addItemBtn));

  // Discount section
  body.append(el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide border-t border-gray-100 pt-3' }, 'Discount'));
  const discTypeSel = el('select', { className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  [['', 'No discount'], ['PERCENTAGE', 'Percentage (%)'], ['FLAT', 'Flat Amount (R)']].forEach(([v, l]) => discTypeSel.append(makeOpt(v, l)));
  discTypeSel.value = discountType;
  discTypeSel.addEventListener('change', e => { discountType = e.target.value; });
  const discValInput = el('input', { type: 'number', min: '0', step: '0.01', placeholder: '0', className: 'w-28 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  discValInput.value = discountValue || '';
  discValInput.addEventListener('input', e => { discountValue = Number(e.target.value) || 0; });

  // Apply from saved rule
  const ruleSel = el('select', { className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  ruleSel.append(makeOpt('', '— Apply saved rule —'));
  (discountRules || []).filter(r => r.isActive).forEach(r => ruleSel.append(makeOpt(r.id, `${r.name} — ${r.type === 'PERCENTAGE' ? r.value + '%' : 'R' + r.value}`)));
  ruleSel.addEventListener('change', () => {
    const rule = (discountRules || []).find(r => r.id === ruleSel.value);
    if (!rule) return;
    discountType = rule.type; discountValue = Number(rule.value);
    discTypeSel.value = discountType; discValInput.value = discountValue;
  });
  body.append(el('div', { className: 'flex gap-2 items-center flex-wrap' }, discTypeSel, discValInput, ruleSel));

  // Delivery fee, notes, valid until
  const feeInp = el('input', { type: 'number', min: '0', step: '0.01', placeholder: '0.00', className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  feeInp.value = deliveryFee || '';
  feeInp.addEventListener('input', e => { deliveryFee = Number(e.target.value) || 0; });
  body.append(el('div', {}, el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Delivery Fee (R)'), feeInp));

  const notesInp = el('textarea', { rows: 2, placeholder: 'Notes…', className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand resize-none' });
  notesInp.value = notes;
  notesInp.addEventListener('input', e => { notes = e.target.value; });
  body.append(el('div', {}, el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Notes'), notesInp));

  const validInp = el('input', { type: 'date', className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  validInp.value = validUntil;
  validInp.addEventListener('change', e => { validUntil = e.target.value; });
  body.append(el('div', {}, el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' }, 'Valid Until'), validInp));

  const errMsg = el('p', { className: 'text-red-500 text-sm hidden' });
  body.append(errMsg);
  panel.append(body);

  const saveBtn = el('button', { className: 'flex-1 bg-brand text-white text-sm font-bold py-2.5 px-4 rounded-xl hover:opacity-90 transition' }, existingQuote ? 'Save Changes' : 'Create Quote');
  saveBtn.addEventListener('click', async () => {
    if (!customerId) { errMsg.textContent = 'Please select a customer'; errMsg.classList.remove('hidden'); return; }
    if (!editItems.length) { errMsg.textContent = 'Add at least one item'; errMsg.classList.remove('hidden'); return; }
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; errMsg.classList.add('hidden');
    const payload = {
      customerId,
      ambassadorCode: ambassadorCode || undefined,
      items: editItems.map(i => ({ variantId: i.variantId, quantity: i.quantity })),
      discountType: discountType || undefined,
      discountValue: discountValue || undefined,
      deliveryFee: deliveryFee || undefined,
      notes: notes || undefined,
      validUntil: validUntil || undefined,
    };
    try {
      if (existingQuote) { await api.quotes.update(existingQuote.id, payload); }
      else { await api.quotes.create(payload); }
      toast(existingQuote ? 'Quote updated' : 'Quote created', 'success');
      close(); onSaved();
    } catch (err) {
      errMsg.textContent = err.message || 'Failed'; errMsg.classList.remove('hidden');
      saveBtn.disabled = false; saveBtn.textContent = existingQuote ? 'Save Changes' : 'Create Quote';
    }
  });
  panel.append(el('div', { className: 'flex gap-2 px-5 py-4 border-t border-gray-100 flex-shrink-0' },
    el('button', { className: 'flex-1 bg-white border border-gray-200 text-gray-600 text-sm font-semibold py-2.5 px-4 rounded-xl hover:bg-gray-50 transition', onClick: close }, 'Cancel'),
    saveBtn
  ));
  overlay.append(panel);
  document.body.append(overlay);
}

// ── QUOTE DETAIL MODAL ─────────────────────────────────────────────────────
function showQuoteDetailModal(quote, customers, products, discountRules, onSaved) {
  const QCOLORS = { DRAFT: '#6B7280', SENT: '#3B82F6', ACCEPTED: '#10B981', DECLINED: '#EF4444', EXPIRED: '#F59E0B' };
  const overlay = el('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4' });
  const panel = el('div', { className: 'bg-white rounded-2xl w-full max-w-xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden' });
  const close = () => document.body.removeChild(overlay);

  let currentQuote = quote;

  function rebuild() {
    panel.innerHTML = '';

    // Header
    panel.append(el('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0' },
      el('div', { className: 'flex items-center gap-2' },
        el('h2', { className: 'font-black text-gray-900 text-base' }, currentQuote.number || 'Quote'),
        badge(currentQuote.status, QCOLORS[currentQuote.status] || '#999')
      ),
      el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')
    ));

    const body = el('div', { className: 'flex-1 overflow-y-auto p-5 space-y-4' });

    // Customer info
    const cust = currentQuote.customer;
    if (cust) {
      body.append(el('div', { className: 'bg-gray-50 rounded-xl p-3' },
        el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide mb-1' }, 'Customer'),
        el('p', { className: 'font-bold text-gray-900' }, `${cust.firstName || ''} ${cust.lastName || ''}`),
        cust.email ? el('p', { className: 'text-xs text-gray-400' }, cust.email) : null,
        cust.phone ? el('p', { className: 'text-xs text-gray-400' }, cust.phone) : null
      ));
    }

    // Items
    body.append(el('div', { className: 'border border-gray-100 rounded-xl overflow-hidden' },
      el('div', { className: 'bg-gray-50 px-4 py-2 border-b border-gray-100' }, el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide' }, `Items (${(currentQuote.items || []).length})`)),
      el('div', { className: 'divide-y divide-gray-50' },
        ...(currentQuote.items || []).map(i => {
          const name = (i.variant?.product?.name || 'Item') + (i.variant?.name ? ` — ${i.variant.name}` : '');
          const up = Number(i.unitPrice || 0);
          return el('div', { className: 'px-4 py-3 flex justify-between items-center' },
            el('div', {}, el('p', { className: 'text-sm font-semibold text-gray-900' }, name), el('p', { className: 'text-xs text-gray-400' }, `${i.quantity} × R${up.toFixed(2)}`)),
            el('p', { className: 'font-bold text-sm text-gray-900' }, `R${(up * i.quantity).toFixed(2)}`)
          );
        }),
        el('div', { className: 'px-4 py-3 bg-gray-50 space-y-1' },
          el('div', { className: 'flex justify-between text-xs text-gray-500' }, el('span', {}, 'Subtotal'), el('span', {}, `R${Number(currentQuote.subtotal || 0).toFixed(2)}`)),
          Number(currentQuote.discountAmount) > 0 ? el('div', { className: 'flex justify-between text-xs text-red-500' }, el('span', {}, `Discount (${currentQuote.discountType}${currentQuote.discountType === 'PERCENTAGE' ? ' ' + currentQuote.discountValue + '%' : ''})`), el('span', {}, `-R${Number(currentQuote.discountAmount).toFixed(2)}`)) : null,
          el('div', { className: 'flex justify-between text-xs text-gray-500' }, el('span', {}, 'Delivery'), el('span', {}, `R${Number(currentQuote.deliveryFee || 0).toFixed(2)}`)),
          el('div', { className: 'flex justify-between text-sm font-black text-gray-900 border-t border-gray-200 mt-1 pt-1.5' }, el('span', {}, 'Total'), el('span', {}, `R${Number(currentQuote.total || 0).toFixed(2)}`))
        )
      )
    ));

    if (currentQuote.notes) {
      body.append(el('div', { className: 'bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-3' },
        el('p', { className: 'text-xs font-black text-yellow-600 uppercase tracking-wide mb-1' }, 'Notes'),
        el('p', { className: 'text-sm text-yellow-900' }, currentQuote.notes)
      ));
    }

    // Actions based on status
    const actions = el('div', { className: 'flex flex-wrap gap-2' });

    if (currentQuote.status === 'DRAFT') {
      const editBtn = el('button', { className: 'px-4 py-2 bg-white border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition' }, '✏️ Edit');
      editBtn.addEventListener('click', () => {
        close();
        showQuoteModal(customers, products, discountRules, currentQuote, async () => {
          const updated = await api.quotes.getById(currentQuote.id);
          currentQuote = updated;
          onSaved();
          showQuoteDetailModal(updated, customers, products, discountRules, onSaved);
        });
      });
      const sendBtn = el('button', { className: 'px-4 py-2 bg-blue-500 text-white text-sm font-bold rounded-xl hover:bg-blue-600 transition' }, '📤 Mark as Sent');
      sendBtn.addEventListener('click', async () => {
        sendBtn.disabled = true; sendBtn.textContent = '…';
        try {
          currentQuote = await api.quotes.updateStatus(currentQuote.id, 'SENT');
          rebuild(); onSaved();
        } catch (err) { toast(err.message || 'Failed'); sendBtn.disabled = false; sendBtn.textContent = '📤 Mark as Sent'; }
      });
      const delBtn = el('button', { className: 'px-4 py-2 bg-white border border-red-200 text-red-500 text-sm font-semibold rounded-xl hover:bg-red-50 transition ml-auto' }, '🗑 Delete');
      delBtn.addEventListener('click', async () => {
        if (!confirm('Delete this draft quote?')) return;
        try { await api.quotes.remove(currentQuote.id); toast('Quote deleted'); close(); onSaved(); }
        catch (err) { toast(err.message || 'Failed'); }
      });
      actions.append(editBtn, sendBtn, delBtn);
    } else if (currentQuote.status === 'SENT') {
      const acceptBtn = el('button', { className: 'px-4 py-2 bg-green-500 text-white text-sm font-bold rounded-xl hover:bg-green-600 transition' }, '✅ Accept');
      acceptBtn.addEventListener('click', async () => {
        acceptBtn.disabled = true;
        try { currentQuote = await api.quotes.updateStatus(currentQuote.id, 'ACCEPTED'); rebuild(); onSaved(); }
        catch (err) { toast(err.message || 'Failed'); acceptBtn.disabled = false; }
      });
      const declineBtn = el('button', { className: 'px-4 py-2 bg-red-500 text-white text-sm font-bold rounded-xl hover:bg-red-600 transition' }, '✕ Decline');
      declineBtn.addEventListener('click', async () => {
        declineBtn.disabled = true;
        try { currentQuote = await api.quotes.updateStatus(currentQuote.id, 'DECLINED'); rebuild(); onSaved(); }
        catch (err) { toast(err.message || 'Failed'); declineBtn.disabled = false; }
      });
      const convertBtn = el('button', { className: 'px-4 py-2 bg-brand text-white text-sm font-bold rounded-xl hover:opacity-90 transition' }, '🔄 Convert to Order');
      convertBtn.addEventListener('click', async () => {
        convertBtn.disabled = true; convertBtn.textContent = 'Converting…';
        try {
          await api.quotes.convert(currentQuote.id);
          toast('Order created from quote!', 'success');
          close(); onSaved();
        } catch (err) { toast(err.message || 'Failed'); convertBtn.disabled = false; convertBtn.textContent = '🔄 Convert to Order'; }
      });
      actions.append(acceptBtn, declineBtn, convertBtn);
    } else if (currentQuote.status === 'ACCEPTED') {
      const convertBtn = el('button', { className: 'px-4 py-2 bg-brand text-white text-sm font-bold rounded-xl hover:opacity-90 transition' }, '🔄 Convert to Order');
      convertBtn.addEventListener('click', async () => {
        convertBtn.disabled = true; convertBtn.textContent = 'Converting…';
        try { await api.quotes.convert(currentQuote.id); toast('Order created!', 'success'); close(); onSaved(); }
        catch (err) { toast(err.message || 'Failed'); convertBtn.disabled = false; convertBtn.textContent = '🔄 Convert to Order'; }
      });
      actions.append(convertBtn);
    }

    if (actions.children.length) {
      body.append(el('div', { className: 'border-t border-gray-100 pt-3' }, actions));
    }

    // ── SEND / DOWNLOAD SECTION (always visible) ──────────────────────────
    body.append(el('div', { className: 'border-t border-gray-100 pt-3 space-y-2' },
      el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wide mb-2' }, 'Deliver Quote'),
      el('div', { className: 'flex flex-wrap gap-2' },

        // Download PDF
        el('a', {
          href: api.quotes.pdf(currentQuote.id),
          target: '_blank',
          className: 'px-4 py-2 bg-white border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition inline-flex items-center gap-1.5',
        }, '⬇️ Download PDF'),

        // Send via Email
        (() => {
          const btn = el('button', { className: 'px-4 py-2 bg-blue-500 text-white text-sm font-semibold rounded-xl hover:bg-blue-600 transition' }, '📧 Send via Email');
          btn.addEventListener('click', () => showSendModal(currentQuote, 'email', () => rebuild()));
          return btn;
        })(),

        // Send via WhatsApp
        (() => {
          const btn = el('button', { className: 'px-4 py-2 text-white text-sm font-semibold rounded-xl hover:opacity-90 transition', style: { background: '#25D366' } }, '💬 Send via WhatsApp');
          btn.addEventListener('click', () => showSendModal(currentQuote, 'whatsapp', () => rebuild()));
          return btn;
        })(),
      )
    ));

    panel.append(body);
    overlay.append(panel);
  }

  rebuild();
  document.body.append(overlay);
}

// ── SEND QUOTE MODAL ───────────────────────────────────────────────────────
function showSendModal(quote, channel, onSent) {
  const isEmail = channel === 'email';
  const defaultTo = isEmail ? (quote.customer?.email || '') : (quote.customer?.phone || '');
  let recipient = defaultTo;

  const overlay = el('div', { className: 'fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-4' });
  const panel = el('div', { className: 'bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden' });
  const close = () => document.body.removeChild(overlay);

  panel.append(
    el('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-gray-100' },
      el('h2', { className: 'font-black text-gray-900 text-base' }, isEmail ? '📧 Send via Email' : '💬 Send via WhatsApp'),
      el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')
    )
  );

  const body = el('div', { className: 'p-5 space-y-4' });

  body.append(el('div', {},
    el('label', { className: 'block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5' },
      isEmail ? 'Recipient Email Address' : 'WhatsApp Number (with country code)'
    ),
    (() => {
      const inp = el('input', {
        type: isEmail ? 'email' : 'tel',
        placeholder: isEmail ? 'customer@email.com' : '+27 81 234 5678',
        className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
        onInput: e => { recipient = e.target.value; },
      });
      inp.value = defaultTo;
      return inp;
    })()
  ));

  if (!isEmail) {
    body.append(el('p', { className: 'text-xs text-gray-400 bg-gray-50 rounded-lg p-3' },
      '💡 Include country code, e.g. +27 81 234 5678. The customer must have already joined your Twilio WhatsApp sandbox (for sandbox numbers).'
    ));
  }

  const errMsg = el('p', { className: 'text-red-500 text-sm hidden' });
  body.append(errMsg);
  panel.append(body);

  const sendBtn = el('button', { className: `w-full text-white text-sm font-bold py-3 rounded-xl hover:opacity-90 transition ${isEmail ? 'bg-blue-500' : ''}`, style: isEmail ? {} : { background: '#25D366' } }, `Send Quote`);
  sendBtn.addEventListener('click', async () => {
    if (!recipient.trim()) { errMsg.textContent = 'Please enter a recipient'; errMsg.classList.remove('hidden'); return; }
    sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; errMsg.classList.add('hidden');
    try {
      await api.quotes.send(quote.id, channel, recipient.trim());
      toast(`Quote sent via ${isEmail ? 'email' : 'WhatsApp'} ✓`, 'success');
      close();
      onSent();
    } catch (err) {
      errMsg.textContent = err.message || 'Failed to send';
      errMsg.classList.remove('hidden');
      sendBtn.disabled = false; sendBtn.textContent = 'Send Quote';
    }
  });

  panel.append(
    el('div', { className: 'px-5 pb-5 flex gap-2' },
      el('button', { className: 'flex-1 bg-white border border-gray-200 text-gray-600 text-sm font-semibold py-2.5 rounded-xl hover:bg-gray-50 transition', onClick: close }, 'Cancel'),
      sendBtn
    )
  );

  overlay.append(panel);
  document.body.append(overlay);
}

// ── ADMIN: PLACE ORDER FOR CLIENT ─────────────────────────────────────────
function showAdminPlaceOrderModal(customers, products, onDone) {
  // ── STATE ──────────────────────────────────────────────────────────────────
  let step = 1;
  let selectedCustomer = null;
  let cart = []; // { variantId, productName, variantName, unitPrice, quantity }
  let ambassadorCode = '';
  let notes = '';

  const custList = [...(customers || [])]; // local mutable copy so new customers can be pushed

  const catMap = new Map();
  (products || []).filter(p => p.isActive).forEach(p => { if (p.category) catMap.set(p.category.id, p.category); });
  const categories = [...catMap.values()];

  // ── SHELL ──────────────────────────────────────────────────────────────────
  const overlay = el('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-2 sm:p-4' });
  const panel = el('div', { className: 'bg-white rounded-2xl w-full max-w-4xl h-[92vh] flex flex-col shadow-2xl overflow-hidden' });
  const close = () => document.body.removeChild(overlay);

  // Header
  const stepBarEl = el('div', { className: 'flex items-center gap-1 sm:gap-2' });
  const header = el('div', { className: 'flex items-center justify-between px-5 py-3.5 border-b border-gray-100 flex-shrink-0 gap-4' },
    el('h2', { className: 'font-black text-gray-900 text-base sm:text-lg flex-shrink-0' }, 'Place Order for Client'),
    stepBarEl,
    el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold ml-2 flex-shrink-0', onClick: close }, '×'),
  );
  panel.append(header);

  // Content (scrollable)
  const content = el('div', { className: 'flex-1 min-h-0 overflow-y-auto' });
  panel.append(content);

  // Footer (fixed)
  const footer = el('div', { className: 'flex-shrink-0 px-5 py-4 border-t border-gray-100 bg-white' });
  panel.append(footer);

  function cartTotal() { return cart.reduce((s, i) => s + i.unitPrice * i.quantity, 0); }
  function cartCount() { return cart.reduce((s, i) => s + i.quantity, 0); }

  function renderStepBar() {
    stepBarEl.innerHTML = '';
    ['Customer', 'Build Order', 'Review'].forEach((s, i) => {
      const num = i + 1, done = step > num, active = step === num;
      stepBarEl.append(
        el('div', { className: 'flex items-center gap-1' },
          el('div', {
            className: `w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 transition ${done ? 'bg-green-500 text-white' : active ? 'bg-brand text-white' : 'bg-gray-200 text-gray-400'}`,
          }, done ? '✓' : String(num)),
          el('span', { className: `text-xs font-semibold hidden sm:block ${active ? 'text-gray-900' : 'text-gray-400'}` }, s),
        ),
        i < 2 ? el('div', { className: 'w-3 sm:w-5 h-px bg-gray-200 mx-0.5' }) : null,
      );
    });
  }

  // ── STEP 1: CUSTOMER ───────────────────────────────────────────────────────
  function renderStep1() {
    content.innerHTML = '';
    footer.innerHTML = '';
    let searchQ = '';
    let showCreate = false;
    let newCust = { firstName: '', lastName: '', email: '', phone: '', password: '' };

    const listEl = el('div', {});
    const createEl = el('div', {});

    function displayName(c) { return `${c.firstName || ''} ${c.lastName || ''}`.trim() || 'Unknown'; }

    function renderList() {
      listEl.innerHTML = '';
      const q = searchQ.toLowerCase().trim();
      const filtered = q
        ? custList.filter(c => displayName(c).toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q) || (c.phone || '').toLowerCase().includes(q))
        : custList.slice().sort((a, b) => displayName(a).localeCompare(displayName(b)));
      const shown = filtered.slice(0, 30);

      if (!shown.length) {
        listEl.append(el('p', { className: 'text-sm text-gray-400 text-center py-8' }, q ? 'No customers match your search' : 'No customers yet'));
        return;
      }
      shown.forEach(c => {
        const isSelected = selectedCustomer?.id === c.id;
        const initials = ((c.firstName?.[0] || '') + (c.lastName?.[0] || '')).toUpperCase() || '?';
        listEl.append(el('button', {
          className: `w-full text-left px-5 py-3 border-b border-gray-50 hover:bg-orange-50 transition flex items-center gap-3 ${isSelected ? 'bg-orange-50' : ''}`,
          onClick: () => { selectedCustomer = isSelected ? null : c; renderList(); renderBanner(); updateFooter(); },
        },
          el('div', { className: `w-8 h-8 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 ${isSelected ? 'bg-brand text-white' : 'bg-gray-100 text-gray-500'}` }, initials),
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'font-semibold text-gray-900 text-sm' }, displayName(c)),
            el('p', { className: 'text-xs text-gray-400 truncate' }, c.email || ''),
          ),
          isSelected ? el('span', { className: 'text-green-500 font-black text-sm flex-shrink-0' }, '✓') : null,
        ));
      });
      if (filtered.length > 30) {
        listEl.append(el('p', { className: 'text-xs text-gray-400 text-center py-2' }, `${filtered.length - 30} more — type to narrow down`));
      }
    }

    function renderCreate() {
      createEl.innerHTML = '';
      if (!showCreate) return;
      const inputs = {};
      const fields = [
        { key: 'firstName', ph: 'First Name *', type: 'text', half: true },
        { key: 'lastName',  ph: 'Last Name *',  type: 'text', half: true },
        { key: 'email',     ph: 'Email *',       type: 'email' },
        { key: 'phone',     ph: 'Phone (optional)', type: 'tel' },
        { key: 'password',  ph: 'Password *',    type: 'password' },
      ];
      const form = el('div', { className: 'mx-5 mb-4 p-4 border border-brand border-opacity-30 rounded-xl bg-orange-50 space-y-2' },
        el('p', { className: 'text-xs font-black text-gray-500 uppercase tracking-wider mb-1' }, '+ New Customer'),
      );
      const halfRow = el('div', { className: 'grid grid-cols-2 gap-2' });
      fields.forEach(f => {
        const inp = el('input', {
          type: f.type, placeholder: f.ph, value: newCust[f.key] || '',
          className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand bg-white',
          onInput: e => { newCust[f.key] = e.target.value; },
        });
        inputs[f.key] = inp;
        if (f.half) { halfRow.append(inp); }
        else { form.append(inp); }
      });
      form.insertBefore(halfRow, form.children[1]);
      const createBtn = el('button', {
        className: 'w-full bg-brand text-white text-sm font-bold py-2 rounded-lg hover:opacity-90 transition',
        onClick: async () => {
          if (!newCust.firstName || !newCust.lastName || !newCust.email || !newCust.password) {
            toast('First name, last name, email and password are required', 'error'); return;
          }
          createBtn.disabled = true; createBtn.textContent = 'Creating…';
          try {
            const { user } = await api.auth.register(newCust);
            custList.push(user);
            selectedCustomer = user;
            showCreate = false;
            newCust = { firstName: '', lastName: '', email: '', phone: '', password: '' };
            toast(`${user.firstName} ${user.lastName} created`, 'success');
            searchQ = '';
            searchInput.value = '';
            renderList(); renderCreate(); renderBanner(); updateFooter();
          } catch (err) { toast(err?.message || 'Failed to create customer', 'error'); createBtn.disabled = false; createBtn.textContent = 'Create Customer'; }
        },
      }, 'Create Customer');
      const cancelBtn = el('button', {
        className: 'w-full text-sm text-gray-500 hover:text-gray-700 py-1',
        onClick: () => { showCreate = false; renderCreate(); },
      }, 'Cancel');
      form.append(createBtn, cancelBtn);
      createEl.append(form);
    }

    const bannerEl = el('div', { className: 'px-5 py-3 border-b border-gray-100' });
    function renderBanner() {
      bannerEl.innerHTML = '';
      if (!selectedCustomer) { bannerEl.classList.add('hidden'); return; }
      bannerEl.classList.remove('hidden');
      bannerEl.append(el('div', { className: 'flex items-center gap-2 bg-green-50 border border-green-200 rounded-xl px-4 py-2.5' },
