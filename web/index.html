                  el('button', { className: 'w-5 h-5 rounded-full bg-brand text-white text-xs font-bold flex items-center justify-center hover:opacity-80 transition', onClick: () => { addToCart(v.id, p.name, v.name || '', price); renderGrid(); } }, '+'),
                )
              : el('button', { className: 'bg-brand text-white text-xs font-bold px-2 py-1 rounded-lg hover:opacity-90 transition flex-shrink-0', onClick: () => { addToCart(v.id, p.name, v.name || '', price); renderGrid(); } }, '+ Add'),
          ));
        });
        card.append(body);
        productGrid.append(card);
      });
    }

    const searchInput = el('input', {
      type: 'text', placeholder: '🔍  Search products…',
      className: 'w-full border border-gray-200 rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3',
      onInput: e => { productSearch = e.target.value; renderGrid(); },
    });
    left.append(searchInput, catRow, productGrid);

    // ── Right: cart ───────────────────────────────────────────────────────
    const right = el('div', { className: 'w-52 sm:w-64 flex-shrink-0 border-l border-gray-100 overflow-y-auto bg-gray-50 flex flex-col' });
    const cartBody = el('div', { className: 'flex-1 p-3' });
    const cartFooterEl = el('div', { className: 'p-3 border-t border-gray-100' });
    right.append(
      el('div', { className: 'px-4 py-3 border-b border-gray-100 bg-white flex-shrink-0' },
        el('p', { className: 'font-black text-gray-800 text-sm' }, '🛒 Cart'),
      ),
      cartBody,
      cartFooterEl,
    );

    function updateCart() {
      cartBody.innerHTML = '';
      cartFooterEl.innerHTML = '';
      if (!cart.length) {
        cartBody.append(el('p', { className: 'text-xs text-gray-400 text-center py-8' }, 'No items added yet'));
      } else {
        cart.forEach(item => {
          cartBody.append(el('div', { className: 'bg-white rounded-lg p-2 mb-2 shadow-sm border border-gray-100' },
            el('p', { className: 'text-xs font-bold text-gray-800 truncate' }, item.productName),
            item.variantName ? el('p', { className: 'text-xs text-gray-400 truncate' }, item.variantName) : null,
            el('div', { className: 'flex items-center justify-between mt-1' },
              el('div', { className: 'flex items-center gap-1' },
                el('button', { className: 'w-5 h-5 rounded-full bg-gray-100 text-xs font-bold flex items-center justify-center hover:bg-gray-200 transition', onClick: () => { decFromCart(item.variantId); updateCart(); renderGrid(); } }, '−'),
                el('span', { className: 'text-xs font-black w-4 text-center' }, String(item.quantity)),
                el('button', { className: 'w-5 h-5 rounded-full bg-brand text-white text-xs font-bold flex items-center justify-center hover:opacity-80 transition', onClick: () => { const e = cart.find(c => c.variantId === item.variantId); if (e) e.quantity++; updateCart(); renderGrid(); } }, '+'),
              ),
              el('p', { className: 'text-xs font-black text-gray-900' }, `R${(item.unitPrice * item.quantity).toFixed(2)}`),
            ),
          ));
        });
        cartFooterEl.append(
          el('div', { className: 'flex justify-between text-sm font-black text-gray-900 mb-3' },
            el('span', {}, 'Total'), el('span', { className: 'text-brand' }, `R${cartTotal().toFixed(2)}`),
          ),
        );
      }
      // update footer nav
      footer.innerHTML = '';
      footer.append(el('div', { className: 'flex gap-3' },
        el('button', { className: 'px-4 py-2.5 border border-gray-200 text-sm font-bold text-gray-600 rounded-xl hover:bg-gray-50 transition', onClick: () => { content.classList.add('overflow-y-auto'); content.classList.remove('overflow-hidden', 'flex'); step = 1; renderStep1(); renderStepBar(); } }, '← Back'),
        el('button', {
          className: `flex-1 font-black py-2.5 rounded-xl transition ${cart.length ? 'bg-brand text-white hover:opacity-90' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`,
          disabled: !cart.length,
          onClick: () => { if (cart.length) { content.classList.add('overflow-y-auto'); content.classList.remove('overflow-hidden', 'flex'); step = 3; renderStep3(); renderStepBar(); } },
        }, cart.length ? `Next: Review (${cartCount()} item${cartCount() !== 1 ? 's' : ''}) →` : 'Add items to continue'),
      ));
    }

    content.append(left, right);
    renderCats(); renderGrid(); updateCart();
  }

  // ── STEP 3: REVIEW & PLACE ─────────────────────────────────────────────────
  function renderStep3() {
    content.innerHTML = '';
    footer.innerHTML = '';

    const wrap = el('div', { className: 'p-5 max-w-2xl mx-auto' });

    // Customer chip
    const cName = `${selectedCustomer.firstName || ''} ${selectedCustomer.lastName || ''}`.trim();
    wrap.append(el('div', { className: 'flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3 mb-4' },
      el('span', { className: 'text-green-600 font-bold text-sm' }, '👤'),
      el('div', {},
        el('p', { className: 'font-bold text-gray-900 text-sm' }, cName),
        el('p', { className: 'text-xs text-gray-500' }, selectedCustomer.email || ''),
      ),
    ));

    // Items
    const itemsCard = el('div', { className: 'bg-white rounded-xl border border-gray-100 shadow-sm mb-4 overflow-hidden' });
    itemsCard.append(el('div', { className: 'px-4 py-2.5 bg-gray-50 border-b border-gray-100' },
      el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider' }, '🛒 Order Items'),
    ));
    cart.forEach(item => {
      itemsCard.append(el('div', { className: 'flex justify-between items-center px-4 py-3 border-b border-gray-50 last:border-0 text-sm' },
        el('div', {},
          el('p', { className: 'font-semibold text-gray-800' }, `${item.quantity}× ${item.productName}`),
          item.variantName ? el('p', { className: 'text-xs text-gray-400' }, item.variantName) : null,
        ),
        el('p', { className: 'font-black text-gray-900 flex-shrink-0 ml-3' }, `R${(item.unitPrice * item.quantity).toFixed(2)}`),
      ));
    });
    itemsCard.append(el('div', { className: 'flex justify-between font-black text-brand text-base px-4 py-3 bg-gray-50 border-t border-gray-100' },
      el('span', {}, 'Total'), el('span', {}, `R${cartTotal().toFixed(2)}`),
    ));
    wrap.append(itemsCard);

    // Ambassador code
    const ambPickerEl = createAmbPicker({
      value: ambassadorCode,
      onChange: (code) => { ambassadorCode = code; },
      wrapClass: 'mb-3',
    });
    wrap.append(el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Ambassador Code'), ambPickerEl);

    // Notes
    const notesInp = el('textarea', {
      placeholder: 'Order notes (optional)', rows: '3',
      className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition resize-none mb-2',
      onInput: e => { notes = e.target.value; },
    });
    notesInp.value = notes;
    wrap.append(el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Notes'), notesInp);
    content.append(wrap);

    // Footer
    const placeBtn = el('button', {
      className: 'flex-1 bg-brand text-white font-black py-3 rounded-xl hover:opacity-90 transition',
      onClick: async () => {
        placeBtn.disabled = true;
        placeBtn.innerHTML = '';
        placeBtn.append(spinner(), document.createTextNode(' Placing order…'));
        try {
          const payload = { customerId: selectedCustomer.id, items: cart.map(i => ({ variantId: i.variantId, quantity: i.quantity })) };
          if (ambassadorCode.trim()) payload.ambassadorCode = ambassadorCode.trim();
          if (notes.trim()) payload.notes = notes.trim();
          await api.orders.createAdmin(payload);
          toast(`Order placed for ${selectedCustomer.firstName || 'customer'} 🎉`, 'success');
          close(); onDone();
        } catch (err) {
          toast(err?.message || 'Failed to place order', 'error');
          placeBtn.disabled = false; placeBtn.textContent = `Place Order — R${cartTotal().toFixed(2)}`;
        }
      },
    }, `Place Order — R${cartTotal().toFixed(2)}`);

    footer.append(el('div', { className: 'flex gap-3' },
      el('button', { className: 'px-4 py-3 border border-gray-200 text-sm font-bold text-gray-600 rounded-xl hover:bg-gray-50 transition', onClick: () => { step = 2; renderStep2(); renderStepBar(); } }, '← Back'),
      placeBtn,
    ));
  }

  // ── INIT ───────────────────────────────────────────────────────────────────
  overlay.append(panel);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.body.appendChild(overlay);
  renderStepBar();
  renderStep1();
}

// ── AMBASSADORS MODULE ────────────────────────────────────────────────────
const KYC_STATUS_META = {
  NOT_SUBMITTED: { label: 'Not Submitted', color: '#9CA3AF', bg: '#F3F4F6', icon: '⬜' },
  SUBMITTED:     { label: 'Under Review',  color: '#F59E0B', bg: '#FEF3C7', icon: '🔍' },
  APPROVED:      { label: 'KYC Approved',  color: '#10B981', bg: '#D1FAE5', icon: '✅' },
  REJECTED:      { label: 'Rejected',      color: '#EF4444', bg: '#FEE2E2', icon: '❌' },
};
const AMB_STATUS_META = {
  PENDING:   { color: '#F59E0B', bg: '#FEF3C7' },
  ACTIVE:    { color: '#10B981', bg: '#D1FAE5' },
  SUSPENDED: { color: '#EF4444', bg: '#FEE2E2' },
};

function kycBadge(kycStatus) {
  const m = KYC_STATUS_META[kycStatus] || KYC_STATUS_META['NOT_SUBMITTED'];
  const b = document.createElement('span');
  b.className = 'inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold';
  b.style.cssText = `color:${m.color};background:${m.bg}`;
  b.textContent = `${m.icon} ${m.label}`;
  return b;
}

function ambStatusBadge(status) {
  const m = AMB_STATUS_META[status] || { color: '#9CA3AF', bg: '#F3F4F6' };
  const b = document.createElement('span');
  b.className = 'inline-block px-2.5 py-0.5 rounded-full text-xs font-bold';
  b.style.cssText = `color:${m.color};background:${m.bg}`;
  b.textContent = status;
  return b;
}

// ── INVENTORY MANAGEMENT ──────────────────────────────────────────────────────
function renderAdminInventory(data, container, reload) {
  const { stockItems = [], suppliers = [], products = [] } = data;
  let activeTab = 'items'; // items | movements | stocktake
  let expandedId = null, searchQ = '', movFilter = '';
  let recentMoves = [];

  const page = el('div', { className: 'p-6 max-w-6xl mx-auto' });

  // ── SUMMARY CHIPS ──────────────────────────────────────────────────────────
  const totalVal = stockItems.reduce((s, i) => s + Number(i.currentStock || 0) * Number(i.costPerUnit || 0), 0);
  const lowStock  = stockItems.filter(i => Number(i.currentStock) > 0 && Number(i.currentStock) <= Number(i.minStockLevel));
  const outStock  = stockItems.filter(i => Number(i.currentStock) <= 0);
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5' });
  [
    { label: 'Total Items',    val: stockItems.length,  color: '#3B82F6' },
    { label: 'Low Stock',      val: lowStock.length,    color: '#F59E0B' },
    { label: 'Out of Stock',   val: outStock.length,    color: '#EF4444' },
    { label: 'Inventory Value', val: `R ${totalVal.toFixed(0)}`, color: '#10B981' },
  ].forEach(c => chipsRow.append(
    el('div', { className: 'bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3' },
      el('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-sm flex-shrink-0', style: { backgroundColor: c.color } }, String(c.val)),
      el('p', { className: 'text-sm font-semibold text-gray-600 leading-tight' }, c.label)
    )
  ));
  page.append(chipsRow);

  // ── TABS ───────────────────────────────────────────────────────────────────
  const tabBar = el('div', { className: 'flex gap-1 bg-gray-100 rounded-xl p-1 mb-5 w-fit' });
  const tabContent = el('div', {});
  page.append(tabBar, tabContent);

  function switchTab(t) {
    activeTab = t;
    tabBar.querySelectorAll('button').forEach(b => {
      const active = b.dataset.tab === t;
      b.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${active ? 'bg-white shadow text-brand' : 'text-gray-500 hover:text-gray-700'}`;
    });
    renderTab();
  }
  ['items', 'movements', 'stocktake', 'available'].forEach((t, i) => {
    const labels = ['📦 Stock Items', '📋 Movements', '🔢 Stock Take', '🛒 Available Stock'];
    const btn = el('button', { dataset: { tab: t }, onClick: () => switchTab(t) }, labels[i]);
    btn.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${activeTab === t ? 'bg-white shadow text-brand' : 'text-gray-500 hover:text-gray-700'}`;
    tabBar.append(btn);
  });

  function stockStatusLabel(item) {
    const cur = Number(item.currentStock), min = Number(item.minStockLevel);
    if (cur <= 0)   return { label: 'OUT', bg: '#FEE2E2', color: '#EF4444' };
    if (cur <= min) return { label: 'LOW', bg: '#FEF3C7', color: '#F59E0B' };
    return          { label: 'OK',  bg: '#D1FAE5', color: '#10B981' };
  }

  function renderItemsTab() {
    tabContent.innerHTML = '';
    const q = searchQ.toLowerCase();
    const filtered = stockItems.filter(i => !q || i.name.toLowerCase().includes(q) || (i.sku||'').toLowerCase().includes(q));

    const toolbar = el('div', { className: 'flex flex-wrap items-center gap-3 mb-4' });
    const searchBox = el('input', { type: 'text', placeholder: '🔍 Search items…', value: searchQ,
      className: 'flex-1 min-w-40 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand',
      onInput: e => { searchQ = e.target.value; renderItemsTab(); },
    });
    const addBtn = el('button', {
      className: 'ml-auto bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90',
      onClick: () => showStockItemForm(null, () => reload()),
    }, '+ New Item');
    toolbar.append(searchBox, addBtn);

    if (!filtered.length) {
      tabContent.append(toolbar, el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '📦'),
        el('p', { className: 'font-bold text-gray-700' }, 'No stock items found')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-4' }, 'Item'),
      el('div', { className: 'col-span-2 text-center' }, 'Current Stock'),
      el('div', { className: 'col-span-2 text-center' }, 'Min Level'),
      el('div', { className: 'col-span-2 text-right' }, 'Unit Cost'),
      el('div', { className: 'col-span-1 text-center' }, 'Status'),
      el('div', { className: 'col-span-1' }, ''),
    ));

    filtered.forEach(item => {
      const st = stockStatusLabel(item);
      const isExp = expandedId === item.id;
      const row = el('div', { className: 'border-b border-gray-50 last:border-0' });
      const mainRow = el('div', {
        className: 'grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-50 cursor-pointer',
        onClick: () => { expandedId = isExp ? null : item.id; renderItemsTab(); },
      },
        el('div', { className: 'col-span-4' },
          el('p', { className: 'font-semibold text-gray-900 text-sm' }, item.name),
          item.sku ? el('p', { className: 'text-xs text-gray-400 font-mono' }, item.sku) : null,
          item.product?.supplier ? el('p', { className: 'text-xs text-gray-400' }, `via ${item.product.supplier.name}`) : null,
        ),
        el('div', { className: 'col-span-2 text-center font-bold text-gray-800 text-sm' }, `${Number(item.currentStock).toFixed(2)} ${item.unit}`),
        el('div', { className: 'col-span-2 text-center text-sm text-gray-500' }, `${Number(item.minStockLevel).toFixed(2)} ${item.unit}`),
        el('div', { className: 'col-span-2 text-right text-sm text-gray-700' }, `R ${Number(item.costPerUnit).toFixed(4)}`),
        el('div', { className: 'col-span-1 text-center' },
          el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: st.bg, color: st.color } }, st.label)
        ),
        el('div', { className: 'col-span-1 text-center text-gray-400 text-xs' }, isExp ? '▲' : '▼'),
      );
      row.append(mainRow);

      if (isExp) {
        const panel = el('div', { className: 'px-4 pb-4 pt-1 bg-gray-50 border-t border-gray-100 flex flex-wrap gap-3' });
        const mkBtn = (label, cls, fn) => el('button', { className: `text-sm font-bold px-4 py-2 rounded-lg ${cls}`, onClick: fn }, label);
        panel.append(
          mkBtn('✏️ Edit', 'bg-blue-100 text-blue-700 hover:bg-blue-200', () => showStockItemForm(item, () => reload())),
          mkBtn('📥 Record Purchase', 'bg-green-100 text-green-700 hover:bg-green-200', () => showMovementForm(item, 'PURCHASE', () => reload())),
          mkBtn('📤 Adjustment Out', 'bg-orange-100 text-orange-700 hover:bg-orange-200', () => showMovementForm(item, 'ADJUSTMENT_OUT', () => reload())),
          mkBtn('🗑️ Waste', 'bg-red-100 text-red-600 hover:bg-red-200', () => showMovementForm(item, 'WASTE', () => reload())),
        );
        row.append(panel);
      }
      table.append(row);
    });
    tabContent.append(toolbar, table);
  }

  async function renderMovementsTab() {
    tabContent.innerHTML = '';
    tabContent.append(el('div', { className: 'flex justify-center py-10' },
      el('div', { className: 'spinner', style: { borderColor: 'rgba(139,58,58,0.2)', borderTopColor: '#8B3A3A' } })
    ));
    try { recentMoves = await api.inventory.getMovements(); } catch(_) { recentMoves = []; }
    tabContent.innerHTML = '';

    const MOVE_META = {
      PURCHASE:       { label: 'Purchase',      color: '#10B981', sign: '+' },
      PRODUCTION_USE: { label: 'Production Use',color: '#8B5CF6', sign: '-' },
      ADJUSTMENT_IN:  { label: 'Adj. In',       color: '#3B82F6', sign: '+' },
      ADJUSTMENT_OUT: { label: 'Adj. Out',      color: '#F59E0B', sign: '-' },
      WASTE:          { label: 'Waste',          color: '#EF4444', sign: '-' },
      RETURN:         { label: 'Return',         color: '#6B7280', sign: '+' },
    };

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-3' }, 'Item'),
      el('div', { className: 'col-span-2' }, 'Type'),
      el('div', { className: 'col-span-2 text-right' }, 'Qty'),
      el('div', { className: 'col-span-3' }, 'Note'),
      el('div', { className: 'col-span-2 text-right' }, 'Date'),
    ));
    if (!recentMoves.length) {
      table.append(el('div', { className: 'p-10 text-center text-gray-400 text-sm' }, 'No movements yet'));
    }
    recentMoves.forEach(m => {
      const meta = MOVE_META[m.type] || { label: m.type, color: '#9CA3AF', sign: '' };
      const qty  = Number(m.quantity);
      table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-2.5 items-center border-b border-gray-50 last:border-0 hover:bg-gray-50' },
        el('div', { className: 'col-span-3 text-sm font-semibold text-gray-800' }, m.stockItem?.name || m.stockItemId),
        el('div', { className: 'col-span-2' }, el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full text-white', style: { backgroundColor: meta.color } }, meta.label)),
        el('div', { className: 'col-span-2 text-right font-bold text-sm', style: { color: qty >= 0 ? '#10B981' : '#EF4444' } },
          `${qty >= 0 ? '+' : ''}${qty.toFixed(3)} ${m.stockItem?.unit || ''}`),
        el('div', { className: 'col-span-3 text-xs text-gray-400 truncate' }, m.note || m.reference || '—'),
        el('div', { className: 'col-span-2 text-right text-xs text-gray-400' }, new Date(m.createdAt).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' })),
      ));
    });
    tabContent.append(table);
  }

  function renderStocktakeTab() {
    tabContent.innerHTML = '';
    if (!stockItems.length) {
      tabContent.append(el('p', { className: 'text-gray-400 text-center py-12' }, 'No stock items to count. Add items first.'));
      return;
    }
    const counts = {};
    stockItems.forEach(i => { counts[i.id] = ''; });

    const header = el('div', { className: 'mb-4' },
      el('p', { className: 'font-black text-gray-900 text-lg mb-1' }, '🔢 Physical Stock Count'),
      el('p', { className: 'text-sm text-gray-500' }, 'Enter the actual counted quantity for each item. Any variances will be automatically adjusted.'),
    );

    const tableWrap = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-5' });
    tableWrap.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-4' }, 'Item'),
      el('div', { className: 'col-span-3 text-center' }, 'System Stock'),
      el('div', { className: 'col-span-3 text-center' }, 'Counted Qty'),
      el('div', { className: 'col-span-2 text-right' }, 'Variance'),
    ));

    const inputMap = {};
    const varianceMap = {};
    stockItems.forEach(item => {
      const varEl = el('span', { className: 'text-xs font-bold' }, '—');
      varianceMap[item.id] = varEl;
      const inp = el('input', {
        type: 'number', step: '0.001', placeholder: '0.000',
        className: 'w-full border border-gray-200 rounded-lg px-2 py-1 text-sm text-center outline-none focus:ring-2 focus:ring-brand',
        onInput: e => {
          counts[item.id] = e.target.value;
          const v = parseFloat(e.target.value) - Number(item.currentStock);
          varEl.textContent = isNaN(v) ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(3)} ${item.unit}`;
          varEl.style.color = isNaN(v) ? '#9CA3AF' : v === 0 ? '#10B981' : v > 0 ? '#3B82F6' : '#EF4444';
        },
      });
      inputMap[item.id] = inp;
      const st = stockStatusLabel(item);
      tableWrap.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-2.5 items-center border-b border-gray-50 last:border-0' },
        el('div', { className: 'col-span-4' },
          el('p', { className: 'font-semibold text-sm text-gray-900' }, item.name),
          el('p', { className: 'text-xs text-gray-400' }, item.unit),
        ),
        el('div', { className: 'col-span-3 text-center' },
          el('span', { className: 'font-bold text-sm text-gray-700' }, `${Number(item.currentStock).toFixed(3)}`),
          el('span', { className: 'ml-1 text-xs font-bold px-1.5 py-0.5 rounded-full', style: { backgroundColor: st.bg, color: st.color } }, st.label),
        ),
        el('div', { className: 'col-span-3' }, inp),
        el('div', { className: 'col-span-2 text-right' }, varEl),
      ));
    });

    const noteInp = el('input', { type: 'text', placeholder: 'Note (optional, e.g. "March stock take")', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-4' });
    const submitBtn = el('button', {
      className: 'bg-brand text-white font-black px-6 py-2.5 rounded-xl hover:opacity-90 transition text-sm',
      onClick: async () => {
        const items = stockItems.filter(i => counts[i.id] !== '').map(i => ({ stockItemId: i.id, countedQty: parseFloat(counts[i.id]) }));
        if (!items.length) { toast('Enter at least one count', 'error'); return; }
        submitBtn.disabled = true; submitBtn.textContent = 'Applying…';
        try {
          const res = await api.inventory.stocktake({ items, note: noteInp.value.trim() || undefined });
          toast(`Stock take applied — ${res.results.filter(r => r.adjusted).length} items adjusted`, 'success');
          reload();
        } catch(err) { toast(err?.message || 'Failed', 'error'); submitBtn.disabled = false; submitBtn.textContent = 'Apply Stock Take'; }
      }
    }, 'Apply Stock Take');

    tabContent.append(header, tableWrap, noteInp, submitBtn);
  }

  function renderTab() {
    if      (activeTab === 'items')     renderItemsTab();
    else if (activeTab === 'movements') renderMovementsTab();
    else if (activeTab === 'stocktake') renderStocktakeTab();
    else if (activeTab === 'available') renderAvailableStockTab();
  }

  // ── Tab: Available Stock (Finished Goods) ─────────────────────────────────
  async function renderAvailableStockTab() {
    tabContent.innerHTML = '';
    tabContent.append(spinner());
    let sellable = [];
    try { sellable = await api.inventory.getSellable(); } catch(e) { sellable = []; }
    tabContent.innerHTML = '';

    const tracked   = sellable.filter(p => p.stockItem);
    const untracked = sellable.filter(p => !p.stockItem);

    // ── Header ──
    tabContent.append(
      el('div', { className: 'flex items-start justify-between mb-5 gap-3 flex-wrap' },
        el('div', {},
          el('h3', { className: 'font-black text-gray-900 text-lg' }, 'Available Finished Goods'),
          el('p', { className: 'text-xs text-gray-400 mt-0.5' },
            `${tracked.length} product${tracked.length !== 1 ? 's' : ''} tracked · ${untracked.length} not yet set up`),
        ),
        el('div', { className: 'flex items-center gap-2 text-xs font-semibold' },
          el('span', { className: 'flex items-center gap-1' }, el('span', { className: 'w-2.5 h-2.5 rounded-full bg-green-400 inline-block' }), 'In Stock'),
          el('span', { className: 'flex items-center gap-1' }, el('span', { className: 'w-2.5 h-2.5 rounded-full bg-yellow-400 inline-block' }), 'Low'),
          el('span', { className: 'flex items-center gap-1' }, el('span', { className: 'w-2.5 h-2.5 rounded-full bg-red-400 inline-block' }), 'Out'),
          el('span', { className: 'flex items-center gap-1' }, el('span', { className: 'w-2.5 h-2.5 rounded-full bg-gray-300 inline-block' }), 'Not tracked'),
        ),
      )
    );

    if (!sellable.length) {
      tabContent.append(el('div', { className: 'text-center py-12 text-gray-400 text-sm' }, 'No sellable products found.'));
      return;
    }

    // ── Product cards ──
    const grid = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-5' });

    for (const product of sellable) {
      const si  = product.stockItem;
      const qty = si ? Number(si.currentStock) : null;
      const min = si ? Number(si.minStockLevel) : null;

      const { badge, cardCls, barCls, dotCls } = !si
        ? { badge: 'NOT TRACKED', cardCls: 'border-gray-200',                           barCls: 'bg-gray-200',  dotCls: 'bg-gray-300'  }
        : qty <= 0
        ? { badge: 'OUT OF STOCK', cardCls: 'border-red-200 bg-red-50/40',              barCls: 'bg-red-400',   dotCls: 'bg-red-500'   }
        : qty <= min
        ? { badge: 'LOW STOCK',    cardCls: 'border-yellow-200 bg-yellow-50/40',        barCls: 'bg-yellow-400',dotCls: 'bg-yellow-500'}
        : { badge: 'IN STOCK',     cardCls: 'border-green-200 bg-green-50/30',          barCls: 'bg-green-400', dotCls: 'bg-green-500' };

      const pct = si && min > 0 ? Math.min(100, (qty / (min * 3)) * 100)
                : si && qty > 0 ? 100 : 0;

      const card = el('div', { className: `bg-white rounded-xl border shadow-sm p-4 flex flex-col gap-3 ${cardCls}` });

      // Header row
      card.append(
        el('div', { className: 'flex items-start justify-between gap-2' },
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'font-black text-gray-900 truncate leading-tight' }, product.name),
            el('p', { className: 'text-xs text-gray-400 mt-0.5' }, product.category?.name || 'Uncategorised'),
          ),
          el('span', { className: 'flex items-center gap-1.5 text-xs font-bold whitespace-nowrap flex-shrink-0' },
            el('span', { className: `w-2 h-2 rounded-full ${dotCls}` }),
            badge,
          ),
        )
      );

      // Stock level section
      if (si) {
        card.append(
          el('div', {},
            el('div', { className: 'flex items-baseline gap-1.5 mb-1' },
              el('span', { className: 'text-3xl font-black text-gray-900' }, String(qty)),
              el('span', { className: 'text-sm font-semibold text-gray-500' }, si.unit + ' on hand'),
            ),
            el('p', { className: 'text-xs text-gray-400 mb-1.5' },
              `Min level: ${min} ${si.unit}` +
              (si.sku ? `  ·  SKU: ${si.sku}` : '')
            ),
            el('div', { className: 'bg-gray-100 rounded-full h-2.5' },
              el('div', { className: `h-2.5 rounded-full transition-all ${barCls}`, style: { width: `${pct.toFixed(0)}%` } })
            ),
          )
        );
      } else {
        card.append(
          el('div', { className: 'bg-gray-50 border border-dashed border-gray-300 rounded-lg px-3 py-2 text-xs text-gray-500' },
            '⚠ Stock tracking not set up for this product.',
          )
        );
      }

      // Variant pills
      if (product.variants?.length) {
        const pills = el('div', { className: 'flex flex-wrap gap-1.5' });
        product.variants.forEach(v => {
          const rp = v.prices?.find(p => p.tier === 'RETAIL');
          pills.append(
            el('span', { className: 'text-xs bg-white border border-gray-200 text-gray-600 px-2 py-0.5 rounded-md font-medium' },
              rp ? `${v.name} · R${Number(rp.price).toFixed(0)}` : v.name
            )
          );
        });
        card.append(pills);
      }

      // Action buttons
      if (si) {
        card.append(
          el('div', { className: 'flex gap-2 mt-auto' },
            el('button', {
              className: 'flex-1 text-xs font-bold bg-brand text-white py-2 rounded-lg hover:opacity-90 transition',
              onClick: () => showMovementForm(si, 'ADJUSTMENT_IN', () => switchTab('available')),
            }, '+ Add Stock'),
            el('button', {
              className: 'flex-1 text-xs font-bold bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition',
              onClick: () => showMovementForm(si, 'ADJUSTMENT_OUT', () => switchTab('available')),
            }, '− Remove'),
          )
        );
      } else {
        card.append(
          el('button', {
            className: 'mt-auto w-full text-xs font-bold bg-gray-100 text-gray-600 py-2 rounded-lg hover:bg-gray-200 transition',
            onClick: () => switchTab('items'),
          }, 'Set Up Stock Tracking →')
        );
      }

      grid.append(card);
    }
    tabContent.append(grid);

    // ── Info banner ──
    tabContent.append(
      el('div', { className: 'bg-blue-50 border border-blue-200 rounded-xl p-4 flex gap-3' },
        el('span', { className: 'text-blue-400 text-lg flex-shrink-0' }, 'ℹ'),
        el('div', {},
          el('p', { className: 'text-sm font-bold text-blue-900' }, 'Smart order routing'),
          el('p', { className: 'text-xs text-blue-600 mt-0.5 leading-relaxed' },
            'When you advance a Confirmed order, the system checks finished-goods stock automatically. ' +
            'If all items have sufficient stock, the order skips Baking and goes straight to Ready — ' +
            'and stock is deducted. ' +
            (untracked.length
              ? `(${untracked.length} product${untracked.length !== 1 ? 's' : ''} not yet tracked — go to Stock Items to enable this.)`
              : 'All products are currently tracked.')
          ),
        )
      )
    );
  }

  // ── MODALS ────────────────────────────────────────────────────────────────
  function showStockItemForm(item, onDone) {
    const isEdit = !!item;
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);

    // For editing, show simple fields; for creating, require a product selection
    const editFields = [
      { label: 'Name', key: 'name', type: 'text', required: true },
      { label: 'SKU (optional)', key: 'sku', type: 'text' },
      { label: 'Unit (e.g. kg, ml, pcs)', key: 'unit', type: 'text', required: true },
      { label: 'Min Stock Level', key: 'minStockLevel', type: 'number', step: '0.001' },
      { label: 'Cost per Unit (R)', key: 'costPerUnit', type: 'number', step: '0.0001' },
      { label: 'Notes', key: 'notes', type: 'text' },
    ];
    const inputs = {};
    const form = el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-md shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-5' },
        el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Stock Item' : 'New Stock Item'),
        el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×'),
      ),
    );

    let selectedProductId = item?.productId || null;

    if (!isEdit) {
      // ── Product selector (only for new items) ─────────────────────────────
      // Show SELLABLE / INGREDIENT / PACKAGING / CONSUMABLE products that don't yet have a stock item
      const existingProductIds = new Set(stockItems.map(s => s.productId).filter(Boolean));
      const eligibleProducts = products.filter(p =>
        ['SELLABLE', 'INGREDIENT', 'PACKAGING', 'CONSUMABLE'].includes(p.classification) &&
        p.isActive && !existingProductIds.has(p.id)
      );

      const productSel = el('select', {
        className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3',
        onChange: (e) => {
          selectedProductId = e.target.value || null;
          const prod = eligibleProducts.find(p => p.id === selectedProductId);
          if (prod) {
            inputs['name'].value = prod.name;
            // Auto-suggest unit based on classification
            if (!inputs['unit'].value) {
              inputs['unit'].value = prod.classification === 'PACKAGING' ? 'pcs' : prod.classification === 'SELLABLE' ? 'units' : 'kg';
            }
            // Show supplier hint
            if (prod.supplier) {
              supplierHint.textContent = `Supplier: ${prod.supplier.name}`;
              supplierHint.style.display = 'block';
            } else {
              supplierHint.style.display = 'none';
            }
          }
        },
      });
      const defProdOpt = document.createElement('option'); defProdOpt.value = ''; defProdOpt.textContent = '— Select a product —'; productSel.append(defProdOpt);
      eligibleProducts.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
        const o = document.createElement('option'); o.value = p.id;
        const cls = { SELLABLE: '🛒', INGREDIENT: '🧂', PACKAGING: '📦', CONSUMABLE: '🧹' }[p.classification] || '';
        o.textContent = `${cls} ${p.name}`;
        productSel.append(o);
      });

      const supplierHint = el('p', { className: 'text-xs text-brand font-semibold mb-3', style: { display: 'none' } }, '');
      form.append(
        el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Linked Product *'),
        productSel,
        supplierHint,
      );
      if (eligibleProducts.length === 0) {
        const hint = el('p', { className: 'text-xs text-amber-600 bg-amber-50 rounded-lg p-2 mb-3' },
          'All eligible products already have stock items, or none exist yet. Add products first under the Products module.'
        );
        form.append(hint);
      }
    } else {
      // Show current product link (read-only)
      const prodName = item?.product?.name || item?.name || '—';
      const suppName = item?.product?.supplier?.name;
      form.append(
        el('div', { className: 'bg-gray-50 rounded-xl p-3 mb-4 border border-gray-100' },
          el('p', { className: 'text-xs text-gray-500 font-semibold mb-0.5' }, 'Linked Product'),
          el('p', { className: 'text-sm font-bold text-gray-800' }, prodName),
          suppName ? el('p', { className: 'text-xs text-brand mt-0.5' }, `Supplier: ${suppName}`) : null,
        )
      );
    }

    editFields.forEach(f => {
      const inp = el('input', { type: f.type || 'text', step: f.step, placeholder: f.label,
        value: item ? (item[f.key] ?? '') : '',
        className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3',
      });
      inputs[f.key] = inp;
      form.append(el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, f.label), inp);
    });

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90 mt-2',
      onClick: async () => {
        if (!isEdit && !selectedProductId) { toast('Please select a product first', 'error'); return; }
        if (!inputs['unit'].value) { toast('Unit is required', 'error'); return; }
        const payload = {};
        editFields.forEach(f => { if (inputs[f.key].value !== '') payload[f.key] = inputs[f.key].value; });
        if (!isEdit) payload['productId'] = selectedProductId;
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          if (isEdit) await api.inventory.update(item.id, payload);
          else await api.inventory.create(payload);
          toast(isEdit ? 'Stock item updated' : 'Stock item created', 'success');
          close(); onDone();
        } catch(err) { toast(err?.message || 'Failed', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save');
    form.append(saveBtn);
    modal.append(form);
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  function showMovementForm(item, type, onDone) {
    const LABELS = { PURCHASE: 'Record Purchase (Stock In)', ADJUSTMENT_OUT: 'Adjustment / Write-off', WASTE: 'Record Waste' };
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const qtyInp  = el('input', { type: 'number', step: '0.001', placeholder: 'Quantity', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const costInp = el('input', { type: 'number', step: '0.0001', placeholder: 'Unit cost (optional)', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const noteInp = el('input', { type: 'text', placeholder: 'Note / reference', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!qtyInp.value) { toast('Enter a quantity', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          await api.inventory.movement({ stockItemId: item.id, type, quantity: parseFloat(qtyInp.value), unitCost: costInp.value || undefined, note: noteInp.value || undefined });
          toast('Movement recorded', 'success'); close(); onDone();
        } catch(err) { toast(err?.message || 'Failed', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save');
    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl' },
      el('div', { className: 'flex items-center justify-between mb-4' },
        el('h3', { className: 'font-black text-gray-900' }, LABELS[type] || type),
        el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×'),
      ),
      el('p', { className: 'text-sm text-gray-500 mb-4' }, `Item: ${item.name} (current: ${Number(item.currentStock).toFixed(3)} ${item.unit})`),
      qtyInp, costInp, noteInp, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  renderTab();
  container.append(page);
}

// ── SUPPLIER MANAGEMENT ───────────────────────────────────────────────────────
function renderAdminSuppliers(data, container, reload) {
  const { suppliers = [], purchaseOrders = [], stockItems = [] } = data;
  let activeTab = 'suppliers'; // suppliers | pos
  let expandedId = null, poExpandedId = null;

  const page = el('div', { className: 'p-6 max-w-6xl mx-auto' });

  // ── SUMMARY CHIPS ──────────────────────────────────────────────────────────
  const openPOs  = purchaseOrders.filter(p => !['RECEIVED','CANCELLED'].includes(p.status));
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5' });
  [
    { label: 'Total Suppliers', val: suppliers.length,                               color: '#3B82F6' },
    { label: 'Active',          val: suppliers.filter(s => s.status === 'ACTIVE').length, color: '#10B981' },
    { label: 'Total POs',       val: purchaseOrders.length,                          color: '#8B5CF6' },
    { label: 'Open POs',        val: openPOs.length,                                 color: '#F59E0B' },
  ].forEach(c => chipsRow.append(
    el('div', { className: 'bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3' },
      el('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0', style: { backgroundColor: c.color } }, String(c.val)),
      el('p', { className: 'text-sm font-semibold text-gray-600 leading-tight' }, c.label)
    )
  ));
  page.append(chipsRow);

  // ── TABS ───────────────────────────────────────────────────────────────────
  const tabBar = el('div', { className: 'flex gap-1 bg-gray-100 rounded-xl p-1 mb-5 w-fit' });
  const tabContent = el('div', {});
  page.append(tabBar, tabContent);

  function switchTab(t) {
    activeTab = t;
    tabBar.querySelectorAll('button').forEach(b => {
      b.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${b.dataset.tab === t ? 'bg-white shadow text-brand' : 'text-gray-500 hover:text-gray-700'}`;
    });
    renderTab();
  }
  [['suppliers','🏭 Suppliers'], ['pos','📋 Purchase Orders']].forEach(([t, label]) => {
    const btn = el('button', { dataset: { tab: t }, onClick: () => switchTab(t) }, label);
    btn.className = `px-4 py-2 rounded-lg text-sm font-bold transition ${activeTab === t ? 'bg-white shadow text-brand' : 'text-gray-500 hover:text-gray-700'}`;
    tabBar.append(btn);
  });

  const PO_STATUS_META = {
    DRAFT:     { label: 'Draft',    color: '#9CA3AF', bg: '#F3F4F6' },
    ORDERED:   { label: 'Ordered',  color: '#3B82F6', bg: '#EFF6FF' },
    PARTIAL:   { label: 'Partial',  color: '#F59E0B', bg: '#FFFBEB' },
    RECEIVED:  { label: 'Received', color: '#10B981', bg: '#ECFDF5' },
    CANCELLED: { label: 'Cancelled',color: '#EF4444', bg: '#FEF2F2' },
  };

  function renderSuppliersTab() {
    tabContent.innerHTML = '';
    const toolbar = el('div', { className: 'flex items-center gap-3 mb-4' });
    toolbar.append(
      el('p', { className: 'text-sm text-gray-500 flex-1' }, `${suppliers.length} supplier(s)`),
      el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showSupplierForm(null, () => reload()) }, '+ Add Supplier'),
    );

    if (!suppliers.length) {
      tabContent.append(toolbar, el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm' },
        el('p', { className: 'text-4xl mb-3' }, '🏭'), el('p', { className: 'font-bold text-gray-700' }, 'No suppliers yet')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    suppliers.forEach(s => {
      const isExp = expandedId === s.id;
      const poCount = purchaseOrders.filter(p => p.supplierId === s.id).length;
      const itemCount = s._count?.stockItems ?? 0;
      const row = el('div', { className: 'border-b border-gray-50 last:border-0' });
      const mainRow = el('div', {
        className: 'flex items-center gap-4 px-5 py-3.5 hover:bg-gray-50 cursor-pointer',
        onClick: () => { expandedId = isExp ? null : s.id; renderSuppliersTab(); },
      },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'font-bold text-gray-900' }, s.name),
          s.contactName ? el('p', { className: 'text-xs text-gray-400' }, s.contactName) : null,
        ),
        el('span', { className: `text-xs font-bold px-2 py-0.5 rounded-full ${s.status === 'ACTIVE' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}` }, s.status),
        el('p', { className: 'text-xs text-gray-400 hidden sm:block' }, `${poCount} PO(s) · ${itemCount} item(s)`),
        el('span', { className: 'text-gray-400 text-xs' }, isExp ? '▲' : '▼'),
      );
      row.append(mainRow);
      if (isExp) {
        const panel = el('div', { className: 'px-5 pb-4 pt-1 bg-gray-50 border-t border-gray-100' });
        panel.append(
          el('div', { className: 'grid grid-cols-2 sm:grid-cols-3 gap-3 text-sm mb-4' },
            s.phone ? el('div', {}, el('span', { className: 'text-gray-400 text-xs' }, 'Phone'), el('p', { className: 'font-semibold' }, s.phone)) : null,
            s.email ? el('div', {}, el('span', { className: 'text-gray-400 text-xs' }, 'Email'), el('p', { className: 'font-semibold truncate' }, s.email)) : null,
            s.city  ? el('div', {}, el('span', { className: 'text-gray-400 text-xs' }, 'City'),  el('p', { className: 'font-semibold' }, s.city)) : null,
            s.notes ? el('div', { className: 'col-span-2 sm:col-span-3' }, el('span', { className: 'text-gray-400 text-xs' }, 'Notes'), el('p', { className: 'text-gray-600 text-xs' }, s.notes)) : null,
          ),
          el('div', { className: 'flex gap-2' },
            el('button', { className: 'text-sm font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200', onClick: () => showSupplierForm(s, () => reload()) }, '✏️ Edit'),
            el('button', { className: 'text-sm font-bold bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200', onClick: () => { activeTab = 'pos'; switchTab('pos'); showNewPOForm(s.id, () => reload()); } }, '+ Create PO'),
          ),
        );
        row.append(panel);
      }
      table.append(row);
    });
    tabContent.append(toolbar, table);
  }

  function renderPOsTab() {
    tabContent.innerHTML = '';
    const toolbar = el('div', { className: 'flex items-center gap-3 mb-4' });
    toolbar.append(
      el('p', { className: 'text-sm text-gray-500 flex-1' }, `${purchaseOrders.length} purchase order(s)`),
      el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showNewPOForm(null, () => reload()) }, '+ New PO'),
    );

    if (!purchaseOrders.length) {
      tabContent.append(toolbar, el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm' },
        el('p', { className: 'text-4xl mb-3' }, '📋'), el('p', { className: 'font-bold text-gray-700' }, 'No purchase orders yet')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-3' }, 'Supplier'),
      el('div', { className: 'col-span-2' }, 'Status'),
      el('div', { className: 'col-span-2 text-right' }, 'Total'),
      el('div', { className: 'col-span-2 text-center' }, 'Order Date'),
      el('div', { className: 'col-span-2 text-center' }, 'Expected'),
      el('div', { className: 'col-span-1' }, ''),
    ));

    purchaseOrders.forEach(po => {
      const isExp = poExpandedId === po.id;
      const meta = PO_STATUS_META[po.status] || { label: po.status, color: '#9CA3AF', bg: '#F3F4F6' };
      const row = el('div', { className: 'border-b border-gray-50 last:border-0' });
      const mainRow = el('div', {
        className: 'grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-50 cursor-pointer',
        onClick: () => { poExpandedId = isExp ? null : po.id; renderPOsTab(); },
      },
        el('div', { className: 'col-span-3 font-semibold text-gray-900 text-sm' }, po.supplier?.name || '—'),
        el('div', { className: 'col-span-2' }, el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: meta.bg, color: meta.color } }, meta.label)),
        el('div', { className: 'col-span-2 text-right font-bold text-sm' }, `R ${Number(po.total).toFixed(2)}`),
        el('div', { className: 'col-span-2 text-center text-xs text-gray-400' }, new Date(po.orderDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' })),
        el('div', { className: 'col-span-2 text-center text-xs text-gray-400' }, po.expectedDate ? new Date(po.expectedDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' }) : '—'),
        el('div', { className: 'col-span-1 text-center text-gray-400 text-xs' }, isExp ? '▲' : '▼'),
      );
      row.append(mainRow);

      if (isExp) {
        const panel = el('div', { className: 'px-4 pb-4 pt-2 bg-gray-50 border-t border-gray-100' });
        if (po.items?.length) {
          const itemTable = el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100 mb-3 text-sm' });
          itemTable.append(el('div', { className: 'grid grid-cols-12 gap-2 px-3 py-2 bg-gray-50 text-xs font-bold text-gray-500' },
            el('div', { className: 'col-span-5' }, 'Item'), el('div', { className: 'col-span-2 text-right' }, 'Ordered'), el('div', { className: 'col-span-2 text-right' }, 'Received'), el('div', { className: 'col-span-2 text-right' }, 'Unit Cost'), el('div', { className: 'col-span-1 text-right' }, 'Total'),
          ));
          po.items.forEach(item => {
            itemTable.append(el('div', { className: 'grid grid-cols-12 gap-2 px-3 py-2 border-t border-gray-50 items-center' },
              el('div', { className: 'col-span-5 font-semibold text-gray-800' }, item.stockItem?.name || item.stockItemId),
              el('div', { className: 'col-span-2 text-right text-gray-600' }, `${Number(item.orderedQty).toFixed(3)} ${item.stockItem?.unit || ''}`),
              el('div', { className: 'col-span-2 text-right text-gray-600' }, `${Number(item.receivedQty).toFixed(3)}`),
              el('div', { className: 'col-span-2 text-right text-gray-500' }, `R ${Number(item.unitCost).toFixed(4)}`),
              el('div', { className: 'col-span-1 text-right font-bold text-gray-800' }, `R ${Number(item.total).toFixed(2)}`),
            ));
          });
          panel.append(itemTable);
        }
        po.notes && panel.append(el('p', { className: 'text-xs text-gray-400 mb-3 italic' }, po.notes));
        const btnRow = el('div', { className: 'flex gap-2' });
        if (po.status === 'DRAFT') {
          btnRow.append(el('button', {
            className: 'text-sm font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200',
            onClick: async () => { try { await api.suppliers.updatePO(po.id, { status: 'ORDERED' }); toast('PO marked as ordered', 'success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '📤 Mark Ordered'));
        }
        if (['ORDERED','PARTIAL'].includes(po.status)) {
          btnRow.append(el('button', {
            className: 'text-sm font-bold bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200',
            onClick: async () => { if (!confirm('Mark this PO as received? This will add all items to stock.')) return; try { await api.suppliers.receivePO(po.id); toast('PO received — stock updated!', 'success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '✅ Mark Received (Add Stock)'));
        }
        if (!['RECEIVED','CANCELLED'].includes(po.status)) {
          btnRow.append(el('button', {
            className: 'text-sm font-bold bg-red-100 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-200',
            onClick: async () => { if (!confirm('Cancel this PO?')) return; try { await api.suppliers.updatePO(po.id, { status: 'CANCELLED' }); toast('PO cancelled','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '🚫 Cancel PO'));
        }
        panel.append(btnRow);
        row.append(panel);
      }
      table.append(row);
    });
    tabContent.append(toolbar, table);
  }

  function renderTab() {
    if (activeTab === 'suppliers') renderSuppliersTab();
    else renderPOsTab();
  }

  function showSupplierForm(sup, onDone) {
    const isEdit = !!sup;
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const fields = [
      { label: 'Name *', key: 'name' }, { label: 'Contact Person', key: 'contactName' },
      { label: 'Phone', key: 'phone' }, { label: 'Email', key: 'email' },
      { label: 'Address', key: 'address' }, { label: 'City', key: 'city' }, { label: 'Notes', key: 'notes' },
    ];
    const inputs = {};
    const formEl = el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-md shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-5' },
        el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Supplier' : 'New Supplier'),
        el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×'),
      ),
    );
    fields.forEach(f => {
      const inp = el('input', { type: 'text', placeholder: f.label, value: sup ? (sup[f.key] ?? '') : '',
        className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3',
      });
      inputs[f.key] = inp;
      formEl.append(inp);
    });
    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!inputs['name'].value.trim()) { toast('Name is required', 'error'); return; }
        const payload = {};
        fields.forEach(f => { if (inputs[f.key].value) payload[f.key] = inputs[f.key].value; });
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          if (isEdit) await api.suppliers.update(sup.id, payload);
          else await api.suppliers.create(payload);
          toast(isEdit ? 'Supplier updated' : 'Supplier created', 'success'); close(); onDone();
        } catch(err) { toast(err?.message || 'Failed', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save');
    formEl.append(saveBtn);
    modal.append(formEl);
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  function showNewPOForm(preselectSupplierId, onDone) {
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const lineItems = [];

    const suppSel = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const emptyOpt = document.createElement('option'); emptyOpt.value = ''; emptyOpt.textContent = '— Select Supplier —'; suppSel.append(emptyOpt);
    suppliers.filter(s => s.status === 'ACTIVE').forEach(s => {
      const o = document.createElement('option'); o.value = s.id; o.textContent = s.name;
      if (preselectSupplierId === s.id) o.selected = true;
      suppSel.append(o);
    });
    const expectedInp = el('input', { type: 'date', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const notesInp = el('input', { type: 'text', placeholder: 'Notes', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const linesDiv = el('div', { className: 'space-y-2 mb-3' });
    const totalEl = el('p', { className: 'text-sm font-bold text-brand mb-3' }, 'Total: R 0.00');

    function recalcTotal() {
      const t = lineItems.reduce((s, l) => s + (parseFloat(l.qty.value)||0) * (parseFloat(l.cost.value)||0), 0);
      totalEl.textContent = `Total: R ${t.toFixed(2)}`;
    }
    function addLine() {
      const stockSel = el('select', { className: 'flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
      const emOpt = document.createElement('option'); emOpt.value = ''; emOpt.textContent = '— Select Item —'; stockSel.append(emOpt);
      stockItems.forEach(i => { const o = document.createElement('option'); o.value = i.id; o.textContent = `${i.name} (${i.unit})`; stockSel.append(o); });
      const qtyInp  = el('input', { type: 'number', step: '0.001', placeholder: 'Qty', className: 'w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand', onInput: recalcTotal });
      const costInp = el('input', { type: 'number', step: '0.0001', placeholder: 'Unit R', className: 'w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand', onInput: recalcTotal });
      const lineObj = { sel: stockSel, qty: qtyInp, cost: costInp };
      lineItems.push(lineObj);
      const removeBtn = el('button', { className: 'text-red-400 hover:text-red-600 font-bold text-sm', onClick: () => { lineItems.splice(lineItems.indexOf(lineObj), 1); line.remove(); recalcTotal(); } }, '×');
      const line = el('div', { className: 'flex gap-2 items-center' }, stockSel, qtyInp, costInp, removeBtn);
      linesDiv.append(line);
    }
    addLine();

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!suppSel.value) { toast('Select a supplier', 'error'); return; }
        const items = lineItems.filter(l => l.sel.value && l.qty.value && l.cost.value)
          .map(l => ({ stockItemId: l.sel.value, orderedQty: parseFloat(l.qty.value), unitCost: parseFloat(l.cost.value) }));
        if (!items.length) { toast('Add at least one item', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Creating…';
        try {
          await api.suppliers.createPO({ supplierId: suppSel.value, expectedDate: expectedInp.value || undefined, notes: notesInp.value || undefined, items });
          toast('Purchase order created', 'success'); close(); onDone();
        } catch(err) { toast(err?.message || 'Failed', 'error'); saveBtn.disabled = false; saveBtn.textContent = 'Create PO'; }
      }
    }, 'Create PO');

    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-4' },
        el('h3', { className: 'font-black text-gray-900 text-lg' }, 'New Purchase Order'),
        el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×'),
      ),
      el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Supplier *'), suppSel,
      el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Expected Delivery Date'), expectedInp,
      notesInp,
      el('div', { className: 'flex items-center justify-between mb-2' },
        el('p', { className: 'text-xs font-bold text-gray-500' }, 'Line Items'),
        el('button', { className: 'text-xs font-bold text-brand hover:opacity-80', onClick: addLine }, '+ Add Item'),
      ),
      linesDiv, totalEl, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  renderTab();
  container.append(page);
}

// ── RECIPE MANAGEMENT ─────────────────────────────────────────────────────────
function renderAdminRecipes(data, container, reload) {
  const { recipes = [], stockItems = [], products = [] } = data;
  let expandedId = null, searchQ = '';

  const page = el('div', { className: 'p-6 max-w-5xl mx-auto' });

  // ── CHIPS ──────────────────────────────────────────────────────────────────
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-3 gap-3 mb-5' });
  [
    { label: 'Total Recipes', val: recipes.length,                           color: '#8B3A3A' },
    { label: 'Active',        val: recipes.filter(r => r.isActive).length,   color: '#10B981' },
    { label: 'Total Ingredients Used', val: new Set(recipes.flatMap(r => (r.ingredients||[]).map(i => i.stockItemId))).size, color: '#3B82F6' },
  ].forEach(c => chipsRow.append(
    el('div', { className: 'bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3' },
      el('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0', style: { backgroundColor: c.color } }, String(c.val)),
      el('p', { className: 'text-sm font-semibold text-gray-600 leading-tight' }, c.label)
    )
  ));
  page.append(chipsRow);

  // ── TOOLBAR ────────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex items-center gap-3 mb-4' });
  const searchBox = el('input', { type: 'text', placeholder: '🔍 Search recipes…', value: searchQ,
    className: 'flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand',
    onInput: e => { searchQ = e.target.value; renderTable(); },
  });
  const addBtn = el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showRecipeForm(null, () => reload()) }, '+ New Recipe');
  toolbar.append(searchBox, addBtn);
  page.append(toolbar);

  const tableWrap = el('div', {});
  page.append(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';
    const q = searchQ.toLowerCase();
    const filtered = recipes.filter(r => !q || r.name.toLowerCase().includes(q));

    if (!filtered.length) {
      tableWrap.append(el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '📋'), el('p', { className: 'font-bold text-gray-700' }, 'No recipes yet')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    filtered.forEach(recipe => {
      const isExp = expandedId === recipe.id;
      const row = el('div', { className: 'border-b border-gray-50 last:border-0' });
      const mainRow = el('div', {
        className: 'flex items-center gap-4 px-5 py-4 hover:bg-gray-50 cursor-pointer',
        onClick: () => { expandedId = isExp ? null : recipe.id; renderTable(); },
      },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'font-bold text-gray-900' }, recipe.name),
          el('p', { className: 'text-xs text-gray-400 mt-0.5' }, `Yields: ${Number(recipe.yieldQty).toFixed(3)} ${recipe.yieldUnit} · ${(recipe.ingredients||[]).length} ingredient(s)`),
        ),
        recipe.isActive
          ? el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700' }, 'Active')
          : el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500' }, 'Inactive'),
        el('span', { className: 'text-gray-400 text-xs' }, isExp ? '▲' : '▼'),
      );
      row.append(mainRow);

      if (isExp) {
        const panel = el('div', { className: 'px-5 pb-4 pt-1 bg-gray-50 border-t border-gray-100' });
        if (recipe.notes) panel.append(el('p', { className: 'text-xs text-gray-500 italic mb-3' }, recipe.notes));

        // Ingredient list
        if (recipe.ingredients?.length) {
          const ingTable = el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100 mb-4' });
          ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase' },
            el('div', { className: 'col-span-5' }, 'Ingredient'),
            el('div', { className: 'col-span-3 text-right' }, 'Quantity Needed'),
            el('div', { className: 'col-span-2 text-right' }, 'In Stock'),
            el('div', { className: 'col-span-2 text-right' }, 'Status'),
          ));
          recipe.ingredients.forEach(ing => {
            const needed = Number(ing.quantity) * 1;
            const inStock = Number(ing.stockItem?.currentStock ?? 0);
            const sufficient = inStock >= needed;
            ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2 border-t border-gray-50 items-center' },
              el('div', { className: 'col-span-5 font-semibold text-sm text-gray-800' }, ing.stockItem?.name || ing.stockItemId),
              el('div', { className: 'col-span-3 text-right text-sm text-gray-600' }, `${needed.toFixed(3)} ${ing.unit}`),
              el('div', { className: 'col-span-2 text-right text-sm text-gray-500' }, `${inStock.toFixed(3)} ${ing.stockItem?.unit||''}`),
              el('div', { className: 'col-span-2 text-right' },
                el('span', { className: `text-xs font-bold px-1.5 py-0.5 rounded-full ${sufficient ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}` }, sufficient ? '✓ OK' : '✗ Low')
              ),
            ));
          });
          panel.append(ingTable);
        } else {
          panel.append(el('p', { className: 'text-xs text-gray-400 italic mb-3' }, 'No ingredients defined yet.'));
        }

        panel.append(el('div', { className: 'flex gap-2' },
          el('button', { className: 'text-sm font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200', onClick: () => showRecipeForm(recipe, () => reload()) }, '✏️ Edit Recipe'),
          el('button', { className: 'text-sm font-bold bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg hover:bg-purple-200', onClick: () => showIngredientsForm(recipe, () => reload()) }, '🧪 Edit Ingredients'),
          el('button', { className: `text-sm font-bold px-3 py-1.5 rounded-lg ${recipe.isActive ? 'bg-gray-100 text-gray-600 hover:bg-gray-200' : 'bg-green-100 text-green-700 hover:bg-green-200'}`, onClick: async () => { try { await api.recipes.update(recipe.id, { isActive: !recipe.isActive }); reload(); } catch(e) { toast(e?.message||'Failed','error'); } } }, recipe.isActive ? 'Archive' : 'Restore'),
        ));
        row.append(panel);
      }
      table.append(row);
    });
    tableWrap.append(table);
  }

  function showRecipeForm(recipe, onDone) {
    const isEdit = !!recipe;
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const nameInp  = el('input', { type: 'text', placeholder: 'Recipe name *', value: recipe?.name ?? '', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const yieldQty = el('input', { type: 'number', step: '0.001', placeholder: 'Yield quantity', value: recipe?.yieldQty ?? '1', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const yieldUnt = el('input', { type: 'text', placeholder: 'Yield unit (e.g. loaves, pcs, batch)', value: recipe?.yieldUnit ?? 'batch', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const notesInp = el('textarea', { placeholder: 'Notes', rows: 2, className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3 resize-none' });
    if (recipe?.notes) notesInp.value = recipe.notes;
    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!nameInp.value.trim()) { toast('Name required', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        const payload = { name: nameInp.value.trim(), yieldQty: parseFloat(yieldQty.value)||1, yieldUnit: yieldUnt.value.trim()||'batch', notes: notesInp.value.trim()||undefined };
        try {
          if (isEdit) await api.recipes.update(recipe.id, payload); else await api.recipes.create(payload);
          toast(isEdit ? 'Recipe updated' : 'Recipe created', 'success'); close(); onDone();
        } catch(err) { toast(err?.message||'Failed','error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save');
    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl' },
      el('div', { className: 'flex items-center justify-between mb-4' }, el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Recipe' : 'New Recipe'), el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')),
      nameInp, yieldQty, yieldUnt, notesInp, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  function showIngredientsForm(recipe, onDone) {
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const lineItems = recipe.ingredients?.map(i => ({ stockItemId: i.stockItemId, quantity: String(i.quantity), unit: i.unit, notes: i.notes || '' })) || [];

    const linesDiv = el('div', { className: 'space-y-2 mb-4 max-h-64 overflow-y-auto' });
    function renderLines() {
      linesDiv.innerHTML = '';
      lineItems.forEach((item, idx) => {
        const stockSel = el('select', { className: 'flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
        stockItems.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.unit})`; if (s.id === item.stockItemId) o.selected = true; stockSel.append(o); });
        stockSel.addEventListener('change', () => { lineItems[idx].stockItemId = stockSel.value; });
        const qtyInp  = el('input', { type: 'number', step: '0.001', placeholder: 'Qty', value: item.quantity, className: 'w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
        qtyInp.addEventListener('input', () => { lineItems[idx].quantity = qtyInp.value; });
        const unitInp = el('input', { type: 'text', placeholder: 'Unit', value: item.unit, className: 'w-16 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
        unitInp.addEventListener('input', () => { lineItems[idx].unit = unitInp.value; });
        const delBtn  = el('button', { className: 'text-red-400 hover:text-red-600 font-bold', onClick: () => { lineItems.splice(idx, 1); renderLines(); } }, '×');
        linesDiv.append(el('div', { className: 'flex gap-2 items-center' }, stockSel, qtyInp, unitInp, delBtn));
      });
    }
    renderLines();

    const addLineBtn = el('button', { className: 'text-xs font-bold text-brand mb-4 hover:opacity-80', onClick: () => {
      lineItems.push({ stockItemId: stockItems[0]?.id || '', quantity: '', unit: stockItems[0]?.unit || '', notes: '' });
      renderLines();
    }}, '+ Add Ingredient');

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        const valid = lineItems.filter(l => l.stockItemId && l.quantity && l.unit);
        if (!valid.length) { toast('Add at least one ingredient', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          await api.recipes.setIngredients(recipe.id, { ingredients: valid.map(l => ({ stockItemId: l.stockItemId, quantity: parseFloat(l.quantity), unit: l.unit })) });
          toast('Ingredients saved', 'success'); close(); onDone();
        } catch(err) { toast(err?.message||'Failed','error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save Ingredients');

    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-4' }, el('h3', { className: 'font-black text-gray-900' }, `Ingredients: ${recipe.name}`), el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')),
      linesDiv, addLineBtn, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  renderTable();
  container.append(page);
}

// ── PRODUCTION MANAGEMENT ─────────────────────────────────────────────────────
function renderAdminProduction(data, container, reload) {
  const { productionRuns = [], recipes = [], stockItems = [] } = data;
  let expandedId = null;

  const PROD_META = {
    PLANNED:     { label: 'Planned',     color: '#9CA3AF', bg: '#F3F4F6', icon: '📅' },
    IN_PROGRESS: { label: 'In Progress', color: '#3B82F6', bg: '#EFF6FF', icon: '⚙️' },
    COMPLETED:   { label: 'Completed',   color: '#10B981', bg: '#ECFDF5', icon: '✅' },
    CANCELLED:   { label: 'Cancelled',   color: '#EF4444', bg: '#FEF2F2', icon: '🚫' },
  };

  const page = el('div', { className: 'p-6 max-w-5xl mx-auto' });

  // ── CHIPS ──────────────────────────────────────────────────────────────────
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5' });
  [
    { label: 'Total Runs',   val: productionRuns.length,                                        color: '#3B82F6' },
    { label: 'Planned',      val: productionRuns.filter(r => r.status === 'PLANNED').length,     color: '#9CA3AF' },
    { label: 'In Progress',  val: productionRuns.filter(r => r.status === 'IN_PROGRESS').length, color: '#F59E0B' },
    { label: 'Completed',    val: productionRuns.filter(r => r.status === 'COMPLETED').length,   color: '#10B981' },
  ].forEach(c => chipsRow.append(
    el('div', { className: 'bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3' },
      el('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0', style: { backgroundColor: c.color } }, String(c.val)),
      el('p', { className: 'text-sm font-semibold text-gray-600 leading-tight' }, c.label)
    )
  ));
  page.append(chipsRow);

  // ── TOOLBAR ────────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex items-center gap-3 mb-4' });
  toolbar.append(
    el('p', { className: 'text-sm text-gray-500 flex-1' }, `${productionRuns.length} run(s)`),
    el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showNewRunForm(() => reload()) }, '+ New Production Run'),
  );
  page.append(toolbar);

  const tableWrap = el('div', {});
  page.append(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';
    if (!productionRuns.length) {
      tableWrap.append(el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '🏭'), el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No production runs yet'),
        el('p', { className: 'text-sm text-gray-400' }, 'Create a run to start tracking production')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-4' }, 'Recipe'),
      el('div', { className: 'col-span-2 text-center' }, 'Batches'),
      el('div', { className: 'col-span-2' }, 'Status'),
      el('div', { className: 'col-span-2 text-center' }, 'Planned Date'),
      el('div', { className: 'col-span-2' }, 'Actions'),
    ));

    productionRuns.forEach(run => {
      const isExp = expandedId === run.id;
      const meta  = PROD_META[run.status] || { label: run.status, color: '#9CA3AF', bg: '#F3F4F6', icon: '' };
      const row   = el('div', { className: 'border-b border-gray-50 last:border-0' });

      const mainRow = el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-50' },
        el('div', { className: 'col-span-4 cursor-pointer', onClick: () => { expandedId = isExp ? null : run.id; renderTable(); } },
          el('p', { className: 'font-bold text-gray-900 text-sm' }, run.recipe?.name || run.recipeId),
          el('p', { className: 'text-xs text-gray-400' }, `${Number(run.batches)} batch(es) · yields ${(Number(run.batches) * Number(run.recipe?.yieldQty || 1)).toFixed(2)} ${run.recipe?.yieldUnit || ''}`),
        ),
        el('div', { className: 'col-span-2 text-center font-bold text-gray-800' }, `×${Number(run.batches)}`),
        el('div', { className: 'col-span-2' },
          el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: meta.bg, color: meta.color } }, `${meta.icon} ${meta.label}`)
        ),
        el('div', { className: 'col-span-2 text-center text-xs text-gray-400' },
          run.plannedDate ? new Date(run.plannedDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' }) : '—'
        ),
        // Inline action buttons
        el('div', { className: 'col-span-2 flex gap-1.5' }, ...[
          run.status === 'PLANNED' ? el('button', {
            className: 'text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-lg hover:bg-blue-200',
            onClick: async () => { try { await api.production.update(run.id, { status: 'IN_PROGRESS' }); toast('Run started','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '▶ Start') : null,
          run.status === 'IN_PROGRESS' ? el('button', {
            className: 'text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded-lg hover:bg-green-200',
            onClick: async () => {
              if (!confirm(`Complete "${run.recipe?.name}"? This will deduct ingredients from stock.`)) return;
              try { await api.production.complete(run.id); toast('Production completed — stock deducted ✅','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); }
            }
          }, '✅ Done') : null,
          !['COMPLETED','CANCELLED'].includes(run.status) ? el('button', {
