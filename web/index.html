<script type="module">
// ─── CONFIG ───────────────────────────────────────────────────────
const API_BASE = 'https://tlaka-treats-production.up.railway.app';

// ─── API ──────────────────────────────────────────────────────────
const token = () => localStorage.getItem('tt_token');
const headers = () => ({
  'Content-Type': 'application/json',
  ...(token() ? { Authorization: `Bearer ${token()}` } : {})
});

const req = async (method, path, body) => {
  const res = await fetch(API_BASE + path, {
    method,
    headers: headers(),
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw { message: data.message || 'Something went wrong', status: res.status };
  return data;
};

// ─── AUTH STORE ───────────────────────────────────────────────────
let _user = null;
let _listeners = [];

const store = {
  get user() { return _user; },
  setAuth(token, user) {
    localStorage.setItem('tt_token', token);
    localStorage.setItem('tt_user', JSON.stringify(user));
    _user = user;
    _listeners.forEach(fn => fn());
  },
  logout() {
    localStorage.removeItem('tt_token');
    localStorage.removeItem('tt_user');
    _user = null;
    _listeners.forEach(fn => fn());
    navigate('login');
  },
  load() {
    const u = localStorage.getItem('tt_user');
    if (u) _user = JSON.parse(u);
  },
  subscribe(fn) { _listeners.push(fn); return () => { _listeners = _listeners.filter(l => l !== fn); }; },
  isAdmin: (u) => u?.roles?.includes('ADMIN'),
  isAmbassador: (u) => u?.roles?.includes('AMBASSADOR'),
};
store.load();

// ─── ROUTER ───────────────────────────────────────────────────────
let _currentPage = 'loading';
let _routerListeners = [];

function navigate(page) {
  _currentPage = page;
  _routerListeners.forEach(fn => fn(page));
}

function getCurrentPage() { return _currentPage; }

// ─── HELPERS ──────────────────────────────────────────────────────
function el(tag, props = {}, ...children) {
  const element = document.createElement(tag);
  const { className, style, onClick, onInput, placeholder, type, value, disabled, href, ...rest } = props;
  if (className) element.className = className;
  if (style) Object.assign(element.style, style);
  if (onClick) element.addEventListener('click', onClick);
  if (placeholder) element.placeholder = placeholder;
  if (type) element.type = type;
  if (value !== undefined) element.value = value;
  if (disabled) element.disabled = disabled;
  if (href) element.href = href;
  if (onInput) element.addEventListener('input', onInput);
  Object.entries(rest).forEach(([k, v]) => element.setAttribute(k, v));
  children.flat().forEach(child => {
    if (child === null || child === undefined) return;
    element.append(typeof child === 'string' ? document.createTextNode(child) : child);
  });
  return element;
}

function html(strings, ...vals) {
  const div = document.createElement('div');
  div.innerHTML = String.raw(strings, ...vals);
  return div.firstElementChild;
}

function spinner() {
  const s = document.createElement('span');
  s.className = 'spinner';
  return s;
}

function badge(text, color) {
  const b = document.createElement('span');
  b.className = 'inline-block px-3 py-1 rounded-full text-white text-xs font-bold';
  b.style.backgroundColor = color || '#999';
  b.textContent = text;
  return b;
}

function toast(msg, type = 'error') {
  const t = document.createElement('div');
  t.className = `fixed top-4 right-4 z-50 px-5 py-3 rounded-xl text-white font-semibold shadow-lg fade-in`;
  t.style.backgroundColor = type === 'error' ? '#EF4444' : '#10B981';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

const STATUS_COLORS = {
  PENDING: '#F59E0B', CONFIRMED: '#3B82F6', BAKING: '#8B5CF6',
  READY: '#10B981', DELIVERED: '#6B7280', CANCELLED: '#EF4444',
};

// ── AMBASSADOR CODE PICKER ─────────────────────────────────────────────────
// Returns a wrapper element. Fetches active ambassadors and shows a searchable
// dropdown. Call with { value, onChange, placeholder?, wrapClass? }.
function createAmbPicker({ value = '', onChange, placeholder = 'Select ambassador code…', wrapClass = '' } = {}) {
  let selected = value;
  let ambList = [];
  let dropOpen = false;
  let searchQ = '';

  const wrap = el('div', { className: `relative ${wrapClass}` });

  // Trigger button
  const trigger = el('button', {
    type: 'button',
    className: 'w-full flex items-center justify-between border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-white outline-none focus:ring-2 focus:ring-brand transition text-left',
    onClick: openDrop,
  });

  const triggerText = el('span', {});
  const triggerRight = el('span', { className: 'flex items-center gap-1 flex-shrink-0 ml-2' });
  trigger.append(triggerText, triggerRight);
  wrap.append(trigger);

  // Dropdown panel (appended to body so z-index works inside modals)
  let dropEl = null;

  function updateTrigger() {
    if (selected) {
      triggerText.textContent = selected;
      triggerText.className = 'font-semibold text-brand flex-1 truncate';
      triggerRight.innerHTML = '';
      const clearBtn = el('span', {
        className: 'text-gray-300 hover:text-gray-500 cursor-pointer text-xs',
        onClick: (e) => { e.stopPropagation(); selected = ''; onChange(''); updateTrigger(); },
      }, '✕');
      triggerRight.append(clearBtn);
    } else {
      triggerText.textContent = placeholder;
      triggerText.className = 'text-gray-400 flex-1';
      triggerRight.innerHTML = '<span class="text-gray-400 text-xs">▾</span>';
    }
  }
  updateTrigger();

  function closeDrop() {
    dropEl?.remove(); dropEl = null; dropOpen = false;
  }

  function openDrop() {
    if (dropOpen) { closeDrop(); return; }
    dropOpen = true;
    searchQ = '';

    // Position dropdown below trigger
    const rect = trigger.getBoundingClientRect();
    dropEl = el('div', {
      className: 'fixed bg-white border border-gray-200 rounded-xl shadow-xl z-[999] flex flex-col',
      style: `top:${rect.bottom + 4 + window.scrollY}px;left:${rect.left + window.scrollX}px;width:${rect.width}px;max-height:280px;`,
    });

    const searchInp = el('input', {
      type: 'text', placeholder: 'Search by code…',
      className: 'w-full border-b border-gray-100 px-4 py-2.5 text-sm outline-none rounded-t-xl',
      value: searchQ,
      onInput: (e) => { searchQ = e.target.value; renderList(); },
    });
    dropEl.append(searchInp);

    const listWrap = el('div', { className: 'overflow-y-auto flex-1' });
    dropEl.append(listWrap);

    function renderList() {
      listWrap.innerHTML = '';
      const q = searchQ.toLowerCase().trim();
      const filtered = ambList.filter(a => !q || (a.code || '').toLowerCase().includes(q) || `${a.user?.firstName || ''} ${a.user?.lastName || ''}`.toLowerCase().includes(q));
      if (!filtered.length) {
        listWrap.append(el('p', { className: 'text-center text-gray-400 text-sm py-5' }, ambList.length ? 'No results' : 'Loading…'));
        return;
      }
      filtered.forEach(a => {
        const row = el('div', {
          className: `flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-50 border-b border-gray-50 last:border-0 ${selected === a.code ? 'bg-brand-light' : ''}`,
          onClick: () => { selected = a.code; onChange(a.code); updateTrigger(); closeDrop(); },
        },
          el('span', { className: 'font-bold text-brand text-sm' }, a.code || ''),
          a.user ? el('span', { className: 'text-xs text-gray-400 ml-2' }, `${a.user.firstName || ''} ${a.user.lastName || ''}`.trim()) : null,
        );
        listWrap.append(row);
      });
    }

    document.body.append(dropEl);
    setTimeout(() => searchInp.focus(), 50);
    renderList();

    // Fetch ambassadors
    api.ambassadors.getActive().then(list => {
      ambList = list;
      renderList();
    }).catch(() => {});

    // Close on outside click
    const onOutside = (e) => { if (!dropEl?.contains(e.target) && e.target !== trigger) { closeDrop(); document.removeEventListener('mousedown', onOutside); } };
    setTimeout(() => document.addEventListener('mousedown', onOutside), 0);
  }

  return wrap;
}

// ── LOGIN ──────────────────────────────────────────────────────────
function LoginPage() {
  let email = '', password = '', loading = false;

  const wrap = document.createElement('div');
  wrap.className = 'min-h-screen bg-brand flex items-center justify-center p-6';

  const inner = document.createElement('div');
  inner.className = 'w-full max-w-sm fade-in';

  const logoWrap = document.createElement('div');
  logoWrap.className = 'text-center mb-8';
  logoWrap.append(
    makeLogo(96, 'rounded-2xl mx-auto mb-4 shadow-lg block'),
    el('h1', { className: 'text-4xl font-black text-white' }, 'Tlaka Treats'),
    el('p', { className: 'text-brand-light mt-1 text-base' }, 'Welcome back')
  );
  inner.append(logoWrap);

  const form = document.createElement('div');
  form.className = 'space-y-4';

  const emailInput = el('input', {
    type: 'email', placeholder: 'Email',
    className: 'w-full bg-white rounded-xl px-4 py-4 text-base text-gray-900 outline-none focus:ring-2 focus:ring-brand-dark',
    onInput: (e) => email = e.target.value,
  });

  const passwordInput = el('input', {
    type: 'password', placeholder: 'Password',
    className: 'w-full bg-white rounded-xl px-4 py-4 text-base text-gray-900 outline-none focus:ring-2 focus:ring-brand-dark',
    onInput: (e) => password = e.target.value,
  });

  const btn = el('button', {
    className: 'w-full bg-brand-dark text-white font-bold text-base py-4 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2',
    onClick: handleLogin,
  }, 'Sign In');

  const registerLink = el('p', {
    className: 'text-center text-brand-light text-sm mt-4 cursor-pointer',
    onClick: () => navigate('register'),
  }, "Don't have an account? ", el('span', { className: 'text-white font-bold' }, 'Register'));

  form.append(emailInput, passwordInput, btn, registerLink);
  inner.append(form);
  wrap.append(inner);

  async function handleLogin() {
    if (!email || !password) return toast('Please fill in all fields');
    loading = true;
    btn.disabled = true;
    btn.innerHTML = '';
    btn.append(spinner());
    try {
      const { token, user } = await api.auth.login(email, password);
      store.setAuth(token, user);
      redirectByRole(user);
    } catch (err) {
      toast(err.message || 'Invalid credentials');
    } finally {
      loading = false;
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  return wrap;
}

    makeLogo(64, 'rounded-xl shadow-lg flex-shrink-0'),
    el('div', {},
      el('h1', { className: 'text-3xl font-black text-white' }, 'Create Account'),
      el('p', { className: 'text-brand-light mt-1' }, 'Join the Tlaka Treats family')
    )
  );
  inner.append(regHeader);

  const fields = document.createElement('div');

  const fieldDefs = [

    { key: 'lastName', placeholder: 'Last Name', type: 'text' },

    { key: 'phone', placeholder: 'Phone (optional)', type: 'tel' },
    { key: 'password', placeholder: 'Password', type: 'password' },

  fieldDefs.forEach(({ key, placeholder, type }) => {
    const input = el('input', {
      type, placeholder,
      className: 'w-full bg-white rounded-xl px-4 py-4 text-base text-gray-900 outline-none focus:ring-2 focus:ring-brand-dark',
      onInput: (e) => form[key] = e.target.value,
    });
    fields.append(input);
  });

  const btn = el('button', {
    className: 'w-full bg-brand-dark text-white font-bold text-base py-4 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2',
    onClick: handleRegister,
  }, 'Create Account');

  const loginLink = el('p', {
    className: 'text-center text-brand-light text-sm mt-4 cursor-pointer',
    onClick: () => navigate('login'),
  }, "Already have an account? ", el('span', { className: 'text-white font-bold' }, 'Sign In'));

  fields.append(btn, loginLink);
  inner.append(fields);
  wrap.append(inner);

  async function handleRegister() {
    if (!form.email || !form.password || !form.firstName || !form.lastName) {
      return toast('Please fill in all required fields');
    }
    btn.disabled = true;
    btn.innerHTML = '';
    btn.append(spinner());
    try {
      const { token, user } = await api.auth.register(form);
      store.setAuth(token, user);
      redirectByRole(user);
    } catch (err) {
      toast(err.message || 'Registration failed');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  }

  return wrap;
}

// ── CUSTOMER HOME ────────────────────────────────────────────────────
function CustomerHomePage() {
  let allProducts = [], categories = [];
  let activeCategory = null, searchQuery = '', sortBy = 'default';
  let currentView = 'browse'; // 'browse' | 'orders' | 'account' | 'cart' | 'checkout'

  // ── CART STATE ────────────────────────────────────────────────────────────
  // Each item: { variantId, variantName, productName, productImg, unitPrice, quantity, ambassadorCode }
  let cart = [];
  let checkoutData = { street: '', suburb: '', city: '', province: '', postalCode: '', notes: '', ambassadorCode: '', step: 1 };
  let savedAddresses = [];

  function cartTotal() { return cart.reduce((s, i) => s + i.unitPrice * i.quantity, 0); }
  function cartCount() { return cart.reduce((s, i) => s + i.quantity, 0); }

  function addToCart(item) {
    const existing = cart.find(c => c.variantId === item.variantId);
    if (existing) { existing.quantity += item.quantity; }
    else { cart.push({ ...item }); }
    updateCartBadge();
  }

  const shell = el('div', { className: 'min-h-screen bg-gray-50 flex flex-col' });

  // ── STICKY TOPNAV ──────────────────────────────────────────────────────────

  // Logo
  navInner.append(
    el('div', { className: 'flex items-center gap-2 flex-shrink-0 cursor-pointer', onClick: () => { currentView = 'browse'; updateView(); } },
      makeLogo(36, 'rounded-lg flex-shrink-0'),
      el('span', { className: 'text-white font-black text-base hidden sm:block leading-tight' }, 'Tlaka Treats')
    )
  );

  // Search bar
  const searchInput = el('input', {
    type: 'text', placeholder: '🔍  Search for treats…',
    className: 'flex-1 bg-white rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand-dark min-w-0',
    onInput: (e) => { searchQuery = e.target.value; if (currentView === 'browse') renderProducts(); },
  });
  navInner.append(el('div', { className: 'flex-1 max-w-lg' }, searchInput));

  // Nav buttons
  const ordersNavBtn = el('button', {
    className: 'text-white text-sm font-semibold px-3 py-2 rounded-lg hover:bg-brand-dark transition hidden sm:flex items-center gap-1.5',
    onClick: () => { currentView = 'orders'; updateView(); },
  }, '📦 My Orders');

  // Cart button with live badge
  const cartBadgeEl = el('span', {
    className: 'hidden absolute -top-1.5 -right-1.5 min-w-[20px] h-5 px-1 rounded-full bg-brand text-white text-xs font-black flex items-center justify-center leading-none border-2 border-white',
  }, '0');
  const cartNavBtn = el('button', {
    className: 'relative flex items-center gap-2 bg-white bg-opacity-20 text-white font-bold px-3 py-2 rounded-xl hover:bg-opacity-30 transition flex-shrink-0 border border-white border-opacity-30',
    onClick: () => { currentView = 'cart'; updateView(); },
  },
    el('span', { className: 'text-lg leading-none' }, '🛒'),
    el('span', { className: 'hidden sm:block text-sm' }, 'Cart'),
    cartBadgeEl
  );

  function updateCartBadge() {
    const total = cartCount();
    if (total > 0) {
      cartBadgeEl.textContent = total > 99 ? '99+' : String(total);
      cartBadgeEl.classList.remove('hidden');
      cartBadgeEl.classList.add('flex');
    } else {
      cartBadgeEl.classList.add('hidden');
      cartBadgeEl.classList.remove('flex');
    }
  }

  const accountInitials = ((store.user?.firstName?.[0] || '') + (store.user?.lastName?.[0] || '')).toUpperCase() || 'ME';
  const accountNavBtn = el('button', {
    className: 'flex items-center gap-2 bg-brand-dark text-white text-sm font-semibold px-3 py-2 rounded-lg hover:opacity-90 transition flex-shrink-0',
    onClick: () => { currentView = 'account'; updateView(); },
  },
    el('div', { className: 'w-6 h-6 rounded-full bg-white bg-opacity-20 flex items-center justify-center text-xs font-black' }, accountInitials),
    el('span', { className: 'hidden sm:block' }, store.user?.firstName || 'Account')
  );
  navInner.append(ordersNavBtn, cartNavBtn, accountNavBtn);
  topnav.append(navInner);
  shell.append(topnav);

  // ── BODY LAYOUT ────────────────────────────────────────────────────────────
  const body = el('div', { className: 'flex flex-1 max-w-7xl mx-auto w-full' });

  // ── LEFT SIDEBAR ───────────────────────────────────────────────────────────
  const sidebar = el('aside', { className: 'w-52 flex-shrink-0 hidden md:block py-5 pl-4 pr-3' });
  const sidebarBox = el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden sticky top-20' });
  sidebar.append(sidebarBox);

  function renderSidebar() {
    sidebarBox.innerHTML = '';
    sidebarBox.append(
      el('div', { className: 'px-4 py-3 border-b border-gray-100 bg-gray-50' },
        el('p', { className: 'text-xs font-black text-gray-500 uppercase tracking-wider' }, 'Categories')
      )
    );
    const allCount = allProducts.length;
    const catList = [
      { id: null, name: 'All Products', count: allCount },
      ...categories.map(c => ({ id: c.id, name: c.name, count: allProducts.filter(p => p.categoryId === c.id).length })),
    ];
    catList.forEach(cat => {
      const active = activeCategory === cat.id;
      sidebarBox.append(
        el('button', {
          className: `w-full flex items-center justify-between px-4 py-2.5 text-sm text-left transition border-l-4 ${active ? 'bg-brand-light border-brand font-bold text-brand-dark' : 'border-transparent text-gray-700 hover:bg-gray-50 hover:border-gray-200'}`,
          onClick: () => { activeCategory = cat.id; renderSidebar(); renderProducts(); },
        },
          el('span', { className: 'truncate' }, cat.name),
          el('span', { className: `text-xs px-1.5 py-0.5 rounded-full font-semibold ${active ? 'bg-brand text-white' : 'bg-gray-100 text-gray-400'}` }, String(cat.count))
        )
      );
    });
  }
  body.append(sidebar);

  // ── MAIN AREA ──────────────────────────────────────────────────────────────
  const main = el('div', { className: 'flex-1 min-w-0 py-5 px-4' });
  body.append(main);
  shell.append(body);

  // ── BROWSE VIEW ────────────────────────────────────────────────────────────
  const browseView = el('div', {});

  const sortBar = el('div', { className: 'flex items-center justify-between mb-4' });
  const countLabel = el('p', { className: 'text-sm text-gray-500' });

  const sortSelect = el('select', { className: 'text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white outline-none focus:ring-2 focus:ring-brand' });
  [['default','Featured'], ['price-asc','Price: Low → High'], ['price-desc','Price: High → Low'], ['name','Name A–Z']].forEach(([v, l]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = l; sortSelect.append(o);
  });
  sortSelect.addEventListener('change', e => { sortBy = e.target.value; renderProducts(); });
  sortBar.append(countLabel, sortSelect);

  const grid = el('div', { className: 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4' });
  browseView.append(sortBar, grid);

  function renderProducts() {
    grid.innerHTML = '';
    const q = searchQuery.toLowerCase().trim();
    let filtered = allProducts.filter(p => {
      if (q && !p.name.toLowerCase().includes(q) && !(p.description || '').toLowerCase().includes(q)) return false;
      if (activeCategory !== null && p.categoryId !== activeCategory) return false;
      return true;
    });
    if (sortBy === 'price-asc')  filtered.sort((a, b) => (a.variants?.[0]?.prices?.[0]?.price || 0) - (b.variants?.[0]?.prices?.[0]?.price || 0));
    if (sortBy === 'price-desc') filtered.sort((a, b) => (b.variants?.[0]?.prices?.[0]?.price || 0) - (a.variants?.[0]?.prices?.[0]?.price || 0));
    if (sortBy === 'name')       filtered.sort((a, b) => a.name.localeCompare(b.name));

    countLabel.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      grid.append(el('div', { className: 'col-span-full text-center py-16' },
        el('p', { className: 'text-4xl mb-3' }, q ? '🔍' : '🍪'),
        el('p', { className: 'font-bold text-gray-700 mb-1' }, q ? 'No results found' : 'No products yet'),
        el('p', { className: 'text-sm text-gray-400' }, q ? `Try searching for something else` : 'Check back soon!')
      )); return;
    }

    filtered.forEach(p => {
      const imgs = Array.isArray(p.images) ? p.images : [];
      const primaryImg = p.imageUrl || imgs.find(i => i.isPrimary)?.url || imgs[0]?.url || null;
      const lowestPrice = p.variants?.reduce((min, v) => {
        const pr = v.prices?.[0]?.price;
        return (pr !== undefined && (min === null || Number(pr) < min)) ? Number(pr) : min;
      }, null);

      const card = el('div', {
        className: 'bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 cursor-pointer flex flex-col',
        onClick: () => showProductModal(p, { onAddToCart: addToCart, priceTier: 'RETAIL' }),
      });

      // Image
      const imgBox = el('div', { className: 'aspect-square bg-orange-50 overflow-hidden' });
      if (primaryImg) {
        const img = el('img', { className: 'w-full h-full object-cover hover:scale-105 transition-transform duration-300', alt: p.name });
        img.src = primaryImg;
        imgBox.append(img);
      } else {
        imgBox.append(el('div', { className: 'w-full h-full flex items-center justify-center' }, makeLogo(52, 'rounded-xl opacity-50')));
      }
      card.append(imgBox);

      // Info
      const info = el('div', { className: 'p-3 flex flex-col flex-1' },
        el('p', { className: 'font-bold text-gray-900 text-sm leading-snug mb-0.5' }, p.name),
        p.category ? el('p', { className: 'text-xs text-gray-400 mb-1' }, p.category.name) : el('div', { className: 'mb-1' }),
        p.description ? el('p', { className: 'text-xs text-gray-500 mb-2 line-clamp-2 leading-snug' }, p.description) : el('div', { className: 'mb-2' }),
        el('div', { className: 'flex items-center justify-between mt-auto' },
          lowestPrice !== null
            ? el('p', { className: 'text-brand font-black' }, `R${lowestPrice.toFixed(2)}`)
            : el('p', { className: 'text-xs text-gray-400' }, 'Price on request'),
          el('button', {
            className: 'bg-brand text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:opacity-90 transition',
            onClick: e => { e.stopPropagation(); showProductModal(p, { onAddToCart: addToCart, priceTier: 'RETAIL' }); },
          }, 'Add to Cart')
        )
      );
      card.append(info);
      grid.append(card);
    });
  }

  // ── MY ORDERS VIEW ─────────────────────────────────────────────────────────
  const ordersView = el('div', { className: 'hidden' });

  function loadOrdersView() {
    ordersView.innerHTML = '';
    ordersView.append(
      el('div', { className: 'flex items-center gap-3 mb-5' },
        el('button', { className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80', onClick: () => { currentView = 'browse'; updateView(); } }, '← Back'),
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'My Orders')
      )
    );
    const wrap = el('div', { className: 'flex justify-center py-10' },
      el('div', { className: 'spinner', style: { borderColor: 'rgba(139,58,58,0.2)', borderTopColor: '#8B3A3A' } })
    );
    ordersView.append(wrap);

    api.orders.getMy().then(orders => {
      wrap.remove();
      if (!orders.length) {
        ordersView.append(el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },

          el('p', { className: 'font-black text-gray-900 text-lg mb-1' }, 'No orders yet'),
          el('p', { className: 'text-sm text-gray-400 mb-5' }, 'Browse our treats and place your first order!'),
          el('button', { className: 'bg-brand text-white font-bold px-6 py-2.5 rounded-xl hover:opacity-90', onClick: () => { currentView = 'browse'; updateView(); } }, '🍪 Browse Products')
        )); return;
      }
      ordersView.append(el('div', { className: 'space-y-3' },
        ...orders.map(order => {
          const date = new Date(order.createdAt).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
          return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
            el('div', { className: 'flex justify-between items-start mb-3' },
              el('div', {},
                el('p', { className: 'font-black text-gray-900' }, `R${Number(order.total).toFixed(2)}`),
                el('div', { className: 'flex items-center gap-2 mt-0.5' },

                  el('p', { className: 'text-xs text-gray-400 font-mono' }, `#${order.id.slice(-8).toUpperCase()}`)
                )
              ),
              badge(order.status, STATUS_COLORS[order.status] || '#999')
            ),
            order.items?.length
              ? el('div', { className: 'space-y-1 text-sm text-gray-600 border-t border-gray-50 pt-3' },
                  ...order.items.map(item => el('p', {}, `${item.quantity}× ${item.variant?.product?.name || 'Item'}${item.variant?.name ? ' — ' + item.variant.name : ''}`))
                )
              : null,
            order.ambassador ? el('p', { className: 'text-xs text-brand font-semibold mt-2' }, `🎟️ Via: ${order.ambassador.code}`) : null
          );
        })
      ));
    }).catch(() => { ordersView.append(el('p', { className: 'text-red-400 text-sm text-center py-8' }, 'Failed to load orders. Make sure the API is running.')); });
  }

  // ── CART VIEW ──────────────────────────────────────────────────────────────
  function loadCartView() {
    cartView.innerHTML = '';

    // Header
    cartView.append(
      el('div', { className: 'flex items-center gap-3 mb-6' },
        el('button', { className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80', onClick: () => { currentView = 'browse'; updateView(); } }, '← Continue Shopping'),
        el('h2', { className: 'text-xl font-black text-gray-900 flex-1' }, '🛒 Your Cart'),
        cart.length ? el('span', { className: 'text-sm text-gray-400' }, `${cartCount()} item${cartCount() !== 1 ? 's' : ''}`) : null,
      )
    );

    if (!cart.length) {
      cartView.append(
        el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },
          el('p', { className: 'text-6xl mb-4' }, '🛒'),
          el('p', { className: 'font-black text-gray-900 text-lg mb-1' }, 'Your cart is empty'),
          el('p', { className: 'text-sm text-gray-400 mb-6' }, 'Add some treats to get started!'),
          el('button', { className: 'bg-brand text-white font-bold px-6 py-3 rounded-xl hover:opacity-90', onClick: () => { currentView = 'browse'; updateView(); } }, '🍪 Browse Products')
        )
      );
      return;
    }

    // Items list
    const itemsList = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4' });

    cart.forEach((item, idx) => {
      const subtotal = item.unitPrice * item.quantity;
      const row = el('div', { className: 'flex items-center gap-4 p-4 border-b border-gray-50 last:border-0' });

      // Product image/icon
      const imgBox = el('div', { className: 'w-16 h-16 rounded-xl overflow-hidden bg-orange-50 flex-shrink-0 flex items-center justify-center' });
      if (item.productImg) {
        const img = document.createElement('img'); img.src = item.productImg; img.className = 'w-full h-full object-cover'; imgBox.append(img);
      } else { imgBox.append(makeLogo(32, 'rounded-lg opacity-40')); }
      row.append(imgBox);

      // Name + variant
      const info = el('div', { className: 'flex-1 min-w-0' },
        el('p', { className: 'font-bold text-gray-900 text-sm truncate' }, item.productName),
        el('p', { className: 'text-xs text-gray-400 mt-0.5' }, item.variantName),
        el('p', { className: 'text-xs text-brand font-semibold mt-0.5' }, `R${item.unitPrice.toFixed(2)} each`),
      );
      row.append(info);

      // Qty controls
      const qtyBox = el('div', { className: 'flex items-center gap-2 flex-shrink-0' },
        el('button', {
          className: 'w-7 h-7 rounded-full bg-gray-100 font-bold text-gray-600 hover:bg-gray-200 flex items-center justify-center text-sm transition',
          onClick: () => {
            if (item.quantity > 1) { item.quantity--; } else { cart.splice(idx, 1); }
            updateCartBadge(); loadCartView();
          }
        }, '−'),
        el('span', { className: 'w-6 text-center text-sm font-bold text-gray-900' }, String(item.quantity)),
        el('button', {
          className: 'w-7 h-7 rounded-full bg-gray-100 font-bold text-gray-600 hover:bg-gray-200 flex items-center justify-center text-sm transition',
          onClick: () => { item.quantity++; updateCartBadge(); loadCartView(); }
        }, '+'),
      );
      row.append(qtyBox);

      // Subtotal + remove
      row.append(
        el('div', { className: 'text-right flex-shrink-0 ml-2' },
          el('p', { className: 'font-black text-gray-900 text-sm' }, `R${subtotal.toFixed(2)}`),
          el('button', {
            className: 'text-xs text-red-400 hover:text-red-600 mt-1 transition',
            onClick: () => { cart.splice(idx, 1); updateCartBadge(); loadCartView(); }
          }, 'Remove')
        )
      );
      itemsList.append(row);
    });
    cartView.append(itemsList);

    // Ambassador code
    const ambRow = el('div', { className: 'bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-4' },
      el('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, '🎟️ Ambassador Code (optional)'),
    );
    ambRow.append(createAmbPicker({
      value: checkoutData.ambassadorCode,
      onChange: (code) => { checkoutData.ambassadorCode = code; },
    }));
    cartView.append(ambRow);

    // Order summary
    const deliveryFee = 0;
    const total = cartTotal() + deliveryFee;
    cartView.append(
      el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5' },
        el('div', { className: 'flex justify-between text-sm text-gray-600 mb-2' },
          el('span', {}, 'Subtotal'), el('span', { className: 'font-semibold' }, `R${cartTotal().toFixed(2)}`)
        ),
        el('div', { className: 'flex justify-between text-sm text-gray-600 mb-3' },
          el('span', {}, 'Delivery'), el('span', { className: 'font-semibold' }, deliveryFee === 0 ? 'Free' : `R${deliveryFee.toFixed(2)}`)
        ),
        el('div', { className: 'flex justify-between font-black text-gray-900 text-lg border-t border-gray-100 pt-3' },
          el('span', {}, 'Total'), el('span', { className: 'text-brand' }, `R${total.toFixed(2)}`)
        )
      ),
      el('button', {
        className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base',
        onClick: () => { currentView = 'checkout'; checkoutData.step = 1; updateView(); }
      }, `Proceed to Checkout — R${total.toFixed(2)}`)
    );
  }

  // ── CHECKOUT VIEW ──────────────────────────────────────────────────────────
  function loadCheckoutView() {
    checkoutView.innerHTML = '';

    const step = checkoutData.step || 1;

    // ── Step indicator ─────────────────────────────────────────────────────
    const steps = ['Delivery', 'Review', 'Done'];
    const stepBar = el('div', { className: 'flex items-center gap-2 mb-6' });
    steps.forEach((s, i) => {
      const num = i + 1;
      const active = step === num;
      const done   = step > num;
      stepBar.append(
        el('div', { className: 'flex items-center gap-1.5' },
          el('div', {
            className: `w-7 h-7 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 transition ${done ? 'bg-green-500 text-white' : active ? 'bg-brand text-white' : 'bg-gray-200 text-gray-400'}`
          }, done ? '✓' : String(num)),
          el('span', { className: `text-sm font-semibold ${active ? 'text-gray-900' : 'text-gray-400'}` }, s),
        ),
        i < steps.length - 1 ? el('div', { className: 'flex-1 h-px bg-gray-200 mx-1' }) : null
      );
    });
    checkoutView.append(
      el('div', { className: 'flex items-center gap-3 mb-2' },
        el('button', {
          className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80',
          onClick: () => {
            if (step === 1) { currentView = 'cart'; updateView(); }
            else { checkoutData.step = step - 1; loadCheckoutView(); }
          }
        }, '← Back'),
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'Checkout')
      ),
      stepBar
    );

    // ── STEP 1: Delivery address + notes ─────────────────────────────────
    if (step === 1) {
      const card = el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-4' });
      card.append(el('h3', { className: 'font-black text-gray-900 mb-4 flex items-center gap-2' }, '📍 Delivery Address'));

      // Load saved addresses and show as selectable options
      const addrWrap = el('div', { className: 'mb-4' });
      card.append(addrWrap);

      function renderAddressOptions(addresses) {
        addrWrap.innerHTML = '';
        if (addresses.length > 0) {
          addrWrap.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-2' }, 'Saved Addresses'));
          addresses.forEach(addr => {
            const isSelected = checkoutData.selectedAddressId === addr.id;
            const addrBtn = el('button', {
              className: `w-full text-left p-3 rounded-xl border-2 mb-2 transition ${isSelected ? 'border-brand bg-orange-50' : 'border-gray-200 hover:border-brand'}`,
              onClick: () => {
                checkoutData.selectedAddressId = addr.id;
                checkoutData.useNewAddress = false;
                renderAddressOptions(addresses);
              }
            },
              el('p', { className: 'text-sm font-bold text-gray-800' }, addr.label || addr.city),
              el('p', { className: 'text-xs text-gray-500 mt-0.5' }, `${addr.street}, ${addr.suburb ? addr.suburb + ', ' : ''}${addr.city}, ${addr.province} ${addr.postalCode}`)
            );
            addrWrap.append(addrBtn);
          });
          const newBtn = el('button', {
            className: `w-full text-left p-3 rounded-xl border-2 mb-2 transition ${checkoutData.useNewAddress ? 'border-brand bg-orange-50' : 'border-dashed border-gray-300 hover:border-brand text-gray-500'}`,
            onClick: () => { checkoutData.useNewAddress = true; checkoutData.selectedAddressId = null; renderAddressOptions(addresses); }
          }, el('span', { className: 'text-sm font-semibold' }, '+ Add a new address'));
          addrWrap.append(newBtn);
        } else {
          checkoutData.useNewAddress = true;
        }

        // New address form — shown if no saved addresses or user clicked "Add new"
        if (checkoutData.useNewAddress || addresses.length === 0) {
          const formGrid = el('div', { className: 'space-y-3 mt-3' });
          const field = (placeholder, key, required = false) => {
            const inp = el('input', {
              type: 'text', placeholder: placeholder + (required ? ' *' : ''),
              value: checkoutData[key] || '',
              className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
              onInput: (e) => checkoutData[key] = e.target.value,
            });
            return inp;
          };
          formGrid.append(
            field('Street address', 'street', true),
            el('div', { className: 'grid grid-cols-2 gap-3' },
              field('Suburb (optional)', 'suburb'),
              field('City', 'city', true),
            ),
            el('div', { className: 'grid grid-cols-2 gap-3' },
              field('Province', 'province', true),
              field('Postal code', 'postalCode', true),
            )
          );
          addrWrap.append(formGrid);
        }
      }

      // Load saved addresses
      api.addresses.getAll().then(addrs => {
        savedAddresses = addrs;
        if (addrs.length > 0 && !checkoutData.selectedAddressId && !checkoutData.useNewAddress) {
          const def = addrs.find(a => a.isDefault) || addrs[0];
          checkoutData.selectedAddressId = def.id;
        }
        renderAddressOptions(addrs);
      }).catch(() => {
        checkoutData.useNewAddress = true;
        renderAddressOptions([]);
      });

      // Notes field
      card.append(
        el('h3', { className: 'font-black text-gray-900 mb-2 mt-5 flex items-center gap-2' }, '📝 Order Notes'),
        el('textarea', {
          placeholder: 'Any special instructions, allergies, or delivery notes…',
          rows: 3,
          value: checkoutData.notes || '',
          className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition resize-none',
          onInput: (e) => checkoutData.notes = e.target.value,
        })
      );

      checkoutView.append(card);
      checkoutView.append(
        el('button', {
          className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base',
          onClick: () => {
            // Validate address
            if (checkoutData.useNewAddress || !checkoutData.selectedAddressId) {
              if (!checkoutData.street || !checkoutData.city || !checkoutData.province || !checkoutData.postalCode) {
                toast('Please fill in all required address fields', 'error'); return;
              }
            }
            checkoutData.step = 2; loadCheckoutView();
          }
        }, 'Next: Review Order →')
      );
    }

    // ── STEP 2: Review & Confirm ──────────────────────────────────────────
    if (step === 2) {
      // Order items summary
      const itemsCard = el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-3' });
      itemsCard.append(el('h3', { className: 'font-black text-gray-900 mb-3' }, '🛒 Order Summary'));
      cart.forEach(item => {
        itemsCard.append(
          el('div', { className: 'flex justify-between items-center py-2 border-b border-gray-50 last:border-0 text-sm' },
            el('div', {},
              el('span', { className: 'font-semibold text-gray-800' }, `${item.quantity}× ${item.productName}`),
              el('span', { className: 'text-gray-400 ml-1' }, `— ${item.variantName}`)
            ),
            el('span', { className: 'font-bold text-gray-900' }, `R${(item.unitPrice * item.quantity).toFixed(2)}`)
          )
        );
      });
      itemsCard.append(
        el('div', { className: 'flex justify-between font-black text-brand text-lg mt-3 pt-2 border-t border-gray-100' },
          el('span', {}, 'Total'), el('span', {}, `R${cartTotal().toFixed(2)}`)
        )
      );
      checkoutView.append(itemsCard);

      // Address summary
      let addrText = '';
      if (checkoutData.selectedAddressId) {
        const addr = savedAddresses.find(a => a.id === checkoutData.selectedAddressId);
        if (addr) addrText = `${addr.street}${addr.suburb ? ', ' + addr.suburb : ''}, ${addr.city}, ${addr.province} ${addr.postalCode}`;
      } else {
        addrText = `${checkoutData.street}${checkoutData.suburb ? ', ' + checkoutData.suburb : ''}, ${checkoutData.city}, ${checkoutData.province} ${checkoutData.postalCode}`;
      }
      if (checkoutData.ambassadorCode) {
        checkoutView.append(
          el('div', { className: 'bg-orange-50 border border-brand border-opacity-30 rounded-xl px-4 py-3 mb-3 text-sm' },
            el('span', { className: 'text-brand font-semibold' }, `🎟️ Ambassador code: ${checkoutData.ambassadorCode}`)
          )
        );
      }
      checkoutView.append(
        el('div', { className: 'bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-3 text-sm' },
          el('p', { className: 'font-bold text-gray-700 mb-1' }, '📍 Delivering to:'),
          el('p', { className: 'text-gray-600' }, addrText),
          checkoutData.notes ? el('div', { className: 'mt-2 pt-2 border-t border-gray-100' },
            el('p', { className: 'font-bold text-gray-700 mb-0.5' }, '📝 Notes:'),
            el('p', { className: 'text-gray-600' }, checkoutData.notes)
          ) : null,
        )
      );

      // Confirm button
      const confirmBtn = el('button', {
        className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base flex items-center justify-center gap-2',
        onClick: async () => {
          confirmBtn.disabled = true;
          confirmBtn.innerHTML = '';
          confirmBtn.append(spinner(), document.createTextNode(' Placing order…'));
          try {
            let addressId = checkoutData.selectedAddressId;
            // Create new address if needed
            if (!addressId && (checkoutData.useNewAddress || !checkoutData.selectedAddressId)) {
              const newAddr = await api.addresses.create({
                street: checkoutData.street,
                suburb: checkoutData.suburb || undefined,
                city: checkoutData.city,
                province: checkoutData.province,
                postalCode: checkoutData.postalCode,
                isDefault: savedAddresses.length === 0,
              });
              addressId = newAddr.id;
            }
            await api.orders.create({
              items: cart.map(i => ({ variantId: i.variantId, quantity: i.quantity })),
              addressId: addressId || undefined,
              notes: checkoutData.notes || undefined,
              ambassadorCode: checkoutData.ambassadorCode || undefined,
            });
            // Clear cart & checkout state
            cart = [];
            checkoutData = { street: '', suburb: '', city: '', province: '', postalCode: '', notes: '', ambassadorCode: '', step: 1 };
            updateCartBadge();
            checkoutData.step = 3;
            loadCheckoutView();
          } catch (err) {
            toast(err?.message || 'Failed to place order. Please try again.', 'error');
            confirmBtn.disabled = false;
            confirmBtn.textContent = `Confirm Order — R${cartTotal().toFixed(2)}`;
          }
        }
      }, `Confirm Order — R${cartTotal().toFixed(2)}`);
      checkoutView.append(confirmBtn);
    }

    // ── STEP 3: Success ────────────────────────────────────────────────────
    if (step === 3) {
      checkoutView.append(
        el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },
          el('div', { className: 'text-6xl mb-4' }, '🎉'),
          el('h2', { className: 'text-2xl font-black text-gray-900 mb-2' }, 'Order Placed!'),
          el('p', { className: 'text-gray-500 mb-6' }, 'Your order has been received. We\'ll get baking right away!'),
          el('div', { className: 'flex flex-col sm:flex-row gap-3 justify-center' },
            el('button', {
              className: 'bg-brand text-white font-bold px-6 py-3 rounded-xl hover:opacity-90 transition',
              onClick: () => { currentView = 'orders'; updateView(); }
            }, '📦 Track My Order'),
            el('button', {
              className: 'border border-brand text-brand font-bold px-6 py-3 rounded-xl hover:bg-orange-50 transition',
              onClick: () => { currentView = 'browse'; updateView(); }
            }, '🍪 Keep Shopping')
          )
        )
      );
    }
  }

  // ── ACCOUNT VIEW ───────────────────────────────────────────────────────────
  const accountView = el('div', { className: 'hidden' });

  async function loadAccountView() {
    const u = store.user;
    accountView.innerHTML = '';

    // Ambassador card placeholder — filled in after async check
    const ambCardSlot = el('div', {});

    accountView.append(
      el('div', { className: 'flex items-center gap-3 mb-6' },
        el('button', { className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80', onClick: () => { currentView = 'browse'; updateView(); } }, '← Back'),
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'My Account')
      ),
      el('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4' },
        acctCard('My Profile', '👤', [
          el('p', { className: 'font-bold text-gray-900 text-base' }, `${u?.firstName || ''} ${u?.lastName || ''}`),
          el('p', { className: 'text-sm text-gray-500 mt-0.5' }, u?.email || ''),
          u?.phone ? el('p', { className: 'text-sm text-gray-500 mt-0.5' }, u.phone) : null,
        ]),
        acctCard('Orders', '📦', [
          el('p', { className: 'text-sm text-gray-500 mb-3' }, 'View and track your orders.'),
          el('button', { className: 'text-brand font-bold text-sm hover:opacity-80 flex items-center gap-1', onClick: () => { currentView = 'orders'; updateView(); } }, 'View my orders →'),
        ]),
        ambCardSlot,
        acctCard('Sign Out', '🚪', [
          el('p', { className: 'text-sm text-gray-500 mb-3' }, `Signed in as ${u?.email || 'you'}.`),
          el('button', { className: 'text-red-500 font-bold text-sm hover:opacity-80', onClick: store.logout.bind(store) }, 'Log out'),
        ]),
      )
    );

    // Show loading state while we check ambassador status
    ambCardSlot.replaceWith(acctCard('Ambassador Programme', '🌟', [
      el('div', { className: 'flex justify-center py-4' },
        el('div', { className: 'spinner', style: { borderColor: 'rgba(139,58,58,0.2)', borderTopColor: '#8B3A3A', width: '24px', height: '24px' } })
      )
    ]));

    let ambData = null;
    try { ambData = await api.ambassadors.me(); } catch (_) { /* not an ambassador yet */ }

    // Rebuild the card based on status
    const newCard = buildAmbCard(ambData);
    // find the current ambCardSlot placeholder (which was replaced in-place) and swap
    const grid = accountView.querySelector('.grid');
    const existing = Array.from(grid.children).find(c => {
      const title = c.querySelector('p.font-black');
      return title && (title.textContent === 'Ambassador Programme' || title.textContent === '🌟');
    }) || grid.children[2];
    if (existing) existing.replaceWith(newCard); else grid.insertBefore(newCard, grid.children[2]);

    function buildAmbCard(amb) {
      // ── Already ACTIVE ─────────────────────────────────────────────────
      if (amb && amb.status === 'ACTIVE') {
        return acctCard('Ambassador Programme', '🌟', [
          el('div', { className: 'flex items-center gap-2 mb-3 px-3 py-2 bg-green-50 rounded-lg' },
            el('span', {}, '✅'),
            el('p', { className: 'text-sm font-bold text-green-700' }, 'You\'re an active ambassador!')
          ),
          el('div', { className: 'bg-brand-bg rounded-lg px-3 py-2 mb-3 flex items-center justify-between' },
            el('div', {},
              el('p', { className: 'text-xs text-gray-500' }, 'Your referral code'),
              el('p', { className: 'font-black text-brand text-lg tracking-wider' }, amb.code),
            ),
            el('button', {
              className: 'text-xs bg-brand text-white px-3 py-1.5 rounded-md font-bold hover:opacity-90',
              onClick: () => {
                navigator.clipboard.writeText(amb.code).then(() => toast('Code copied!', 'success')).catch(() => {});
              }
            }, '📋 Copy'),
          ),
          el('p', { className: 'text-xs text-gray-400' }, `Commission rate: ${(parseFloat(amb.commissionRate) * 100).toFixed(0)}%`),
        ]);
      }

      // ── Application PENDING review ──────────────────────────────────────
      if (amb && amb.status === 'PENDING') {
        return acctCard('Ambassador Programme', '🌟', [
          el('div', { className: 'flex items-center gap-2 mb-3 px-3 py-2 bg-yellow-50 rounded-lg' },
            el('span', {}, '🔍'),
            el('p', { className: 'text-sm font-bold text-yellow-700' }, 'Application under review')
          ),
          el('p', { className: 'text-sm text-gray-500 mb-2' }, 'Your application has been received. We\'ll notify you once it\'s been reviewed.'),
          amb.kycStatus === 'NOT_SUBMITTED' || amb.kycStatus === 'REJECTED'
            ? el('p', { className: 'text-xs text-brand font-semibold' }, 'Complete your KYC in the Ambassador Portal to speed up approval →')
            : el('p', { className: 'text-xs text-gray-400' }, 'KYC submitted — awaiting admin review.'),
        ]);
      }

      // ── SUSPENDED ──────────────────────────────────────────────────────
      if (amb && amb.status === 'SUSPENDED') {
        return acctCard('Ambassador Programme', '🌟', [
          el('div', { className: 'flex items-center gap-2 mb-3 px-3 py-2 bg-red-50 rounded-lg' },
            el('span', {}, '⚠️'),
            el('p', { className: 'text-sm font-bold text-red-700' }, 'Account suspended')
          ),
          el('p', { className: 'text-sm text-gray-500' }, 'Your ambassador account has been suspended. Please contact us for more information.'),
        ]);
      }

      // ── NOT YET APPLIED — show apply form ──────────────────────────────
      const bioInput = el('textarea', {
        placeholder: 'Tell us a little about yourself and why you\'d like to be a Tlaka Treats ambassador… (optional)',
        rows: 3,
        className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none outline-none focus:ring-2 focus:ring-brand mb-3',
      });
      const applyBtn = el('button', {
        className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90 transition text-sm',
        onClick: async () => {
          applyBtn.disabled = true;
          applyBtn.textContent = 'Submitting…';
          try {
            await api.ambassadors.apply(bioInput.value.trim() || undefined);
            toast('Application submitted! We\'ll review it shortly.', 'success');
            loadAccountView(); // refresh card
          } catch (err) {
            toast(err?.message || 'Could not submit application', 'error');
            applyBtn.disabled = false;
            applyBtn.textContent = 'Apply Now';
          }
        }
      }, 'Apply Now');

      return acctCard('Become an Ambassador', '🌟', [
        el('p', { className: 'text-sm text-gray-500 mb-3' }, 'Earn commission by sharing your unique code with friends and family.'),
        el('div', { className: 'flex flex-col gap-2 text-xs text-gray-500 mb-4' },
          el('div', { className: 'flex items-start gap-2' }, el('span', {}, '✅'), el('span', {}, 'Apply below with a short bio')),
          el('div', { className: 'flex items-start gap-2' }, el('span', {}, '🔍'), el('span', {}, 'We review and approve your application')),
          el('div', { className: 'flex items-start gap-2' }, el('span', {}, '💸'), el('span', {}, 'Earn commission on every order placed with your code')),
        ),
        bioInput,
        applyBtn,
      ]);
    }
  }

  function acctCard(title, icon, children) {
    return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
      el('div', { className: 'flex items-center gap-2 mb-4 pb-3 border-b border-gray-100' },
        el('span', { className: 'text-2xl' }, icon),
        el('p', { className: 'font-black text-gray-900' }, title)
      ),
      ...children.filter(Boolean)
    );
  }

  // ── CART & CHECKOUT VIEWS ──────────────────────────────────────────────────
  const cartView     = el('div', { className: 'hidden w-full py-6 px-4 max-w-2xl mx-auto' });
  const checkoutView = el('div', { className: 'hidden w-full py-6 px-4 max-w-2xl mx-auto' });

  // ── VIEW SWITCHER ──────────────────────────────────────────────────────────
  main.append(browseView, ordersView, accountView, cartView, checkoutView);

  function updateView() {
    browseView.classList.toggle('hidden',   currentView !== 'browse');
    ordersView.classList.toggle('hidden',   currentView !== 'orders');
    accountView.classList.toggle('hidden',  currentView !== 'account');
    cartView.classList.toggle('hidden',     currentView !== 'cart');
    checkoutView.classList.toggle('hidden', currentView !== 'checkout');
    if (currentView === 'orders')   loadOrdersView();
    if (currentView === 'account')  loadAccountView();
    if (currentView === 'cart')     loadCartView();
    if (currentView === 'checkout') loadCheckoutView();
    searchInput.style.display = currentView === 'browse' ? '' : 'none';
    // Highlight cart button when active
    cartNavBtn.classList.toggle('bg-white', currentView === 'cart');
    cartNavBtn.classList.toggle('text-brand', currentView === 'cart');
    cartNavBtn.classList.toggle('bg-opacity-100', currentView === 'cart');
  }

  // ── LOAD DATA ──────────────────────────────────────────────────────────────
  grid.innerHTML = '<div class="col-span-full flex justify-center py-16"><div class="spinner" style="border-color:rgba(139,58,58,0.2);border-top-color:#8B3A3A"></div></div>';
  api.products.getAll().then(products => {
    allProducts = products;
    const catMap = new Map();
    products.forEach(p => { if (p.category) catMap.set(p.category.id, p.category); });
    categories = [...catMap.values()];
    renderSidebar();
    renderProducts();
  }).catch(() => {
    grid.innerHTML = '<p class="col-span-full text-center text-red-400 py-10 text-sm">Failed to load products. Make sure the API is running.</p>';
  });

  updateView();
  return shell;
}

function showProductModal(product, options = {}) {
  const { onAddToCart, priceTier } = options; // onAddToCart → cart mode; priceTier → prefer that tier
  const isCartMode = typeof onAddToCart === 'function';

  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-end sm:items-center justify-center z-50 p-4';

  const modal = document.createElement('div');
  modal.className = 'bg-white rounded-2xl w-full max-w-md p-6 fade-in';

  const variants = product.variants || [];

  // Pick the best price for the given tier, falling back to first price
  function pickPrice(variant) {
    if (!variant) return null;
    if (priceTier) {
      return variant.prices?.find(px => px.tier === priceTier) || variant.prices?.[0] || null;
    }
    return variant.prices?.[0] || null;
  }

  let selectedVariant = variants[0] || null;
  let selectedPrice = pickPrice(selectedVariant);
  let qty = 1;
  let ambassadorCode = '';
  let loading = false;

  function render() {
    modal.innerHTML = '';

    modal.append(
      el('div', { className: 'flex justify-between items-start mb-4' },
        el('div', {},
          makeLogo(56, 'rounded-xl mb-2'),
          el('h2', { className: 'text-xl font-black text-gray-900' }, product.name),
          el('p', { className: 'text-sm text-gray-400' }, product.category?.name || '')
        ),
        el('button', { className: 'text-gray-400 text-2xl hover:text-gray-600', onClick: () => overlay.remove() }, '×')
      )
    );

    if (variants.length > 0) {
      const variantSection = el('div', { className: 'mb-4' },
        el('p', { className: 'text-sm font-semibold text-gray-700 mb-2' }, 'Size / Variant')
      );
      variants.forEach(v => {
        const btn = el('button', {
          className: `mr-2 mb-2 px-3 py-1.5 rounded-lg text-sm font-semibold border-2 transition ${selectedVariant?.id === v.id ? 'border-brand bg-brand text-white' : 'border-gray-200 text-gray-700 hover:border-brand'}`,
          onClick: () => { selectedVariant = v; selectedPrice = pickPrice(v); render(); }
        }, v.name);
        variantSection.append(btn);
      });
      modal.append(variantSection);
    }

    if (selectedPrice) {
      modal.append(
        el('div', { className: 'bg-orange-50 rounded-xl p-3 mb-4 flex justify-between items-center' },
          el('span', { className: 'text-sm text-gray-600' }, `Price (min. qty: ${selectedPrice.minQty || 1})`),
          el('span', { className: 'text-brand font-black text-lg' }, `R${Number(selectedPrice.price).toFixed(2)}`)
        )
      );
    }

    // Qty
    const qtyRow = el('div', { className: 'flex items-center gap-3 mb-4' },
      el('span', { className: 'text-sm font-semibold text-gray-700' }, 'Quantity'),
      el('button', {
        className: 'w-8 h-8 rounded-full bg-gray-100 font-bold hover:bg-gray-200 flex items-center justify-center',
        onClick: () => { if (qty > 1) { qty--; render(); } }
      }, '−'),
      el('span', { className: 'text-lg font-bold w-8 text-center' }, String(qty)),
      el('button', {
        className: 'w-8 h-8 rounded-full bg-gray-100 font-bold hover:bg-gray-200 flex items-center justify-center',
        onClick: () => { qty++; render(); }
      }, '+')
    );
    modal.append(qtyRow);

    if (isCartMode) {
      // ── Cart mode: "Add to Cart" button, no ambassador code (that's on the cart page)
      const addBtn = el('button', {
        className: 'w-full bg-brand text-white font-bold py-4 rounded-xl hover:opacity-90 transition',
        onClick: () => {
          if (!selectedVariant || !selectedPrice) return toast('Please select a variant');
          onAddToCart({
            variantId: selectedVariant.id,
            variantName: selectedVariant.name,
            productName: product.name,
            productImg: (product.images || []).find(i => i.isPrimary)?.url || null,
            unitPrice: Number(selectedPrice.price),
            quantity: qty,
          });
          toast(`${product.name} added to cart! 🛒`, 'success');
          overlay.remove();
        },
      });
      addBtn.textContent = `Add to Cart — R${selectedPrice ? (Number(selectedPrice.price) * qty).toFixed(2) : '0.00'}`;
      modal.append(addBtn);
    } else {
      // ── Order mode: ambassador code + "Place Order" button (ambassador flow)
      modal.append(createAmbPicker({
        value: ambassadorCode,
        onChange: (code) => { ambassadorCode = code; },
        wrapClass: 'mb-4',
      }));

      const orderBtn = el('button', {
        className: 'w-full bg-brand text-white font-bold py-4 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2',
        onClick: placeOrder,
      });
      orderBtn.innerHTML = loading ? '' : `Place Order — R${selectedPrice ? (Number(selectedPrice.price) * qty).toFixed(2) : '0.00'}`;
      if (loading) orderBtn.append(spinner());
      modal.append(orderBtn);
    }
  }

  async function placeOrder() {
    if (!selectedVariant || !selectedPrice) return toast('Please select a variant');
    loading = true; render();
    try {
      await api.orders.create({
        items: [{ variantId: selectedVariant.id, priceId: selectedPrice.id, quantity: qty }],
        ambassadorCode: ambassadorCode || undefined,
      });
      toast('Order placed! 🎉', 'success');
      overlay.remove();
    } catch (err) {
      toast(err.message || 'Failed to place order');
      loading = false; render();
    }
  }

  render();
  overlay.append(modal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── AMBASSADOR DASHBOARD ──────────────────────────────────────────────
function AmbassadorDashboardPage() {
  let allProducts = [], categories = [];
  let activeCategory = null, searchQuery = '', sortBy = 'default';

          // Load own orders if not yet fetched
