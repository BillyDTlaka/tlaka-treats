      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Date'), dateInp),
    );

    openModal({ title: 'Assign Shift', body, footer: el('div', { className: 'flex gap-2 justify-end' },
      el('button', { className: 'btn-secondary', onClick: closeModal }, 'Cancel'),
      el('button', { className: 'btn-primary', onClick: async () => {
        try {
          await api.employees.assignShift({ employeeId: empSel.value, shiftId: shiftSel.value, date: dateInp.value });
          closeModal(); onDone(); toast('Shift assigned', 'success');
        } catch(e) { toast(e.message, 'error'); }
      }}, 'Assign')
    )});
  }

  function showAssignmentModal(asgn, onDone) {
    const STATUS_OPTS = ['SCHEDULED','COMPLETED','ABSENT','LATE','CANCELLED'];
    const statusSel = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm' });
    STATUS_OPTS.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; statusSel.append(o); });
    statusSel.value = asgn.status;

    const clockInInp = el('input', { type: 'datetime-local', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', value: asgn.clockIn ? new Date(asgn.clockIn).toISOString().slice(0,16) : '' });
    const clockOutInp = el('input', { type: 'datetime-local', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', value: asgn.clockOut ? new Date(asgn.clockOut).toISOString().slice(0,16) : '' });
    const notesInp = el('textarea', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', rows: 2 }, asgn.notes || '');

    const empName = `${asgn.employee?.user?.firstName || ''} ${asgn.employee?.user?.lastName || ''}`.trim();
    const body = el('div', { className: 'space-y-4' },
      el('div', { className: 'text-sm text-gray-500' }, `${empName} · ${asgn.shift?.name} · ${new Date(asgn.date).toLocaleDateString('en-ZA')}`),
      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Status'), statusSel),
      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Clock In'), clockInInp),
      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Clock Out'), clockOutInp),
      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Notes'), notesInp),
    );

    openModal({ title: 'Update Assignment', body, footer: el('div', { className: 'flex gap-2 justify-end' },
      el('button', { className: 'btn-secondary text-red-500', onClick: async () => {
        if (!confirm('Remove this assignment?')) return;
        try { await api.employees.deleteAssignment(asgn.id); closeModal(); onDone(); toast('Removed', 'success'); }
        catch(e) { toast(e.message, 'error'); }
      }}, 'Remove'),
      el('button', { className: 'btn-secondary', onClick: closeModal }, 'Cancel'),
      el('button', { className: 'btn-primary', onClick: async () => {
        const data = { status: statusSel.value, notes: notesInp.value || undefined };
        if (clockInInp.value) data.clockIn = new Date(clockInInp.value).toISOString();
        if (clockOutInp.value) data.clockOut = new Date(clockOutInp.value).toISOString();
        try { await api.employees.updateAssignment(asgn.id, data); closeModal(); onDone(); toast('Updated', 'success'); }
        catch(e) { toast(e.message, 'error'); }
      }}, 'Save')
    )});
  }

          el('div', { className: 'flex items-center gap-3' },

            el('span', { className: 'text-xs px-2 py-0.5 rounded-full ' + sc }, run.status),
            el('span', { className: 'text-sm text-gray-500' }, `${run.items?.length || 0} employees`),
          ),
          el('div', { className: 'text-right' },
            el('div', { className: 'font-semibold text-gray-900' }, `R${Number(run.totalNet).toLocaleString('en-ZA', { minimumFractionDigits: 2 })}`),
            el('div', { className: 'text-xs text-gray-400' }, 'Net payroll')
          )
        ),
        // Items table
        el('div', { className: 'overflow-x-auto' },
          el('table', { className: 'w-full text-sm' },
            el('thead', {},
              el('tr', { className: 'border-b border-gray-100 text-left text-xs text-gray-400' },
                el('th', { className: 'pb-1.5' }, 'Employee'),
                el('th', { className: 'pb-1.5 text-right' }, 'Hours'),
                el('th', { className: 'pb-1.5 text-right' }, 'Gross'),
                el('th', { className: 'pb-1.5 text-right' }, 'Net'),
              )
            ),
            el('tbody', {},
              ...(run.items || []).map(item => {
                const name = `${item.employee?.user?.firstName || ''} ${item.employee?.user?.lastName || ''}`.trim();
                return el('tr', { className: 'border-b border-gray-50' },
                  el('td', { className: 'py-1.5' }, name),
                  el('td', { className: 'py-1.5 text-right text-gray-600' }, Number(item.hoursWorked).toFixed(1) + 'h'),
                  el('td', { className: 'py-1.5 text-right text-gray-600' }, `R${Number(item.grossPay).toFixed(2)}`),
                  el('td', { className: 'py-1.5 text-right font-medium' }, `R${Number(item.netPay).toFixed(2)}`),
                );
              })
            )
          )
        ),
        // Actions
        el('div', { className: 'flex gap-2 mt-3 pt-3 border-t border-gray-100' },
          run.status === 'DRAFT' ? el('button', { className: 'btn-primary text-xs px-3 py-1.5', onClick: async () => {
            try { await api.employees.approvePayroll(run.id); renderPayrollTab(); toast('Payroll approved', 'success'); }
            catch(e) { toast(e.message, 'error'); }
          }}, 'Approve') : null,
          run.status === 'APPROVED' ? el('button', { className: 'btn-primary text-xs px-3 py-1.5', onClick: async () => {
            try { await api.employees.processPayroll(run.id); renderPayrollTab(); toast('Payroll processed & recorded in Finance', 'success'); }
            catch(e) { toast(e.message, 'error'); }
          }}, 'Process & Record Expense') : null,
          run.status === 'PAID' && run.processedAt ? el('span', { className: 'text-xs text-gray-400' }, `Paid ${new Date(run.processedAt).toLocaleDateString('en-ZA')}`) : null,
        )
      );
      list.append(card);
    });
    content.append(list);
  }

  // init
  setTab('staff');
}

// ── TASKS MODULE ──────────────────────────────────────────────────────────────
function renderAdminTasks(container) {
  container.innerHTML = '';
  const page = el('div', { className: 'p-6 max-w-4xl mx-auto' });
  container.append(page);

  const PRIORITY_META = {
    HIGH:   { label: 'High',   color: '#DC2626', bg: '#FEF2F2' },
    MEDIUM: { label: 'Medium', color: '#D97706', bg: '#FFFBEB' },
    LOW:    { label: 'Low',    color: '#059669', bg: '#F0FDF4' },
  };
  const STATUS_META = {
    OPEN:        { label: 'Open',        color: '#2563EB', bg: '#EFF6FF' },
    IN_PROGRESS: { label: 'In Progress', color: '#7C3AED', bg: '#F5F3FF' },
    DONE:        { label: 'Done',        color: '#059669', bg: '#F0FDF4' },
    CANCELLED:   { label: 'Cancelled',   color: '#6B7280', bg: '#F9FAFB' },
  };

  let allTasks = [];
  let filterStatus = '';
  let filterPriority = '';

  // ── Header ──────────────────────────────────────────────────────────────────
  const countBadge = el('span', { className: 'ml-2 text-sm font-bold text-indigo-600 bg-indigo-50 px-2.5 py-0.5 rounded-full' }, '…');
  page.append(
    el('div', { className: 'flex items-center justify-between mb-6 flex-wrap gap-3' },
      el('div', { className: 'flex items-center gap-2' },
        el('h2', { className: 'text-2xl font-black text-gray-900' }, 'Tasks'),
        countBadge
      ),
      el('button', {
        className: 'bg-brand text-white font-bold px-4 py-2 rounded-xl text-sm hover:opacity-90',
        onClick: () => openTaskModal(null),
      }, '+ New Task')
    )
  );

  // ── Stats row ────────────────────────────────────────────────────────────────
  const statsRow = el('div', { className: 'grid grid-cols-3 gap-3 mb-5' });
  page.append(statsRow);

  function renderStats(counts) {
    statsRow.innerHTML = '';
    [
      { label: 'Open',        val: counts.open,       color: '#2563EB' },
      { label: 'In Progress', val: counts.inProgress, color: '#7C3AED' },
      { label: 'Done',        val: counts.done,       color: '#059669' },
    ].forEach(s => {
      statsRow.append(
        el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-4 text-center' },
          el('div', { className: 'text-2xl font-black', style: { color: s.color } }, String(s.val)),
          el('div', { className: 'text-xs text-gray-500 font-medium mt-1' }, s.label)
        )
      );
    });
    countBadge.textContent = String(counts.open + counts.inProgress);
  }

  // ── Filters ──────────────────────────────────────────────────────────────────
  const statusSel = el('select', { className: 'text-sm border border-gray-200 rounded-lg px-2 py-1.5 bg-white' });
  [['', 'All statuses'], ['OPEN', 'Open'], ['IN_PROGRESS', 'In Progress'], ['DONE', 'Done'], ['CANCELLED', 'Cancelled']]
    .forEach(([v, l]) => statusSel.append(el('option', { value: v }, l)));
  statusSel.addEventListener('change', () => { filterStatus = statusSel.value; renderList(); });

  const prioritySel = el('select', { className: 'text-sm border border-gray-200 rounded-lg px-2 py-1.5 bg-white' });
  [['', 'All priorities'], ['HIGH', 'High'], ['MEDIUM', 'Medium'], ['LOW', 'Low']]
    .forEach(([v, l]) => prioritySel.append(el('option', { value: v }, l)));
  prioritySel.addEventListener('change', () => { filterPriority = prioritySel.value; renderList(); });

  page.append(
    el('div', { className: 'flex items-center gap-3 mb-4 flex-wrap' },
      el('span', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide' }, 'Filter:'),
      statusSel, prioritySel
    )
  );

  // ── Task list ─────────────────────────────────────────────────────────────────
  const listEl = el('div', { className: 'space-y-2' });
  page.append(listEl);

  function renderList() {
    listEl.innerHTML = '';
    let tasks = allTasks;
    if (filterStatus)   tasks = tasks.filter(t => t.status   === filterStatus);
    if (filterPriority) tasks = tasks.filter(t => t.priority === filterPriority);

    if (!tasks.length) {
      listEl.append(el('p', { className: 'text-sm text-gray-400 text-center py-10' }, 'No tasks found.'));
      return;
    }

    // Group by status
    const groups = { OPEN: [], IN_PROGRESS: [], DONE: [], CANCELLED: [] };
    tasks.forEach(t => { (groups[t.status] || groups.OPEN).push(t); });

    Object.entries(groups).forEach(([status, items]) => {
      if (!items.length) return;
      const sm = STATUS_META[status] || STATUS_META.OPEN;
      listEl.append(
        el('div', { className: 'text-xs font-black text-gray-400 uppercase tracking-widest mb-2 mt-4 first:mt-0' },
          sm.label + ` (${items.length})`)
      );
      items.forEach(task => {
        const pm = PRIORITY_META[task.priority] || PRIORITY_META.MEDIUM;
        const card = el('div', { className: 'bg-white rounded-xl border border-gray-100 p-4 flex gap-3 items-start hover:shadow-sm transition cursor-pointer group' });

        const statusDot = el('div', {
          className: 'w-5 h-5 rounded-full border-2 flex-shrink-0 mt-0.5 cursor-pointer',
          style: { borderColor: sm.color, backgroundColor: status === 'DONE' ? sm.color : 'transparent' },
          title: 'Toggle done',
        });
        statusDot.addEventListener('click', async (e) => {
          e.stopPropagation();
          const newStatus = status === 'DONE' ? 'OPEN' : 'DONE';
          await api.tasks.update(task.id, { status: newStatus });
          await loadTasks();
        });

        card.append(
          statusDot,
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: `text-sm font-semibold text-gray-900 leading-snug ${status === 'DONE' ? 'line-through text-gray-400' : ''}` }, task.title),
            task.description ? el('p', { className: 'text-xs text-gray-400 mt-1 leading-relaxed line-clamp-2' }, task.description) : null,
            el('div', { className: 'flex items-center gap-2 mt-2 flex-wrap' },
              el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: pm.bg, color: pm.color } }, pm.label),
              task.owner ? el('span', { className: 'text-xs text-gray-400' }, `Owner: ${task.owner}`) : null,
              task.dueDate ? el('span', { className: 'text-xs text-gray-400' }, `Due: ${new Date(task.dueDate).toLocaleDateString('en-ZA')}`) : null,
              task.source === 'BOARD_MEETING' ? el('span', { className: 'text-xs text-indigo-500 font-bold' }, '🤖 Board') : null,
            )
          ),
          el('div', { className: 'flex gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0' },
            el('button', {
              className: 'text-xs text-gray-400 hover:text-gray-600 p-1',
              title: 'Edit',
              onClick: (e) => { e.stopPropagation(); openTaskModal(task); },
            }, '✏️'),
            el('button', {
              className: 'text-xs text-gray-400 hover:text-red-500 p-1',
              title: 'Delete',
              onClick: async (e) => {
                e.stopPropagation();
                if (!confirm('Delete this task?')) return;
                await api.tasks.delete(task.id);
                await loadTasks();
              },
            }, '🗑️')
          )
        );
        card.addEventListener('click', () => openTaskModal(task));
        listEl.append(card);
      });
    });
  }

  async function loadTasks() {
    const [tasks, counts] = await Promise.all([api.tasks.list(), api.tasks.counts()]);
    allTasks = tasks;
    renderList();
    renderStats(counts);
  }

  // ── Task modal ───────────────────────────────────────────────────────────────
  function openTaskModal(task) {
    const isNew = !task;
    const overlay = el('div', { className: 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4' });

    const titleInput = el('input', {
      className: 'w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand/30 focus:border-brand outline-none',
      placeholder: 'Task title',
      value: task?.title || '',
    });
    const descInput = el('textarea', {
      className: 'w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-brand/30 focus:border-brand outline-none resize-none',
      placeholder: 'Description (optional)',
      rows: 3,
    });
    if (task?.description) descInput.value = task.description;

    const prioritySel2 = el('select', { className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm' });
    [['HIGH', 'High Priority'], ['MEDIUM', 'Medium Priority'], ['LOW', 'Low Priority']]
      .forEach(([v, l]) => { const o = el('option', { value: v }, l); if (task?.priority === v) o.selected = true; prioritySel2.append(o); });

    const statusSel2 = el('select', { className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm' });
    [['OPEN', 'Open'], ['IN_PROGRESS', 'In Progress'], ['DONE', 'Done'], ['CANCELLED', 'Cancelled']]
      .forEach(([v, l]) => { const o = el('option', { value: v }, l); if (task?.status === v) o.selected = true; statusSel2.append(o); });

    const ownerInput = el('input', {
      className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm',
      placeholder: 'Owner (e.g. CEO)',
      value: task?.owner || '',
    });
    const dueDateInput = el('input', {
      className: 'flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm',
      type: 'date',
      value: task?.dueDate ? new Date(task.dueDate).toISOString().slice(0,10) : '',
    });

    const saveBtn = el('button', { className: 'bg-brand text-white font-bold px-5 py-2 rounded-xl text-sm hover:opacity-90' }, isNew ? 'Create Task' : 'Save Changes');
    saveBtn.addEventListener('click', async () => {
      if (!titleInput.value.trim()) { titleInput.focus(); return; }
      const payload = {
        title:       titleInput.value.trim(),
        description: descInput.value.trim() || undefined,
        priority:    prioritySel2.value,
        status:      statusSel2.value,
        owner:       ownerInput.value.trim() || undefined,
        dueDate:     dueDateInput.value || undefined,
      };
      try {
        if (isNew) { await api.tasks.create(payload); }
        else       { await api.tasks.update(task.id, payload); }
        overlay.remove();
        await loadTasks();
      } catch(e) { alert('Error: ' + e.message); }
    });

    overlay.append(
      el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl' },
        el('div', { className: 'flex items-center justify-between mb-5' },
          el('h3', { className: 'font-black text-gray-900 text-lg' }, isNew ? 'New Task' : 'Edit Task'),
          el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold leading-none', onClick: () => overlay.remove() }, '×')
        ),
        el('div', { className: 'space-y-3' },
          el('div', {}, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Title'), titleInput),
          el('div', {}, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Description'), descInput),
          el('div', { className: 'flex gap-3' },
            el('div', { className: 'flex-1' }, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Priority'), prioritySel2),
            el('div', { className: 'flex-1' }, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Status'), statusSel2),
          ),
          el('div', { className: 'flex gap-3' },
            el('div', { className: 'flex-1' }, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Owner'), ownerInput),
            el('div', { className: 'flex-1' }, el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1' }, 'Due Date'), dueDateInput),
          ),
        ),
        el('div', { className: 'flex justify-end gap-3 mt-5' },
          el('button', { className: 'text-sm text-gray-500 hover:text-gray-700 font-medium px-4 py-2', onClick: () => overlay.remove() }, 'Cancel'),
          saveBtn
        )
      )
    );
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    document.body.append(overlay);
    titleInput.focus();
  }

  loadTasks().catch(e => {
    listEl.append(el('p', { className: 'text-red-500 text-sm text-center py-8' }, 'Failed to load tasks: ' + e.message));
  });
}

// ── SETTINGS MODULE ───────────────────────────────────────────────────────────
function renderAdminSettings(data, container, reload) {
  const { ambassadors } = data;
  const page = el('div', { className: 'p-6 max-w-3xl mx-auto' });

  function section(title, subtitle, ...children) {
    return el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-4' },
      el('div', { className: 'mb-4 pb-4 border-b border-gray-100' },
        el('h3', { className: 'text-sm font-black text-gray-900' }, title),
        subtitle ? el('p', { className: 'text-xs text-gray-400 mt-0.5' }, subtitle) : null
      ),
      ...children
    );
  }

  function formRow(label, hint, inputEl) {
    return el('div', { className: 'flex items-start gap-4 py-3 border-b border-gray-50 last:border-0' },
      el('div', { className: 'w-44 flex-shrink-0' },
        el('p', { className: 'text-sm font-semibold text-gray-700' }, label),
        hint ? el('p', { className: 'text-xs text-gray-400 mt-0.5' }, hint) : null
      ),
      el('div', { className: 'flex-1' }, inputEl)
    );
  }

  function inputField(value, placeholder, onChange, type='text') {
    const inp = el('input', {
      type,
      value: value||'',
      placeholder,
      className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent',
    });
    if (onChange) inp.addEventListener('input', e => onChange(e.target.value));
    return inp;
  }

  function saveBtn(label, onClick) {
    return el('button', {
      className: 'mt-4 bg-brand text-white text-sm font-bold px-5 py-2 rounded-lg hover:opacity-90 transition',
      onClick
    }, label);
  }

  // ── Store Information ──────────────────────────────────────────
  const storeFields = { name: 'Tlaka Treats', email: 'hello@tlakatreats.co.za', phone: '', address: '', vatNumber: '' };
  const storeInputs = {};

  page.append(section('Store Information', 'Basic details about your business',
    formRow('Business Name',   'Displayed across the platform',
      storeInputs.name = inputField(storeFields.name, 'Tlaka Treats', v => storeFields.name = v)),
    formRow('Contact Email',   'Customer-facing email address',
      storeInputs.email = inputField(storeFields.email, 'hello@tlakatreats.co.za', v => storeFields.email = v, 'email')),
    formRow('Phone Number',    'WhatsApp / call number',
      storeInputs.phone = inputField(storeFields.phone, '+27 00 000 0000', v => storeFields.phone = v)),
    formRow('Business Address','Displayed on invoices & receipts',
      storeInputs.address = inputField(storeFields.address, '12 Main Road, Johannesburg', v => storeFields.address = v)),
    formRow('VAT Number',      'Leave blank if not VAT registered',
      storeInputs.vatNumber = inputField(storeFields.vatNumber, 'e.g. 4123456789', v => storeFields.vatNumber = v)),
    saveBtn('Save Store Info', () => toast('Store info saved ✓', 'success'))
  ));

  // ── Ambassador Defaults ────────────────────────────────────────
  let defaultRate = 10;
  const rateInp = inputField(String(defaultRate), '10', v => defaultRate = Number(v), 'number');

  page.append(section('Ambassador Programme', 'Defaults applied to newly approved ambassadors',
    formRow('Default Commission %', 'Rate given to new ambassadors on approval',
      el('div', { className: 'flex items-center gap-2' },
        el('div', { className: 'relative flex-1' },
          rateInp,
          el('span', { className: 'absolute right-3 top-2 text-sm text-gray-400' }, '%')
        )
      )
    ),
    formRow('Pending Ambassadors', `${ambassadors.filter(a=>a.status==='PENDING').length} waiting for review`,
      el('button', {
        className: 'text-sm font-semibold text-brand hover:underline',
        onClick: () => toast('Navigate to Ambassadors → Pending to review applications', 'info')
      }, `Review ${ambassadors.filter(a=>a.status==='PENDING').length} application(s) →`)
    ),
    saveBtn('Save Ambassador Settings', () => toast('Ambassador settings saved ✓', 'success'))
  ));

  // ── Order Workflow ─────────────────────────────────────────────
  const statusDescriptions = {
    PENDING:   'Order received, awaiting confirmation',
    CONFIRMED: 'Order confirmed, not yet started',
    BAKING:    'Order is being prepared / baked',
    READY:     'Order is ready for collection / delivery',
    DELIVERED: 'Order has been delivered',
    CANCELLED: 'Order was cancelled',
  };

  page.append(section('Order Status Workflow', 'How orders progress through your fulfilment process',
    ...Object.entries(statusDescriptions).map(([status, desc], i, arr) =>
      el('div', { className: `flex items-center gap-4 py-3 ${i<arr.length-1?'border-b border-gray-50':''}` },
        el('div', { className: 'w-6 h-6 rounded-full flex-shrink-0', style: { backgroundColor: STATUS_COLORS[status]||'#ccc' } }),
        el('div', { className: 'flex-1' },
          el('p', { className: 'text-sm font-bold text-gray-800' }, status),
          el('p', { className: 'text-xs text-gray-400' }, desc)
        ),
        el('span', { className: `text-xs font-semibold px-2 py-1 rounded-full`, style: { backgroundColor: (STATUS_COLORS[status]||'#ccc')+'20', color: STATUS_COLORS[status]||'#999' } }, status === 'DELIVERED' || status === 'CANCELLED' ? 'Terminal' : 'Active')
      )
    )
  ));

  // ── Notifications ──────────────────────────────────────────────
  const notifSettings = [
    { id: 'newOrder',     label: 'New Order',           desc: 'Alert when a new order is placed',         enabled: true  },
    { id: 'newAmb',       label: 'Ambassador Application', desc: 'Alert when someone applies to be an ambassador', enabled: true },
    { id: 'lowStock',     label: 'Low Stock Warning',   desc: 'Alert when inventory falls below threshold', enabled: false },
    { id: 'dailySummary', label: 'Daily Summary',       desc: 'End-of-day order and revenue summary',     enabled: false },
  ];

  const notifRows = notifSettings.map(s => {
    let isOn = s.enabled;
    const toggle = el('label', { className: 'relative inline-flex items-center cursor-pointer' });
    const inp2 = el('input', { type: 'checkbox', className: 'sr-only peer' });
    if (isOn) inp2.checked = true;
    inp2.addEventListener('change', () => { isOn = inp2.checked; });
    toggle.append(inp2,
      el('div', { className: "w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-brand peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all" })
    );
    return el('div', { className: 'flex items-center justify-between py-3 border-b border-gray-50 last:border-0' },
      el('div', {},
        el('p', { className: 'text-sm font-semibold text-gray-800' }, s.label),
        el('p', { className: 'text-xs text-gray-400' }, s.desc)
      ),
      toggle
    );
  });

  page.append(section('Notifications', 'Control which alerts you receive',
    ...notifRows,
    saveBtn('Save Notification Settings', () => toast('Notification preferences saved ✓', 'success'))
  ));

  // ── Discount Rules ─────────────────────────────────────────────
  const discountRules = data.discountRules || [];
  const drListWrap = el('div', {});

  function renderDRList() {
    drListWrap.innerHTML = '';
    if (!discountRules.length) {
      drListWrap.append(el('p', { className: 'text-sm text-gray-400 py-2' }, 'No discount rules yet.'));
      return;
    }
    discountRules.forEach((rule, idx) => {
      drListWrap.append(
        el('div', { className: `flex items-center gap-3 py-3 ${idx < discountRules.length - 1 ? 'border-b border-gray-50' : ''}` },
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'text-sm font-bold text-gray-900' }, rule.name),
            el('p', { className: 'text-xs text-gray-400' }, `${rule.type === 'PERCENTAGE' ? rule.value + '% off' : 'R' + rule.value + ' flat'}${rule.code ? ` · Code: ${rule.code}` : ''}${rule.minOrder ? ` · Min: R${rule.minOrder}` : ''}`)
          ),
          el('label', { className: 'relative inline-flex items-center cursor-pointer flex-shrink-0' },
            (() => {
              const chk = el('input', { type: 'checkbox', className: 'sr-only peer' });
              if (rule.isActive) chk.checked = true;
              chk.addEventListener('change', async () => {
                try { await api.discountRules.update(rule.id, { isActive: chk.checked }); rule.isActive = chk.checked; toast(`Rule ${chk.checked ? 'activated' : 'deactivated'}`, 'success'); }
                catch (err) { toast(err.message || 'Failed'); chk.checked = !chk.checked; }
              });
              return chk;
            })(),
            el('div', { className: "w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-brand peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all" })
          ),
          el('button', { className: 'text-red-400 hover:text-red-600 text-sm font-bold flex-shrink-0',
            onClick: async () => {
              if (!confirm(`Delete rule "${rule.name}"?`)) return;
              try { await api.discountRules.remove(rule.id); discountRules.splice(idx, 1); renderDRList(); toast('Rule deleted'); }
              catch (err) { toast(err.message || 'Failed'); }
            }
          }, '✕')
        )
      );
    });
  }

  renderDRList();

  // New rule form
  let newRuleName = '', newRuleType = 'PERCENTAGE', newRuleValue = 0, newRuleCode = '', newRuleMinOrder = '';
  function makeOpt2(v, t) { const o = document.createElement('option'); o.value = v; o.textContent = t; return o; }
  const nrTypeSel = el('select', { className: 'border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand' });
  [['PERCENTAGE', '% Off'], ['FLAT', 'R Flat']].forEach(([v, l]) => nrTypeSel.append(makeOpt2(v, l)));
  nrTypeSel.addEventListener('change', e => { newRuleType = e.target.value; });
  const nrNameInp = el('input', { type: 'text', placeholder: 'Rule name', className: 'border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand flex-1' });
  nrNameInp.addEventListener('input', e => { newRuleName = e.target.value; });
  const nrValInp = el('input', { type: 'number', min: '0', placeholder: 'Value', className: 'w-20 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand' });
  nrValInp.addEventListener('input', e => { newRuleValue = Number(e.target.value) || 0; });
  const nrCodeInp = el('input', { type: 'text', placeholder: 'Code (optional)', className: 'w-28 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand' });
  nrCodeInp.addEventListener('input', e => { newRuleCode = e.target.value; });
  const nrAddBtn = el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90 transition flex-shrink-0' }, '+ Add');
  nrAddBtn.addEventListener('click', async () => {
    if (!newRuleName || !newRuleValue) { toast('Name and value are required'); return; }
    nrAddBtn.disabled = true; nrAddBtn.textContent = '…';
    try {
      const rule = await api.discountRules.create({ name: newRuleName, type: newRuleType, value: newRuleValue, code: newRuleCode || undefined });
      discountRules.push(rule); renderDRList();
      nrNameInp.value = ''; nrValInp.value = ''; nrCodeInp.value = '';
      newRuleName = ''; newRuleValue = 0; newRuleCode = '';
      toast('Rule created', 'success');
    } catch (err) { toast(err.message || 'Failed'); }
    nrAddBtn.disabled = false; nrAddBtn.textContent = '+ Add';
  });

  page.append(section('Discount Rules', 'Configure discount rules that can be applied to quotes and orders',
    drListWrap,
    el('div', { className: 'border-t border-gray-100 pt-4 flex gap-2 flex-wrap items-center' },
      nrNameInp, nrTypeSel, nrValInp, nrCodeInp, nrAddBtn
    )
  ));

  // ── Units of Measure ──────────────────────────────────────────
  let uomList = [];
  const uomListWrap = el('div', {});

  async function loadAndRenderUomList() {
    try { uomList = await api.uom.getAdmin(); } catch(_) { uomList = []; }
    renderUomList();
  }

  const UOM_TYPE_COLORS = {
    WEIGHT: { bg: '#EFF6FF', color: '#2563EB' },
    VOLUME: { bg: '#F0FDF4', color: '#16A34A' },
    COUNT:  { bg: '#FFF7ED', color: '#EA580C' },
    LENGTH: { bg: '#FAF5FF', color: '#9333EA' },
    OTHER:  { bg: '#F9FAFB', color: '#6B7280' },
  };

  function renderUomList() {
    uomListWrap.innerHTML = '';
    if (!uomList.length) {
      uomListWrap.append(el('p', { className: 'text-sm text-gray-400 py-2' }, 'No units of measure yet. Click "Seed Defaults" to add common units.'));
      return;
    }
    // Group by type
    const grouped = {};
    uomList.forEach(u => {
      if (!grouped[u.type]) grouped[u.type] = [];
      grouped[u.type].push(u);
    });
    Object.entries(grouped).forEach(([type, items]) => {
      const tc = UOM_TYPE_COLORS[type] || UOM_TYPE_COLORS.OTHER;
      uomListWrap.append(
        el('p', { className: 'text-xs font-black uppercase tracking-wider mb-1 mt-3', style: { color: tc.color } }, type)
      );
      items.forEach((uom, idx) => {
        uomListWrap.append(
          el('div', { className: `flex items-center gap-3 py-2 ${idx < items.length - 1 ? 'border-b border-gray-50' : ''}` },
            el('div', { className: 'flex-1 min-w-0' },
              el('span', { className: 'text-sm font-bold text-gray-900' }, uom.name),
              el('span', { className: 'text-xs text-gray-400 ml-2' }, uom.abbreviation),
            ),
            el('span', { className: 'text-xs font-semibold px-2 py-0.5 rounded-full flex-shrink-0', style: { backgroundColor: tc.bg, color: tc.color } }, type),
            el('label', { className: 'relative inline-flex items-center cursor-pointer flex-shrink-0' },
              (() => {
                const chk = el('input', { type: 'checkbox', className: 'sr-only peer' });
                if (uom.isActive) chk.checked = true;
                chk.addEventListener('change', async () => {
                  try {
                    await api.uom.update(uom.id, { isActive: chk.checked });
                    uom.isActive = chk.checked;
                    toast(`UOM ${chk.checked ? 'activated' : 'deactivated'}`, 'success');
                  } catch (err) { toast(err.message || 'Failed'); chk.checked = !chk.checked; }
                });
                return chk;
              })(),
              el('div', { className: "w-9 h-5 bg-gray-200 rounded-full peer peer-checked:bg-brand peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all" })
            )
          )
        );
      });
    });
  }

  loadAndRenderUomList();

  // New UOM form
  let newUomName = '', newUomAbbr = '', newUomType = 'COUNT';
  function makeUomOpt(v, t) { const o = document.createElement('option'); o.value = v; o.textContent = t; return o; }
  const uomTypeSel = el('select', { className: 'border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand' });
  [['WEIGHT','Weight'], ['VOLUME','Volume'], ['COUNT','Count'], ['LENGTH','Length'], ['OTHER','Other']].forEach(([v, l]) => uomTypeSel.append(makeUomOpt(v, l)));
  uomTypeSel.addEventListener('change', e => { newUomType = e.target.value; });
  const uomNameInp = el('input', { type: 'text', placeholder: 'Name (e.g. Kilogram)', className: 'border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand flex-1' });
  uomNameInp.addEventListener('input', e => { newUomName = e.target.value; });
  const uomAbbrInp = el('input', { type: 'text', placeholder: 'Abbr (e.g. kg)', className: 'w-24 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand' });
  uomAbbrInp.addEventListener('input', e => { newUomAbbr = e.target.value; });
  const uomAddBtn = el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90 transition flex-shrink-0' }, '+ Add');
  uomAddBtn.addEventListener('click', async () => {
    if (!newUomName || !newUomAbbr) { toast('Name and abbreviation are required'); return; }
    uomAddBtn.disabled = true; uomAddBtn.textContent = '…';
    try {
      await api.uom.create({ name: newUomName, abbreviation: newUomAbbr, type: newUomType });
      uomNameInp.value = ''; uomAbbrInp.value = ''; newUomName = ''; newUomAbbr = '';
      await loadAndRenderUomList();
      toast('UOM created', 'success');
    } catch (err) { toast(err.message || 'Failed'); }
    uomAddBtn.disabled = false; uomAddBtn.textContent = '+ Add';
  });
  const uomSeedBtn = el('button', { className: 'bg-gray-100 text-gray-700 text-sm font-bold px-4 py-2 rounded-lg hover:bg-gray-200 transition flex-shrink-0' }, 'Seed Defaults');
  uomSeedBtn.addEventListener('click', async () => {
    uomSeedBtn.disabled = true; uomSeedBtn.textContent = '…';
    try {
      const res = await api.uom.seed();
      await loadAndRenderUomList();
      toast(`Seeded ${res.seeded} of ${res.total} UOMs`, 'success');
    } catch (err) { toast(err.message || 'Failed'); }
    uomSeedBtn.disabled = false; uomSeedBtn.textContent = 'Seed Defaults';
  });

  page.append(section('Units of Measure', 'Manage measurement units used across products, stock items and recipes',
    uomListWrap,
    el('div', { className: 'border-t border-gray-100 pt-4 flex gap-2 flex-wrap items-center' },
      uomNameInp, uomAbbrInp, uomTypeSel, uomAddBtn, uomSeedBtn
    )
  ));

  // ── About ──────────────────────────────────────────────────────
  page.append(section('About',  null,
    el('div', { className: 'grid grid-cols-2 gap-4 text-sm' },
      el('div', {},
        el('p', { className: 'text-xs text-gray-400 uppercase tracking-wide font-semibold mb-1' }, 'Platform'),
        el('p', { className: 'font-bold text-gray-800' }, 'Tlaka Treats Admin')
      ),
      el('div', {},
        el('p', { className: 'text-xs text-gray-400 uppercase tracking-wide font-semibold mb-1' }, 'Version'),
        el('p', { className: 'font-bold text-gray-800' }, 'v1.0.0')
      ),
      el('div', {},
        el('p', { className: 'text-xs text-gray-400 uppercase tracking-wide font-semibold mb-1' }, 'Total Orders'),
        el('p', { className: 'font-bold text-gray-800' }, String(data.orders.length))
      ),
      el('div', {},
        el('p', { className: 'text-xs text-gray-400 uppercase tracking-wide font-semibold mb-1' }, 'Total Customers'),
        el('p', { className: 'font-bold text-gray-800' }, String(data.customers.length))
      )
    )
  ));

  container.append(page);
}

// ─── ROUTING ──────────────────────────────────────────────────────
function redirectByRole(user) {
  if (store.isAdmin(user)) navigate('admin');
  else if (store.isAmbassador(user)) navigate('ambassador');
  else navigate('customer');
}

function renderPage(page) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const pages = {
    login: LoginPage,
    register: RegisterPage,
    customer: CustomerHomePage,
    ambassador: AmbassadorDashboardPage,
    admin: AdminOverviewPage,
  };

  if (pages[page]) {
    app.append(pages[page]());
  }
}

// ─── INIT ─────────────────────────────────────────────────────────
_routerListeners.push(renderPage);

// Initial route
if (!store.user) {
  navigate('login');
} else {
  redirectByRole(store.user);
}
</script>
</body>
</html>
