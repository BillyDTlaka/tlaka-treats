          el('p', { className: 'text-xs text-gray-400' }, `${t.category} · ${new Date(t.date).toLocaleDateString('en-ZA')}`),
        ),
        el('div', { className: 'text-right flex-shrink-0' },
          el('p', { className: `font-bold text-sm ${isIncome ? 'text-green-600' : 'text-red-500'}` }, `${isIncome ? '+' : '-'}${fmt(t.amount)}`),
          t.bankTxn ? el('p', { className: 'text-xs text-blue-400' }, '🔗 Matched') : el('span', {}),
        ),
      );
      table.append(row);
    });
    container.append(table);
  }

  load();
}

async function showTxnForm(txn, onSave) {
  const isEdit = !!txn;

  let type      = txn?.type || 'EXPENSE';
  let accountId = txn?.accountId || txn?.account?.id || '';
  let category  = txn?.category || '';
  let amount    = txn?.amount || '';
  let desc      = txn?.description || '';
  let date      = txn?.date ? txn.date.slice(0, 10) : new Date().toISOString().slice(0, 10);
  let ref       = txn?.reference || '';
  let loading   = false;

  // Load accounts from API (falls back to empty list gracefully)
  let allAccounts = [];
  try { allAccounts = await api.finance.getAccounts(); } catch(e) {}

  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-md p-6 fade-in max-h-screen overflow-y-auto' });

  function renderModal() {
    modal.innerHTML = '';

    // Filter accounts by type — INCOME/ASSET for income txns, EXPENSE/LIABILITY for expense txns
    const relevantTypes = type === 'INCOME' ? ['INCOME', 'ASSET'] : ['EXPENSE', 'LIABILITY'];
    const filteredAccounts = allAccounts.filter(a => relevantTypes.includes(a.type) && a.isActive);
    // Fallback categories if no accounts seeded yet
    const fallbackCats = type === 'INCOME' ? ['Sales', 'Other Income'] : ['Ingredients', 'Packaging', 'Transport', 'Wages', 'Rent', 'Marketing', 'Utilities', 'Other Expense'];

    modal.append(
      el('div', { className: 'flex justify-between items-center mb-5' },
        el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Transaction' : 'Add Transaction'),
        el('button', { className: 'text-gray-400 text-2xl', onClick: () => overlay.remove() }, '×'),
      ),

      el('div', { className: 'flex gap-2 mb-4' },
        ['INCOME', 'EXPENSE'].map(t =>
          el('button', {
            className: `flex-1 py-2 rounded-lg text-sm font-bold border-2 transition ${type === t ? (t === 'INCOME' ? 'border-green-500 bg-green-50 text-green-700' : 'border-red-400 bg-red-50 text-red-600') : 'border-gray-200 text-gray-500 hover:border-gray-300'}`,
            onClick: () => { type = t; accountId = ''; category = ''; renderModal(); },
          }, t === 'INCOME' ? '↑ Income' : '↓ Expense')
        )
      ),

      finField('Date', el('input', { type: 'date', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', value: date, onChange: e => date = e.target.value })),
      finField('Amount (R)', el('input', { type: 'number', step: '0.01', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: '0.00', value: amount, onInput: e => amount = e.target.value })),
    );

    // Account selector (grouped by type) — falls back to plain category dropdown if no accounts
    if (filteredAccounts.length > 0) {
      const acctSelect = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', onChange: e => { accountId = e.target.value; category = ''; } });
      acctSelect.append(el('option', { value: '' }, 'Select account…'));
      // Group by type
      const groups = {};
      filteredAccounts.forEach(a => { (groups[a.type] = groups[a.type] || []).push(a); });
      Object.entries(groups).forEach(([grpType, accts]) => {
        const grp = el('optgroup', {}); grp.label = grpType;
        accts.forEach(a => {
          const o = el('option', { value: a.id }, `${a.code} · ${a.name}`);
          if (a.id === accountId) o.selected = true;
          grp.append(o);
        });
        acctSelect.append(grp);
      });
      modal.append(finField('Account', acctSelect));
    } else {
      // No accounts seeded — fallback to category text dropdown
      const catSelect = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', onChange: e => { category = e.target.value; accountId = ''; } });
      catSelect.append(el('option', { value: '' }, 'Select category…'));
      fallbackCats.forEach(c => { const o = el('option', { value: c }, c); if (c === category) o.selected = true; catSelect.append(o); });
      modal.append(finField('Category', catSelect));
      modal.append(
        el('p', { className: 'text-xs text-blue-600 -mt-3 mb-4 cursor-pointer hover:underline', onClick: async () => {
          try { await api.finance.seedAccounts(); allAccounts = await api.finance.getAccounts(); renderModal(); toast('Default accounts loaded!', 'success'); }
          catch(e) { toast('Failed to load accounts'); }
        }}, '💡 Load default Chart of Accounts for better categorisation →')
      );
    }

    modal.append(
      finField('Description', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: 'What was this for?', value: desc, onInput: e => desc = e.target.value })),
      finField('Reference (optional)', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: 'Invoice #, receipt #…', value: ref, onInput: e => ref = e.target.value })),
    );

    const btns = el('div', { className: 'flex gap-3 mt-5' });

    if (isEdit) {
      btns.append(el('button', {
        className: 'flex-1 border border-red-200 text-red-500 text-sm font-semibold py-2.5 rounded-xl hover:bg-red-50',
        onClick: async () => {
          if (!confirm('Delete this transaction?')) return;
          await api.finance.deleteTransaction(txn.id);
          overlay.remove(); onSave();
        },
      }, 'Delete'));
    }

    const saveBtn = el('button', {
      className: 'flex-1 bg-brand text-white font-bold py-2.5 rounded-xl hover:opacity-90 flex items-center justify-center gap-2',
      onClick: async () => {
        const resolvedCategory = accountId ? (allAccounts.find(a => a.id === accountId)?.name || '') : category;
        if (!amount || !resolvedCategory || !desc) return toast('Please fill in all required fields');
        loading = true; saveBtn.disabled = true; saveBtn.innerHTML = ''; saveBtn.append(spinner());
        try {
          const data = { date, amount: Number(amount), type, category: resolvedCategory, accountId: accountId || undefined, description: desc, reference: ref || undefined };
          if (isEdit) await api.finance.updateTransaction(txn.id, data);
          else        await api.finance.createTransaction(data);
          overlay.remove(); onSave();
          toast(isEdit ? 'Transaction updated' : 'Transaction added', 'success');
        } catch(e) { toast(e.message || 'Failed to save'); loading = false; saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      },
    }, 'Save');

    btns.append(saveBtn);
    modal.append(btns);
  }

  renderModal();
  overlay.append(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

function finField(label, input) {
  return el('div', { className: 'mb-4' },
    el('label', { className: 'block text-xs font-semibold text-gray-600 mb-1' }, label),
    input,
  );
}

async function renderFinanceExpenses(container) {
  let expenses = [];
  const fmt = n => `R${Number(n).toFixed(2)}`;

  async function load() {
    const data = await api.finance.getTransactions({ type: 'EXPENSE' });
    expenses = data;
    render();
  }

  function render() {
    container.innerHTML = '';
    container.append(
      el('div', { className: 'flex items-center justify-between mb-5' },
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'Expenses'),
        el('button', {
          className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90',
          onClick: () => showTxnForm({ type: 'EXPENSE' }, load),
        }, '+ Add Expense'),
      )
    );

    if (!expenses.length) {
      container.append(el('div', { className: 'text-center py-16 text-gray-400' }, 'No expenses recorded yet.'));
      return;
    }

    // Group by category
    const byCategory = {};
    for (const e of expenses) byCategory[e.category] = (byCategory[e.category] || 0) + Number(e.amount);

    const sortedCats = Object.entries(byCategory).sort(([,a],[,b]) => b - a);
    const total = expenses.reduce((s, e) => s + Number(e.amount), 0);

    // Category summary pills
    const summary = el('div', { className: 'flex flex-wrap gap-2 mb-5' });
    sortedCats.forEach(([cat, amt]) => {
      summary.append(el('div', { className: 'bg-white border border-gray-100 rounded-xl px-3 py-2 text-center shadow-sm' },
        el('p', { className: 'text-sm font-bold text-gray-900' }, fmt(amt)),
        el('p', { className: 'text-xs text-gray-400' }, cat),
      ));
    });
    summary.append(el('div', { className: 'bg-red-50 border border-red-100 rounded-xl px-3 py-2 text-center shadow-sm ml-auto' },
      el('p', { className: 'text-sm font-black text-red-600' }, fmt(total)),
      el('p', { className: 'text-xs text-red-400' }, 'Total'),
    ));
    container.append(summary);

    // Table
    const table = el('div', { className: 'bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden' });
    expenses.forEach((e, i) => {
      table.append(el('div', {
        className: `flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer ${i < expenses.length - 1 ? 'border-b border-gray-50' : ''}`,
        onClick: () => showTxnForm(e, load),
      },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'text-sm font-semibold text-gray-900 truncate' }, e.description),
          el('p', { className: 'text-xs text-gray-400' }, `${e.category} · ${new Date(e.date).toLocaleDateString('en-ZA')}`),
        ),
        el('p', { className: 'font-bold text-sm text-red-500 flex-shrink-0' }, `-${fmt(e.amount)}`),
      ));
    });
    container.append(table);
  }

  load();
}

// ── Finance: Chart of Accounts ───────────────────────────────────────────────
async function renderFinanceAccounts(container) {
  const TYPE_META = {
    ASSET:     { label: 'Assets',      color: 'bg-blue-50 text-blue-700',   border: 'border-blue-100',  desc: 'Cash, bank accounts, money owed to you' },
    LIABILITY: { label: 'Liabilities', color: 'bg-red-50 text-red-700',     border: 'border-red-100',   desc: 'Loans, money you owe to others' },
    EQUITY:    { label: 'Equity',      color: 'bg-purple-50 text-purple-700',border: 'border-purple-100',desc: "Owner's investment and retained earnings" },
    INCOME:    { label: 'Income',      color: 'bg-green-50 text-green-700',  border: 'border-green-100', desc: 'Revenue from sales and other sources' },
    EXPENSE:   { label: 'Expenses',    color: 'bg-orange-50 text-orange-700',border: 'border-orange-100',desc: 'Costs and operating expenses' },
  };

  let accounts = [];

  async function load() {
    accounts = await api.finance.getAccounts();
    render();
  }

  function render() {
    container.innerHTML = '';

    const header = el('div', { className: 'flex items-center gap-3 mb-5' },
      el('div', { className: 'flex-1' },
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'Chart of Accounts'),
        el('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'Organise your income and expenses into a clear account structure'),
      ),
      accounts.length === 0
        ? el('button', {
            className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90',
            onClick: async () => {
              try {
                const r = await api.finance.seedAccounts();
                toast(`${r.created} default accounts loaded!`, 'success');
                load();
              } catch(e) { toast(e.message || 'Failed'); }
            },
          }, '⚡ Load Default Accounts')
        : el('button', {
            className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90',
            onClick: () => showAccountForm(null, load),
          }, '+ New Account'),
    );
    container.append(header);

    if (!accounts.length) {
      container.append(
        el('div', { className: 'text-center py-16' },
          el('p', { className: 'text-4xl mb-3' }, '📒'),
          el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No accounts yet'),
          el('p', { className: 'text-sm text-gray-400 mb-4' }, 'Load the default Tlaka Treats chart of accounts to get started instantly, or create your own.'),
        )
      );
      return;
    }

    // Group by type in order: ASSET, LIABILITY, EQUITY, INCOME, EXPENSE
    const grouped = {};
    ['ASSET', 'LIABILITY', 'EQUITY', 'INCOME', 'EXPENSE'].forEach(t => grouped[t] = []);
    accounts.forEach(a => { if (grouped[a.type]) grouped[a.type].push(a); });

    Object.entries(grouped).forEach(([type, accts]) => {
      if (!accts.length) return;
      const meta = TYPE_META[type];

      const section = el('div', { className: 'mb-5' });
      section.append(
        el('div', { className: `flex items-center gap-3 mb-2 px-1` },
          el('span', { className: `text-xs font-bold px-2.5 py-1 rounded-full ${meta.color}` }, meta.label),
          el('span', { className: 'text-xs text-gray-400' }, meta.desc),
          el('span', { className: 'ml-auto text-xs text-gray-300 font-semibold' }, `${accts.length} accounts`),
        )
      );

      const table = el('div', { className: `bg-white rounded-xl border ${meta.border} shadow-sm overflow-hidden` });
      accts.forEach((a, i) => {
        table.append(el('div', {
          className: `flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer ${i < accts.length - 1 ? 'border-b border-gray-50' : ''}`,
          onClick: () => showAccountForm(a, load),
        },
          el('div', { className: `w-16 flex-shrink-0` },
            el('span', { className: 'text-xs font-mono font-bold text-gray-400' }, a.code),
          ),
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: `text-sm font-semibold ${a.isActive ? 'text-gray-900' : 'text-gray-400 line-through'}` }, a.name),
            a.description ? el('p', { className: 'text-xs text-gray-400 truncate' }, a.description) : el('span', {}),
          ),
          el('div', { className: 'flex items-center gap-2 flex-shrink-0' },
            a._count?.transactions > 0
              ? el('span', { className: 'text-xs text-gray-400' }, `${a._count.transactions} txns`)
              : el('span', {}),
            a.isSystem
              ? el('span', { className: 'text-xs bg-gray-100 text-gray-400 px-2 py-0.5 rounded-full' }, 'system')
              : el('span', {}),
            el('span', { className: `w-2 h-2 rounded-full ${a.isActive ? 'bg-green-400' : 'bg-gray-300'}` }),
          ),
        ));
      });
      section.append(table);
      container.append(section);
    });

    // Add account button at bottom too if accounts exist
    container.append(
      el('button', {
        className: 'w-full mt-2 border-2 border-dashed border-gray-200 text-gray-400 text-sm font-semibold py-3 rounded-xl hover:border-brand hover:text-brand transition',
        onClick: () => showAccountForm(null, load),
      }, '+ Add Custom Account')
    );
  }

  load();
}

function showAccountForm(account, onSave) {
  const isEdit = !!account;
  let code     = account?.code || '';
  let name     = account?.name || '';
  let type     = account?.type || 'EXPENSE';
  let desc     = account?.description || '';
  let isActive = account?.isActive !== false;

  const TYPES = ['ASSET', 'LIABILITY', 'EQUITY', 'INCOME', 'EXPENSE'];

  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-sm p-6 fade-in' });

  modal.append(
    el('div', { className: 'flex justify-between items-center mb-5' },
      el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Account' : 'New Account'),
      el('button', { className: 'text-gray-400 text-2xl', onClick: () => overlay.remove() }, '×'),
    ),
    finField('Account Code', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono', placeholder: 'e.g. 5010', value: code, onInput: e => code = e.target.value, disabled: isEdit && account?.isSystem })),
    finField('Account Name', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: 'e.g. Baking Supplies', value: name, onInput: e => name = e.target.value })),
    finField('Type', (() => {
      const s = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', onChange: e => type = e.target.value, disabled: isEdit && account?.isSystem });
      TYPES.forEach(t => { const o = el('option', { value: t }, t); if (t === type) o.selected = true; s.append(o); });
      return s;
    })()),
    finField('Description (optional)', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: 'What is this account for?', value: desc, onInput: e => desc = e.target.value })),
  );

  if (isEdit) {
    const toggle = el('label', { className: 'flex items-center gap-3 mb-4 cursor-pointer' },
      el('span', { className: 'text-sm font-semibold text-gray-700 flex-1' }, 'Active'),
      el('div', { className: 'relative' }, (() => {
        const cb = el('input', { type: 'checkbox', className: 'sr-only' });
        cb.checked = isActive;
        cb.addEventListener('change', e => isActive = e.target.checked);
        return cb;
      })(), el('div', { className: 'w-10 h-5 bg-gray-200 rounded-full peer-checked:bg-brand' })),
    );
    modal.append(toggle);
  }

  const btnRow = el('div', { className: 'flex gap-3 mt-2' });

  if (isEdit && !account?.isSystem) {
    btnRow.append(el('button', {
      className: 'border border-red-200 text-red-500 text-sm font-semibold px-4 py-2.5 rounded-xl hover:bg-red-50',
      onClick: async () => {
        try {
          await api.finance.deleteAccount(account.id);
          overlay.remove(); onSave();
          toast('Account deleted', 'success');
        } catch(e) { toast(e.message || 'Cannot delete'); }
      },
    }, 'Delete'));
  }

  btnRow.append(el('button', {
    className: 'flex-1 bg-brand text-white font-bold py-2.5 rounded-xl hover:opacity-90',
    onClick: async () => {
      if (!code || !name || !type) return toast('Code, name and type are required');
      try {
        const data = { code, name, type, description: desc || undefined, isActive };
        if (isEdit) await api.finance.updateAccount(account.id, data);
        else        await api.finance.createAccount(data);
        overlay.remove(); onSave();
        toast(isEdit ? 'Account updated' : 'Account created', 'success');
      } catch(e) { toast(e.message || 'Failed to save'); }
    },
  }, 'Save'));

  modal.append(btnRow);
  overlay.append(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── Finance: Bank Accounts ────────────────────────────────────────────────────
async function renderFinanceBankAccounts(container) {
  let accounts = [], activeAccountId = null, bankTxns = [], txnStatusFilter = 'UNMATCHED';

  async function loadAccounts() {
    accounts = await api.finance.getBankAccounts();
    if (!activeAccountId && accounts.length) activeAccountId = accounts[0].id;
    render();
  }

  async function loadBankTxns() {
    if (!activeAccountId) { bankTxns = []; return; }
    bankTxns = await api.finance.getBankTransactions({ bankAccountId: activeAccountId, status: txnStatusFilter });
  }

  function render() {
    container.innerHTML = '';

    container.append(
      el('div', { className: 'flex items-center justify-between mb-5' },
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'Bank Accounts'),
        el('button', {
          className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90',
          onClick: () => showBankAccountForm(null, loadAccounts),
        }, '+ Add Account'),
      )
    );

    if (!accounts.length) {
      container.append(el('div', { className: 'text-center py-16 text-gray-400' },
        el('p', { className: 'text-4xl mb-3' }, '🏦'),
        el('p', { className: 'font-semibold text-gray-500' }, 'No bank accounts yet'),
        el('p', { className: 'text-sm mt-1' }, 'Add a bank account and import your CSV statements'),
      ));
      return;
    }

    // Account cards
    const accountGrid = el('div', { className: 'flex gap-3 mb-6 overflow-x-auto pb-1' });
    accounts.forEach(a => {
      accountGrid.append(el('div', {
        className: `flex-shrink-0 w-56 rounded-xl p-4 border-2 cursor-pointer transition ${activeAccountId === a.id ? 'border-brand bg-brand-light' : 'border-gray-100 bg-white hover:border-gray-300'}`,
        onClick: () => { activeAccountId = a.id; loadBankTxns().then(renderTxns); },
      },
        el('p', { className: 'text-xs text-gray-400 mb-1' }, a.bankName || 'Bank'),
        el('p', { className: 'font-bold text-gray-900 text-sm mb-2' }, a.name),
        el('p', { className: 'text-xl font-black text-brand' }, `R${Number(a.balance).toFixed(2)}`),
        el('p', { className: 'text-xs text-gray-400 mt-1' }, `${a._count?.transactions || 0} transactions`),
      ));
    });
    container.append(accountGrid);

    // Import CSV button for active account
    if (activeAccountId) {
      container.append(
        el('div', { className: 'flex items-center gap-3 mb-4' },
          el('h3', { className: 'font-black text-gray-900 flex-1' }, 'Bank Transactions'),
          el('select', {
            className: 'border border-gray-200 rounded-lg px-3 py-2 text-sm',
            value: txnStatusFilter,
            onChange: async e => { txnStatusFilter = e.target.value; await loadBankTxns(); renderTxns(); },
          },
            el('option', { value: '' }, 'All'),
            el('option', { value: 'UNMATCHED' }, 'Unmatched'),
            el('option', { value: 'MATCHED' }, 'Matched'),
            el('option', { value: 'IGNORED' }, 'Ignored'),
          ),
          el('button', {
            className: 'border border-brand text-brand text-sm font-bold px-4 py-2 rounded-lg hover:bg-brand-light',
            onClick: () => showCsvImport(activeAccountId, () => loadBankTxns().then(renderTxns)),
          }, '⬆ Import CSV'),
        )
      );
    }

    loadBankTxns().then(renderTxns);
  }

  const txnArea = el('div', {});

  function renderTxns() {
    // Remove previous txnArea if present
    const old = container.querySelector('[data-txnarea]');
    if (old) old.remove();
    const area = el('div', { 'data-txnarea': '1' });
    area.setAttribute('data-txnarea', '1');

    if (!activeAccountId) return container.append(area);

    if (!bankTxns.length) {
      area.append(el('div', { className: 'text-center py-10 text-gray-400 text-sm' }, txnStatusFilter === 'UNMATCHED' ? 'No unmatched transactions. Great job! 🎉' : 'No transactions found.'));
      container.append(area);
      return;
    }

    const table = el('div', { className: 'bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden' });
    bankTxns.forEach((t, i) => {
      const isCredit = Number(t.amount) >= 0;
      const statusColors = { UNMATCHED: 'bg-yellow-50 text-yellow-700', MATCHED: 'bg-green-50 text-green-700', IGNORED: 'bg-gray-100 text-gray-500' };

      const row = el('div', { className: `flex items-center gap-3 px-4 py-3 ${i < bankTxns.length - 1 ? 'border-b border-gray-50' : ''}` },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'text-sm font-semibold text-gray-900 truncate' }, t.description),
          el('p', { className: 'text-xs text-gray-400' }, new Date(t.date).toLocaleDateString('en-ZA') + (t.reference ? ` · ${t.reference}` : '')),
          t.transaction ? el('p', { className: 'text-xs text-blue-600 mt-0.5' }, `↔ ${t.transaction.category}: ${t.transaction.description}`) : el('span', {}),
        ),
        el('div', { className: 'text-right flex-shrink-0 mr-2' },
          el('p', { className: `font-bold text-sm ${isCredit ? 'text-green-600' : 'text-red-500'}` }, `${isCredit ? '+' : ''}R${Number(t.amount).toFixed(2)}`),
          t.balance != null ? el('p', { className: 'text-xs text-gray-400' }, `Bal: R${Number(t.balance).toFixed(2)}`) : el('span', {}),
        ),
        el('div', { className: 'flex flex-col gap-1 flex-shrink-0' },
          el('span', { className: `text-xs px-2 py-0.5 rounded-full font-semibold ${statusColors[t.status]}` }, t.status),
          t.status === 'UNMATCHED' ? el('button', {
            className: 'text-xs text-blue-600 font-semibold hover:underline',
            onClick: () => showMatchTxnDialog(t, () => loadBankTxns().then(renderTxns)),
          }, 'Match') : el('span', {}),
          t.status === 'UNMATCHED' ? el('button', {
            className: 'text-xs text-gray-400 hover:text-gray-600 font-semibold',
            onClick: async () => { await api.finance.ignoreBankTxn(t.id); await loadBankTxns(); renderTxns(); },
          }, 'Ignore') : el('span', {}),
          t.status === 'MATCHED' ? el('button', {
            className: 'text-xs text-gray-400 hover:text-red-500 font-semibold',
            onClick: async () => { await api.finance.unmatchBankTxn(t.id); await loadBankTxns(); renderTxns(); },
          }, 'Unmatch') : el('span', {}),
        ),
      );
      table.append(row);
    });
    area.append(table);
    container.append(area);
  }

  loadAccounts();
}

function showCsvImport(bankAccountId, onDone) {
  let csvText = '';
  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-lg p-6 fade-in' });
  modal.append(
    el('div', { className: 'flex justify-between items-center mb-4' },
      el('h3', { className: 'font-black text-gray-900 text-lg' }, 'Import Bank Statement (CSV)'),
      el('button', { className: 'text-gray-400 text-2xl', onClick: () => overlay.remove() }, '×'),
    ),
    el('p', { className: 'text-sm text-gray-500 mb-4' }, 'Paste your CSV content below or drag-and-drop a .csv file. The system auto-detects columns for Date, Description, Amount/Debit/Credit, Balance, and Reference.'),
    el('div', { className: 'bg-gray-50 rounded-lg p-3 text-xs text-gray-400 font-mono mb-4' },
      'Expected headers (any order): Date, Description, Amount (or Debit+Credit), Balance, Reference'
    ),
  );

  const fileInput = el('input', { type: 'file', accept: '.csv,text/csv', className: 'mb-3 text-sm text-gray-600' });
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { csvText = ev.target.result; textarea.value = csvText; };
    reader.readAsText(file);
  });

  const textarea = el('textarea', {
    className: 'w-full border border-gray-200 rounded-lg p-3 text-xs font-mono h-48 resize-none mb-4',
    placeholder: 'Date,Description,Amount,Balance\n2024-01-15,Customer Payment,500.00,1500.00\n…',
    onInput: e => csvText = e.target.value,
  });

  modal.append(fileInput, textarea);

  const importBtn = el('button', {
    className: 'w-full bg-brand text-white font-bold py-3 rounded-xl hover:opacity-90 flex items-center justify-center gap-2',
    onClick: async () => {
      const csv = csvText || textarea.value;
      if (!csv.trim()) return toast('Please paste or upload CSV content');
      importBtn.disabled = true; importBtn.innerHTML = ''; importBtn.append(spinner(), document.createTextNode(' Importing…'));
      try {
        const result = await api.finance.importCsv(bankAccountId, { csv });
        overlay.remove();
        onDone();
        toast(`Imported ${result.imported} transactions${result.errors?.length ? ` (${result.errors.length} errors)` : ''}`, 'success');
      } catch(e) { toast(e.message || 'Import failed'); importBtn.disabled = false; importBtn.textContent = 'Import'; }
    },
  }, 'Import');

  modal.append(importBtn);
  overlay.append(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── Finance: Commissions ──────────────────────────────────────────────────────
async function renderFinanceCommissions(container) {
  let statusFilter = 'PENDING';
  let commissions = [], summary = [];

  async function load() {
    const data = await api.finance.getCommissions(statusFilter ? { status: statusFilter } : null);
    commissions = data.commissions;
    summary = data.summary;
    render();
  }

  function render() {
    container.innerHTML = '';
    const fmt = n => `R${Number(n).toFixed(2)}`;

    // Summary chips
    const summaryRow = el('div', { className: 'flex items-center gap-3 mb-5 flex-wrap' },
      el('h2', { className: 'text-xl font-black text-gray-900 flex-1' }, 'Commissions'),
    );

    const statusTabs = el('div', { className: 'flex gap-2 mb-5' });
    ['', 'PENDING', 'APPROVED', 'PAID'].forEach(s => {
      statusTabs.append(el('button', {
        className: `px-4 py-1.5 rounded-full text-sm font-semibold transition ${statusFilter === s ? 'bg-brand text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`,
        onClick: () => { statusFilter = s; load(); },
      }, s || 'All'));
    });
    container.append(summaryRow, statusTabs);

    // Summary stats from API
    const statsRow = el('div', { className: 'grid grid-cols-3 gap-3 mb-5' });
    const statMap = { PENDING: 0, APPROVED: 0, PAID: 0 };
    for (const s of summary) statMap[s.status] = Number(s._sum?.amount || 0);
    statsRow.append(
      el('div', { className: 'bg-yellow-50 rounded-xl p-3 text-center' }, el('p', { className: 'font-black text-yellow-700' }, fmt(statMap.PENDING)), el('p', { className: 'text-xs text-yellow-600' }, 'Pending')),
      el('div', { className: 'bg-blue-50 rounded-xl p-3 text-center' }, el('p', { className: 'font-black text-blue-700' }, fmt(statMap.APPROVED)), el('p', { className: 'text-xs text-blue-600' }, 'Approved')),
      el('div', { className: 'bg-green-50 rounded-xl p-3 text-center' }, el('p', { className: 'font-black text-green-700' }, fmt(statMap.PAID)), el('p', { className: 'text-xs text-green-600' }, 'Paid')),
    );
    container.append(statsRow);

    if (!commissions.length) {
      container.append(el('div', { className: 'text-center py-10 text-gray-400 text-sm' }, 'No commissions found.'));
      return;
    }

    // Group by ambassador for payout
    const byAmb = {};
    commissions.forEach(c => {
      if (!byAmb[c.ambassadorId]) byAmb[c.ambassadorId] = { ambassador: c.ambassador, commissions: [] };
      byAmb[c.ambassadorId].commissions.push(c);
    });

    Object.values(byAmb).forEach((group) => {
      const amb = group.ambassador;

function showPayoutForm(ambassador, commissionIds, total, onSave) {
  let method = 'bank_transfer', reference = '', notes = '';
  const fmt = n => `R${Number(n).toFixed(2)}`;

  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-sm p-6 fade-in' });

  modal.append(
    el('div', { className: 'flex justify-between items-center mb-4' },
      el('h3', { className: 'font-black text-gray-900 text-lg' }, 'Record Payout'),
      el('button', { className: 'text-gray-400 text-2xl', onClick: () => overlay.remove() }, '×'),
    ),
    el('div', { className: 'bg-orange-50 rounded-xl p-3 mb-4' },
      el('p', { className: 'text-sm text-gray-600' }, `Paying out ${commissionIds.length} commissions to`),
      el('p', { className: 'font-bold text-gray-900' }, `${ambassador.user.firstName} ${ambassador.user.lastName}`),
      el('p', { className: 'text-2xl font-black text-brand mt-1' }, fmt(total)),
    ),
    finField('Payment Method', el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', onChange: e => method = e.target.value },
      el('option', { value: 'bank_transfer' }, 'Bank Transfer'),
      el('option', { value: 'cash' }, 'Cash'),
      el('option', { value: 'other' }, 'Other'),
    )),
    finField('Reference (optional)', el('input', { type: 'text', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', placeholder: 'Transaction ref, receipt #…', onInput: e => reference = e.target.value })),
    finField('Notes (optional)', el('textarea', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none h-16', onInput: e => notes = e.target.value })),
  );

  const confirmBtn = el('button', {
    className: 'w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:opacity-90 mt-2',
    onClick: async () => {
      confirmBtn.disabled = true; confirmBtn.textContent = 'Processing…';
      try {
        await api.finance.createPayout({ ambassadorId: ambassador.id, commissionIds, method, reference: reference || undefined, notes: notes || undefined });
        overlay.remove(); onSave();
        toast(`Payout of ${fmt(total)} recorded!`, 'success');
      } catch(e) { toast(e.message || 'Failed to record payout'); confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Payout'; }
    },
  }, 'Confirm Payout');

  modal.append(confirmBtn);
  overlay.append(modal);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── CSV Export helper ─────────────────────────────────────────────────────────
function downloadCsv(filename, rows) {
  // rows: array of arrays (first row = headers)
  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? '').replace(/"/g, '""');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s}"` : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportBtn(label, onClick) {

    onClick,
  }, '⬇ ' + label);
}

async function renderFinanceReports(container) {
  const REPORTS = [
    { id: 'pnl',       label: '📋 Profit & Loss' },
    { id: 'cashflow',  label: '📅 Cashflow' },

  ];

  let activeReport = 'pnl';

  // Default date range: first day of current month → today
  const today    = new Date();
  const firstDOM = new Date(today.getFullYear(), today.getMonth(), 1);
  let dateFrom = firstDOM.toISOString().slice(0, 10);
  let dateTo   = today.toISOString().slice(0, 10);

  container.innerHTML = '';

  // ── Header row ──
  container.append(
    el('div', { className: 'flex items-center gap-3 mb-5 flex-wrap' },

        el('label', { className: 'text-xs font-semibold text-gray-500' }, 'To'),
        (() => { const i = el('input', { type: 'date', className: 'border border-gray-200 rounded-lg px-2 py-1.5 text-sm', value: dateTo }); i.addEventListener('change', e => { dateTo = e.target.value; loadReport(); }); return i; })(),
      ),
    )
  );

  // ── Report tabs ──
  const tabRow   = el('div', { className: 'flex gap-1.5 mb-5 overflow-x-auto pb-1 flex-shrink-0' });
  const reportArea = el('div', {});

  function renderTabs() {
    tabRow.innerHTML = '';
    REPORTS.forEach(r => {
      tabRow.append(el('button', {
        className: `px-3.5 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition ${activeReport === r.id ? 'bg-brand text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600 hover:border-brand hover:text-brand'}`,
        onClick: () => { activeReport = r.id; renderTabs(); loadReport(); },
      }, r.label));
    });
  }

  async function loadReport() {
    reportArea.innerHTML = '';
    reportArea.append(spinner());
    const range = { from: dateFrom, to: dateTo + 'T23:59:59' };
    try {
      if      (activeReport === 'pnl')         await renderPnLReport(reportArea, range);
      else if (activeReport === 'cashflow')     await renderCashflowReport(reportArea, range);
      else if (activeReport === 'sales')        await renderSalesReport(reportArea, range);
      else if (activeReport === 'expenses')     await renderExpensesReport(reportArea, range);
      else if (activeReport === 'commissions')  await renderCommissionsReport(reportArea);
      else if (activeReport === 'statement')    await renderAccountStatement(reportArea, range);
    } catch(e) {
      reportArea.innerHTML = '';
      reportArea.append(el('p', { className: 'text-red-500 text-sm' }, 'Failed to load: ' + e.message));
    }
  }

  renderTabs();
  container.append(tabRow, reportArea);
  loadReport();
}

// ── REPORTS MODULE ────────────────────────────────────────────────────────────
function renderAdminReports(data, container) {
  const { orders, customers } = data;

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function monthKey(d) { const dt = new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }
  function last6Months() {
    const now = new Date();
    return Array.from({length:6},(_,i)=>{ const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1); return {key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,label:MONTHS[d.getMonth()]}; });
  }
  function fmt(n) { return `R${Number(n||0).toFixed(2)}`; }
  function fmtNum(n) { return Number(n||0).toLocaleString(); }

  function barChart(items, max, prefix='') {
    const wrap = el('div', { className: 'flex items-end gap-2 h-32 mt-2' });
    items.forEach(item => {
      const pct = Math.max((item.value/max)*100, item.value>0?3:0);
      const col = el('div', { className: 'flex-1 flex flex-col items-center gap-1' });
      col.append(
        el('span', { className: 'text-xs text-gray-400 font-semibold' }, item.value>0 ? `${prefix}${item.value>=1000?(item.value/1000).toFixed(1)+'k':item.value.toFixed(0)}` : '–'),
        el('div', { className: 'w-full rounded-t-md bg-brand transition-all', style: { height: `${pct}%`, minHeight: item.value>0?'4px':'0' } }),
        el('span', { className: 'text-xs text-gray-400' }, item.label)
      );
      wrap.append(col);
    });
    return wrap;
  }

  function sectionTitle(text) {
    return el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-3' }, text);
  }

  function card(...children) {
    return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100 mb-4' }, ...children);
  }

  function kpiGrid(...items) {
    return el('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3 mb-4' }, ...items);
  }

  function kpi(label, value, color='#8B3A3A') {
    return el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100 shadow-sm' },
      el('p', { className: 'text-xs text-gray-400 mb-1' }, label),
      el('p', { className: 'text-lg font-black', style: { color } }, value)
    );
  }

  function loadingSpinner() {
    return el('div', { className: 'flex items-center justify-center py-12' },
      el('div', { className: 'w-8 h-8 border-4 border-brand border-t-transparent rounded-full animate-spin' })
    );
  }

  function progressBar(value, max, color='#8B3A3A') {
    const pct = max > 0 ? Math.min((value/max)*100, 100) : 0;
    return el('div', { className: 'flex-1 bg-gray-100 rounded-full h-2 overflow-hidden' },
      el('div', { className: 'h-2 rounded-full transition-all', style: { width: `${pct}%`, backgroundColor: color } })
    );
  }

  // ─── TABS ─────────────────────────────────────────────────────────
  const TABS = [
    { id: 'sales',      label: 'Sales' },
    { id: 'finance',    label: 'Finance' },
    { id: 'inventory',  label: 'Inventory' },
    { id: 'production', label: 'Production' },
  ];
  let activeTab = 'sales';

  const shell = el('div', { className: 'flex flex-col h-full' });
  const tabNav = el('div', { className: 'flex gap-1 px-6 pt-4 border-b border-gray-100 bg-white flex-shrink-0 overflow-x-auto' });
  const tabContent = el('div', { className: 'flex-1 overflow-y-auto p-6' });
  shell.append(tabNav, tabContent);

  function renderTabNav() {
    tabNav.innerHTML = '';
    TABS.forEach(t => {
      const btn = el('button', {
        className: `px-4 py-2 text-sm font-semibold rounded-t-lg border-b-2 transition-colors whitespace-nowrap ${activeTab===t.id ? 'border-brand text-brand bg-rose-50' : 'border-transparent text-gray-500 hover:text-gray-700'}`,
        onClick: () => { activeTab = t.id; renderTabNav(); renderActiveTab(); }
      }, t.label);
      tabNav.append(btn);
    });
  }

  // ── SALES TAB ─────────────────────────────────────────────────────────
  function renderSalesTab() {
    tabContent.innerHTML = '';
    const page = el('div', { className: 'max-w-5xl mx-auto' });
    tabContent.append(page);

    const delivered = orders.filter(o=>o.status==='DELIVERED');
    const revenue   = delivered.reduce((s,o)=>s+Number(o.total||0),0);
    const avgOrder  = delivered.length ? revenue/delivered.length : 0;
    const totalCommission = delivered.reduce((s,o)=>s+Number(o.total||0)*Number(o.ambassador?.commissionRate||0),0);

    page.append(kpiGrid(
      kpi('Total Revenue',      fmt(revenue),              '#10B981'),
      kpi('Delivered Orders',   String(delivered.length),  '#3B82F6'),
      kpi('Avg Order Value',    fmt(avgOrder),             '#8B3A3A'),
      kpi('Commission Owed',    fmt(totalCommission),      '#8B5CF6'),
    ));

    // Monthly charts
    const months = last6Months();
    const monthlyRevenue = months.map(m=>({ label:m.label, value:orders.filter(o=>o.status==='DELIVERED'&&monthKey(o.createdAt)===m.key).reduce((s,o)=>s+Number(o.total||0),0) }));
    const monthlyOrders  = months.map(m=>({ label:m.label, value:orders.filter(o=>monthKey(o.createdAt)===m.key).length }));
    const maxRev = Math.max(...monthlyRevenue.map(m=>m.value), 1);
    const maxOrd = Math.max(...monthlyOrders.map(m=>m.value), 1);

    page.append(el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-4' },
      card(sectionTitle('Monthly Revenue (Delivered)'), barChart(monthlyRevenue, maxRev, 'R')),
      card(sectionTitle('Monthly Orders'), barChart(monthlyOrders, maxOrd))
    ));

    // Orders by status
    const STATUS_COLORS_HEX = { PENDING:'#F59E0B', CONFIRMED:'#3B82F6', BAKING:'#8B5CF6', READY:'#10B981', DELIVERED:'#6B7280', CANCELLED:'#EF4444' };
    const statusCounts = ['PENDING','CONFIRMED','BAKING','READY','DELIVERED','CANCELLED']
      .map(s=>({ label:s, value:orders.filter(o=>o.status===s).length, color:STATUS_COLORS_HEX[s] }))
      .filter(s=>s.value>0);
    const statusCard = card(sectionTitle('Orders by Status'));
    statusCounts.forEach(s => {
      const pct = orders.length ? ((s.value/orders.length)*100).toFixed(0) : 0;
      statusCard.append(el('div', { className: 'flex items-center gap-3 mb-2' },
        el('span', { className: 'text-xs font-semibold w-24 text-gray-600 truncate' }, s.label),
        progressBar(s.value, orders.length, s.color),
        el('span', { className: 'text-xs font-bold text-gray-700 w-8 text-right' }, String(s.value))
      ));
    });
    page.append(statusCard);

    // Top products
    const prodMap = {};
    orders.forEach(o=>(o.items||[]).forEach(item=>{
      const name = item.variant?.product?.name || 'Unknown';
      if (!prodMap[name]) prodMap[name] = { name, qty:0, revenue:0 };
      prodMap[name].qty += item.quantity;
      prodMap[name].revenue += Number(item.subtotal||0);
    }));
    const topProducts = Object.values(prodMap).sort((a,b)=>b.revenue-a.revenue).slice(0,8);
    const maxProdRev = Math.max(...topProducts.map(p=>p.revenue), 1);
    const topProdCard = card(
      el('div', { className: 'flex justify-between items-center mb-3' },
        sectionTitle('Top Products by Revenue'),
        el('span', { className: 'text-xs text-gray-400' }, `${topProducts.length} products`)
      ),
      topProducts.length === 0
        ? el('p', { className: 'text-center text-gray-400 py-6 text-sm' }, 'No order data yet')
        : el('div', { className: 'divide-y divide-gray-50' },
            ...topProducts.map((p,i) => el('div', { className: 'flex items-center gap-3 py-2.5' },
              el('span', { className: 'text-xs font-black text-gray-300 w-5' }, String(i+1)),
              el('div', { className: 'flex-1 min-w-0' },
                el('p', { className: 'text-sm font-semibold text-gray-800 truncate' }, p.name),
                el('div', { className: 'w-full bg-gray-100 rounded-full h-1.5 mt-1 overflow-hidden' },
                  el('div', { className: 'h-1.5 rounded-full bg-brand', style: { width: `${(p.revenue/maxProdRev)*100}%` } })
                )
              ),
              el('div', { className: 'text-right flex-shrink-0' },
                el('p', { className: 'text-sm font-bold text-gray-900' }, fmt(p.revenue)),
                el('p', { className: 'text-xs text-gray-400' }, `${p.qty} sold`)
              )
            ))
          )
    );
    page.append(topProdCard);

    // Top ambassadors
    const ambMap = {};
    orders.filter(o=>o.ambassador).forEach(o=>{
      const id = o.ambassador.id;
      if (!ambMap[id]) ambMap[id] = { code:o.ambassador.code, orders:0, revenue:0, commission:0, rate:Number(o.ambassador.commissionRate||0) };
      ambMap[id].orders++;
      ambMap[id].revenue += Number(o.total||0);
      if (o.status==='DELIVERED') ambMap[id].commission += Number(o.total||0)*ambMap[id].rate;
    });
    const topAmb = Object.values(ambMap).sort((a,b)=>b.revenue-a.revenue).slice(0,6);
    if (topAmb.length > 0) {
      const ambCard = card(
        sectionTitle('Top Ambassadors by Revenue Generated'),
        el('div', { className: 'grid grid-cols-6 text-xs font-bold text-gray-400 pb-2 border-b border-gray-100 mb-1' },
          el('span', { className: 'col-span-2' }, 'Ambassador'),
          el('span', { className: 'text-right' }, 'Orders'),
          el('span', { className: 'col-span-2 text-right' }, 'Revenue'),
          el('span', { className: 'text-right' }, 'Commission')
        ),
        ...topAmb.map(a => el('div', { className: 'grid grid-cols-6 items-center text-sm py-2 border-b border-gray-50 last:border-0' },
          el('span', { className: 'col-span-2 font-bold text-gray-800' }, a.code),
          el('span', { className: 'text-right text-gray-600' }, String(a.orders)),
          el('span', { className: 'col-span-2 text-right font-semibold text-gray-900' }, fmt(a.revenue)),
          el('span', { className: 'text-right text-brand font-bold' }, fmt(a.commission))
        ))
      );
      page.append(ambCard);
    }

    // Customer acquisition
    const custMonths = last6Months();
    const newCustPerMonth = custMonths.map(m=>({ label:m.label, value:customers.filter(c=>monthKey(c.createdAt)===m.key).length }));
    const maxCust = Math.max(...newCustPerMonth.map(m=>m.value), 1);
    page.append(card(sectionTitle('New Customers per Month'), barChart(newCustPerMonth, maxCust)));
  }

  function renderActiveTab() {
    if (activeTab === 'sales')      renderSalesTab();
    else if (activeTab === 'finance')    renderFinanceTab();
    else if (activeTab === 'inventory')  renderInventoryTab();

  renderTabNav();
  renderActiveTab();
  container.append(shell);
}

// ── AI ADVISORY BOARD ─────────────────────────────────────────────────────────
function renderAdminBoard(container) {
  container.innerHTML = '';
  const page = el('div', { className: 'p-6 max-w-4xl mx-auto' });

  const HEALTH_META = {
    STRONG:   { color: '#10B981', bg: '#ECFDF5', label: 'Strong' },
    STABLE:   { color: '#3B82F6', bg: '#EFF6FF', label: 'Stable' },
    AT_RISK:  { color: '#F59E0B', bg: '#FFFBEB', label: 'At Risk' },
    CRITICAL: { color: '#EF4444', bg: '#FEF2F2', label: 'Critical' },
  };
  const PRIORITY_COLOR = { HIGH: '#EF4444', MEDIUM: '#F59E0B', LOW: '#10B981' };
  const SEV_COLOR = { CRITICAL: '#EF4444', HIGH: '#F97316', MEDIUM: '#F59E0B', LOW: '#6B7280' };
  const SENTIMENT_ICON = { POSITIVE: '😊', CAUTIOUS: '🤔', CONCERNED: '😟', CRITICAL: '🚨' };

  // ── Run controls ────────────────────────────────────────────────────────────
  let periodDays = 60;
  let includeDebate = false;
  let running = false;

  const periodSel = el('select', { className: 'border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand' });
  [['7 days', 7], ['30 days', 30], ['60 days', 60], ['90 days', 90]].forEach(([label, val]) => {
    const o = document.createElement('option');
    o.value = String(val); o.textContent = label; if (val === 60) o.selected = true;
    periodSel.append(o);
  });
  periodSel.addEventListener('change', () => { periodDays = Number(periodSel.value); });

  const debateToggle = el('label', { className: 'flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none' },
    (() => { const cb = el('input', { type: 'checkbox', className: 'w-4 h-4 accent-brand' }); cb.addEventListener('change', () => { includeDebate = cb.checked; }); return cb; })(),
    'Include debate round (higher quality, ~2× cost)'
  );

  const runBtn = el('button', { className: 'bg-brand text-white font-black px-5 py-2.5 rounded-xl hover:opacity-90 flex items-center gap-2' },
    el('span', {}, '🤖'), el('span', {}, 'Run Board Meeting')
  );

  const reportArea = el('div', { className: 'mt-6' });

  function badge(text, color) {
    return el('span', { className: 'text-xs font-bold px-2.5 py-1 rounded-full', style: { backgroundColor: color + '20', color } }, text);
  }

  function renderReport(report, meetingId) {
    reportArea.innerHTML = '';
    const v = report.verdict || {};
    const hm = HEALTH_META[v.overallHealth] || HEALTH_META.STABLE;

    // ── Action buttons bar ──────────────────────────────────────────────────
    const actionsBar = el('div', { className: 'flex gap-3 mb-4 flex-wrap' });

    if (meetingId) {
      // PDF download — uses a direct link so the browser handles the download
      const pdfBtn = el('button', {
        className: 'inline-flex items-center gap-1.5 px-4 py-2 bg-white border border-gray-200 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition',
      }, '⬇️ Download PDF');
      // Attach auth token so the server can authenticate the download
      pdfBtn.addEventListener('click', async () => {
        try {
          const res = await fetch(`${API_BASE}/board/meetings/${meetingId}/pdf`, {
            headers: { Authorization: `Bearer ${token()}` },
          });
          if (!res.ok) { alert('Failed to generate PDF'); return; }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `board-report-${new Date().toISOString().slice(0,10)}.pdf`;
          a.click();
          URL.revokeObjectURL(url);
        } catch(e) { alert('Download failed: ' + e.message); }
      });

      // Create tasks button
      const tasksBtn = el('button', {
        className: 'inline-flex items-center gap-1.5 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-xl hover:bg-indigo-700 transition',
      }, '✅ Create Tasks from Recommendations');
      tasksBtn.addEventListener('click', async () => {
        tasksBtn.disabled = true;
        tasksBtn.textContent = 'Creating tasks…';
        try {
          const result = await api.tasks.fromBoard(meetingId);
          tasksBtn.textContent = `✓ ${result.created} tasks created`;
          tasksBtn.className = 'inline-flex items-center gap-1.5 px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-xl cursor-default';
        } catch(err) {
          tasksBtn.disabled = false;
          tasksBtn.textContent = '✅ Create Tasks from Recommendations';
          alert('Failed to create tasks: ' + (err?.message || 'Unknown error'));
        }
      });

      actionsBar.append(pdfBtn, tasksBtn);
    }
    if (actionsBar.children.length) reportArea.append(actionsBar);

    // ── Header verdict card ──────────────────────────────────────────────────
    reportArea.append(
      el('div', { className: 'rounded-2xl p-5 mb-4 border', style: { backgroundColor: hm.bg, borderColor: hm.color + '40' } },
        el('div', { className: 'flex items-center gap-3 mb-2' },
          el('div', { className: 'text-2xl font-black', style: { color: hm.color } }, hm.label),
          el('div', { className: 'text-xs font-bold px-2.5 py-1 rounded-full text-white', style: { backgroundColor: hm.color } }, v.overallHealth || ''),
        ),
        el('p', { className: 'text-gray-700 font-medium text-sm leading-relaxed' }, v.headline || ''),
        el('div', { className: 'flex gap-4 mt-3 flex-wrap' },
          ...Object.entries(v.boardSentiment || {}).map(([key, count]) =>
            el('span', { className: 'text-xs text-gray-500' }, `${SENTIMENT_ICON[key.toUpperCase()] || '•'} ${count} ${key}`)
          )
        ),
        el('div', { className: 'mt-3 text-xs text-gray-400' },
          `Generated ${new Date(report.meta?.generatedAt || Date.now()).toLocaleString('en-ZA')} · ${report.meta?.periodDays || 30}-day window · ${report.meta?.totalAgentCalls || 7} AI calls · Debate: ${report.meta?.debateEnabled ? 'Yes' : 'No'}`
        )
      )
    );

    // ── Key Insights ──────────────────────────────────────────────────────────
    if (report.keyInsights?.length) {
      const section = el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5 mb-4' },
        el('h3', { className: 'font-black text-gray-900 mb-3' }, '💡 Key Insights')
      );
      report.keyInsights.forEach((ins, i) => {
        section.append(
          el('div', { className: 'flex gap-3 py-3 border-b border-gray-50 last:border-0' },
            el('div', { className: 'w-6 h-6 rounded-full bg-brand/10 text-brand text-xs font-black flex items-center justify-center flex-shrink-0 mt-0.5' }, String(i + 1)),
            el('div', {},
              el('p', { className: 'text-sm text-gray-800 leading-snug' }, ins.insight),
              el('div', { className: 'flex gap-2 mt-1.5' },
                el('span', { className: 'text-xs text-gray-400' }, ins.source?.replace(/_/g, ' ')),
                ins.dataRef ? el('span', { className: 'text-xs font-mono bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded' }, ins.dataRef) : null,
              )
            )
          )
        );
      });
      reportArea.append(section);
    }

    // ── Recommended Actions ───────────────────────────────────────────────────
    if (report.recommendedActions?.length) {
      const section = el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5 mb-4' },
        el('h3', { className: 'font-black text-gray-900 mb-3' }, '✅ Recommended Actions')
      );
      report.recommendedActions.forEach((act, i) => {
        const pc = PRIORITY_COLOR[act.priority] || '#6B7280';
        section.append(
          el('div', { className: 'flex gap-3 py-3 border-b border-gray-50 last:border-0' },
            el('div', { className: 'text-lg font-black flex-shrink-0 mt-0.5 w-7 text-center' },
              act.priority === 'HIGH' ? '🔴' : act.priority === 'MEDIUM' ? '🟡' : '🟢'
            ),
            el('div', { className: 'flex-1 min-w-0' },
              el('p', { className: 'text-sm font-semibold text-gray-900 leading-snug' }, act.action),
              el('p', { className: 'text-xs text-gray-500 mt-1' }, act.expectedImpact),
              el('div', { className: 'flex gap-2 mt-2 flex-wrap' },
                badge(act.priority, pc),
                badge(act.timeframe?.replace(/_/g, ' '), '#6366F1'),
                el('span', { className: 'text-xs text-gray-400' }, `Owner: ${act.owner}`),
                act.advisorConsensus === 'agreed'
                  ? el('span', { className: 'text-xs text-emerald-600 font-bold' }, '✓ Board agreed')
                  : el('span', { className: 'text-xs text-amber-600 font-bold' }, '~ Mixed views'),
              )
            )
          )
        );
      });
      reportArea.append(section);
    }

    // ── Risk Warnings + Growth Opportunities side by side ────────────────────
    const twoCol = el('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4 mb-4' });

    if (report.riskWarnings?.length) {
      const section = el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5' },
        el('h3', { className: 'font-black text-gray-900 mb-3' }, '⚠️ Risk Warnings')
      );
      report.riskWarnings.forEach(r => {
        const sc = SEV_COLOR[r.severity] || '#6B7280';
        section.append(
          el('div', { className: 'py-3 border-b border-gray-50 last:border-0' },
            el('div', { className: 'flex items-start gap-2 mb-1' },
              badge(r.severity, sc),
              el('p', { className: 'text-sm font-semibold text-gray-800 leading-snug' }, r.risk)
            ),
            el('p', { className: 'text-xs text-gray-500 mt-1' }, '→ ' + r.mitigation)
          )
        );
      });
      twoCol.append(section);
    }

    if (report.growthOpportunities?.length) {
      const section = el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5' },
        el('h3', { className: 'font-black text-gray-900 mb-3' }, '🚀 Growth Opportunities')
      );
      report.growthOpportunities.forEach(o => {
        section.append(
          el('div', { className: 'py-3 border-b border-gray-50 last:border-0' },
            el('p', { className: 'text-sm font-semibold text-gray-800 leading-snug mb-1' }, o.opportunity),
            el('p', { className: 'text-xs text-emerald-600 font-bold' }, o.potentialValue),
            el('div', { className: 'flex gap-2 mt-1.5' },
              badge(o.effort + ' effort', '#6366F1'),
              el('span', { className: 'text-xs text-gray-400' }, o.timeframe)
            )
          )
        );
      });
      twoCol.append(section);
    }
    if (twoCol.children.length) reportArea.append(twoCol);

    // ── Advisor Highlights ────────────────────────────────────────────────────
    if (report.advisorHighlights?.length) {
      const section = el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5 mb-4' },
        el('h3', { className: 'font-black text-gray-900 mb-3' }, '🧠 Advisor Highlights')
      );
      const grid = el('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-3' });
      report.advisorHighlights.forEach(adv => {
        const icon = SENTIMENT_ICON[adv.sentiment?.toUpperCase()] || '💬';
        grid.append(
          el('div', { className: 'bg-gray-50 rounded-xl p-3' },
            el('div', { className: 'flex items-center gap-2 mb-1' },
              el('span', { className: 'text-base' }, icon),
              el('span', { className: 'text-xs font-black text-gray-500 uppercase tracking-wide' }, adv.role?.replace(/_/g, ' '))
            ),
            el('p', { className: 'text-sm text-gray-700 leading-snug' }, adv.headline)
          )
        );
      });
      section.append(grid);
      reportArea.append(section);
    }

    // ── Next meeting focus ────────────────────────────────────────────────────
    if (report.nextMeetingFocus?.length) {
      reportArea.append(
        el('div', { className: 'bg-indigo-50 rounded-2xl border border-indigo-100 p-5' },
          el('h3', { className: 'font-black text-indigo-900 mb-2' }, '📅 Next Meeting Focus'),
          el('ul', { className: 'space-y-1.5' },
            ...report.nextMeetingFocus.map(item =>
              el('li', { className: 'flex items-start gap-2 text-sm text-indigo-800' },
                el('span', { className: 'text-indigo-400 mt-0.5 flex-shrink-0' }, '→'),
                el('span', {}, item)
              )
            )
          )
        )
      );
    }
  }

  function renderHistory(meetings) {
    reportArea.innerHTML = '';
    if (!meetings.length) {
      reportArea.append(el('p', { className: 'text-sm text-gray-400 text-center py-8' }, 'No board meetings yet. Run your first one above.'));
      return;
    }
    meetings.forEach(m => {
      const r = m.reportJson || {};
      const v = r.verdict || {};
      const hm = HEALTH_META[v.overallHealth] || HEALTH_META.STABLE;
      const card = el('div', { className: 'bg-white rounded-xl border border-gray-100 p-4 mb-3 cursor-pointer hover:shadow-md transition-shadow' });
      card.append(
        el('div', { className: 'flex items-center gap-3' },
          el('div', { className: 'text-xs font-black px-2.5 py-1 rounded-full', style: { backgroundColor: hm.bg, color: hm.color } }, hm.label),
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'text-sm font-semibold text-gray-900 truncate' }, v.headline || 'Board Meeting'),
            el('p', { className: 'text-xs text-gray-400' }, `${new Date(m.createdAt).toLocaleString('en-ZA')} · ${m.periodDays}-day window`)
          )
        )
      );
      card.addEventListener('click', () => renderReport(r, m.id));
      reportArea.append(card);
    });
  }

  runBtn.addEventListener('click', async () => {
    if (running) return;
    running = true;
    runBtn.disabled = true;
    runBtn.innerHTML = '<span class="animate-spin inline-block">⚙️</span> <span>Convening board… this takes ~20s</span>';
    reportArea.innerHTML = '';
    reportArea.append(
      el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-8 text-center' },
        el('div', { className: 'text-4xl mb-3 animate-bounce' }, '🤖'),
        el('p', { className: 'font-bold text-gray-700 mb-1' }, 'AI board meeting in progress'),
        el('p', { className: 'text-sm text-gray-400' }, '6 advisors are analysing your business data in parallel…')
      )
    );
    try {
      // Start the meeting — returns immediately with an ID
      const { id } = await api.board.run(periodDays, includeDebate);

      // Poll every 4 seconds until COMPLETED or FAILED
      let dots = 0;
      const messages = [
        '6 advisors are analysing your business data…',
        'CEO & CFO advisors processing…',
        'Marketing & Operations advisors processing…',
        'Risk & Customer advisors processing…',
        'Synthesising board report…',
        'Almost done…',
      ];
      const statusEl = reportArea.querySelector('p:last-child');
      const pollInterval = setInterval(async () => {
        dots++;
        if (statusEl) statusEl.textContent = messages[Math.min(dots - 1, messages.length - 1)];
        try {
          const meeting = await api.board.getById(id);
          if (meeting.status === 'COMPLETED') {
            clearInterval(pollInterval);
            running = false;
            runBtn.disabled = false;
            runBtn.innerHTML = '🤖 Run Board Meeting';
            renderReport(meeting.reportJson, id);
          } else if (meeting.status === 'FAILED') {
            clearInterval(pollInterval);
            running = false;
            runBtn.disabled = false;
            runBtn.innerHTML = '🤖 Run Board Meeting';
            reportArea.innerHTML = '';
            reportArea.append(el('div', { className: 'bg-red-50 rounded-xl p-4 text-red-600 text-sm font-medium' },
              '⚠️ Board meeting failed: ' + (meeting.errorMessage || 'Unknown error. Check that ANTHROPIC_API_KEY is set correctly.')
            ));
          }
        } catch(e) { /* keep polling */ }
      }, 4000);
    } catch(err) {
      running = false;
      runBtn.disabled = false;
      runBtn.innerHTML = '🤖 Run Board Meeting';
      reportArea.innerHTML = '';
      reportArea.append(el('div', { className: 'bg-red-50 rounded-xl p-4 text-red-600 text-sm' }, err?.message || 'Failed to start board meeting.'));
    }
  });

  // Load history on mount
  api.board.history().then(meetings => renderHistory(meetings)).catch(() => {});

  page.append(
    el('div', { className: 'bg-white rounded-2xl border border-gray-100 p-5 mb-5' },
      el('div', { className: 'flex items-start gap-4 flex-wrap' },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'text-sm text-gray-600 leading-relaxed' },
            'Run a virtual board meeting powered by 6 AI advisors (CEO, CFO, Marketing, Operations, Risk, Customer). Each advisor independently analyses your business data, then a synthesiser produces a unified report with actionable recommendations.'
          )
        )
      ),
      el('div', { className: 'flex items-center gap-3 mt-4 flex-wrap' },
        el('div', { className: 'flex items-center gap-2' },
          el('label', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide' }, 'Analysis period'),
          periodSel
        ),
        debateToggle,
        runBtn,
        el('button', { className: 'text-xs text-gray-400 hover:text-indigo-600 underline', onClick: async () => {
          try {
            const result = await req('GET', `/board/snapshot?periodDays=${periodDays}`);
            const snap = result.snapshot;
            const dbg  = result.debug;
            const txt = [
              `DB totals: ${dbg.totalOrdersInDb} orders, ${dbg.totalTransactionsInDb} transactions, ${dbg.totalStockItemsInDb} stock items, ${dbg.totalProductionRunsInDb} production runs`,
              `Snapshot (${dbg.periodDays}-day window):`,
              `  Revenue: R${snap.sales?.totalRevenue} from ${snap.sales?.totalOrders} orders`,
              `  Finance income: R${snap.finance?.totalIncome} | expenses: R${snap.finance?.totalExpenses}`,
              `  Top products: ${snap.sales?.topProducts?.map(p => p.name + ' R' + p.revenue).join(', ') || 'none'}`,
              `  Production runs: ${snap.production?.runsCompleted} completed`,
              `  Customers: ${snap.customers?.totalActiveCustomers}`,
              `  Low stock items: ${snap.inventory?.lowStockItems?.length}`,
            ].join('\n');
            alert(txt);
          } catch(e) { alert('Snapshot error: ' + e.message); }
        }}, 'Check data snapshot')
      )
    ),
    reportArea
  );
  container.append(page);
}

// ── EMPLOYEES MODULE ──────────────────────────────────────────────────────────

    activeTab = id;

  // ── EMPLOYEE FORM MODAL ───────────────────────────────────────────────────
  function showEmployeeModal(emp, onDone) {
    const isEdit = !!emp;
    const fields = [
      { key: 'firstName',      label: 'First Name',    type: 'text',   required: !isEdit },
      { key: 'lastName',       label: 'Last Name',     type: 'text',   required: !isEdit },
      { key: 'email',          label: 'Email',         type: 'email',  required: !isEdit },
      { key: 'phone',          label: 'Phone',         type: 'text' },
      { key: 'password',       label: 'Password',      type: 'password', required: !isEdit, hidden: isEdit },
      { key: 'jobTitle',       label: 'Job Title',     type: 'text',   required: true },
      { key: 'department',     label: 'Department',    type: 'text' },
      { key: 'employmentType', label: 'Employment Type', type: 'select', options: ['FULL_TIME','PART_TIME','CONTRACT','CASUAL'] },
      { key: 'startDate',      label: 'Start Date',    type: 'date',   required: !isEdit },
      { key: 'hourlyRate',     label: 'Hourly Rate (R)', type: 'number' },
      { key: 'monthlyRate',    label: 'Monthly Rate (R)', type: 'number' },
      { key: 'bio',            label: 'Bio',           type: 'textarea' },
      { key: 'bankName',       label: 'Bank Name',     type: 'text' },
      { key: 'bankAccount',    label: 'Bank Account No.', type: 'text' },
      { key: 'bankBranch',     label: 'Branch Code',   type: 'text' },
      { key: 'notes',          label: 'Notes',         type: 'textarea' },
    ].filter(f => !f.hidden);

    const inputs = {};
    const form = el('div', { className: 'space-y-4' });

    fields.forEach(f => {
      const wrap = el('div');
      const lbl  = el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, f.label + (f.required ? ' *' : ''));
      let inp;
      if (f.type === 'select') {
        inp = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm' });
        f.options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o.replace('_', ' '); inp.append(opt); });
        if (emp?.[f.key]) inp.value = emp[f.key];
      } else if (f.type === 'textarea') {
        inp = el('textarea', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm', rows: 3 });
        if (emp?.[f.key]) inp.value = emp[f.key] || '';
      } else {
        inp = el('input', { type: f.type, className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm' });
        if (emp?.[f.key] !== undefined) {
          if (f.type === 'date') inp.value = emp[f.key] ? emp[f.key].split('T')[0] : '';
          else inp.value = emp[f.key] || '';
        }
      }
      inputs[f.key] = inp;
      wrap.append(lbl, inp);
      form.append(wrap);
    });

    const footer = el('div', { className: 'flex gap-2 justify-end' },
      el('button', { className: 'btn-secondary', onClick: closeModal }, 'Cancel'),
      el('button', { className: 'btn-primary', onClick: async () => {

        fields.forEach(f => { const v = inputs[f.key]?.value; if (v) data[f.key] = f.type === 'number' ? Number(v) : v; });
        try {
          if (isEdit) await api.employees.update(emp.id, data);
          else        await api.employees.create(data);
          closeModal(); onDone(); toast(isEdit ? 'Employee updated' : 'Employee added', 'success');
        } catch(e) { toast(e.message, 'error'); }
      }}, isEdit ? 'Save' : 'Add Employee')
    );

    openModal({ title: isEdit ? 'Edit Employee' : 'Add Employee', body: form, footer });
  }

        inp = el('input', { type: f.type, className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm' });

  // ── SCHEDULE TAB ──────────────────────────────────────────────────────────
  async function renderScheduleTab() {
    content.innerHTML = '<div class="text-gray-400 text-sm">Loading...</div>';
    let shifts = [], employees = [];
    try { [shifts, employees] = await Promise.all([api.employees.listShifts(), api.employees.list({ status: 'ACTIVE' })]); }
    catch(e) { content.innerHTML = `<p class="text-red-500 text-sm">Failed to load: ${e.message}</p>`; return; }

    content.innerHTML = '';

    // Week navigation
    const today = new Date();
    let weekStart = new Date(today);
    weekStart.setDate(today.getDate() - today.getDay() + 1); // Monday

    const weekLabel = el('span', { className: 'font-medium text-gray-700 text-sm' });
    const prevBtn = el('button', { className: 'p-1.5 rounded hover:bg-gray-100 text-gray-500', onClick: () => { weekStart.setDate(weekStart.getDate() - 7); loadSchedule(); }}, '←');
    const nextBtn = el('button', { className: 'p-1.5 rounded hover:bg-gray-100 text-gray-500', onClick: () => { weekStart.setDate(weekStart.getDate() + 7); loadSchedule(); }}, '→');

    const controls = el('div', { className: 'flex items-center justify-between mb-4' },
      el('div', { className: 'flex items-center gap-2' }, prevBtn, weekLabel, nextBtn),
      el('div', { className: 'flex gap-2' },
        el('button', { className: 'btn-secondary text-sm px-3 py-1.5', onClick: () => showShiftTemplatesModal(shifts, () => renderScheduleTab()) }, 'Manage Shifts'),
        employees.length > 0 && shifts.length > 0
          ? el('button', { className: 'btn-primary text-sm px-3 py-1.5', onClick: () => showAssignModal(employees, shifts, () => loadSchedule()) }, '+ Assign Shift')
          : null
      )
    );
    content.append(controls);

    const scheduleWrap = el('div');
    content.append(scheduleWrap);

    async function loadSchedule() {
      const ws = new Date(weekStart);
      const we = new Date(weekStart); we.setDate(ws.getDate() + 6);
      const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate() + i); return d; });
      weekLabel.textContent = `${ws.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short' })} – ${we.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' })}`;

      let assignments = [];
      try { assignments = await api.employees.getSchedule({ from: ws.toISOString().split('T')[0], to: we.toISOString().split('T')[0] }); }
      catch(e) { /* no data */ }

      const STATUS_COLOURS = { SCHEDULED: 'bg-blue-100 text-blue-700', COMPLETED: 'bg-green-100 text-green-700', ABSENT: 'bg-red-100 text-red-600', LATE: 'bg-amber-100 text-amber-700', CANCELLED: 'bg-gray-100 text-gray-500' };
      scheduleWrap.innerHTML = '';

      if (!employees.length) { scheduleWrap.append(el('p', { className: 'text-gray-400 text-sm text-center py-8' }, 'No active employees.')); return; }

      const table = el('div', { className: 'overflow-x-auto' });
      const grid = el('div', { className: 'min-w-max' });

      // Header row
      const header = el('div', { className: 'flex gap-2 mb-2' },
        el('div', { className: 'w-36 text-xs font-medium text-gray-400 uppercase tracking-wide' }, 'Employee'),
        ...days.map(d => el('div', { className: 'w-28 text-center text-xs font-medium text-gray-500' }, d.toLocaleDateString('en-ZA', { weekday: 'short', day: 'numeric' })))
      );
      grid.append(header);

      employees.forEach(emp => {
        const name = `${emp.user?.firstName || ''} ${emp.user?.lastName || ''}`.trim();
        const row = el('div', { className: 'flex gap-2 mb-2 items-center' },
          el('div', { className: 'w-36 text-sm font-medium text-gray-700 truncate' }, name)
        );
        days.forEach(day => {
          const dateStr = day.toISOString().split('T')[0];
          const asgn = assignments.find(a => a.employeeId === emp.id && a.date?.startsWith(dateStr));
          const cell = el('div', { className: 'w-28 h-14 rounded-lg border border-gray-100 flex flex-col items-center justify-center text-xs cursor-pointer ' + (asgn ? '' : 'bg-gray-50 hover:bg-gray-100 text-gray-300') });
          if (asgn) {
            const sc = STATUS_COLOURS[asgn.status] || 'bg-gray-100 text-gray-600';
            cell.className = `w-28 h-14 rounded-lg border flex flex-col items-center justify-center text-xs cursor-pointer ${sc} border-transparent`;
            cell.append(
              el('div', { className: 'font-medium' }, asgn.shift?.name || '—'),
              el('div', { className: 'text-xs opacity-70' }, `${asgn.shift?.startTime || ''}–${asgn.shift?.endTime || ''}`),
              el('div', { className: 'text-xs opacity-60' }, asgn.status),
            );
            cell.onclick = () => showAssignmentModal(asgn, () => loadSchedule());
          } else {
            cell.textContent = '+';
            cell.onclick = () => showAssignModal(employees, shifts, () => loadSchedule(), emp.id, dateStr);
          }
          row.append(cell);
        });
        grid.append(row);
      });

      table.append(grid);
      scheduleWrap.append(table);
    }

    loadSchedule();
  }

  function showShiftTemplatesModal(shifts, onDone) {
    const list = el('div', { className: 'space-y-2 mb-4' });
    const form = el('div', { className: 'border-t border-gray-100 pt-4 space-y-3' },
      el('h4', { className: 'text-sm font-medium text-gray-700' }, 'Add New Shift'),
      el('div', { className: 'flex gap-2' },
        ...[['Name', 'text', 'shiftName', ''], ['Start', 'time', 'shiftStart', ''], ['End', 'time', 'shiftEnd', ''], ['Break (min)', 'number', 'shiftBreak', '30']].map(([lbl, type, id, def]) => {
          const wrap = el('div', { className: 'flex-1' },
            el('label', { className: 'text-xs text-gray-500 block mb-1' }, lbl),
            el('input', { type, id, value: def, className: 'w-full border border-gray-200 rounded px-2 py-1 text-sm' })
          );
          return wrap;
        })
      ),
      el('button', { className: 'btn-primary text-sm px-3 py-1.5', onClick: async () => {
        const name = document.getElementById('shiftName').value;
        const start = document.getElementById('shiftStart').value;

        const breakMins = Number(document.getElementById('shiftBreak').value) || 30;

      }}, 'Add Shift')
    );

    shifts.forEach(s => {

        el('span', { className: 'font-medium' }, `${s.name} — ${s.startTime}–${s.endTime} (${s.breakMins}min break)`),
        el('button', { className: 'text-xs text-red-400 hover:text-red-600', onClick: async () => {

  function showAssignModal(employees, shifts, onDone, preEmpId, preDate) {
    const empSel = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm' });
    employees.forEach(e => { const o = document.createElement('option'); o.value = e.id; o.textContent = `${e.user?.firstName} ${e.user?.lastName}`; empSel.append(o); });

    const body = el('div', { className: 'space-y-4' },
      el('div', {}, el('label', { className: 'block text-sm font-medium text-gray-700 mb-1' }, 'Employee'), empSel),
