  const addBtn = el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showRecipeForm(null, () => reload()) }, '+ New Recipe');
  toolbar.append(searchBox, addBtn);
  page.append(toolbar);

  const tableWrap = el('div', {});
  page.append(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';
    const q = searchQ.toLowerCase();
    const filtered = recipes.filter(r => !q || r.name.toLowerCase().includes(q));

    if (!filtered.length) {
      tableWrap.append(el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '📋'), el('p', { className: 'font-bold text-gray-700' }, 'No recipes yet')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    filtered.forEach(recipe => {
      const isExp = expandedId === recipe.id;
      const row = el('div', { className: 'border-b border-gray-50 last:border-0' });
      const mainRow = el('div', {
        className: 'flex items-center gap-4 px-5 py-4 hover:bg-gray-50 cursor-pointer',
        onClick: () => { expandedId = isExp ? null : recipe.id; renderTable(); },
      },
        el('div', { className: 'flex-1 min-w-0' },
          el('p', { className: 'font-bold text-gray-900' }, recipe.name),
          el('p', { className: 'text-xs text-gray-400 mt-0.5' }, `Yields: ${Number(recipe.yieldQty).toFixed(3)} ${recipe.yieldUnit} · ${(recipe.ingredients||[]).length} ingredient(s)`),
        ),
        recipe.isActive
          ? el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700' }, 'Active')
          : el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-500' }, 'Inactive'),
        el('span', { className: 'text-gray-400 text-xs' }, isExp ? '▲' : '▼'),
      );
      row.append(mainRow);

      if (isExp) {
        const panel = el('div', { className: 'px-5 pb-5 pt-2 bg-gray-50 border-t border-gray-100' });
        if (recipe.notes) panel.append(el('p', { className: 'text-xs text-gray-500 italic mb-3 bg-yellow-50 border border-yellow-100 rounded-lg px-3 py-2' }, recipe.notes));

        // ── Ingredient list with cost ──────────────────────────────────────────
        let costPerBatch = 0;
        if (recipe.ingredients?.length) {
          const ingTable = el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100 mb-3' });
          ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2 bg-gray-50 text-xs font-bold text-gray-400 uppercase tracking-wide' },
            el('div', { className: 'col-span-4' }, 'Ingredient'),
            el('div', { className: 'col-span-2 text-right' }, 'Qty / batch'),
            el('div', { className: 'col-span-2 text-right' }, 'In Stock'),
            el('div', { className: 'col-span-2 text-right' }, 'Cost'),
            el('div', { className: 'col-span-2 text-right' }, 'Status'),
          ));
          recipe.ingredients.forEach(ing => {
            const needed  = Number(ing.quantity);
            const inStock = Number(ing.stockItem?.currentStock ?? 0);
            const cost    = needed * Number(ing.stockItem?.costPerUnit ?? 0);
            costPerBatch += cost;
            const sufficient = inStock >= needed;
            const uom = ing.stockItem?.uom?.abbreviation || ing.stockItem?.unit || ing.unit || '';
            ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2.5 border-t border-gray-50 items-center' },
              el('div', { className: 'col-span-4 font-semibold text-sm text-gray-800 truncate' }, ing.stockItem?.name || ing.stockItemId),
              el('div', { className: 'col-span-2 text-right text-sm text-gray-600' }, `${needed % 1 === 0 ? needed : needed.toFixed(3)} ${uom}`),
              el('div', { className: 'col-span-2 text-right text-sm text-gray-400' }, `${Number(inStock).toFixed(2)} ${uom}`),
              el('div', { className: 'col-span-2 text-right text-xs font-semibold text-gray-600' }, cost > 0 ? `R${cost.toFixed(2)}` : '—'),
              el('div', { className: 'col-span-2 text-right' },
                el('span', { className: `text-xs font-bold px-1.5 py-0.5 rounded-full ${sufficient ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}` }, sufficient ? '✓ OK' : '✗ Low')
              ),
            ));
          });
          // Cost summary row
          const yieldQty = Number(recipe.yieldQty) || 1;
          const costPerUnit = costPerBatch / yieldQty;
          ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2.5 border-t-2 border-gray-200 bg-gray-50 items-center' },
            el('div', { className: 'col-span-6 text-xs font-black text-gray-500 uppercase tracking-wide' }, `Cost per batch (${yieldQty} ${recipe.yieldUnit})`),
            el('div', { className: 'col-span-4 text-right' }),
            el('div', { className: 'col-span-2 text-right font-black text-brand' }, `R${costPerBatch.toFixed(2)}`),
          ));
          if (yieldQty > 1) {
            ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-1.5 bg-gray-50 items-center border-t border-gray-100' },
              el('div', { className: 'col-span-8 text-xs text-gray-400' }, `Cost per ${recipe.yieldUnit}`),
              el('div', { className: 'col-span-4 text-right text-xs font-bold text-gray-600' }, `R${costPerUnit.toFixed(2)}`),
            ));
          }
          panel.append(ingTable);
        } else {
          panel.append(el('p', { className: 'text-xs text-gray-400 italic mb-3 bg-white border border-gray-100 rounded-lg px-3 py-3 text-center' }, 'No ingredients defined yet — click Edit Ingredients to add.'));
        }

        // ── Instructions ──────────────────────────────────────────────────────
        if (recipe.instructions) {
          panel.append(
            el('div', { className: 'bg-white rounded-xl border border-gray-100 p-4 mb-3' },
              el('p', { className: 'text-xs font-bold text-gray-400 uppercase tracking-wide mb-2' }, '📋 Instructions'),
              el('pre', { className: 'text-sm text-gray-700 whitespace-pre-wrap font-sans leading-relaxed' }, recipe.instructions)
            )
          );
        }

        panel.append(el('div', { className: 'flex gap-2 flex-wrap' },
          el('button', { className: 'text-sm font-bold bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-200', onClick: () => showRecipeForm(recipe, () => reload()) }, '✏️ Edit Recipe'),
          el('button', { className: 'text-sm font-bold bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg hover:bg-purple-200', onClick: () => showIngredientsForm(recipe, () => reload()) }, '🧪 Edit Ingredients'),
          el('button', { className: `text-sm font-bold px-3 py-1.5 rounded-lg ${recipe.isActive ? 'bg-gray-100 text-gray-600 hover:bg-gray-200' : 'bg-green-100 text-green-700 hover:bg-green-200'}`, onClick: async () => { try { await api.recipes.update(recipe.id, { isActive: !recipe.isActive }); reload(); } catch(e) { toast(e?.message||'Failed','error'); } } }, recipe.isActive ? 'Archive' : 'Restore'),
        ));
        row.append(panel);
      }
      table.append(row);
    });
    tableWrap.append(table);
  }

  function showRecipeForm(recipe, onDone) {
    const isEdit = !!recipe;
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);

    const inp = (type, ph, val, extra='') => el('input', { type, placeholder: ph, value: val??'', className: `w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3 ${extra}` });
    const lbl = txt => el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-1' }, txt);

    const nameInp      = inp('text',   'Recipe name *',                    recipe?.name);
    const yieldQty     = inp('number', 'Yield quantity per batch',         recipe?.yieldQty ?? '1');
    yieldQty.step = '0.001';
    const yieldUnt     = inp('text',   'Yield unit (e.g. loaves, pcs)',    recipe?.yieldUnit ?? 'batch');
    const notesInp     = el('textarea', { placeholder: 'Internal notes (allergens, tips, storage…)', rows: 2, className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3 resize-none' });
    if (recipe?.notes) notesInp.value = recipe.notes;
    const instrInp     = el('textarea', { placeholder: 'Step-by-step preparation instructions…\n\n1. Preheat oven to 180°C\n2. Mix dry ingredients…', rows: 6, className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3 resize-none font-mono text-xs' });
    if (recipe?.instructions) instrInp.value = recipe.instructions;

    // Output product selector
    const sellableProducts = products.filter(p => p.classification === 'SELLABLE' && p.isActive);
    const outputProdSel = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    [{ id: '', name: '— Output Product (optional) —' }, ...sellableProducts].forEach(p => {
      const o = document.createElement('option'); o.value = p.id; o.textContent = p.name;
      if (recipe?.outputProductId === p.id) o.selected = true;
      outputProdSel.append(o);
    });
    const yieldPerBatch = inp('number', 'Sellable units produced per batch', recipe?.yieldPerBatch ?? '0');
    yieldPerBatch.step = '0.001'; yieldPerBatch.min = '0';

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!nameInp.value.trim()) { toast('Name required', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        const payload = {
          name: nameInp.value.trim(),
          yieldQty: parseFloat(yieldQty.value)||1,
          yieldUnit: yieldUnt.value.trim()||'batch',
          outputProductId: outputProdSel.value || undefined,
          yieldPerBatch: parseFloat(yieldPerBatch.value)||0,
          notes: notesInp.value.trim()||undefined,
          instructions: instrInp.value.trim()||undefined,
        };
        try {
          if (isEdit) await api.recipes.update(recipe.id, payload); else await api.recipes.create(payload);
          toast(isEdit ? 'Recipe updated' : 'Recipe created', 'success'); close(); onDone();
        } catch(err) { toast(err?.message||'Failed','error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save Recipe');

    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-4' },
        el('h3', { className: 'font-black text-gray-900 text-lg' }, isEdit ? 'Edit Recipe' : 'New Recipe'),
        el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')
      ),
      lbl('Recipe Details'),
      nameInp,
      el('div', { className: 'grid grid-cols-2 gap-3' }, yieldQty, yieldUnt),
      notesInp,
      lbl('Instructions / Method'),
      instrInp,
      lbl('Packaging Output (links recipe to inventory)'),
      outputProdSel, yieldPerBatch,
      saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  function showIngredientsForm(recipe, onDone) {
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const lineItems = recipe.ingredients?.map(i => ({ stockItemId: i.stockItemId, quantity: String(i.quantity), unit: i.unit, notes: i.notes || '' })) || [];

    const linesDiv = el('div', { className: 'space-y-2 mb-4 max-h-64 overflow-y-auto' });
    function renderLines() {
      linesDiv.innerHTML = '';
      lineItems.forEach((item, idx) => {
        const stockSel = el('select', { className: 'flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
        stockItems.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = `${s.name} (${s.uom?.abbreviation || s.unit || ''})`; if (s.id === item.stockItemId) o.selected = true; stockSel.append(o); });
        const qtyInp  = el('input', { type: 'number', step: '0.001', placeholder: 'Qty', value: item.quantity, className: 'w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-2 focus:ring-brand' });
        qtyInp.addEventListener('input', () => { lineItems[idx].quantity = qtyInp.value; });
        const unitInp = el('input', { type: 'text', placeholder: 'Unit', readOnly: true, value: item.unit, className: 'w-16 border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-gray-50 text-gray-500 cursor-default' });
        stockSel.addEventListener('change', () => {
          lineItems[idx].stockItemId = stockSel.value;
          const found = stockItems.find(s => s.id === stockSel.value);
          const uom = found?.uom?.abbreviation || found?.unit || '';
          unitInp.value = uom;
          lineItems[idx].unit = uom;
        });
        const delBtn  = el('button', { className: 'text-red-400 hover:text-red-600 font-bold', onClick: () => { lineItems.splice(idx, 1); renderLines(); } }, '×');
        linesDiv.append(el('div', { className: 'flex gap-2 items-center' }, stockSel, qtyInp, unitInp, delBtn));
      });
    }
    renderLines();

    const addLineBtn = el('button', { className: 'text-xs font-bold text-brand mb-4 hover:opacity-80', onClick: () => {
      const firstStock = stockItems[0];
      lineItems.push({ stockItemId: firstStock?.id || '', quantity: '', unit: firstStock?.uom?.abbreviation || firstStock?.unit || '', notes: '' });
      renderLines();
    }}, '+ Add Ingredient');

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        const valid = lineItems.filter(l => l.stockItemId && l.quantity);
        if (!valid.length) { toast('Add at least one ingredient', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          await api.recipes.setIngredients(recipe.id, { ingredients: valid.map(l => ({ stockItemId: l.stockItemId, quantity: parseFloat(l.quantity), unit: l.unit || undefined })) });
          toast('Ingredients saved', 'success'); close(); onDone();
        } catch(err) { toast(err?.message||'Failed','error'); saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      }
    }, 'Save Ingredients');

    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl max-h-[90vh] overflow-y-auto' },
      el('div', { className: 'flex items-center justify-between mb-4' }, el('h3', { className: 'font-black text-gray-900' }, `Ingredients: ${recipe.name}`), el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')),
      linesDiv, addLineBtn, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  renderTable();
  container.append(page);
}

// ── PRODUCTION MANAGEMENT ─────────────────────────────────────────────────────
function renderAdminProduction(data, container, reload) {
  const { productionRuns = [], recipes = [], stockItems = [] } = data;
  let expandedId = null;

  const PROD_META = {
    PLANNED:     { label: 'Planned',     color: '#9CA3AF', bg: '#F3F4F6', icon: '📅' },
    IN_PROGRESS: { label: 'In Progress', color: '#3B82F6', bg: '#EFF6FF', icon: '⚙️' },
    COMPLETED:   { label: 'Completed',   color: '#10B981', bg: '#ECFDF5', icon: '✅' },
    CANCELLED:   { label: 'Cancelled',   color: '#EF4444', bg: '#FEF2F2', icon: '🚫' },
  };

  const page = el('div', { className: 'p-6 max-w-5xl mx-auto' });

  // ── CHIPS ──────────────────────────────────────────────────────────────────
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5' });
  [
    { label: 'Total Runs',   val: productionRuns.length,                                        color: '#3B82F6' },
    { label: 'Planned',      val: productionRuns.filter(r => r.status === 'PLANNED').length,     color: '#9CA3AF' },
    { label: 'In Progress',  val: productionRuns.filter(r => r.status === 'IN_PROGRESS').length, color: '#F59E0B' },
    { label: 'Completed',    val: productionRuns.filter(r => r.status === 'COMPLETED').length,   color: '#10B981' },
  ].forEach(c => chipsRow.append(
    el('div', { className: 'bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3' },
      el('div', { className: 'w-10 h-10 rounded-xl flex items-center justify-center text-white font-black text-lg flex-shrink-0', style: { backgroundColor: c.color } }, String(c.val)),
      el('p', { className: 'text-sm font-semibold text-gray-600 leading-tight' }, c.label)
    )
  ));
  page.append(chipsRow);

  // ── TOOLBAR ────────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex items-center gap-3 mb-4' });
  toolbar.append(
    el('p', { className: 'text-sm text-gray-500 flex-1' }, `${productionRuns.length} run(s)`),
    el('button', { className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-xl hover:opacity-90', onClick: () => showNewRunForm(() => reload()) }, '+ New Production Run'),
  );
  page.append(toolbar);

  const tableWrap = el('div', {});
  page.append(tableWrap);

  function renderTable() {
    tableWrap.innerHTML = '';
    if (!productionRuns.length) {
      tableWrap.append(el('div', { className: 'bg-white rounded-xl p-12 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '🏭'), el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No production runs yet'),
        el('p', { className: 'text-sm text-gray-400' }, 'Create a run to start tracking production')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden' });
    table.append(el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider' },
      el('div', { className: 'col-span-4' }, 'Recipe'),
      el('div', { className: 'col-span-2 text-center' }, 'Batches'),
      el('div', { className: 'col-span-2' }, 'Status'),
      el('div', { className: 'col-span-2 text-center' }, 'Planned Date'),
      el('div', { className: 'col-span-2' }, 'Actions'),
    ));

    productionRuns.forEach(run => {
      const isExp = expandedId === run.id;
      const meta  = PROD_META[run.status] || { label: run.status, color: '#9CA3AF', bg: '#F3F4F6', icon: '' };
      const row   = el('div', { className: 'border-b border-gray-50 last:border-0' });

      const mainRow = el('div', { className: 'grid grid-cols-12 gap-2 px-4 py-3 items-center hover:bg-gray-50' },
        el('div', { className: 'col-span-4 cursor-pointer', onClick: () => { expandedId = isExp ? null : run.id; renderTable(); } },
          el('p', { className: 'font-bold text-gray-900 text-sm' }, run.recipe?.name || run.recipeId),
          el('p', { className: 'text-xs text-gray-400' }, `${Number(run.batches)} batch(es) · yields ${(Number(run.batches) * Number(run.recipe?.yieldQty || 1)).toFixed(2)} ${run.recipe?.yieldUnit || ''}`),
        ),
        el('div', { className: 'col-span-2 text-center font-bold text-gray-800' }, `×${Number(run.batches)}`),
        el('div', { className: 'col-span-2' },
          el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: meta.bg, color: meta.color } }, `${meta.icon} ${meta.label}`)
        ),
        el('div', { className: 'col-span-2 text-center text-xs text-gray-400' },
          run.plannedDate ? new Date(run.plannedDate).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' }) : '—'
        ),
        // Inline action buttons
        el('div', { className: 'col-span-2 flex gap-1.5' }, ...[
          run.status === 'PLANNED' ? el('button', {
            className: 'text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-lg hover:bg-blue-200',
            onClick: async () => { try { await api.production.update(run.id, { status: 'IN_PROGRESS' }); toast('Run started','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '▶ Start') : null,
          run.status === 'IN_PROGRESS' ? el('button', {
            className: 'text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded-lg hover:bg-green-200',
            onClick: async () => {
              if (!confirm(`Complete "${run.recipe?.name}"? This will deduct ingredients from stock and create a packaging run.`)) return;
              try { await api.production.complete(run.id); toast('Production completed — packaging run created ✅','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); }
            }
          }, '✅ Done') : null,
          !['COMPLETED','CANCELLED'].includes(run.status) ? el('button', {
            className: 'text-xs font-bold bg-red-100 text-red-500 px-2 py-1 rounded-lg hover:bg-red-200',
            onClick: async () => { if (!confirm('Cancel this run?')) return; try { await api.production.update(run.id, { status: 'CANCELLED' }); toast('Run cancelled','success'); reload(); } catch(e) { toast(e?.message||'Failed','error'); } }
          }, '✕') : null,
        ].filter(Boolean)),
      );
      row.append(mainRow);

      // Expanded panel — shows ingredient requirements vs stock
      if (isExp) {
        const recipeData = recipes.find(r => r.id === run.recipeId);
        const panel = el('div', { className: 'px-4 pb-4 pt-2 bg-gray-50 border-t border-gray-100' });
        if (recipeData?.ingredients?.length) {
          const batches = Number(run.batches);
          panel.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wider mb-2' }, 'Ingredient Requirements'));
          const ingTable = el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100 mb-3' });
          ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase' },
            el('div', { className: 'col-span-4' }, 'Ingredient'),
            el('div', { className: 'col-span-3 text-right' }, 'Need (×batches)'),
            el('div', { className: 'col-span-3 text-right' }, 'In Stock'),
            el('div', { className: 'col-span-2 text-right' }, 'Feasible?'),
          ));
          recipeData.ingredients.forEach(ing => {
            const needed  = Number(ing.quantity) * batches;
            const inStock = Number(ing.stockItem?.currentStock ?? 0);
            const ok      = inStock >= needed;
            ingTable.append(el('div', { className: 'grid grid-cols-12 px-3 py-2 border-t border-gray-50 items-center' },
              el('div', { className: 'col-span-4 font-semibold text-sm text-gray-800' }, ing.stockItem?.name || ing.stockItemId),
              el('div', { className: 'col-span-3 text-right text-sm text-gray-600' }, `${needed.toFixed(3)} ${ing.unit}`),
              el('div', { className: 'col-span-3 text-right text-sm text-gray-500' }, `${inStock.toFixed(3)}`),
              el('div', { className: 'col-span-2 text-right' },
                el('span', { className: `text-xs font-bold px-1.5 py-0.5 rounded-full ${ok ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}` }, ok ? '✓' : '✗ Short')
              ),
            ));
          });
          panel.append(ingTable);
        }
        if (run.notes) panel.append(el('p', { className: 'text-xs text-gray-400 italic' }, run.notes));

        // PackagingRun sub-card
        if (run.packagingRun) {
          const pr = run.packagingRun;
          const PKG_META = {
            PENDING:     { label: 'Pending',     color: '#F59E0B', bg: '#FEF3C7' },
            IN_PROGRESS: { label: 'In Progress', color: '#3B82F6', bg: '#DBEAFE' },
            COMPLETED:   { label: 'Completed',   color: '#10B981', bg: '#D1FAE5' },
            CANCELLED:   { label: 'Cancelled',   color: '#EF4444', bg: '#FEE2E2' },
          };
          const pm = PKG_META[pr.status] || { label: pr.status, color: '#9CA3AF', bg: '#F3F4F6' };
          const pkgCard = el('div', { className: 'mt-3 border border-blue-100 rounded-xl bg-blue-50 p-3' });
          const pkgHeader = el('div', { className: 'flex items-center justify-between mb-2' });
          pkgHeader.append(
            el('p', { className: 'text-xs font-bold text-blue-700 uppercase tracking-wide' }, '📦 Packaging Run'),
            el('span', { className: 'text-xs font-bold px-2 py-0.5 rounded-full', style: { backgroundColor: pm.bg, color: pm.color } }, pm.label),
          );
          pkgCard.append(pkgHeader);

          if (pr.status !== 'COMPLETED' && pr.status !== 'CANCELLED') {
            const btnRow = el('div', { className: 'flex gap-2 mt-2' });
            if (pr.status === 'PENDING') {
              const startBtn = el('button', {
                className: 'text-xs font-bold bg-blue-500 text-white px-3 py-1 rounded-lg hover:bg-blue-600',
                onClick: async () => {
                  try { await api.packaging.update(pr.id, { status: 'IN_PROGRESS' }); toast('Packaging started', 'success'); reload(); }
                  catch(e) { toast(e?.message || 'Failed', 'error'); }
                }
              }, '▶ Start Packaging');
              btnRow.append(startBtn);
            }
            if (pr.status === 'IN_PROGRESS') {
              const completeBtn = el('button', {
                className: 'text-xs font-bold bg-green-500 text-white px-3 py-1 rounded-lg hover:bg-green-600',
                onClick: async () => {
                  if (!confirm('Complete packaging? This will add finished goods to inventory.')) return;
                  try {
                    const result = await api.packaging.complete(pr.id);
                    const units = result?.unitsProduced;
                    toast(units ? `Packaging done — ${units} unit(s) added to inventory ✅` : 'Packaging completed ✅', 'success');
                    reload();
                  } catch(e) { toast(e?.message || 'Failed', 'error'); }
                }
              }, '✅ Complete Packaging');
              btnRow.append(completeBtn);
            }
            pkgCard.append(btnRow);
          } else if (pr.status === 'COMPLETED') {
            pkgCard.append(el('p', { className: 'text-xs text-green-700 mt-1' }, `✓ Completed${pr.completedAt ? ' on ' + new Date(pr.completedAt).toLocaleDateString('en-ZA') : ''}`));
          }

          panel.append(pkgCard);
        }

        row.append(panel);
      }
      table.append(row);
    });
    tableWrap.append(table);
  }

  function showNewRunForm(onDone) {
    const activeRecipes = recipes.filter(r => r.isActive);
    const modal = el('div', { className: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' });
    const close = () => document.body.removeChild(modal);
    const recipeSel = el('select', { className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const emOpt = document.createElement('option'); emOpt.value = ''; emOpt.textContent = '— Select Recipe —'; recipeSel.append(emOpt);
    activeRecipes.forEach(r => { const o = document.createElement('option'); o.value = r.id; o.textContent = `${r.name} (yields ${Number(r.yieldQty).toFixed(2)} ${r.yieldUnit} / batch)`; recipeSel.append(o); });

    const batchInp = el('input', { type: 'number', step: '0.5', min: '0.5', placeholder: 'Number of batches', value: '1', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const dateInp  = el('input', { type: 'date', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const noteInp  = el('input', { type: 'text', placeholder: 'Notes', className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand mb-3' });
    const yieldPrev = el('p', { className: 'text-xs text-brand font-semibold mb-3' }, '');

    function updatePreview() {
      const r = activeRecipes.find(r => r.id === recipeSel.value);
      const b = parseFloat(batchInp.value) || 0;
      yieldPrev.textContent = r && b ? `Expected yield: ${(Number(r.yieldQty) * b).toFixed(2)} ${r.yieldUnit}` : '';
    }
    recipeSel.addEventListener('change', updatePreview);
    batchInp.addEventListener('input', updatePreview);

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-black py-2.5 rounded-xl hover:opacity-90',
      onClick: async () => {
        if (!recipeSel.value) { toast('Select a recipe', 'error'); return; }
        saveBtn.disabled = true; saveBtn.textContent = 'Creating…';
        try {
          await api.production.create({ recipeId: recipeSel.value, batches: parseFloat(batchInp.value)||1, plannedDate: dateInp.value || undefined, notes: noteInp.value || undefined });
          toast('Production run created', 'success'); close(); onDone();
        } catch(err) { toast(err?.message||'Failed','error'); saveBtn.disabled = false; saveBtn.textContent = 'Create Run'; }
      }
    }, 'Create Run');

    modal.append(el('div', { className: 'bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl' },
      el('div', { className: 'flex items-center justify-between mb-4' }, el('h3', { className: 'font-black text-gray-900 text-lg' }, 'New Production Run'), el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold', onClick: close }, '×')),
      el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Recipe *'), recipeSel,
      el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Number of Batches'), batchInp,
      yieldPrev,
      el('label', { className: 'block text-xs font-bold text-gray-500 mb-1' }, 'Planned Date'), dateInp,
      noteInp, saveBtn,
    ));
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    document.body.appendChild(modal);
  }

  renderTable();
  container.append(page);
}

// ── CUSTOMER MANAGEMENT ───────────────────────────────────────────────────────
function renderAdminCustomers(data, container, reload) {
  let allCustomers = [...(data.customers || [])];
  let statusFilter = '', searchQ = '';
  let expandedId = null;

  const page = el('div', { className: 'p-6 max-w-6xl mx-auto' });

  // ── TOOLBAR ────────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex flex-wrap items-center gap-3 mb-5' });
  const searchBox = el('input', {
    type: 'text', placeholder: '🔍  Search by name, email, or phone…',
    className: 'flex-1 min-w-48 bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
    onInput: e => { searchQ = e.target.value; renderTable(); },
  });
  const statusSel = el('select', { className: 'bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
  [['', 'All Statuses'], ['ACTIVE', 'Active'], ['SUSPENDED', 'Suspended']].forEach(([v, l]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = l; statusSel.append(o);
  });
  statusSel.addEventListener('change', e => { statusFilter = e.target.value; renderTable(); });
  toolbar.append(searchBox, statusSel);
  page.append(toolbar);

  // ── SUMMARY CHIPS ──────────────────────────────────────────────────────────
  const chipsRow = el('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5' });
  const monthAgo = new Date(); monthAgo.setDate(monthAgo.getDate() - 30);
  function renderChips() {
    chipsRow.innerHTML = '';

// ── PRODUCTS MODULE ───────────────────────────────────────────────────────────
function renderAdminProducts(data, container, reload) {
  const { products, suppliers = [], uoms = [] } = data;
  const page = el('div', { className: 'p-6 max-w-6xl mx-auto' });

  // ── Toolbar ──────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex flex-wrap gap-3 items-center mb-4' });

  const searchInput = el('input', {
    type: 'text',
    placeholder: '🔍  Search by name…',
    className: 'flex-1 min-w-48 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition',
  });

  const classFilter = el('select', { className: 'bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition' });
  [['', 'All Types'], ...Object.entries(CLASSIFICATIONS).map(([k, v]) => [k, v.label])].forEach(([val, lbl]) => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = lbl;
    classFilter.append(opt);
  });

  const statusFilter = el('select', { className: 'bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition' });
  [['', 'All Status'], ['active', 'Active'], ['inactive', 'Inactive']].forEach(([val, lbl]) => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = lbl;
    statusFilter.append(opt);
  });

  const addBtn = el('button', {
    className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90 transition flex-shrink-0',
    onClick: () => showAddProductModal(reload, suppliers, uoms),
  }, '+ Add Product');

  toolbar.append(searchInput, classFilter, statusFilter, addBtn);

  // ── Bulk action bar (hidden until rows selected) ──────────────────────────
  const bulkBar = el('div', { className: 'hidden items-center gap-3 bg-brand-light border border-brand rounded-lg px-4 py-2.5 mb-3' });
  const bulkCount = el('span', { className: 'text-sm font-semibold text-brand-dark flex-1' }, '0 selected');
  const bulkActivate = el('button', {
    className: 'text-xs font-bold px-3 py-1.5 rounded-lg bg-green-600 text-white hover:opacity-90 transition',
    onClick: async () => {
      const ids = getSelectedIds();
      if (!ids.length) return;
      await Promise.all(ids.map(id => api.products.update(id, { isActive: true })));
      toast(`${ids.length} product(s) activated`, 'success'); reload();
    }
  }, 'Activate');
  const bulkDeactivate = el('button', {
    className: 'text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-500 text-white hover:opacity-90 transition',
    onClick: async () => {
      const ids = getSelectedIds();
      if (!ids.length) return;
      await Promise.all(ids.map(id => api.products.update(id, { isActive: false })));
      toast(`${ids.length} product(s) deactivated`, 'success'); reload();
    }
  }, 'Deactivate');
  bulkBar.append(bulkCount, bulkActivate, bulkDeactivate);

  // ── Table ─────────────────────────────────────────────────────────────────
  const tableWrap = el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden' });

  const thead = el('thead', { className: 'bg-gray-50 border-b border-gray-100' },
    el('tr', {},
      el('th', { className: 'w-10 px-4 py-3' },
        el('input', { type: 'checkbox', className: 'w-4 h-4 rounded accent-brand cursor-pointer', onClick: (e) => { toggleAll(e.target.checked); } })
      ),
      el('th', { className: 'w-14 py-3' }),    // thumbnail
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider' }, 'Product'),
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider' }, 'Type'),
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell' }, 'Brand'),
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden lg:table-cell' }, 'Supplier'),
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider' }, 'Status'),
      el('th', { className: 'px-3 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider hidden md:table-cell' }, 'Updated'),
      el('th', { className: 'px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider' }, 'Actions'),
    )
  );
  const tbody = el('tbody', { className: 'divide-y divide-gray-50' });
  const tableEl = el('table', { className: 'w-full text-sm' }, thead, tbody);
  tableWrap.append(tableEl);

  const emptyRow = el('tr', {},
    el('td', { className: 'text-center text-gray-400 py-16 text-sm', colspan: '10' }, 'No products match your filters.')
  );

  // ── State ─────────────────────────────────────────────────────────────────
  const selected = new Set();
  let filtered = [];

  function getSelectedIds() { return [...selected]; }

  function updateBulkBar() {
    if (selected.size > 0) {
      bulkBar.classList.remove('hidden');
      bulkBar.classList.add('flex');
      bulkCount.textContent = `${selected.size} selected`;
    } else {
      bulkBar.classList.add('hidden');
      bulkBar.classList.remove('flex');
    }
  }

  function toggleAll(checked) {
    selected.clear();
    if (checked) filtered.forEach(p => selected.add(p.id));
    [...tbody.querySelectorAll('input[type=checkbox]')].forEach(cb => cb.checked = checked);
    updateBulkBar();
  }

  function renderRows() {
    tbody.innerHTML = '';
    const q    = searchInput.value.toLowerCase().trim();
    const cls  = classFilter.value;
    const stat = statusFilter.value;

    filtered = products.filter(p => {
      if (q   && !p.name.toLowerCase().includes(q) && !(p.description || '').toLowerCase().includes(q)) return false;
      if (cls  && p.classification !== cls)  return false;
      if (stat === 'active'   && !p.isActive) return false;
      if (stat === 'inactive' &&  p.isActive) return false;
      return true;
    });

    if (!filtered.length) { tbody.append(emptyRow); return; }

    filtered.forEach(product => {
      const meta         = CLASSIFICATIONS[product.classification] || CLASSIFICATIONS.SELLABLE;
      const isSellable   = product.classification === 'SELLABLE' || !product.classification;
      const primaryImg   = (() => {
        if (product.imageUrl) return product.imageUrl;

        return imgs.find(i => i.isPrimary)?.url || imgs[0]?.url || null;
      })();
      const retailPrice  = product.variants?.[0]?.prices?.find(p => p.tier === 'RETAIL')?.price;
      const updatedAt    = product.updatedAt ? new Date(product.updatedAt).toLocaleDateString() : '—';

      const cb = el('input', { type: 'checkbox', className: 'w-4 h-4 rounded accent-brand cursor-pointer' });
      cb.checked = selected.has(product.id);
      cb.addEventListener('change', () => {
        if (cb.checked) selected.add(product.id); else selected.delete(product.id);
        updateBulkBar();
      });

      const thumb = (isSellable && primaryImg)
        ? el('img', { className: 'w-10 h-10 rounded-lg object-cover border border-gray-100', src: primaryImg, alt: product.name })
        : el('div', { className: 'w-10 h-10 rounded-lg flex items-center justify-center text-lg', style: { backgroundColor: meta.bg } },
            document.createTextNode(meta.icon)
          );

      const classBadge = el('span', {
        className: 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold',
        style: { backgroundColor: meta.bg, color: meta.color },
      }, meta.icon + ' ' + meta.label);

      const statusBadge = badge(product.isActive ? 'Active' : 'Inactive', product.isActive ? '#10B981' : '#9CA3AF');

      const row = el('tr', { className: `hover:bg-gray-50 transition ${!product.isActive ? 'opacity-60' : ''}` },
        el('td', { className: 'px-4 py-3' }, cb),
        el('td', { className: 'py-3 pr-2' }, thumb),
        el('td', { className: 'px-3 py-3' },
          el('p', { className: 'font-semibold text-gray-900 truncate max-w-xs' }, product.name),
          product.description
            ? el('p', { className: 'text-xs text-gray-400 truncate max-w-xs mt-0.5' }, product.description)
            : null,
          (isSellable && retailPrice)
            ? el('p', { className: 'text-xs text-brand font-semibold mt-0.5' }, `From R${Number(retailPrice).toFixed(2)}`)
            : null,
        ),
        el('td', { className: 'px-3 py-3' }, classBadge),
        el('td', { className: 'px-3 py-3 text-xs text-gray-500 hidden lg:table-cell' }, product.brand || '—'),
        el('td', { className: 'px-3 py-3 text-xs text-gray-500 hidden lg:table-cell' }, product.supplier?.name || '—'),
        el('td', { className: 'px-3 py-3' }, statusBadge),
        el('td', { className: 'px-3 py-3 text-xs text-gray-400 hidden md:table-cell' }, updatedAt),
        el('td', { className: 'px-4 py-3 text-right' },
          el('div', { className: 'flex items-center justify-end gap-2' },
            el('button', {
              className: 'text-xs font-semibold px-3 py-1.5 rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-700 transition',
              onClick: () => showEditProductModal(product, reload, suppliers, uoms),
            }, '✏️ Edit'),
            el('button', {
              className: `text-xs font-semibold px-3 py-1.5 rounded-lg transition ${product.isActive ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'}`,
              onClick: async (e) => {

                  reload();
                } catch (err) { toast(err.message || 'Failed'); e.target.disabled = false; }
              },
            }, product.isActive ? 'Deactivate' : 'Activate'),
          )
        ),
      );
      tbody.append(row);
    });
  }

  searchInput.addEventListener('input', renderRows);
  classFilter.addEventListener('change', renderRows);

  page.append(toolbar, bulkBar, tableWrap);
  renderRows();
  container.append(page);

// ── IMAGE HELPER: compress uploaded file to a base64 data URL ─────────────────
function compressImage(file, maxPx = 900, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale  = Math.min(1, maxPx / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

    el('p', { className: 'text-xs text-gray-400 mb-3' }, 'Upload up to 8 images. Click ★ to set the primary (main) image. Drag to reorder.')
  );

  const grid = el('div', { className: 'grid grid-cols-4 gap-2 mb-3' });

  function notify() { onImagesChange([...images]); }

  function renderGrid() {
    grid.innerHTML = '';
    images.forEach((img, idx) => {
      const cell = el('div', { className: 'relative group' });
      const imgEl = el('img', {
        className: `w-full aspect-square object-cover rounded-xl cursor-pointer border-2 transition ${img.isPrimary ? 'border-brand shadow-md' : 'border-transparent hover:border-gray-300'}`,
        src: img.url,
      });
      imgEl.addEventListener('click', () => {
        images.forEach((i, j) => i.isPrimary = (j === idx));
        notify(); renderGrid();
      });

      const removeBtn = el('button', {
        className: 'absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full text-xs hidden group-hover:flex items-center justify-center leading-none hover:bg-red-600',
        onClick: (e) => { e.stopPropagation(); images.splice(idx, 1); if (images.length && !images.some(i => i.isPrimary)) images[0].isPrimary = true; notify(); renderGrid(); }
      }, '×');

      const starBadge = img.isPrimary
        ? el('div', { className: 'absolute bottom-1 left-1 bg-brand text-white text-xs px-1.5 py-0.5 rounded-md font-bold' }, '★ Main')
        : el('div', { className: 'absolute bottom-1 left-1 bg-black bg-opacity-50 text-white text-xs px-1.5 py-0.5 rounded-md hidden group-hover:block' }, '☆ Set main');

      cell.append(imgEl, removeBtn, starBadge);
      grid.append(cell);
    });

    // Add slot
    if (images.length < 8) {
      const addSlot = el('div', {
        className: 'aspect-square rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center cursor-pointer hover:border-brand hover:bg-orange-50 transition text-gray-400 hover:text-brand',
        onClick: () => fileInput.click(),
      },
        svgIcon('M12 5v14|M5 12h14', 24),
        el('span', { className: 'text-xs mt-1 font-medium' }, 'Add')
      );
      grid.append(addSlot);
    }
  }

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.multiple = true;
  fileInput.style.display = 'none';
  fileInput.addEventListener('change', async () => {
    const files = [...(fileInput.files || [])].slice(0, 8 - images.length);
    for (const file of files) {
      if (file.size > 10 * 1024 * 1024) { toast('One or more images are too large (max 10 MB each)'); continue; }
      try {
        const url = await compressImage(file);
        images.push({ url, isPrimary: images.length === 0 });
        notify(); renderGrid();
      } catch { toast('Failed to process image'); }
    }
    fileInput.value = '';
  });

  renderGrid();
  wrap.append(grid, fileInput);
  return { widget: wrap, getImages: () => images };
}

// ── PRODUCT FORM HELPER: make a labelled input field ─────────────────────────
function productField(label, key, form, type = 'text', placeholder = '', defaultVal = '') {
  const input = el('input', {
    type, placeholder,
    value: form[key] !== undefined ? form[key] : defaultVal,
    className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
    onInput: (e) => form[key] = e.target.value,
  });
  return el('div', { className: 'mb-4' },
    el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, label),
    input
  );
}

// ── ADD PRODUCT MODAL ─────────────────────────────────────────────────────────
function showAddProductModal(onSave, suppliers = [], uoms = []) {
  let classification = null;   // chosen in step 1
  let galleryWidget  = null;

  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-lg p-6 fade-in overflow-y-auto', style: { maxHeight: '90vh' } });

  function renderStep1() {
    modal.innerHTML = '';
    modal.append(
      el('div', { className: 'flex justify-between items-center mb-6' },
        el('div', {},
          el('h2', { className: 'text-xl font-black text-gray-900' }, 'Add Product'),
          el('p', { className: 'text-sm text-gray-400 mt-0.5' }, 'What kind of item is this?')
        ),
        el('button', { className: 'text-gray-400 text-2xl leading-none hover:text-gray-600', onClick: () => overlay.remove() }, '×')
      )
    );
    const grid = el('div', { className: 'grid grid-cols-1 gap-3' });
    Object.entries(CLASSIFICATIONS).forEach(([key, meta]) => {
      const card = el('button', {
        className: 'flex items-center gap-4 p-4 rounded-xl border-2 border-gray-100 hover:border-brand hover:shadow-sm transition text-left w-full group',
        onClick: () => { classification = key; renderStep2(); },
      },
        el('div', { className: 'w-12 h-12 rounded-xl flex items-center justify-center text-2xl flex-shrink-0', style: { backgroundColor: meta.bg } },
          document.createTextNode(meta.icon)
        ),
        el('div', {},
          el('p', { className: 'font-bold text-gray-900 group-hover:text-brand transition' }, meta.label),
          el('p', { className: 'text-xs text-gray-500 mt-0.5' }, meta.desc)
        ),
        el('div', { className: 'ml-auto text-gray-300 group-hover:text-brand transition' }, svgIcon('M9 18l6-6-6-6', 16))
      );
      grid.append(card);
    });
    modal.append(grid);
  }

  function renderStep2() {
    const isSellable = classification === 'SELLABLE';
    const meta       = CLASSIFICATIONS[classification];
    const form       = { name: '', description: '', variantName: '1 Pack', retailPrice: '', ambassadorPrice: '', uomId: '' };
    let   galleryImages = [];

    modal.innerHTML = '';
    modal.append(
      el('div', { className: 'flex items-center gap-3 mb-5' },
        el('button', {
          className: 'text-gray-400 hover:text-gray-700 transition text-lg leading-none',
          onClick: renderStep1,
        }, '←'),
        el('div', { className: 'w-9 h-9 rounded-lg flex items-center justify-center text-lg flex-shrink-0', style: { backgroundColor: meta.bg } },
          document.createTextNode(meta.icon)
        ),
        el('div', { className: 'flex-1' },
          el('h2', { className: 'text-lg font-black text-gray-900' }, `New ${meta.label}`),
          el('p', { className: 'text-xs text-gray-400' }, meta.desc)
        ),
        el('button', { className: 'text-gray-400 text-2xl leading-none hover:text-gray-600', onClick: () => overlay.remove() }, '×')
      )
    );

    // Image gallery only for SELLABLE
    if (isSellable) {
      const gallery = makeImageGallery([], (imgs) => { galleryImages = imgs; });
      galleryWidget = gallery;
      modal.append(gallery.widget);
    }

    modal.append(productField('Product Name *', 'name', form, 'text', `e.g. ${isSellable ? 'Chocolate Chip Cookies' : 'Cake flour 25kg'}`));
    modal.append(productField('Description', 'description', form, 'text', 'Optional short description'));

    // Brand & Supplier — two columns side by side
    const supplierDropdown = el('select', {
      className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
      onChange: (e) => form.supplierId = e.target.value,
    });
    const noSuppOpt = document.createElement('option'); noSuppOpt.value = ''; noSuppOpt.textContent = '— None —'; supplierDropdown.append(noSuppOpt);
    suppliers.filter(s => s.status === 'ACTIVE').forEach(s => {
      const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; supplierDropdown.append(o);
    });
    const brandSupplierRow = el('div', { className: 'grid grid-cols-2 gap-3 mb-4' },
      el('div', {},
        el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Brand'),
        el('input', { type: 'text', placeholder: 'e.g. Tlaka Treats',
          className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
          onInput: (e) => form.brand = e.target.value })
      ),
      el('div', {},
        el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Supplier'),
        supplierDropdown,
      )
    );
    modal.append(brandSupplierRow);

    // ── Unit of Measure ──────────────────────────────────────────────────────
    if (uoms.length) {
      const uomDropdown = el('select', {
        className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition mb-4',
        onChange: (e) => { form.uomId = e.target.value; },
      });
      const noUomOpt = document.createElement('option'); noUomOpt.value = ''; noUomOpt.textContent = '— No unit —'; uomDropdown.append(noUomOpt);
      const uomGroups = {};
      uoms.forEach(u => { if (!uomGroups[u.type]) uomGroups[u.type] = []; uomGroups[u.type].push(u); });
      Object.entries(uomGroups).forEach(([type, items]) => {
        const og = document.createElement('optgroup'); og.label = type;
        items.forEach(u => { const o = document.createElement('option'); o.value = u.id; o.textContent = `${u.name} (${u.abbreviation})`; og.append(o); });
        uomDropdown.append(og);
      });
      modal.append(
        el('div', { className: 'mb-4' },
          el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Unit of Measure'),
          uomDropdown
        )
      );
    }

    // ── Multi-variant builder (SELLABLE only) ────────────────────────────────
    // variants: [{ name, retailPrice, ambassadorPrice }]
    let variants = [{ name: '', retailPrice: '', ambassadorPrice: '' }];

    const variantSection = el('div', { className: 'mb-2' });

    function renderVariants() {
      variantSection.innerHTML = '';
      variantSection.append(
        el('div', { className: 'flex items-center justify-between mb-2' },
          el('label', { className: 'text-sm font-semibold text-gray-700' }, isSellable ? 'Sizes / Variants *' : null),
          el('p', { className: 'text-xs text-gray-400' }, 'e.g. 5L · 10L · 20L')
        )
      );

      variants.forEach((v, idx) => {
        const isOnly = variants.length === 1;
        const row = el('div', { className: 'flex gap-2 items-start mb-2 p-3 bg-gray-50 rounded-xl border border-gray-100' });

        // Size/name input
        const nameInput = el('input', {
          type: 'text', placeholder: 'Size / name  e.g. 5L',
          value: v.name,
          className: 'flex-1 min-w-0 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition bg-white',
          onInput: (e) => { variants[idx].name = e.target.value; },
        });

        // Retail price
        const retailInput = el('input', {
          type: 'number', placeholder: 'Retail R',
          value: v.retailPrice,
          className: 'w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition bg-white',
          onInput: (e) => { variants[idx].retailPrice = e.target.value; },
        });

        // Ambassador price
        const ambInput = el('input', {
          type: 'number', placeholder: 'Amb R (opt)',
          value: v.ambassadorPrice,
          className: 'w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand transition bg-white',
          onInput: (e) => { variants[idx].ambassadorPrice = e.target.value; },
        });

        // Remove button (hidden when only one row)
        const removeBtn = el('button', {
          type: 'button',
          className: `text-gray-300 hover:text-red-400 transition text-lg leading-none flex-shrink-0 self-center ${isOnly ? 'invisible' : ''}`,
          onClick: () => { variants.splice(idx, 1); renderVariants(); },
        }, '×');

        row.append(nameInput, retailInput, ambInput, removeBtn);
        variantSection.append(row);
      });

      // Column labels for first row
      if (variants.length === 1) {
        const labels = el('div', { className: 'flex gap-2 px-3 mb-1' },
          el('span', { className: 'flex-1 text-xs text-gray-400' }, 'Size / variant name'),
          el('span', { className: 'w-24 text-xs text-gray-400' }, 'Retail (R)'),
          el('span', { className: 'w-24 text-xs text-gray-400' }, 'Amb. (R)'),
          el('span', { className: 'w-5' })
        );
        variantSection.insertBefore(labels, variantSection.children[1]);
      }

      const addBtn = el('button', {
        type: 'button',
        className: 'mt-1 text-sm text-brand font-semibold hover:opacity-80 transition flex items-center gap-1',
        onClick: () => { variants.push({ name: '', retailPrice: '', ambassadorPrice: '' }); renderVariants(); },
      }, '+ Add another size');
      variantSection.append(addBtn);
    }

    if (isSellable) {
      renderVariants();
      modal.append(variantSection);
    }

    const saveBtn = el('button', {
      className: 'w-full bg-brand text-white font-bold py-3.5 rounded-xl hover:opacity-90 transition mt-3 flex items-center justify-center gap-2',
      onClick: async () => {
        if (!form.name) return toast('Product name is required');
        if (isSellable) {
          const filled = variants.filter(v => v.name.trim() && v.retailPrice);
          if (!filled.length) return toast('Add at least one size with a name and retail price');
          if (variants.some(v => v.name.trim() && !v.retailPrice)) return toast('Every size needs a retail price');
        }
        saveBtn.disabled = true; saveBtn.innerHTML = ''; saveBtn.append(spinner());
        try {
          const primaryImg = galleryImages.find(i => i.isPrimary)?.url || galleryImages[0]?.url || undefined;
          const builtVariants = variants
            .filter(v => v.name.trim() && v.retailPrice)
            .map(v => ({
              name: v.name.trim(),
              prices: [
                { tier: 'RETAIL',     price: parseFloat(v.retailPrice) },
                ...(v.ambassadorPrice ? [{ tier: 'AMBASSADOR', price: parseFloat(v.ambassadorPrice) }] : []),
              ],
            }));
          await api.products.create({
            name: form.name,
            description: form.description || undefined,
            brand: form.brand || undefined,
            supplierId: form.supplierId || undefined,
            uomId: form.uomId || undefined,
            classification,
            imageUrl: primaryImg,
            images: galleryImages.length ? galleryImages : undefined,
            variants: isSellable ? builtVariants : undefined,
          });
          toast(`${meta.label} created!`, 'success');
          overlay.remove(); onSave();
        } catch (err) {
          toast(err.message || 'Failed to create product');
          saveBtn.disabled = false; saveBtn.textContent = `Create ${meta.label}`;
        }
      }
    }, `Create ${meta.label}`);
    modal.append(saveBtn);
  }

  renderStep1();
  overlay.append(modal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── EDIT PRODUCT MODAL ────────────────────────────────────────────────────────
function showEditProductModal(product, onSave, suppliers = [], uoms = []) {
  const isSellable = product.classification === 'SELLABLE' || !product.classification;
  const meta       = CLASSIFICATIONS[product.classification] || CLASSIFICATIONS.SELLABLE;
  const form       = { name: product.name, description: product.description || '', brand: product.brand || '', supplierId: product.supplierId || product.supplier?.id || '', uomId: product.uomId || product.uom?.id || '' };

  // Parse existing images
  let galleryImages = [];
  if (Array.isArray(product.images) && product.images.length) {
    galleryImages = product.images;
  } else if (product.imageUrl) {
    galleryImages = [{ url: product.imageUrl, isPrimary: true }];
  }

  const overlay = el('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' });
  const modal   = el('div', { className: 'bg-white rounded-2xl w-full max-w-lg p-6 fade-in overflow-y-auto', style: { maxHeight: '90vh' } });

  // Header with type badge
  modal.append(
    el('div', { className: 'flex items-center gap-3 mb-5' },
      el('div', { className: 'w-9 h-9 rounded-lg flex items-center justify-center text-lg flex-shrink-0', style: { backgroundColor: meta.bg } },
        document.createTextNode(meta.icon)
      ),
      el('div', { className: 'flex-1' },
        el('h2', { className: 'text-lg font-black text-gray-900' }, 'Edit Product'),
        el('span', { className: 'text-xs font-semibold px-2 py-0.5 rounded-full', style: { backgroundColor: meta.bg, color: meta.color } }, meta.label)
      ),
      el('button', { className: 'text-gray-400 text-2xl leading-none hover:text-gray-600', onClick: () => overlay.remove() }, '×')
    )
  );

  // Image gallery for SELLABLE only
  if (isSellable) {
    const gallery = makeImageGallery(galleryImages, (imgs) => { galleryImages = imgs; });
    modal.append(gallery.widget);
  }

  modal.append(
    el('div', { className: 'mb-4' },
      el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Product Name *'),
      el('input', {
        type: 'text', value: product.name,
        className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
        onInput: (e) => form.name = e.target.value,
      })
    ),
    el('div', { className: 'mb-4' },
      el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Description'),
      el('input', {
        type: 'text', value: product.description || '', placeholder: 'Optional description',
        className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
        onInput: (e) => form.description = e.target.value,
      })
    ),
    el('div', { className: 'grid grid-cols-2 gap-3 mb-5' },
      el('div', {},
        el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Brand'),
        el('input', {
          type: 'text', value: product.brand || '', placeholder: 'e.g. Tlaka Treats',
          className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
          onInput: (e) => form.brand = e.target.value,
        })
      ),
      el('div', {},
        el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Supplier'),
        (() => {
          const sel = el('select', {
            className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
            onChange: (e) => form.supplierId = e.target.value,
          });
          const noneOpt = document.createElement('option'); noneOpt.value = ''; noneOpt.textContent = '— None —'; sel.append(noneOpt);
          suppliers.filter(s => s.status === 'ACTIVE').forEach(s => {
            const o = document.createElement('option'); o.value = s.id; o.textContent = s.name;
            if (form.supplierId === s.id) o.selected = true;
            sel.append(o);
          });
          return sel;
        })()
      )
    )
  );

  // ── Unit of Measure (edit modal) ─────────────────────────────────────────
  if (uoms.length) {
    const uomSel = el('select', {
      className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
      onChange: (e) => { form.uomId = e.target.value; },
    });
    const noUomOpt2 = document.createElement('option'); noUomOpt2.value = ''; noUomOpt2.textContent = '— No unit —'; uomSel.append(noUomOpt2);
    const uomGroups2 = {};
    uoms.forEach(u => { if (!uomGroups2[u.type]) uomGroups2[u.type] = []; uomGroups2[u.type].push(u); });
    Object.entries(uomGroups2).forEach(([type, items]) => {
      const og = document.createElement('optgroup'); og.label = type;
      items.forEach(u => {
        const o = document.createElement('option'); o.value = u.id; o.textContent = `${u.name} (${u.abbreviation})`;
        if (form.uomId === u.id) o.selected = true;
        og.append(o);
      });
      uomSel.append(og);
    });
    modal.append(
      el('div', { className: 'mb-5' },
        el('label', { className: 'block text-sm font-semibold text-gray-700 mb-1' }, 'Unit of Measure'),
        uomSel
      )
    );
  }

  // ── Existing variants (SELLABLE) ─────────────────────────────────────────
  if (isSellable) {
    const existingVariants = product.variants || [];
    const variantBlock = el('div', { className: 'mb-5' });
    variantBlock.append(
      el('p', { className: 'text-sm font-semibold text-gray-700 mb-2' }, 'Sizes / Variants')
    );

    if (existingVariants.length) {
      const list = el('div', { className: 'space-y-1.5 mb-3' });
      existingVariants.forEach(v => {
        const retail  = v.prices?.find(p => p.tier === 'RETAIL')?.price;
        const amb     = v.prices?.find(p => p.tier === 'AMBASSADOR')?.price;
        list.append(
          el('div', { className: 'flex items-center justify-between px-3 py-2 bg-gray-50 rounded-lg border border-gray-100 text-sm' },
            el('span', { className: 'font-semibold text-gray-800' }, v.name),
            el('div', { className: 'flex gap-3 text-xs text-gray-500' },
              retail ? el('span', {}, `Retail R${Number(retail).toFixed(2)}`) : null,
              amb    ? el('span', { className: 'text-brand' }, `Amb R${Number(amb).toFixed(2)}`) : null,
            )
          )
        );
      });
      variantBlock.append(list);
    } else {
      variantBlock.append(el('p', { className: 'text-xs text-gray-400 mb-3' }, 'No variants yet.'));
    }

    // ── Add new variant inline ───────────────────────────────────────────
    let showingAddForm = false;
    const addVariantBtn = el('button', {
      type: 'button',
      className: 'text-sm text-brand font-semibold hover:opacity-80 transition flex items-center gap-1',
      onClick: () => { showingAddForm = !showingAddForm; addForm.classList.toggle('hidden', !showingAddForm); addVariantBtn.textContent = showingAddForm ? '− Cancel' : '+ Add size'; },
    }, '+ Add size');

    const newV = { name: '', retailPrice: '', ambassadorPrice: '' };
    const addForm = el('div', { className: 'hidden mt-3 p-3 bg-orange-50 rounded-xl border border-brand border-opacity-20 space-y-2' });
    addForm.append(
      el('p', { className: 'text-xs font-semibold text-gray-600 mb-1' }, 'New size'),
      el('input', { type: 'text', placeholder: 'Size name  e.g. 10L',
        className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:ring-2 focus:ring-brand',
        onInput: (e) => newV.name = e.target.value }),
      el('div', { className: 'grid grid-cols-2 gap-2' },
        el('input', { type: 'number', placeholder: 'Retail price (R) *',
          className: 'border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:ring-2 focus:ring-brand',
          onInput: (e) => newV.retailPrice = e.target.value }),
        el('input', { type: 'number', placeholder: 'Ambassador price (opt)',
          className: 'border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white outline-none focus:ring-2 focus:ring-brand',
          onInput: (e) => newV.ambassadorPrice = e.target.value })
      )
    );
    const saveVariantBtn = el('button', {
      type: 'button',
      className: 'w-full bg-brand text-white text-sm font-bold py-2 rounded-lg hover:opacity-90 transition flex items-center justify-center gap-2',
      onClick: async () => {
        if (!newV.name.trim())   return toast('Size name is required');
        if (!newV.retailPrice)   return toast('Retail price is required');
        saveVariantBtn.disabled = true; saveVariantBtn.innerHTML = ''; saveVariantBtn.append(spinner());
        try {
          await api.products.addVariant(product.id, {
            name: newV.name.trim(),
            prices: [
              { tier: 'RETAIL', price: parseFloat(newV.retailPrice) },
              ...(newV.ambassadorPrice ? [{ tier: 'AMBASSADOR', price: parseFloat(newV.ambassadorPrice) }] : []),
            ],
          });
          toast(`Size "${newV.name}" added!`, 'success');
          overlay.remove(); onSave();
        } catch (err) {
          toast(err.message || 'Failed'); saveVariantBtn.disabled = false; saveVariantBtn.textContent = 'Add Size';
        }
      }
    }, 'Add Size');
    addForm.append(saveVariantBtn);
    variantBlock.append(addVariantBtn, addForm);
    modal.append(variantBlock);
  }

  const saveBtn = el('button', {
    className: 'w-full bg-brand text-white font-bold py-3.5 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2',
    onClick: async () => {
      if (!form.name) return toast('Name is required');
      saveBtn.disabled = true; saveBtn.innerHTML = ''; saveBtn.append(spinner());
      try {
        const primaryImg = galleryImages.find(i => i.isPrimary)?.url || galleryImages[0]?.url || undefined;
        await api.products.update(product.id, {
          name:        form.name,
          description: form.description || undefined,
          brand:       form.brand       || undefined,
          supplierId:  form.supplierId  || '',
          uomId:       form.uomId       || undefined,
          imageUrl:    primaryImg,
          images:      galleryImages.length ? galleryImages : undefined,
        });
        toast('Product updated!', 'success');
        overlay.remove(); onSave();
      } catch (err) {
        toast(err.message || 'Failed'); saveBtn.disabled = false; saveBtn.textContent = 'Save Changes';
      }
    }
  }, 'Save Changes');
  modal.append(saveBtn);

  overlay.append(modal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.append(overlay);
}

// ── Finance: Transactions ─────────────────────────────────────────────────────
async function renderFinanceTransactions(container) {
  const CATEGORIES_INCOME  = ['Sales', 'Other Income'];
  const CATEGORIES_EXPENSE = ['Ingredients', 'Packaging', 'Transport', 'Wages', 'Rent', 'Marketing', 'Utilities', 'Other Expense'];

  let txns = [], typeFilter = '', catFilter = '';
  const fmt = n => `R${Number(n).toFixed(2)}`;

  async function load() {
    const p = {};
    if (typeFilter) p.type = typeFilter;
    if (catFilter)  p.category = catFilter;
    txns = await api.finance.getTransactions(Object.keys(p).length ? p : null);
    render();
  }

  function render() {
    container.innerHTML = '';

    const toolbar = el('div', { className: 'flex flex-wrap items-center gap-3 mb-5' },
      el('h2', { className: 'text-xl font-black text-gray-900 flex-1' }, 'Transactions'),
      el('select', {
        className: 'border border-gray-200 rounded-lg px-3 py-2 text-sm',
        value: typeFilter,
        onChange: e => { typeFilter = e.target.value; load(); },
      },
        el('option', { value: '' }, 'All Types'),
        el('option', { value: 'INCOME' }, 'Income'),
        el('option', { value: 'EXPENSE' }, 'Expense'),
      ),
      el('button', {
        className: 'bg-brand text-white text-sm font-bold px-4 py-2 rounded-lg hover:opacity-90',
        onClick: () => showTxnForm(null, load),
      }, '+ Add Transaction'),
    );

    container.append(toolbar);

    if (!txns.length) {
      container.append(el('div', { className: 'text-center py-16 text-gray-400' }, 'No transactions yet. Add your first one!'));
      return;
    }

    const totalIncome  = txns.filter(t => t.type === 'INCOME').reduce((s, t) => s + Number(t.amount), 0);
    const totalExpense = txns.filter(t => t.type === 'EXPENSE').reduce((s, t) => s + Number(t.amount), 0);

    container.append(
      el('div', { className: 'grid grid-cols-3 gap-4 mb-5' },
        el('div', { className: 'bg-green-50 rounded-xl p-4 text-center' },
          el('p', { className: 'text-lg font-black text-green-700' }, fmt(totalIncome)),
          el('p', { className: 'text-xs text-green-600 mt-0.5' }, 'Total Income'),
        ),
        el('div', { className: 'bg-red-50 rounded-xl p-4 text-center' },
          el('p', { className: 'text-lg font-black text-red-600' }, fmt(totalExpense)),
          el('p', { className: 'text-xs text-red-500 mt-0.5' }, 'Total Expenses'),
        ),
        el('div', { className: `${totalIncome - totalExpense >= 0 ? 'bg-brand-light' : 'bg-red-50'} rounded-xl p-4 text-center` },
          el('p', { className: `text-lg font-black ${totalIncome - totalExpense >= 0 ? 'text-brand' : 'text-red-600'}` }, fmt(totalIncome - totalExpense)),
          el('p', { className: 'text-xs text-gray-500 mt-0.5' }, 'Net'),
        ),
      )
    );

    const table = el('div', { className: 'bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden' });
    txns.forEach((t, i) => {
      const isIncome = t.type === 'INCOME';
      const row = el('div', {
        className: `flex items-center gap-3 px-4 py-3 hover:bg-gray-50 cursor-pointer ${i < txns.length - 1 ? 'border-b border-gray-50' : ''}`,
        onClick: () => showTxnForm(t, load),
      },
        el('div', { className: `w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${isIncome ? 'bg-green-100' : 'bg-red-100'}` }, isIncome ? '↑' : '↓'),
        el('div', { className: 'flex-1 min-w-0' },
