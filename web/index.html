            el('div', { className: 'spinner', style: { borderColor: 'rgba(139,58,58,0.2)', borderTopColor: '#8B3A3A' } })
          ));
          api.orders.getMy().then(orders => {
            ownOrders = orders;
            renderBody();
          }).catch(() => {
            bodyWrap.innerHTML = '<p class="text-center text-red-400 text-sm py-10">Failed to load orders.</p>';
          });
          return;
        }
        if (ownOrders.length === 0) {
          bodyWrap.append(
            el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },
              el('p', { className: 'text-5xl mb-4' }, '📦'),
              el('p', { className: 'font-black text-gray-900 text-lg mb-1' }, 'No orders yet'),
              el('p', { className: 'text-sm text-gray-400 mb-5' }, 'Place an order from Browse Products'),
              el('button', { className: 'bg-brand text-white font-bold px-6 py-2.5 rounded-xl hover:opacity-90', onClick: () => { currentView = 'browse'; updateView(); renderSidebar(); } }, '🛍️ Browse Products')
            )
          );
          return;
        }
        bodyWrap.append(el('div', { className: 'space-y-3' },
          ...ownOrders.map(order => {
            const date = new Date(order.createdAt).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
            return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100 fade-in' },
              el('div', { className: 'flex justify-between items-start mb-3' },
                el('div', {},
                  el('p', { className: 'font-black text-gray-900' }, `R${Number(order.total).toFixed(2)}`),
                  el('p', { className: 'text-xs text-gray-400 mt-0.5' }, date)
                ),
                badge(order.status, STATUS_COLORS[order.status] || '#999')
              ),
              order.items?.length
                ? el('div', { className: 'space-y-1 text-sm text-gray-600 border-t border-gray-50 pt-3' },
                    ...order.items.map(item => el('p', {}, `${item.quantity}× ${item.variant?.product?.name || 'Item'}${item.variant?.name ? ' — ' + item.variant.name : ''}`))
                  )
                : null
            );
          })
        ));
      }
    }

    // Load referred orders fresh each time; own orders loaded lazily
    const loadWrap = el('div', {});
    bodyWrap.append(loadWrap);
    Promise.all([api.ambassadors.me(), api.orders.getAmbassador()]).then(([amb, orders]) => {
      ambData = amb;
      ambOrders = orders;
      renderBody();
    }).catch(() => {
      bodyWrap.innerHTML = '<p class="text-center text-red-400 text-sm py-10">Failed to load orders.</p>';
    });
    loadWrap.innerHTML = '<div class="flex justify-center py-16"><div class="spinner" style="border-color:rgba(139,58,58,0.2);border-top-color:#8B3A3A"></div></div>';
  }

  // ── ACCOUNT VIEW ──────────────────────────────────────────────────────────
  const ambAccountView = el('div', { className: 'hidden' });

  function loadAmbAccountView() {
    const u = store.user;
    ambAccountView.innerHTML = '';

    // KYC card — shows form, review status, or approved banner
    function makeKycCard() {
      const kycStatus = ambData?.kycStatus || 'NOT_SUBMITTED';

      if (kycStatus === 'APPROVED') {
        return ambAcctCard('Identity Verification', '🪪', [
          el('div', { className: 'flex items-center gap-2 mb-2' },
            el('span', { className: 'text-2xl' }, '✅'),
            el('p', { className: 'font-bold text-green-700 text-base' }, 'KYC Verified')
          ),
          el('p', { className: 'text-sm text-gray-500' }, 'Your identity has been verified. You are fully set up as an ambassador.'),
        ]);
      }

      if (kycStatus === 'SUBMITTED') {
        return ambAcctCard('Identity Verification', '🪪', [
          el('div', { className: 'flex items-center gap-2 mb-2' },
            el('span', { className: 'text-2xl' }, '🔍'),
            el('p', { className: 'font-bold text-yellow-700 text-base' }, 'KYC Under Review')
          ),
          el('p', { className: 'text-sm text-gray-500' }, 'Your documents have been submitted and are being reviewed. We\'ll notify you once approved.'),
        ]);
      }

      // NOT_SUBMITTED or REJECTED — show the form
      const isRejected = kycStatus === 'REJECTED';
      let kycPhone = u?.phone || '';
      let kycStreet = '', kycSuburb = '', kycCity = '', kycProvince = '', kycPostal = '';
      let kycIdType = 'South African ID', kycIdNumber = '', kycDocBase64 = '';
      let kycLoading = false;

      const formWrap = el('div', {});

      function renderKycForm() {
        formWrap.innerHTML = '';

        if (isRejected && ambData?.kycNote) {
          formWrap.append(
            el('div', { className: 'bg-red-50 border border-red-200 rounded-xl px-4 py-3 mb-4' },
              el('p', { className: 'text-xs font-black text-red-600 uppercase tracking-wide mb-1' }, '❌ Previous Submission Rejected'),
              el('p', { className: 'text-sm text-red-700' }, ambData.kycNote)
            )
          );
        }

        // Phone
        formWrap.append(el('div', { className: 'mb-3' },
          el('label', { className: 'block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1' }, 'Cell Number *'),
          el('input', { type: 'tel', placeholder: '+27 81 234 5678', value: kycPhone, className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand', onInput: e => { kycPhone = e.target.value; } })
        ));

        // Address
        formWrap.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-2' }, 'Residential Address *'));
        [
          { ph: 'Street address', val: kycStreet, set: v => { kycStreet = v; } },
          { ph: 'Suburb',         val: kycSuburb, set: v => { kycSuburb = v; } },
        ].forEach(f => {
          formWrap.append(el('div', { className: 'mb-2' },
            el('input', { type: 'text', placeholder: f.ph, value: f.val, className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand', onInput: e => f.set(e.target.value) })
          ));
        });
        const addrRow2 = el('div', { className: 'grid grid-cols-3 gap-2 mb-3' });
        [
          { ph: 'City',     val: kycCity,     set: v => { kycCity = v; } },
          { ph: 'Province', val: kycProvince, set: v => { kycProvince = v; } },
          { ph: 'Code',     val: kycPostal,   set: v => { kycPostal = v; } },
        ].forEach(f => {
          addrRow2.append(el('input', { type: 'text', placeholder: f.ph, value: f.val, className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand', onInput: e => f.set(e.target.value) }));
        });
        formWrap.append(addrRow2);

        // ID Type + Number
        formWrap.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-2' }, 'Identification *'));
        const idRow = el('div', { className: 'grid grid-cols-2 gap-2 mb-3' });
        const idTypeSel = el('select', { className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand' });
        ['South African ID', 'Passport', 'Driver\'s Licence'].forEach(opt => {
          const o = document.createElement('option'); o.value = opt; o.textContent = opt;
          if (opt === kycIdType) o.selected = true;
          idTypeSel.append(o);
        });
        idTypeSel.addEventListener('change', e => { kycIdType = e.target.value; });
        const idNumInput = el('input', { type: 'text', placeholder: 'ID / Passport Number', value: kycIdNumber, className: 'w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand', onInput: e => { kycIdNumber = e.target.value; } });
        idRow.append(idTypeSel, idNumInput);
        formWrap.append(idRow);

        // ID Document upload
        formWrap.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-2' }, 'Certified ID Document *'));
        const docLabel = el('label', { className: 'flex items-center gap-3 border-2 border-dashed border-gray-200 rounded-xl p-4 cursor-pointer hover:border-brand transition' });
        const docInput = el('input', { type: 'file', className: 'hidden' });
        docInput.accept = 'image/*,application/pdf';
        const docPreview = el('div', {});
        if (kycDocBase64) {
          docPreview.append(el('img', { className: 'h-16 rounded-lg object-cover', src: kycDocBase64, alt: 'ID Doc' }));
        } else {
          docPreview.append(
            el('div', { className: 'w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-xl' }, '🪪'),
            el('div', {},
              el('p', { className: 'text-sm font-semibold text-gray-700' }, 'Upload Certified ID Document'),
              el('p', { className: 'text-xs text-gray-400' }, 'JPG, PNG, or PDF · Max 5MB')
            )
          );
        }
        docLabel.append(docPreview, docInput);
        docInput.addEventListener('change', async e => {
          const file = e.target.files[0];
          if (!file) return;
          docPreview.innerHTML = '';
          docPreview.append(el('p', { className: 'text-xs text-gray-400' }, 'Processing…'));
          kycDocBase64 = await compressImage(file, 900, 0.82);
          renderKycForm();
        });
        formWrap.append(el('div', { className: 'mb-4' }, docLabel));

        const submitKycBtn = el('button', {
          className: 'w-full bg-brand text-white font-bold py-3 rounded-xl hover:opacity-90 transition flex items-center justify-center gap-2',
          onClick: submitKyc,
        });
        submitKycBtn.append(kycLoading ? spinner() : document.createTextNode(isRejected ? 'Resubmit KYC Documents' : 'Submit KYC Documents'));
        formWrap.append(submitKycBtn);
      }

      async function submitKyc() {
        if (!kycPhone.trim() || !kycStreet.trim() || !kycCity.trim() || !kycIdNumber.trim() || !kycDocBase64) {
          toast('Please fill in all required fields and upload your ID document'); return;
        }
        kycLoading = true; renderKycForm();
        try {
          await api.ambassadors.submitKyc(ambData.id, {
            phone: kycPhone,
            address: { street: kycStreet, suburb: kycSuburb, city: kycCity, province: kycProvince, postalCode: kycPostal },
            idType: kycIdType,
            idNumber: kycIdNumber,
            idDocumentUrl: kycDocBase64,
          });
          toast('KYC submitted! We will review your documents shortly 🎉', 'success');
          // Reload ambassador data
          api.ambassadors.me().then(amb => { ambData = amb; loadAmbAccountView(); }).catch(() => {});
        } catch (err) { toast(err.message || 'Failed to submit KYC'); kycLoading = false; renderKycForm(); }
      }

      renderKycForm();
      return ambAcctCard('Identity Verification (KYC)', '🪪', [
        el('p', { className: 'text-sm text-gray-500 mb-4' }, 'To become a fully active ambassador we need to verify your identity. Please provide your details below.'),
        formWrap,
      ]);
    }

    const cards = [
      ambAcctCard('My Profile', '👤', [
        el('p', { className: 'font-bold text-gray-900 text-base' }, `${u?.firstName || ''} ${u?.lastName || ''}`),
        el('p', { className: 'text-sm text-gray-500 mt-0.5' }, u?.email || ''),
        u?.phone ? el('p', { className: 'text-sm text-gray-500 mt-0.5' }, u.phone) : null,
        el('span', { className: 'inline-block mt-2 px-3 py-1 bg-brand-light text-brand-dark text-xs font-bold rounded-full' }, '🌟 Ambassador'),
      ]),
      ambData?.code ? ambAcctCard('My Referral Code', '🎟️', [
        el('p', { className: 'text-3xl font-black text-brand tracking-widest mb-3' }, ambData.code),
        el('p', { className: 'text-sm text-gray-500 mb-3' }, 'Share this code with customers to earn commission on their orders.'),
        el('button', {
          className: 'bg-brand text-white font-bold text-sm px-5 py-2 rounded-xl hover:opacity-90 transition',
          onClick: () => { navigator.clipboard?.writeText(ambData.code).then(() => toast('Code copied!', 'success')); },
        }, '📋 Copy to Clipboard'),
      ]) : null,
      makeKycCard(),
      ambAcctCard('My Stats', '📊', [
        el('div', { className: 'space-y-2' },
          el('div', { className: 'flex justify-between text-sm' },
            el('span', { className: 'text-gray-500' }, 'Orders Referred'),
            el('span', { className: 'font-bold text-gray-900' }, String(ambOrders.length))
          ),
          el('div', { className: 'flex justify-between text-sm' },
            el('span', { className: 'text-gray-500' }, 'Total Commission Earned'),
            el('span', { className: 'font-bold text-green-600' }, `R${ambOrders.reduce((s, o) => s + (o.commission?.amount ? Number(o.commission.amount) : 0), 0).toFixed(2)}`)
          )
        ),
      ]),
      ambAcctCard('Sign Out', '🚪', [
        el('p', { className: 'text-sm text-gray-500 mb-4' }, `Signed in as ${u?.email || 'you'}.`),
        el('button', { className: 'text-red-500 font-bold text-sm hover:opacity-80', onClick: store.logout.bind(store) }, 'Log out'),
      ]),
    ].filter(Boolean);

    ambAccountView.append(
      el('div', { className: 'flex items-center gap-3 mb-6' },
        el('button', {
          className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80',
          onClick: () => { currentView = 'dashboard'; updateView(); renderSidebar(); },
        }, '← Back'),
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'My Account')
      ),
      el('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' }, ...cards)
    );
  }

  function ambAcctCard(title, icon, children) {
    return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
      el('div', { className: 'flex items-center gap-2 mb-4 pb-3 border-b border-gray-100' },
        el('span', { className: 'text-2xl' }, icon),
        el('p', { className: 'font-black text-gray-900' }, title)
      ),
      ...children.filter(Boolean)
    );
  }

  // ── CART VIEW ──────────────────────────────────────────────────────────────
  const ambCartView = el('div', { className: 'hidden w-full py-6 max-w-2xl mx-auto' });
  const ambCheckoutView = el('div', { className: 'hidden w-full py-6 max-w-2xl mx-auto' });

  function loadAmbCartView() {
    ambCartView.innerHTML = '';

    // Header
    ambCartView.append(
      el('div', { className: 'flex items-center gap-3 mb-6' },
        el('button', { className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80', onClick: () => { currentView = 'browse'; updateView(); renderSidebar(); } }, '← Continue Shopping'),
        el('h2', { className: 'text-xl font-black text-gray-900 flex-1' }, '🛒 My Cart'),
        cart.length ? el('span', { className: 'text-sm text-gray-400' }, `${cartCount()} item${cartCount() !== 1 ? 's' : ''}`) : null,
      )
    );

    if (!cart.length) {
      ambCartView.append(
        el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },
          el('p', { className: 'text-6xl mb-4' }, '🛒'),
          el('p', { className: 'font-black text-gray-900 text-lg mb-1' }, 'Your cart is empty'),
          el('p', { className: 'text-sm text-gray-400 mb-6' }, 'Browse products and add some treats!'),
          el('button', { className: 'bg-brand text-white font-bold px-6 py-3 rounded-xl hover:opacity-90', onClick: () => { currentView = 'browse'; updateView(); renderSidebar(); } }, '🛍️ Browse Products')
        )
      );
      return;
    }

    // Items list
    const itemsList = el('div', { className: 'bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4' });
    cart.forEach((item, idx) => {
      const subtotal = item.unitPrice * item.quantity;
      const row = el('div', { className: 'flex items-center gap-4 p-4 border-b border-gray-50 last:border-0' });

      const imgBox = el('div', { className: 'w-16 h-16 rounded-xl overflow-hidden bg-orange-50 flex-shrink-0 flex items-center justify-center' });
      if (item.productImg) {
        const img = document.createElement('img'); img.src = item.productImg; img.className = 'w-full h-full object-cover'; imgBox.append(img);
      } else { imgBox.append(makeLogo(32, 'rounded-lg opacity-40')); }
      row.append(imgBox);

      row.append(el('div', { className: 'flex-1 min-w-0' },
        el('p', { className: 'font-bold text-gray-900 text-sm truncate' }, item.productName),
        el('p', { className: 'text-xs text-gray-400 mt-0.5' }, item.variantName),
        el('p', { className: 'text-xs text-brand font-semibold mt-0.5' }, `R${item.unitPrice.toFixed(2)} each`),
      ));

      row.append(el('div', { className: 'flex items-center gap-2 flex-shrink-0' },
        el('button', {
          className: 'w-7 h-7 rounded-full bg-gray-100 font-bold text-gray-600 hover:bg-gray-200 flex items-center justify-center text-sm transition',
          onClick: () => { if (item.quantity > 1) { item.quantity--; } else { cart.splice(idx, 1); } updateCartBadge(); loadAmbCartView(); }
        }, '−'),
        el('span', { className: 'w-6 text-center text-sm font-bold text-gray-900' }, String(item.quantity)),
        el('button', {
          className: 'w-7 h-7 rounded-full bg-gray-100 font-bold text-gray-600 hover:bg-gray-200 flex items-center justify-center text-sm transition',
          onClick: () => { item.quantity++; updateCartBadge(); loadAmbCartView(); }
        }, '+'),
      ));

      row.append(el('div', { className: 'text-right flex-shrink-0 ml-2' },
        el('p', { className: 'font-black text-gray-900 text-sm' }, `R${subtotal.toFixed(2)}`),
        el('button', {
          className: 'text-xs text-red-400 hover:text-red-600 mt-1 transition',
          onClick: () => { cart.splice(idx, 1); updateCartBadge(); loadAmbCartView(); }
        }, 'Remove')
      ));
      itemsList.append(row);
    });
    ambCartView.append(itemsList);

    // Ambassador pricing note
    ambCartView.append(
      el('div', { className: 'bg-orange-50 border border-brand border-opacity-20 rounded-xl px-4 py-3 mb-4 flex items-center gap-2' },
        el('span', { className: 'text-xl' }, '🌟'),
        el('p', { className: 'text-sm text-brand-dark font-semibold' }, 'Ambassador pricing applied to your order')
      )
    );

    // Order summary
    const total = cartTotal();
    ambCartView.append(
      el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5' },
        el('div', { className: 'flex justify-between text-sm text-gray-600 mb-2' },
          el('span', {}, 'Subtotal'), el('span', { className: 'font-semibold' }, `R${cartTotal().toFixed(2)}`)
        ),
        el('div', { className: 'flex justify-between text-sm text-gray-600 mb-3' },
          el('span', {}, 'Delivery'), el('span', { className: 'font-semibold' }, 'Free')
        ),
        el('div', { className: 'flex justify-between font-black text-gray-900 text-lg border-t border-gray-100 pt-3' },
          el('span', {}, 'Total'), el('span', { className: 'text-brand' }, `R${total.toFixed(2)}`)
        )
      ),
      el('button', {
        className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base',
        onClick: () => { currentView = 'checkout'; checkoutData.step = 1; updateView(); renderSidebar(); }
      }, `Proceed to Checkout — R${total.toFixed(2)}`)
    );
  }

  // ── CHECKOUT VIEW ──────────────────────────────────────────────────────────
  function loadAmbCheckoutView() {
    ambCheckoutView.innerHTML = '';
    const step = checkoutData.step || 1;

    // Step indicator
    const steps = ['Delivery', 'Review', 'Done'];
    const stepBar = el('div', { className: 'flex items-center gap-2 mb-6' });
    steps.forEach((s, i) => {
      const num = i + 1;
      const active = step === num, done = step > num;
      stepBar.append(
        el('div', { className: 'flex items-center gap-1.5' },
          el('div', { className: `w-7 h-7 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 transition ${done ? 'bg-green-500 text-white' : active ? 'bg-brand text-white' : 'bg-gray-200 text-gray-400'}` }, done ? '✓' : String(num)),
          el('span', { className: `text-sm font-semibold ${active ? 'text-gray-900' : 'text-gray-400'}` }, s),
        ),
        i < steps.length - 1 ? el('div', { className: 'flex-1 h-px bg-gray-200 mx-1' }) : null
      );
    });
    ambCheckoutView.append(
      el('div', { className: 'flex items-center gap-3 mb-2' },
        el('button', {
          className: 'text-brand font-semibold text-sm flex items-center gap-1 hover:opacity-80',
          onClick: () => { if (step === 1) { currentView = 'cart'; updateView(); renderSidebar(); } else { checkoutData.step = step - 1; loadAmbCheckoutView(); } }
        }, '← Back'),
        el('h2', { className: 'text-xl font-black text-gray-900' }, 'Checkout')
      ),
      stepBar
    );

    // STEP 1: Delivery address
    if (step === 1) {
      const card = el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-4' });
      card.append(el('h3', { className: 'font-black text-gray-900 mb-4 flex items-center gap-2' }, '📍 Delivery Address'));

      const addrWrap = el('div', { className: 'mb-4' });
      card.append(addrWrap);

      function renderAddressOptions(addresses) {
        addrWrap.innerHTML = '';
        if (addresses.length > 0) {
          addrWrap.append(el('p', { className: 'text-xs font-bold text-gray-500 uppercase tracking-wide mb-2' }, 'Saved Addresses'));
          addresses.forEach(addr => {
            const isSelected = checkoutData.selectedAddressId === addr.id;
            addrWrap.append(el('button', {
              className: `w-full text-left p-3 rounded-xl border-2 mb-2 transition ${isSelected ? 'border-brand bg-orange-50' : 'border-gray-200 hover:border-brand'}`,
              onClick: () => { checkoutData.selectedAddressId = addr.id; checkoutData.useNewAddress = false; renderAddressOptions(addresses); }
            },
              el('p', { className: 'text-sm font-bold text-gray-800' }, addr.label || addr.city),
              el('p', { className: 'text-xs text-gray-500 mt-0.5' }, `${addr.street}, ${addr.suburb ? addr.suburb + ', ' : ''}${addr.city}, ${addr.province} ${addr.postalCode}`)
            ));
          });
          addrWrap.append(el('button', {
            className: `w-full text-left p-3 rounded-xl border-2 mb-2 transition ${checkoutData.useNewAddress ? 'border-brand bg-orange-50' : 'border-dashed border-gray-300 hover:border-brand text-gray-500'}`,
            onClick: () => { checkoutData.useNewAddress = true; checkoutData.selectedAddressId = null; renderAddressOptions(addresses); }
          }, el('span', { className: 'text-sm font-semibold' }, '+ Add a new address')));
        } else {
          checkoutData.useNewAddress = true;
        }

        if (checkoutData.useNewAddress || addresses.length === 0) {
          const formGrid = el('div', { className: 'space-y-3 mt-3' });
          const field = (placeholder, key, required = false) => el('input', {
            type: 'text', placeholder: placeholder + (required ? ' *' : ''),
            value: checkoutData[key] || '',
            className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition',
            onInput: (e) => checkoutData[key] = e.target.value,
          });
          formGrid.append(
            field('Street address', 'street', true),
            el('div', { className: 'grid grid-cols-2 gap-3' }, field('Suburb (optional)', 'suburb'), field('City', 'city', true)),
            el('div', { className: 'grid grid-cols-2 gap-3' }, field('Province', 'province', true), field('Postal code', 'postalCode', true))
          );
          addrWrap.append(formGrid);
        }
      }

      api.addresses.getAll().then(addrs => {
        savedAddresses = addrs;
        if (addrs.length > 0 && !checkoutData.selectedAddressId && !checkoutData.useNewAddress) {
          const def = addrs.find(a => a.isDefault) || addrs[0];
          checkoutData.selectedAddressId = def.id;
        }
        renderAddressOptions(addrs);
      }).catch(() => { checkoutData.useNewAddress = true; renderAddressOptions([]); });

      card.append(
        el('h3', { className: 'font-black text-gray-900 mb-2 mt-5 flex items-center gap-2' }, '📝 Order Notes'),
        el('textarea', {
          placeholder: 'Any special instructions, allergies, or delivery notes…',
          rows: 3, value: checkoutData.notes || '',
          className: 'w-full border border-gray-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-brand transition resize-none',
          onInput: (e) => checkoutData.notes = e.target.value,
        })
      );
      ambCheckoutView.append(card);
      ambCheckoutView.append(el('button', {
        className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base',
        onClick: () => {
          if (checkoutData.useNewAddress || !checkoutData.selectedAddressId) {
            if (!checkoutData.street || !checkoutData.city || !checkoutData.province || !checkoutData.postalCode) {
              toast('Please fill in all required address fields', 'error'); return;
            }
          }
          checkoutData.step = 2; loadAmbCheckoutView();
        }
      }, 'Next: Review Order →'));
    }

    // STEP 2: Review & confirm
    if (step === 2) {
      const itemsCard = el('div', { className: 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-3' });
      itemsCard.append(el('h3', { className: 'font-black text-gray-900 mb-3' }, '🛒 Order Summary'));
      cart.forEach(item => {
        itemsCard.append(el('div', { className: 'flex justify-between items-center py-2 border-b border-gray-50 last:border-0 text-sm' },
          el('div', {},
            el('span', { className: 'font-semibold text-gray-800' }, `${item.quantity}× ${item.productName}`),
            el('span', { className: 'text-gray-400 ml-1' }, `— ${item.variantName}`)
          ),
          el('span', { className: 'font-bold text-gray-900' }, `R${(item.unitPrice * item.quantity).toFixed(2)}`)
        ));
      });
      itemsCard.append(el('div', { className: 'flex justify-between font-black text-brand text-lg mt-3 pt-2 border-t border-gray-100' },
        el('span', {}, 'Total'), el('span', {}, `R${cartTotal().toFixed(2)}`)
      ));
      ambCheckoutView.append(itemsCard);

      // Ambassador pricing badge
      ambCheckoutView.append(
        el('div', { className: 'bg-orange-50 border border-brand border-opacity-20 rounded-xl px-4 py-3 mb-3 flex items-center gap-2' },
          el('span', {}, '🌟'),
          el('span', { className: 'text-sm text-brand-dark font-semibold' }, 'Ambassador pricing applied')
        )
      );

      // Address summary
      let addrText = '';
      if (checkoutData.selectedAddressId) {
        const addr = savedAddresses.find(a => a.id === checkoutData.selectedAddressId);
        if (addr) addrText = `${addr.street}${addr.suburb ? ', ' + addr.suburb : ''}, ${addr.city}, ${addr.province} ${addr.postalCode}`;
      } else {
        addrText = `${checkoutData.street}${checkoutData.suburb ? ', ' + checkoutData.suburb : ''}, ${checkoutData.city}, ${checkoutData.province} ${checkoutData.postalCode}`;
      }
      ambCheckoutView.append(el('div', { className: 'bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-3 text-sm' },
        el('p', { className: 'font-bold text-gray-700 mb-1' }, '📍 Delivering to:'),
        el('p', { className: 'text-gray-600' }, addrText),
        checkoutData.notes ? el('div', { className: 'mt-2 pt-2 border-t border-gray-100' },
          el('p', { className: 'font-bold text-gray-700 mb-0.5' }, '📝 Notes:'),
          el('p', { className: 'text-gray-600' }, checkoutData.notes)
        ) : null,
      ));

      const confirmBtn = el('button', {
        className: 'w-full bg-brand text-white font-black py-4 rounded-2xl hover:opacity-90 transition text-base flex items-center justify-center gap-2',
        onClick: async () => {
          confirmBtn.disabled = true;
          confirmBtn.innerHTML = '';
          confirmBtn.append(spinner(), document.createTextNode(' Placing order…'));
          try {
            let addressId = checkoutData.selectedAddressId;
            if (!addressId && (checkoutData.useNewAddress || !checkoutData.selectedAddressId)) {
              const newAddr = await api.addresses.create({
                street: checkoutData.street,
                suburb: checkoutData.suburb || undefined,
                city: checkoutData.city,
                province: checkoutData.province,
                postalCode: checkoutData.postalCode,
                isDefault: savedAddresses.length === 0,
              });
              addressId = newAddr.id;
            }
            await api.orders.create({
              items: cart.map(i => ({ variantId: i.variantId, quantity: i.quantity })),
              addressId: addressId || undefined,
              notes: checkoutData.notes || undefined,
            });
            cart = [];
            checkoutData = { street: '', suburb: '', city: '', province: '', postalCode: '', notes: '', step: 1, useNewAddress: false, selectedAddressId: null };
            updateCartBadge();
            checkoutData.step = 3;
            loadAmbCheckoutView();
          } catch (err) {
            toast(err?.message || 'Failed to place order. Please try again.', 'error');
            confirmBtn.disabled = false;
            confirmBtn.textContent = `Confirm Order — R${cartTotal().toFixed(2)}`;
          }
        }
      }, `Confirm Order — R${cartTotal().toFixed(2)}`);
      ambCheckoutView.append(confirmBtn);
    }

    // STEP 3: Success
    if (step === 3) {
      ambCheckoutView.append(
        el('div', { className: 'bg-white rounded-2xl p-12 text-center shadow-sm border border-gray-100' },
          el('div', { className: 'text-6xl mb-4' }, '🎉'),
          el('h2', { className: 'text-2xl font-black text-gray-900 mb-2' }, 'Order Placed!'),
          el('p', { className: 'text-gray-500 mb-6' }, "Your order has been received. We'll get baking right away!"),
          el('div', { className: 'flex flex-col sm:flex-row gap-3 justify-center' },
            el('button', {
              className: 'bg-brand text-white font-bold px-6 py-3 rounded-xl hover:opacity-90 transition',
              onClick: () => { currentView = 'orders'; updateView(); renderSidebar(); }
            }, '📦 Track My Order'),
            el('button', {
              className: 'border border-brand text-brand font-bold px-6 py-3 rounded-xl hover:bg-orange-50 transition',
              onClick: () => { currentView = 'browse'; updateView(); renderSidebar(); }
            }, '🛍️ Keep Shopping')
          )
        )
      );
    }
  }

  // ── VIEW SWITCHER ──────────────────────────────────────────────────────────
  main.append(dashboardView, browseView, ambOrdersView, ambAccountView, ambCartView, ambCheckoutView);

  function updateView() {
    dashboardView.classList.toggle('hidden',    currentView !== 'dashboard');
    browseView.classList.toggle('hidden',       currentView !== 'browse');
    ambOrdersView.classList.toggle('hidden',    currentView !== 'orders');
    ambAccountView.classList.toggle('hidden',   currentView !== 'account');
    ambCartView.classList.toggle('hidden',      currentView !== 'cart');
    ambCheckoutView.classList.toggle('hidden',  currentView !== 'checkout');
    // Show search bar only in browse
    searchWrap.classList.toggle('hidden', currentView !== 'browse');
    navSpacer.classList.toggle('hidden',  currentView === 'browse');
    // Highlight cart button when active
    cartNavBtn.classList.toggle('bg-white', currentView === 'cart');
    cartNavBtn.classList.toggle('text-brand', currentView === 'cart');
    cartNavBtn.classList.toggle('bg-opacity-100', currentView === 'cart');
    if (currentView === 'orders')   loadAmbOrdersView();
    if (currentView === 'account')  loadAmbAccountView();
    if (currentView === 'cart')     loadAmbCartView();
    if (currentView === 'checkout') loadAmbCheckoutView();
    if (currentView === 'browse' && !allProducts.length) loadBrowseProducts();
  }

  function loadBrowseProducts() {
    ambGrid.innerHTML = '<div class="col-span-full flex justify-center py-16"><div class="spinner" style="border-color:rgba(139,58,58,0.2);border-top-color:#8B3A3A"></div></div>';
    api.products.getAll().then(products => {
      allProducts = products;
      const catMap = new Map();
      products.forEach(p => { if (p.category) catMap.set(p.category.id, p.category); });
      categories = [...catMap.values()];
      renderCatFilter();
      renderAmbProducts();
    }).catch(() => {
      ambGrid.innerHTML = '<p class="col-span-full text-center text-red-400 py-10 text-sm">Failed to load products. Make sure the API is running.</p>';
    });
  }

  // Initial load
  renderSidebar();
  loadDashboard();
  updateView();
  return shell;
}

function svgIcon(pathD, size = 20) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '2');
  svg.setAttribute('stroke-linecap', 'round');
  svg.setAttribute('stroke-linejoin', 'round');
  // Support multiple paths (space-separated path data won't work; use | delimiter)
  pathD.split('|').forEach(d => {
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', d.trim());
    svg.append(path);
  });
  return svg;
}

function AdminOverviewPage() {
  let activeModule = 'dashboard';
  let adminData = { orders: [], ambassadors: [], products: [], customers: [], stockItems: [], suppliers: [], purchaseOrders: [], recipes: [], productionRuns: [] };
  let dataLoaded = false;

  // ── ROOT SHELL ──────────────────────────────────────────────────────

    makeLogo(34, 'rounded-lg flex-shrink-0'),
    el('div', {},
      el('p', { className: 'text-white font-black text-sm leading-tight' }, 'Tlaka Treats'),
      el('p', { className: 'text-gray-500 text-xs' }, 'Admin Console')

  );
  sidebar.append(sidebarLogo);

  // Nav
  const nav = el('nav', { className: 'flex-1 overflow-y-auto py-3 px-2' });

  function updateNav() {
    nav.innerHTML = '';
    let soonHeaderAdded = false;
    ADMIN_NAV.forEach(item => {
      if (item.soon && !soonHeaderAdded) {
        nav.append(el('div', { className: 'border-t border-gray-800 mt-2 mb-3 mx-1' }));
        nav.append(el('p', { className: 'text-gray-600 text-xs font-semibold uppercase tracking-wider px-3 pb-1' }, 'Coming Soon'));
        soonHeaderAdded = true;
      }
      const isActive = activeModule === item.id && !item.soon;
      const navBtn = el('button', {
        className: `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-0.5 text-sm font-medium transition-all text-left ${

          item.soon  ? 'text-gray-600 cursor-default' :

          activeModule = item.id;
          updateNav();
          updateTopbar();
          renderContent();

      },
        svgIcon(item.icon, 16),
        el('span', { className: 'flex-1 truncate' }, item.label),
        item.soon ? el('span', { className: 'text-xs bg-gray-800 text-gray-600 px-1.5 py-0.5 rounded flex-shrink-0' }, 'Soon') : null

    el('p', { className: 'text-gray-600 text-xs truncate' }, store.user?.email || 'Admin')

  // Topbar

  const topbarTitle    = el('h1', { className: 'text-sm font-bold text-gray-900 leading-tight' }, 'Dashboard');
  const topbarSubtitle = el('p',  { className: 'text-xs text-gray-400' }, 'Overview of your business');
  topbar.append(
    el('div', {}, topbarTitle, topbarSubtitle),
    el('div', { className: 'flex items-center gap-3' },
      el('div', { className: 'w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white text-xs font-bold flex-shrink-0' },
        ((store.user?.firstName?.[0] || '') + (store.user?.lastName?.[0] || '')).toUpperCase() || 'AD'
      ),
      el('button', {
        className: 'text-xs font-semibold text-gray-500 hover:text-red-600 transition px-3 py-1.5 rounded-lg hover:bg-red-50',
        onClick: store.logout.bind(store),
      }, 'Logout')
    )
  );

  function updateTopbar() {
    const meta = MODULE_META[activeModule] || {};
    topbarTitle.textContent    = meta.title    || '';
    topbarSubtitle.textContent = meta.subtitle || '';
  }

  // Content area
  const contentArea = el('div', { className: 'flex-1 overflow-auto bg-gray-50' });

  function renderContent() {
    contentArea.innerHTML = '';
    if (!dataLoaded) {
      contentArea.append(el('div', { className: 'flex justify-center items-center h-64' },
        el('div', { className: 'spinner', style: { borderColor: 'rgba(139,58,58,0.2)', borderTopColor: '#8B3A3A' } })
      ));
      return;
    }
    renderAdminModule(activeModule, adminData, contentArea, reloadData);
  }

  mainArea.append(topbar, contentArea);
  shell.append(sidebar, mainArea);

  // Data loading
  async function reloadData() {
    dataLoaded = false;
    renderContent();
    try {
      const [orders, ambassadors, products, customers, stockItems, suppliers, purchaseOrders, recipes, productionRuns] = await Promise.all([
        api.orders.getAll(), api.ambassadors.getAll(), api.products.getAllAdmin(), api.customers.getAll(),
        api.inventory.getAll().catch(() => []),
        api.suppliers.getAll().catch(() => []),
        api.suppliers.getAllPOs().catch(() => []),
        api.recipes.getAll().catch(() => []),
        api.production.getAll().catch(() => []),
      ]);
      adminData = { orders, ambassadors, products, customers, stockItems, suppliers, purchaseOrders, recipes, productionRuns };
      dataLoaded = true;
      renderContent();
    } catch {
      contentArea.innerHTML = '';
      contentArea.append(el('div', { className: 'flex flex-col items-center justify-center h-64 text-center p-6' },
        el('p', { className: 'text-red-500 font-semibold mb-1' }, 'Failed to load data'),
        el('p', { className: 'text-gray-400 text-sm mb-4' }, 'Make sure the API is running'),
        el('button', {
          className: 'px-4 py-2 bg-brand text-white text-sm font-semibold rounded-lg hover:opacity-90',
          onClick: reloadData
        }, 'Retry')
      ));
    }
  }

  updateNav();
  updateTopbar();
  reloadData();
  return shell;
}

// ── MODULE ROUTER ────────────────────────────────────────────────────────
function renderAdminModule(module, data, container, reload) {
  switch (module) {
    case 'dashboard':   renderAdminDashboard(data, container, reload);   break;
    case 'orders':      renderAdminOrders(data, container, reload);      break;
    case 'products':    renderAdminProducts(data, container, reload);    break;
    case 'customers':   renderAdminCustomers(data, container, reload);   break;
    case 'ambassadors': renderAdminAmbassadors(data, container, reload); break;
    case 'inventory':   renderAdminInventory(data, container, reload);  break;
    case 'suppliers':   renderAdminSuppliers(data, container, reload);  break;
    case 'recipes':     renderAdminRecipes(data, container, reload);    break;
    case 'production':  renderAdminProduction(data, container, reload); break;
    case 'finance':     renderAdminFinance(container);                   break;
    case 'reports':     renderAdminReports(data, container);             break;
    case 'settings':    renderAdminSettings(data, container, reload);    break;
    default:            renderAdminSoon(module, container);              break;
  }
}

    kpiCard('Total Orders',         String(orders.length),      '#3B82F6', 'M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z|M3 6h18'),
    kpiCard('Pending Orders',       String(pendingOrders),      '#F59E0B', 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'),
    kpiCard('Active Ambassadors',   String(activeAmb),          '#8B5CF6', 'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2|M9 11a4 4 0 100-8 4 4 0 000 8z')
  ));

  // Recent Orders table
  page.append(
    el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6' },
      el('div', { className: 'px-5 py-4 border-b border-gray-100 flex justify-between items-center' },
        el('h3', { className: 'font-bold text-gray-900 text-sm' }, 'Recent Orders'),
        el('span', { className: 'text-xs text-gray-400' }, `${orders.length} total`)
      ),
      el('div', { className: 'divide-y divide-gray-50' },
        ...(orders.length === 0
          ? [el('p', { className: 'text-center text-gray-400 py-10 text-sm' }, 'No orders yet')]
          : orders.slice(0, 8).map(order =>
              el('div', { className: 'flex items-center justify-between px-5 py-3' },
                el('div', {},
                  el('p', { className: 'text-sm font-semibold text-gray-900' }, `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`),
                  el('p', { className: 'text-xs text-gray-400' }, order.ambassador ? `via ${order.ambassador.code}` : 'Direct order')
                ),
                el('div', { className: 'flex items-center gap-3' },
                  el('p', { className: 'text-sm font-bold text-gray-900' }, `R${Number(order.total).toFixed(2)}`),
                  badge(order.status, STATUS_COLORS[order.status])
                )
              )
            )
        )
      )
    )
  );

  // Quick stats row
  page.append(el('div', { className: 'grid grid-cols-2 gap-4' },
    el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
      el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3' }, 'Products'),
      el('div', { className: 'flex justify-between' },
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-green-600' }, String(activeProducts)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Active')
        ),
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-gray-400' }, String(products.length - activeProducts)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Inactive')
        ),
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-gray-900' }, String(products.length)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Total')
        )
      )
    ),
    el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
      el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3' }, 'Ambassadors'),
      el('div', { className: 'flex justify-between' },
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-green-600' }, String(activeAmb)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Active')
        ),
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-yellow-500' }, String(ambassadors.filter(a => a.status === 'PENDING').length)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Pending')
        ),
        el('div', { className: 'text-center' },
          el('p', { className: 'text-2xl font-black text-gray-900' }, String(ambassadors.length)),
          el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Total')
        )
      )
    )
  ));

  container.append(page);
}

function kpiCard(label, value, color, iconPath) {
  return el('div', { className: 'bg-white rounded-xl p-5 shadow-sm border border-gray-100' },
    el('div', { className: 'flex items-start justify-between mb-3' },
      el('p', { className: 'text-xs font-semibold text-gray-500 uppercase tracking-wide leading-tight' }, label),
      el('div', { className: 'w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0', style: { backgroundColor: color + '20', color } },
        svgIcon(iconPath, 15)
      )
    ),
    el('p', { className: 'text-2xl font-black', style: { color } }, value)
  );
}

// ── ORDERS MODULE ─────────────────────────────────────────────────────────
// ── Status workflow config ─────────────────────────────────────────────────
const STATUS_SEQUENCE = ['PENDING','CONFIRMED','BAKING','READY','DELIVERED'];
const STATUS_NEXT_ACTION = {
  PENDING:   { label: '✓ Confirm Order',  next: 'CONFIRMED',  btnClass: 'bg-blue-500 hover:bg-blue-600 text-white'    },
  CONFIRMED: { label: '▶ Advance Order',  next: 'BAKING',     btnClass: 'bg-purple-500 hover:bg-purple-600 text-white' },
  BAKING:    { label: '✅ Mark Ready',    next: 'READY',      btnClass: 'bg-green-500 hover:bg-green-600 text-white'   },
  READY:     { label: '🚚 Mark Delivered',next: 'DELIVERED',  btnClass: 'bg-gray-600 hover:bg-gray-700 text-white'     },
};

function renderAdminOrders(data, container, reload) {
  let allOrders = [...data.orders];
  let searchQ = '', statusFilter = '', sortDir = 'desc';
  let expandedId = null;

  const page = el('div', { className: 'p-6 max-w-6xl mx-auto' });

  // ── STATUS FILTER CHIPS ─────────────────────────────────────────────────
  const chipsRow = el('div', { className: 'flex gap-2 flex-wrap mb-5' });

  function renderChips() {
    chipsRow.innerHTML = '';
    const active = statusFilter === '';
    chipsRow.append(el('button', {
      className: `px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${active ? 'bg-gray-800 border-gray-800 text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-400'}`,
      onClick: () => { statusFilter = ''; renderChips(); renderTable(); },
    }, `All (${allOrders.length})`));

    ['PENDING','CONFIRMED','BAKING','READY','DELIVERED','CANCELLED'].forEach(s => {
      const count = allOrders.filter(o => o.status === s).length;
      const isActive = statusFilter === s;
      const btn = el('button', {
        className: `flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold border-2 transition ${isActive ? 'text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-gray-300'}`,
        style: isActive ? { backgroundColor: STATUS_COLORS[s], borderColor: STATUS_COLORS[s] } : {},
        onClick: () => { statusFilter = s; renderChips(); renderTable(); },
      },
        el('span', { className: 'w-2 h-2 rounded-full flex-shrink-0', style: { backgroundColor: isActive ? 'rgba(255,255,255,0.6)' : STATUS_COLORS[s] } }),
        s,
        el('span', { className: `text-xs px-1.5 py-0 rounded-full ml-0.5 ${isActive ? 'bg-white bg-opacity-25 text-white' : 'bg-gray-100 text-gray-500'}` }, String(count))
      );
      chipsRow.append(btn);
    });
  }
  page.append(chipsRow);

  // ── TOOLBAR ─────────────────────────────────────────────────────────────
  const toolbar = el('div', { className: 'flex flex-wrap items-center gap-3 mb-5' });

  const searchBox = el('input', {
    type: 'text', placeholder: '🔍  Search by customer name, email, or ambassador code…',
    className: 'flex-1 min-w-56 bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
    onInput: e => { searchQ = e.target.value; renderTable(); },
  });

  const sortSel = el('select', {
    className: 'bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-brand',
  });
  [['desc','Newest first'],['asc','Oldest first'],['total-desc','Highest value'],['total-asc','Lowest value']].forEach(([v,l]) => {
    const o = document.createElement('option'); o.value = v; o.textContent = l; sortSel.append(o);
  });
  sortSel.addEventListener('change', e => { sortDir = e.target.value; renderTable(); });

  const revSummary = el('div', { className: 'ml-auto' });

  const placeOrderBtn = el('button', {
    className: 'bg-brand text-white text-sm font-bold px-4 py-2.5 rounded-xl hover:opacity-90 transition flex-shrink-0',
    onClick: () => showAdminPlaceOrderModal(data.customers, data.products, () => reload()),
  }, '+ Place Order for Client');

  toolbar.append(searchBox, sortSel, placeOrderBtn, revSummary);
  page.append(toolbar);

  // ── TABLE WRAPPER ───────────────────────────────────────────────────────
  const tableWrap = el('div', {});
  page.append(tableWrap);

  // ── HELPERS ─────────────────────────────────────────────────────────────
  function getFiltered() {
    const q = searchQ.toLowerCase().trim();
    let list = allOrders.filter(o => {
      if (statusFilter && o.status !== statusFilter) return false;
      if (q) {
        const name  = `${o.customer?.firstName || ''} ${o.customer?.lastName || ''}`.toLowerCase();
        const email = (o.customer?.email  || '').toLowerCase();
        const code  = (o.ambassador?.code || '').toLowerCase();
        const phone = (o.customer?.phone  || '').toLowerCase();
        if (!name.includes(q) && !email.includes(q) && !code.includes(q) && !phone.includes(q)) return false;
      }
      return true;
    });
    if (sortDir === 'asc')        list.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
    else if (sortDir === 'desc')  list.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    else if (sortDir === 'total-desc') list.sort((a,b) => Number(b.total) - Number(a.total));
    else if (sortDir === 'total-asc')  list.sort((a,b) => Number(a.total) - Number(b.total));
    return list;
  }

  function statusStepper(currentStatus) {
    const steps = STATUS_SEQUENCE;
    const currentIdx = steps.indexOf(currentStatus);
    const wrap = el('div', { className: 'flex items-center gap-1 flex-wrap' });
    steps.forEach((s, i) => {
      const done = i < currentIdx;
      const active = i === currentIdx;
      wrap.append(
        el('span', {
          className: `text-xs font-bold px-2 py-0.5 rounded-full transition ${active ? 'text-white' : done ? 'text-green-700 bg-green-100' : 'text-gray-300 bg-gray-100'}`,
          style: active ? { backgroundColor: STATUS_COLORS[s] } : {},
        }, s)
      );
      if (i < steps.length - 1) wrap.append(el('span', { className: 'text-gray-300 text-xs' }, '→'));
    });
    return wrap;
  }

  // ── RENDER TABLE ─────────────────────────────────────────────────────────
  function renderTable() {
    tableWrap.innerHTML = '';
    const filtered = getFiltered();
    const revenue  = filtered.reduce((s,o) => s + Number(o.total || 0), 0);

    // Revenue summary chip
    revSummary.innerHTML = '';
    revSummary.append(
      el('div', { className: 'bg-white rounded-lg px-4 py-2 border border-gray-200 text-sm whitespace-nowrap' },
        el('span', { className: 'text-gray-500' }, `${filtered.length} orders · `),
        el('span', { className: 'font-black text-gray-900' }, `R${revenue.toFixed(2)}`)
      )
    );

    if (!filtered.length) {
      tableWrap.append(el('div', { className: 'bg-white rounded-xl p-14 text-center shadow-sm border border-gray-100' },
        el('p', { className: 'text-4xl mb-3' }, '📦'),
        el('p', { className: 'font-bold text-gray-700 mb-1' }, 'No orders found'),
        el('p', { className: 'text-sm text-gray-400' }, searchQ ? 'Try adjusting your search' : 'No orders yet')
      )); return;
    }

    const table = el('div', { className: 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden' });

    // Column header (desktop only)
    table.append(
      el('div', { className: 'hidden md:grid grid-cols-12 bg-gray-50 border-b border-gray-100 px-5 py-3 text-xs font-black text-gray-400 uppercase tracking-wider' },
        el('div', { className: 'col-span-3' }, 'Customer'),
        el('div', { className: 'col-span-2' }, 'Date & Time'),
        el('div', { className: 'col-span-1 text-center' }, 'Items'),
        el('div', { className: 'col-span-2' }, 'Total'),
        el('div', { className: 'col-span-2' }, 'Ambassador'),
        el('div', { className: 'col-span-1' }, 'Status'),
        el('div', { className: 'col-span-1' }, '')
      )
    );

    const tbody = el('div', { className: 'divide-y divide-gray-50' });

    filtered.forEach(order => {
      const dateObj = new Date(order.createdAt);
      const dateStr = dateObj.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: '2-digit' });
      const timeStr = dateObj.toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
      const isExpanded = expandedId === order.id;
      const isTerminal = ['DELIVERED','CANCELLED'].includes(order.status);

      const rowWrap = el('div', {});

      // ── Main row ──
      const row = el('div', {
        className: `grid grid-cols-12 items-center gap-0 px-5 py-3.5 cursor-pointer hover:bg-gray-50 transition select-none ${isExpanded ? 'bg-orange-50 border-l-4 border-brand' : ''}`,
        onClick: () => { expandedId = isExpanded ? null : order.id; renderTable(); },
      });

      // Customer
      row.append(el('div', { className: 'col-span-6 md:col-span-3 min-w-0 pr-2' },
        el('p', { className: 'font-semibold text-gray-900 text-sm truncate' }, `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`),
        el('p', { className: 'text-xs text-gray-400 truncate' }, order.customer?.email || '—')
      ));
      // Date
      row.append(el('div', { className: 'hidden md:block col-span-2' },
        el('p', { className: 'text-sm text-gray-700' }, dateStr),
        el('p', { className: 'text-xs text-gray-400' }, timeStr)
      ));
      // Items count
      row.append(el('div', { className: 'hidden md:flex col-span-1 justify-center' },
        el('span', { className: 'bg-gray-100 text-gray-700 text-xs font-bold px-2 py-0.5 rounded-full' }, String(order.items?.length || 0))
      ));
      // Total
      row.append(el('div', { className: 'col-span-3 md:col-span-2' },
        el('p', { className: 'font-black text-gray-900 text-sm' }, `R${Number(order.total).toFixed(2)}`),
        order.commission ? el('p', { className: 'text-xs text-green-600 font-semibold' }, `comm. R${Number(order.commission.amount).toFixed(2)}`) : null
      ));
      // Ambassador
      row.append(el('div', { className: 'hidden md:block col-span-2' },
        order.ambassador
          ? el('span', { className: 'text-xs bg-brand-light text-brand-dark font-bold px-2 py-0.5 rounded-full' }, order.ambassador.code)
          : el('span', { className: 'text-xs text-gray-300' }, '—')
      ));
      // Status badge
      row.append(el('div', { className: 'hidden md:block col-span-1' },
        badge(order.status, STATUS_COLORS[order.status] || '#999')
      ));
      // Expand toggle
      row.append(el('div', { className: 'col-span-3 md:col-span-1 flex items-center justify-end gap-2' },
        el('div', { className: 'md:hidden' }, badge(order.status, STATUS_COLORS[order.status] || '#999')),
        el('span', { className: `text-gray-400 text-sm font-bold transition-transform ${isExpanded ? 'rotate-180' : ''}` }, '▼')
      ));

      rowWrap.append(row);

      // ── Expanded detail panel ──
      if (isExpanded) {
        const panel = el('div', { className: 'bg-orange-50 border-l-4 border-brand px-5 pb-6 pt-4 space-y-4' });

        // Items breakdown table
        if (order.items?.length) {
          panel.append(
            el('div', { className: 'bg-white rounded-xl overflow-hidden border border-gray-100' },
              el('div', { className: 'px-4 py-2.5 bg-gray-50 border-b border-gray-100' },
                el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider' }, `Order Items (${order.items.length})`)
              ),
              el('div', { className: 'divide-y divide-gray-50' },
                ...order.items.map(item => {
                  const pname   = item.variant?.product?.name || 'Unknown Product';
                  const vname   = item.variant?.name || '';
                  const unitP   = Number(item.unitPrice || 0);
                  const qty     = item.quantity;
                  return el('div', { className: 'px-4 py-3 flex justify-between items-center' },
                    el('div', {},
                      el('p', { className: 'text-sm font-semibold text-gray-900' }, pname + (vname ? ` — ${vname}` : '')),
                      el('p', { className: 'text-xs text-gray-400 mt-0.5' }, `${qty} × R${unitP.toFixed(2)} each`)
                    ),
                    el('p', { className: 'font-black text-gray-900 text-sm' }, `R${(unitP * qty).toFixed(2)}`)
                  );
                }),
                // Totals footer
                el('div', { className: 'px-4 py-3 bg-gray-50 space-y-1' },
                  el('div', { className: 'flex justify-between text-xs text-gray-500' },
                    el('span', {}, 'Subtotal'), el('span', {}, `R${Number(order.subtotal || 0).toFixed(2)}`)
                  ),
                  el('div', { className: 'flex justify-between text-xs text-gray-500' },
                    el('span', {}, 'Delivery fee'), el('span', {}, `R${Number(order.deliveryFee || 0).toFixed(2)}`)
                  ),
                  el('div', { className: 'flex justify-between text-sm font-black text-gray-900 mt-1 pt-1.5 border-t border-gray-200' },
                    el('span', {}, 'Total'), el('span', {}, `R${Number(order.total).toFixed(2)}`)
                  )
                )
              )
            )
          );
        }

        // Customer + Ambassador cards
        const infoRow = el('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3' });

        // Customer card
        infoRow.append(
          el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100 space-y-1' },
            el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '👤 Customer'),
            el('p', { className: 'font-bold text-gray-900' }, `${order.customer?.firstName || ''} ${order.customer?.lastName || ''}`),
            order.customer?.email ? el('a', { href: `mailto:${order.customer.email}`, className: 'text-sm text-blue-500 hover:underline block' }, order.customer.email) : null,
            order.customer?.phone ? el('a', { href: `tel:${order.customer.phone}`, className: 'text-sm text-brand hover:underline block' }, order.customer.phone) : null
          )
        );

        // Ambassador card
        if (order.ambassador) {
          const comm = order.commission;
          infoRow.append(
            el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100' },
              el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '🌟 Ambassador'),
              el('p', { className: 'font-black text-brand text-lg tracking-wide' }, order.ambassador.code),
              comm
                ? el('div', { className: 'mt-1 flex items-center gap-2 flex-wrap' },
                    el('span', { className: 'text-sm font-semibold text-gray-700' }, `R${Number(comm.amount).toFixed(2)} commission`),
                    badge(comm.status, comm.status === 'PAID' ? '#10B981' : '#F59E0B')
                  )
                : el('p', { className: 'text-xs text-gray-400 mt-1' }, 'Commission generated on confirmation')
            )
          );
        }

        // Dates card
        infoRow.append(
          el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100 space-y-1' },
            el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider mb-2' }, '🕐 Timeline'),
            el('p', { className: 'text-sm text-gray-600' }, `Placed: ${dateStr} at ${timeStr}`),
            ...((order.statusLogs || []).map(log => {
              const logDate = new Date(log.createdAt).toLocaleTimeString('en-ZA', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
              return el('p', { className: 'text-xs text-gray-400' },
                el('span', { className: 'font-semibold', style: { color: STATUS_COLORS[log.status] || '#999' } }, log.status),
                ` — ${logDate}${log.note ? ` · "${log.note}"` : ''}`
              );
            }))
          )
        );

        panel.append(infoRow);

        // Customer note
        if (order.notes) {
          panel.append(
            el('div', { className: 'bg-yellow-50 border border-yellow-200 rounded-xl px-4 py-3' },
              el('p', { className: 'text-xs font-black text-yellow-600 uppercase tracking-wider mb-1' }, '📝 Customer Note'),
              el('p', { className: 'text-sm text-yellow-900' }, order.notes)
            )
          );
        }

        // ── Status action panel ──
        if (!isTerminal) {
          const nextAction = STATUS_NEXT_ACTION[order.status];

          let cancelNote = '';
          let showingCancelInput = false;

          const cancelNoteInput = el('input', {
            type: 'text', placeholder: 'Reason for cancellation (optional)…',
            className: 'flex-1 min-w-48 border border-red-200 rounded-xl px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-red-400 hidden',
            onInput: e => { cancelNote = e.target.value; },
          });

          const cancelBtn = el('button', {
            className: 'border-2 border-red-300 text-red-500 text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-red-50 transition',
          }, '✕ Cancel Order');

          cancelBtn.addEventListener('click', async () => {
            if (!showingCancelInput) {
              showingCancelInput = true;
              cancelNoteInput.classList.remove('hidden');
              cancelBtn.textContent = '✕ Confirm Cancellation';
              cancelBtn.className = 'bg-red-500 text-white text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-red-600 transition';
              return;
            }
            cancelBtn.disabled = true; cancelBtn.textContent = 'Cancelling…';
            try {
              await api.orders.updateStatus(order.id, 'CANCELLED', cancelNote || undefined);
              toast('Order cancelled', 'success'); reload();
            } catch (err) { toast(err.message || 'Failed'); cancelBtn.disabled = false; cancelBtn.textContent = '✕ Confirm Cancellation'; }
          });

          const actionsRow = el('div', { className: 'flex flex-wrap gap-2 items-center' });

          if (nextAction) {
            const advBtn = el('button', {
              className: `text-sm font-bold px-6 py-2.5 rounded-xl transition ${nextAction.btnClass}`,
            }, nextAction.label);
            advBtn.addEventListener('click', async () => {
              advBtn.disabled = true; advBtn.textContent = 'Updating…';
              try {
                const result = await api.orders.updateStatus(order.id, nextAction.next);
                if (result?.fulfilledFromStock) {
                  toast('✅ Stock available — baking skipped! Order is now Ready.', 'success');
                } else {
                  const actual = result?.status || result?.actualStatus || nextAction.next;
                  const labels = { BAKING: '🍞 Sent to baking', READY: '✅ Marked Ready', DELIVERED: '🚚 Delivered', CONFIRMED: '✓ Confirmed' };
                  toast(labels[actual] || `Marked ${actual} ✓`, 'success');
                }
                reload();
              } catch (err) { toast(err.message || 'Failed'); advBtn.disabled = false; advBtn.textContent = nextAction.label; }
            });
            actionsRow.append(advBtn);
          }

          actionsRow.append(cancelNoteInput, cancelBtn);

          panel.append(
            el('div', { className: 'bg-white rounded-xl p-4 border border-gray-100' },
              el('div', { className: 'flex items-center justify-between mb-3 flex-wrap gap-2' },
                el('p', { className: 'text-xs font-black text-gray-400 uppercase tracking-wider' }, 'Update Status'),
                statusStepper(order.status)
              ),
              actionsRow
            )
          );
        } else {
          panel.append(
            el('div', {
              className: `rounded-xl px-4 py-3 text-sm font-semibold ${order.status === 'DELIVERED' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-600 border border-red-200'}`
            },
              order.status === 'DELIVERED'
                ? '✅ This order has been successfully delivered.'
                : `✕ This order was cancelled.${(order.statusLogs || []).find(l => l.status === 'CANCELLED' && l.note) ? ' Reason: "' + order.statusLogs.find(l => l.status === 'CANCELLED').note + '"' : ''}`
            )
          );
        }

        rowWrap.append(panel);
      }

      tbody.append(rowWrap);
    });

    table.append(tbody);
    tableWrap.append(table);
  }

  renderChips();
  renderTable();
  container.append(page);
}

// ── ADMIN: PLACE ORDER FOR CLIENT ─────────────────────────────────────────
function showAdminPlaceOrderModal(customers, products, onDone) {
  // ── STATE ──────────────────────────────────────────────────────────────────
  let step = 1;
  let selectedCustomer = null;
  let cart = []; // { variantId, productName, variantName, unitPrice, quantity }
  let ambassadorCode = '';
  let notes = '';

  const custList = [...(customers || [])]; // local mutable copy so new customers can be pushed

  const catMap = new Map();
  (products || []).filter(p => p.isActive).forEach(p => { if (p.category) catMap.set(p.category.id, p.category); });
  const categories = [...catMap.values()];

  // ── SHELL ──────────────────────────────────────────────────────────────────
  const overlay = el('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-2 sm:p-4' });
  const panel = el('div', { className: 'bg-white rounded-2xl w-full max-w-4xl h-[92vh] flex flex-col shadow-2xl overflow-hidden' });
  const close = () => document.body.removeChild(overlay);

  // Header
  const stepBarEl = el('div', { className: 'flex items-center gap-1 sm:gap-2' });
  const header = el('div', { className: 'flex items-center justify-between px-5 py-3.5 border-b border-gray-100 flex-shrink-0 gap-4' },
    el('h2', { className: 'font-black text-gray-900 text-base sm:text-lg flex-shrink-0' }, 'Place Order for Client'),
    stepBarEl,
    el('button', { className: 'text-gray-400 hover:text-gray-600 text-2xl font-bold ml-2 flex-shrink-0', onClick: close }, '×'),
  );
  panel.append(header);

  // Content (scrollable)
  const content = el('div', { className: 'flex-1 min-h-0 overflow-y-auto' });
  panel.append(content);

  // Footer (fixed)
  const footer = el('div', { className: 'flex-shrink-0 px-5 py-4 border-t border-gray-100 bg-white' });
  panel.append(footer);

  function cartTotal() { return cart.reduce((s, i) => s + i.unitPrice * i.quantity, 0); }
  function cartCount() { return cart.reduce((s, i) => s + i.quantity, 0); }

  function renderStepBar() {
    stepBarEl.innerHTML = '';
    ['Customer', 'Build Order', 'Review'].forEach((s, i) => {
      const num = i + 1, done = step > num, active = step === num;
      stepBarEl.append(
        el('div', { className: 'flex items-center gap-1' },
          el('div', {
            className: `w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 transition ${done ? 'bg-green-500 text-white' : active ? 'bg-brand text-white' : 'bg-gray-200 text-gray-400'}`,
          }, done ? '✓' : String(num)),
          el('span', { className: `text-xs font-semibold hidden sm:block ${active ? 'text-gray-900' : 'text-gray-400'}` }, s),
        ),
        i < 2 ? el('div', { className: 'w-3 sm:w-5 h-px bg-gray-200 mx-0.5' }) : null,
      );
    });
  }

  // ── STEP 1: CUSTOMER ───────────────────────────────────────────────────────
  function renderStep1() {
    content.innerHTML = '';
    footer.innerHTML = '';
    let searchQ = '';
    let showCreate = false;
    let newCust = { firstName: '', lastName: '', email: '', phone: '', password: '' };

    const listEl = el('div', {});
    const createEl = el('div', {});

    function displayName(c) { return `${c.firstName || ''} ${c.lastName || ''}`.trim() || 'Unknown'; }

    function renderList() {
      listEl.innerHTML = '';
      const q = searchQ.toLowerCase().trim();
      const filtered = q
        ? custList.filter(c => displayName(c).toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q) || (c.phone || '').toLowerCase().includes(q))
        : custList.slice().sort((a, b) => displayName(a).localeCompare(displayName(b)));
      const shown = filtered.slice(0, 30);

      if (!shown.length) {
        listEl.append(el('p', { className: 'text-sm text-gray-400 text-center py-8' }, q ? 'No customers match your search' : 'No customers yet'));
        return;
      }
      shown.forEach(c => {
        const isSelected = selectedCustomer?.id === c.id;
        const initials = ((c.firstName?.[0] || '') + (c.lastName?.[0] || '')).toUpperCase() || '?';
        listEl.append(el('button', {
          className: `w-full text-left px-5 py-3 border-b border-gray-50 hover:bg-orange-50 transition flex items-center gap-3 ${isSelected ? 'bg-orange-50' : ''}`,
          onClick: () => { selectedCustomer = isSelected ? null : c; renderList(); renderBanner(); updateFooter(); },
        },
          el('div', { className: `w-8 h-8 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 ${isSelected ? 'bg-brand text-white' : 'bg-gray-100 text-gray-500'}` }, initials),
          el('div', { className: 'flex-1 min-w-0' },
            el('p', { className: 'font-semibold text-gray-900 text-sm' }, displayName(c)),
            el('p', { className: 'text-xs text-gray-400 truncate' }, c.email || ''),
          ),
          isSelected ? el('span', { className: 'text-green-500 font-black text-sm flex-shrink-0' }, '✓') : null,
        ));
      });
      if (filtered.length > 30) {
        listEl.append(el('p', { className: 'text-xs text-gray-400 text-center py-2' }, `${filtered.length - 30} more — type to narrow down`));
      }
    }

    function renderCreate() {
      createEl.innerHTML = '';
      if (!showCreate) return;
      const inputs = {};
      const fields = [
        { key: 'firstName', ph: 'First Name *', type: 'text', half: true },
        { key: 'lastName',  ph: 'Last Name *',  type: 'text', half: true },
        { key: 'email',     ph: 'Email *',       type: 'email' },
        { key: 'phone',     ph: 'Phone (optional)', type: 'tel' },
        { key: 'password',  ph: 'Password *',    type: 'password' },
      ];
      const form = el('div', { className: 'mx-5 mb-4 p-4 border border-brand border-opacity-30 rounded-xl bg-orange-50 space-y-2' },
        el('p', { className: 'text-xs font-black text-gray-500 uppercase tracking-wider mb-1' }, '+ New Customer'),
      );
      const halfRow = el('div', { className: 'grid grid-cols-2 gap-2' });
      fields.forEach(f => {
        const inp = el('input', {
          type: f.type, placeholder: f.ph, value: newCust[f.key] || '',
          className: 'w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-brand bg-white',
          onInput: e => { newCust[f.key] = e.target.value; },
        });
        inputs[f.key] = inp;
        if (f.half) { halfRow.append(inp); }
        else { form.append(inp); }
      });
      form.insertBefore(halfRow, form.children[1]);
      const createBtn = el('button', {
        className: 'w-full bg-brand text-white text-sm font-bold py-2 rounded-lg hover:opacity-90 transition',
        onClick: async () => {
          if (!newCust.firstName || !newCust.lastName || !newCust.email || !newCust.password) {
            toast('First name, last name, email and password are required', 'error'); return;
          }
          createBtn.disabled = true; createBtn.textContent = 'Creating…';
          try {
            const { user } = await api.auth.register(newCust);
            custList.push(user);
            selectedCustomer = user;
            showCreate = false;
            newCust = { firstName: '', lastName: '', email: '', phone: '', password: '' };
            toast(`${user.firstName} ${user.lastName} created`, 'success');
            searchQ = '';
            searchInput.value = '';
            renderList(); renderCreate(); renderBanner(); updateFooter();
          } catch (err) { toast(err?.message || 'Failed to create customer', 'error'); createBtn.disabled = false; createBtn.textContent = 'Create Customer'; }
        },
      }, 'Create Customer');
      const cancelBtn = el('button', {
        className: 'w-full text-sm text-gray-500 hover:text-gray-700 py-1',
        onClick: () => { showCreate = false; renderCreate(); },
      }, 'Cancel');
      form.append(createBtn, cancelBtn);
      createEl.append(form);
    }

    const bannerEl = el('div', { className: 'px-5 py-3 border-b border-gray-100' });
    function renderBanner() {
      bannerEl.innerHTML = '';
      if (!selectedCustomer) { bannerEl.classList.add('hidden'); return; }
      bannerEl.classList.remove('hidden');
      bannerEl.append(el('div', { className: 'flex items-center gap-2 bg-green-50 border border-green-200 rounded-xl px-4 py-2.5' },
        el('span', { className: 'text-green-600 font-bold text-sm' }, '✓'),
        el('span', { className: 'font-semibold text-gray-900 text-sm' }, displayName(selectedCustomer)),
        selectedCustomer.email ? el('span', { className: 'text-gray-400 text-xs truncate' }, `· ${selectedCustomer.email}`) : null,
        el('button', { className: 'ml-auto text-xs text-gray-400 hover:text-red-500 transition', onClick: () => { selectedCustomer = null; renderBanner(); updateFooter(); } }, '✕ Change'),
      ));
    }
    bannerEl.classList.add('hidden');

    const searchInput = el('input', {
      type: 'text', placeholder: '🔍  Type name, email, or phone to search…',
      className: 'w-full border-0 border-b border-gray-100 px-5 py-3 text-sm outline-none focus:bg-orange-50 transition placeholder-gray-400',
      onInput: e => { searchQ = e.target.value; renderList(); },
    });

    const createToggleBtn = el('button', {
      className: 'w-full px-5 py-3 text-sm font-bold text-brand hover:bg-orange-50 transition text-left border-t border-gray-100 flex items-center gap-2',
      onClick: () => { showCreate = !showCreate; renderCreate(); },
    }, '+ Create New Customer');

    content.append(bannerEl, searchInput, listEl, createToggleBtn, createEl);

    function updateFooter() {
      footer.innerHTML = '';
      footer.append(el('button', {
        className: `w-full font-black py-3 rounded-xl transition ${selectedCustomer ? 'bg-brand text-white hover:opacity-90' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`,
        disabled: !selectedCustomer,
        onClick: () => { if (selectedCustomer) { step = 2; renderStep2(); renderStepBar(); } },
      }, 'Next: Build Order →'));
    }

    renderList(); renderBanner(); updateFooter();
  }

  // ── STEP 2: BUILD ORDER ────────────────────────────────────────────────────
  function renderStep2() {
    content.innerHTML = '';
    content.classList.remove('overflow-y-auto');
    content.classList.add('overflow-hidden', 'flex');
    footer.innerHTML = '';

    let productSearch = '';
    let activeCat = null;

    function addToCart(variantId, productName, variantName, unitPrice) {
      const existing = cart.find(c => c.variantId === variantId);
      if (existing) { existing.quantity++; }
      else { cart.push({ variantId, productName, variantName, unitPrice, quantity: 1 }); }
      updateCart();
    }
    function decFromCart(variantId) {
      const idx = cart.findIndex(c => c.variantId === variantId);
      if (idx === -1) return;
      if (cart[idx].quantity > 1) { cart[idx].quantity--; } else { cart.splice(idx, 1); }
      updateCart();
    }

    // ── Left: product browser ─────────────────────────────────────────────
    const left = el('div', { className: 'flex-1 min-w-0 overflow-y-auto p-4' });

    const catRow = el('div', { className: 'flex gap-2 flex-wrap mb-3' });
    function renderCats() {
      catRow.innerHTML = '';
      [{ id: null, name: 'All' }, ...categories].forEach(cat => {
        const active = activeCat === cat.id;
        catRow.append(el('button', {
          className: `px-3 py-1 text-xs font-bold rounded-full border-2 transition ${active ? 'bg-brand border-brand text-white' : 'bg-white border-gray-200 text-gray-600 hover:border-brand'}`,
          onClick: () => { activeCat = cat.id; renderCats(); renderGrid(); },
        }, cat.name));
      });
    }

    const productGrid = el('div', { className: 'grid grid-cols-2 sm:grid-cols-3 gap-3' });
    function renderGrid() {
      productGrid.innerHTML = '';
      const q = productSearch.toLowerCase().trim();
      const filtered = (products || []).filter(p => {
        if (!p.isActive) return false;
        if (q && !p.name.toLowerCase().includes(q)) return false;
        if (activeCat !== null && p.categoryId !== activeCat) return false;
        return (p.variants || []).some(v => v.isActive !== false);
      });
      if (!filtered.length) {
        productGrid.append(el('div', { className: 'col-span-full text-center py-10 text-sm text-gray-400' }, 'No products found'));
        return;
      }
      filtered.forEach(p => {
        const imgs = Array.isArray(p.images) ? p.images : [];
        const imgUrl = p.imageUrl || imgs.find(i => i.isPrimary)?.url || imgs[0]?.url || null;
        const variants = (p.variants || []).filter(v => v.isActive !== false);
        const card = el('div', { className: 'bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden' });
        const imgBox = el('div', { className: 'aspect-video bg-orange-50 overflow-hidden flex items-center justify-center' });
        if (imgUrl) { const img = el('img', { className: 'w-full h-full object-cover', alt: p.name }); img.src = imgUrl; imgBox.append(img); }
        else { imgBox.append(makeLogo(32, 'rounded-lg opacity-30')); }
        card.append(imgBox);
        const body = el('div', { className: 'p-2.5' });
        body.append(el('p', { className: 'font-bold text-gray-900 text-xs mb-1.5 truncate' }, p.name));
        variants.forEach(v => {
          const price = Number(v.prices?.find(px => px.tier === 'RETAIL')?.price ?? v.prices?.[0]?.price ?? v.retailPrice ?? 0);
          const inCart = cart.find(c => c.variantId === v.id);
          body.append(el('div', { className: 'flex items-center justify-between py-1 border-t border-gray-50' },
            el('div', { className: 'min-w-0 mr-1' },
              variants.length > 1 ? el('p', { className: 'text-xs text-gray-600 truncate' }, v.name || 'Default') : null,
              el('p', { className: 'text-xs font-bold text-brand' }, `R${price.toFixed(2)}`),
            ),
            inCart
              ? el('div', { className: 'flex items-center gap-1 flex-shrink-0' },
                  el('button', { className: 'w-5 h-5 rounded-full bg-gray-100 text-gray-700 text-xs font-bold flex items-center justify-center hover:bg-gray-200 transition', onClick: () => { decFromCart(v.id); renderGrid(); } }, '−'),
                  el('span', { className: 'text-xs font-black w-4 text-center text-gray-900' }, String(inCart.quantity)),
